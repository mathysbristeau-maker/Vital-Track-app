<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Vital Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VITAL TRACK — Webapp complète, monofichier, localStorage
   Charte graphique v1.0 strictement respectée
   ============================================================ */
:root {
  --bone:#FAFAF8; --cloud:#F4F5F2; --hairline:#E8E8E5;
  --sage-pale:#E8EFE9; --sage:#8AA89B; --sage-deep:#5C7A6D;
  --stone:#1A1F1C; --graphite:#4A5550; --mist:#8E9893;
  --terra:#D4956A; --crimson:#C5524A;
  --font-display:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
  --font-text:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif;
  --font-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;
  --r-input:8px; --r-button:12px; --r-card:16px; --r-pill:28px;
  --t-micro:150ms; --t-comp:300ms;
  --ease-std:cubic-bezier(0.4,0,0.2,1);
  --ease-out:cubic-bezier(0,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bone);color:var(--stone);font-family:var(--font-text);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{overflow:hidden}
button{font-family:inherit}
input,select,textarea{font-family:inherit}
.app-frame{width:100%;max-width:430px;height:100vh;margin:0 auto;background:var(--bone);position:relative;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--hairline);border-right:1px solid var(--hairline)}
@media(min-width:768px){body{background:var(--cloud);display:flex;align-items:center;justify-content:center}.app-frame{height:min(900px,100vh);max-height:900px;border-radius:32px;border:1px solid var(--hairline);overflow:hidden}}
.status-bar{height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--stone)}
.status-bar .right-icons{display:flex;align-items:center;gap:6px}
.screen-container{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 24px 24px;scrollbar-width:none;animation:fadeIn 300ms var(--ease-out)}
.screen-container::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.t-display{font-family:var(--font-display);font-size:34px;font-weight:700;line-height:1.2;letter-spacing:-0.5px}
.t-h1{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1.2;letter-spacing:-0.3px}
.t-h2{font-family:var(--font-display);font-size:20px;font-weight:600;line-height:1.3}
.t-h3{font-family:var(--font-display);font-size:16px;font-weight:600;line-height:1.3}
.t-body{font-family:var(--font-text);font-size:15px;font-weight:400;line-height:1.4}
.t-caption{font-family:var(--font-text);font-size:12px;font-weight:400;color:var(--mist)}
.t-legend{font-family:var(--font-text);font-size:10px;font-weight:400;color:var(--mist)}
.t-mono-xl{font-family:var(--font-mono);font-size:44px;font-weight:700;line-height:1;letter-spacing:-1px}
.t-mono-lg{font-family:var(--font-mono);font-size:28px;font-weight:700;line-height:1}
.t-mono{font-family:var(--font-mono);font-size:16px;font-weight:600}
.t-mono-sm{font-family:var(--font-mono);font-size:13px;font-weight:500}
.t-graphite{color:var(--graphite)} .t-mist{color:var(--mist)} .t-sage{color:var(--sage-deep)}
.screen-header{padding-top:8px;padding-bottom:24px}
.screen-header .greeting{color:var(--mist);font-size:13px;font-weight:500;margin-bottom:4px}
.card{background:var(--cloud);border-radius:var(--r-card);padding:24px;margin-bottom:16px}
.card.bone{background:var(--bone);border:1px solid var(--hairline)}
.card-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.btn{height:56px;border:none;border-radius:var(--r-pill);font-family:var(--font-display);font-size:17px;font-weight:600;cursor:pointer;transition:all var(--t-micro) var(--ease-std);display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 24px;width:100%}
.btn-primary{background:var(--sage);color:var(--bone)}
.btn-primary:active{background:var(--sage-deep)}
.btn-secondary{background:transparent;color:var(--stone);border:1px solid var(--hairline)}
.btn-tertiary{background:transparent;color:var(--sage-deep);height:auto;padding:8px;border:none;cursor:pointer;font-family:var(--font-display);font-weight:600}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-small{height:36px;font-size:13px;padding:0 16px;border-radius:18px;width:auto;border:none;cursor:pointer;font-family:var(--font-display);font-weight:600}
.btn-icon{width:44px;height:44px;border-radius:22px;display:inline-flex;align-items:center;justify-content:center;background:var(--cloud);border:none;cursor:pointer;color:var(--stone);transition:background var(--t-micro)}
.btn-icon:active{background:var(--hairline)}
.input-group{margin-bottom:16px}
.input-label{display:block;font-size:13px;color:var(--mist);margin-bottom:8px;font-weight:500}
.input{width:100%;height:56px;background:var(--cloud);border:1px solid transparent;border-radius:var(--r-button);padding:0 16px;font-family:var(--font-text);font-size:17px;color:var(--stone);transition:border-color var(--t-micro) var(--ease-std)}
.input:focus{outline:none;border-color:var(--sage)}
select.input{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14' fill='none' stroke='%238E9893' stroke-width='2'><path d='M3 5 L7 9 L11 5'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:40px}
.chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:16px;background:var(--cloud);color:var(--stone);font-family:var(--font-text);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all var(--t-micro) var(--ease-std)}
.chip.active{background:var(--sage-pale);color:var(--sage-deep)}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tab-bar{height:84px;flex-shrink:0;background:var(--bone);border-top:1px solid var(--hairline);display:flex;align-items:flex-start;justify-content:space-around;padding-top:12px;padding-bottom:24px}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--mist);padding:4px 8px;transition:color var(--t-micro) var(--ease-std);flex:1}
.tab-item.active{color:var(--sage-deep)}
.tab-item .tab-label{font-size:11px;font-weight:500}
.tab-item svg{width:24px;height:24px}
.calorie-ring-wrap{display:flex;align-items:center;justify-content:center;margin:8px 0 24px;position:relative}
.ring-svg{transform:rotate(-90deg)}
.ring-track{stroke:var(--sage-pale);fill:none}
.ring-progress{stroke:var(--sage);fill:none;stroke-linecap:round;transition:stroke-dashoffset 800ms var(--ease-out)}
.ring-center{position:absolute;text-align:center;display:flex;flex-direction:column;align-items:center}
.ring-center .num{font-family:var(--font-mono);font-size:44px;font-weight:700;color:var(--stone);line-height:1;letter-spacing:-1px}
.ring-center .unit{font-family:var(--font-text);font-size:13px;color:var(--mist);margin-top:8px}
.ring-center .sub{font-family:var(--font-mono);font-size:13px;color:var(--mist);margin-top:4px}
.macro-row{margin-bottom:16px}
.macro-row:last-child{margin-bottom:0}
.macro-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.macro-name{font-size:13px;color:var(--graphite);font-weight:500}
.macro-vals{font-family:var(--font-mono);font-size:13px;color:var(--stone);font-weight:600}
.macro-vals .total{color:var(--mist);font-weight:500}
.macro-bar{height:6px;background:var(--sage-pale);border-radius:3px;overflow:hidden}
.macro-bar-fill{height:100%;background:var(--sage);border-radius:3px;transition:width 800ms var(--ease-out)}
.list-item{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--hairline)}
.list-item:last-child{border-bottom:none}
.list-item-icon{width:40px;height:40px;border-radius:20px;background:var(--sage-pale);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--sage-deep)}
.list-item-content{flex:1;min-width:0}
.list-item-title{font-size:15px;font-weight:500;color:var(--stone);margin-bottom:2px}
.list-item-sub{font-size:13px;color:var(--mist)}
.list-item-trail{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--graphite)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.week-day{aspect-ratio:1/1.4;background:var(--cloud);border-radius:12px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all var(--t-micro) var(--ease-std);border:1px solid transparent}
.week-day.today{background:var(--sage-pale);border-color:var(--sage)}
.week-day.done{background:var(--sage)}
.week-day.done .week-day-name,.week-day.done .week-day-num{color:var(--bone)}
.week-day-name{font-size:11px;color:var(--mist);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.week-day-num{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--stone);margin-top:4px}
.week-day.today .week-day-name,.week-day.today .week-day-num{color:var(--sage-deep)}
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-tile{background:var(--cloud);border-radius:16px;padding:16px;text-align:left}
.stat-tile-label{font-size:11px;color:var(--mist);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.stat-tile-value{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--stone)}
.stat-tile-unit{font-family:var(--font-mono);font-size:13px;color:var(--mist);font-weight:500;margin-left:2px}
.stat-tile-trend{font-size:11px;color:var(--sage-deep);margin-top:4px;font-weight:500}
.streak-card{background:var(--bone);border:1px solid var(--hairline);border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.streak-icon{width:48px;height:48px;border-radius:24px;background:var(--sage-pale);display:flex;align-items:center;justify-content:center;color:var(--terra);flex-shrink:0}
.streak-content{flex:1}
.streak-num{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--stone);line-height:1}
.streak-label{font-size:13px;color:var(--mist);margin-top:4px}
.chart-wrap{height:180px;position:relative;margin-bottom:16px}
.chart-wrap svg{width:100%;height:100%}
.chart-line{fill:none;stroke:var(--sage);stroke-width:2}
.chart-area{fill:var(--sage-pale);opacity:0.5}
.chart-target{fill:none;stroke:var(--mist);stroke-width:1;stroke-dasharray:4 4}
.chart-dot{fill:var(--sage-deep)}
.period-selector{display:flex;background:var(--cloud);border-radius:12px;padding:4px;margin-bottom:24px}
.period-btn{flex:1;background:none;border:none;padding:8px 4px;font-family:var(--font-text);font-size:13px;font-weight:500;color:var(--mist);border-radius:8px;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.period-btn.active{background:var(--bone);color:var(--stone)}
.exercise-guide{background:var(--cloud);border-radius:16px;padding:24px;margin-bottom:16px}
.exercise-guide h3{font-family:var(--font-display);font-size:20px;font-weight:600;margin-bottom:8px;color:var(--stone)}
.exercise-guide .muscles{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.exercise-guide .muscle-tag{background:var(--sage-pale);color:var(--sage-deep);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500}
.exercise-guide ol{padding-left:20px;margin-bottom:16px}
.exercise-guide ol li{font-size:14px;color:var(--graphite);margin-bottom:8px;line-height:1.5}
.exercise-guide .pro-tip{background:var(--sage-pale);border-radius:12px;padding:16px;margin-top:16px}
.exercise-guide .pro-tip-label{font-size:11px;font-weight:600;color:var(--sage-deep);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.exercise-guide .pro-tip-text{font-size:13px;color:var(--graphite);line-height:1.5}
.chat-input-wrap{display:flex;gap:8px;align-items:center;margin-top:8px}
.chat-input{flex:1;height:48px;background:var(--cloud);border:none;border-radius:24px;padding:0 20px;font-family:var(--font-text);font-size:15px}
.chat-input:focus{outline:none}
.onboarding-screen{display:flex;flex-direction:column;height:100%;padding:16px 24px 24px;animation:fadeIn 300ms var(--ease-out)}
.onboarding-content{flex:1;display:flex;flex-direction:column;justify-content:center}
.onboarding-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--sage),var(--sage-deep));display:flex;align-items:center;justify-content:center;color:var(--bone);margin-bottom:32px}
.onboarding-title{font-family:var(--font-display);font-size:32px;font-weight:700;line-height:1.15;letter-spacing:-0.5px;margin-bottom:16px}
.onboarding-subtitle{font-size:16px;color:var(--mist);line-height:1.5;margin-bottom:32px}
.step-dots{display:flex;gap:6px;margin-bottom:24px}
.step-dot{height:4px;border-radius:2px;background:var(--hairline);flex:1;transition:background var(--t-micro)}
.step-dot.active{background:var(--sage)}
.segment-group{display:grid;gap:8px;margin-bottom:24px}
.segment-option{background:var(--cloud);border:1px solid transparent;border-radius:12px;padding:16px 20px;font-family:var(--font-text);font-size:15px;color:var(--stone);cursor:pointer;text-align:left;transition:all var(--t-micro) var(--ease-std);display:flex;align-items:center;justify-content:space-between}
.segment-option.selected{border-color:var(--sage);background:var(--sage-pale);color:var(--sage-deep)}
.segment-option .check{opacity:0;color:var(--sage-deep);transition:opacity var(--t-micro)}
.segment-option.selected .check{opacity:1}
.recipe-image{height:200px;border-radius:16px;background:linear-gradient(135deg,var(--sage-pale),var(--cloud));margin-bottom:16px;display:flex;align-items:center;justify-content:center;color:var(--sage-deep)}
.recipe-meta{display:flex;gap:24px;margin-bottom:24px}
.recipe-meta-item .label{font-size:11px;color:var(--mist);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.recipe-meta-item .value{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--stone)}
.measure-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--hairline)}
.measure-item:last-child{border-bottom:none}
.measure-name{font-size:15px;color:var(--stone)}
.measure-value{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--graphite)}
.kinetic-row{display:grid;grid-template-columns:1fr auto 96px auto;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--hairline)}
.kinetic-row:last-child{border-bottom:none}
.kinetic-row.paired{display:block;padding:14px 0;border-bottom:1px solid var(--hairline)}
.kinetic-row.paired:last-child{border-bottom:none}
.kinetic-label{display:flex;flex-direction:column;gap:2px;min-width:0}
.kinetic-name{font-size:14px;color:var(--stone);font-weight:500}
.kinetic-meta{font-size:11px;color:var(--mist)}
.kinetic-value{display:flex;align-items:baseline;color:var(--stone)}
.kinetic-spark{width:96px;height:32px;display:flex;align-items:center}
.kinetic-spark .spark{width:100%;height:100%}
.kinetic-trend{display:flex;align-items:center;gap:4px;justify-content:flex-end;min-width:72px}
.kinetic-delta{font-family:var(--font-mono);font-size:12px;font-weight:600;white-space:nowrap}
.kinetic-pair{display:grid;grid-template-columns:1fr 1px 1fr;gap:12px;align-items:stretch}
.kinetic-pair-sep{background:var(--hairline);width:1px}
.kinetic-side{display:flex;flex-direction:column;gap:6px}
.kinetic-side-lab{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:500}
.kinetic-side-val{display:flex;align-items:baseline;color:var(--stone)}
.kinetic-side-spark{height:28px;display:flex;align-items:center}
.kinetic-side-spark .spark{width:100%;height:100%}
.kinetic-side-trend{display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:12px;font-weight:600}
.hist-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--hairline)}
.hist-row:last-child{border-bottom:none}
.hist-content{flex:1;min-width:0}
.hist-primary{display:flex;align-items:baseline;color:var(--stone)}
.hist-meta{font-size:12px;color:var(--mist);margin-top:4px}
.btn-icon.pending{background:var(--crimson);color:var(--bone)}
.match-badge{font-family:var(--font-mono);font-size:13px;font-weight:700;padding:6px 10px;border-radius:8px;background:var(--cloud);color:var(--graphite);white-space:nowrap}
.match-badge.ready{background:var(--sage-pale);color:var(--sage-deep)}
.match-badge.almost{background:#FFF4E8;color:var(--terra)}
.match-badge.partial{background:var(--cloud);color:var(--mist)}
.match-bar{height:4px;background:var(--hairline);border-radius:2px;overflow:hidden;margin-top:4px}
.match-bar-fill{height:100%;border-radius:2px;transition:width 600ms var(--ease-out)}
.match-bar-fill.ready{background:var(--sage-deep)}
.match-bar-fill.almost{background:var(--terra)}
.match-bar-fill.partial{background:var(--mist)}
.shopping-item .shopping-name{cursor:pointer}
.session-timer-pill{display:flex;align-items:center;gap:8px;background:var(--sage-pale);color:var(--sage-deep);padding:8px 14px;border-radius:20px;font-family:var(--font-mono);font-size:14px;font-weight:600}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
.target-editor{background:var(--bone);border:1px solid var(--hairline);border-radius:12px;padding:16px;margin-bottom:16px}
.rest-trigger{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:40px;margin-top:12px;background:var(--bone);border:1px dashed var(--sage);border-radius:12px;color:var(--sage-deep);font-family:var(--font-text);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.rest-trigger:active{background:var(--sage-pale)}
.add-exo-card{background:var(--bone);border:1px dashed var(--sage);cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.add-exo-card:active{background:var(--sage-pale)}
.rest-modal{position:absolute;inset:0;background:rgba(26,31,28,0.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;animation:fadeIn 200ms var(--ease-out)}
.rest-modal-card{background:var(--bone);border-radius:24px;padding:40px 24px;text-align:center;width:100%;max-width:320px}
.rest-modal-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--mist);font-weight:600;margin-bottom:12px}
.rest-modal-time{font-family:var(--font-mono);font-size:64px;font-weight:700;color:var(--stone);line-height:1;letter-spacing:-2px;margin-bottom:24px}
.rest-modal-actions{display:flex;gap:8px;justify-content:center}
.session-timer-pill{border:none;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.session-timer-pill.paused{background:var(--cloud);color:var(--graphite)}
.session-timer-pill.paused:active{background:var(--hairline)}
.day-toggle-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day-toggle{padding:14px 4px;border-radius:12px;background:var(--cloud);color:var(--mist);border:1px solid transparent;font-family:var(--font-text);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.day-toggle.active{background:var(--sage);color:var(--bone);border-color:var(--sage-deep)}
.sport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sport-pick{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;background:var(--cloud);border:1px solid transparent;border-radius:14px;color:var(--graphite);font-family:var(--font-text);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--t-micro) var(--ease-std);text-align:center}
.sport-pick.active{background:var(--sage-pale);border-color:var(--sage);color:var(--sage-deep)}
.sport-pick svg{color:inherit}
.sport-pick span{line-height:1.2}
.quick-sport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.quick-sport{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px;background:var(--cloud);border:none;border-radius:12px;color:var(--graphite);font-family:var(--font-text);font-size:11px;font-weight:500;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.quick-sport:active{background:var(--sage-pale)}
.week-day{position:relative;padding-bottom:20px}
.week-day-pill{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:22px;height:22px;border-radius:11px;background:var(--bone);display:flex;align-items:center;justify-content:center;color:var(--mist);border:1px solid var(--hairline)}
.week-day.planned{background:var(--cloud);border-color:var(--hairline)}
.week-day.planned .week-day-pill{color:var(--sage-deep);background:var(--sage-pale);border-color:var(--sage-pale)}
.week-day.rest{opacity:0.6}
.week-day.rest .week-day-pill{color:var(--mist)}
.week-day.today .week-day-pill{background:var(--bone);color:var(--sage-deep);border-color:var(--sage)}
.week-day.done .week-day-pill{background:var(--bone);color:var(--sage-deep);border-color:transparent}
.cardio-icon-large{width:96px;height:96px;border-radius:48px;background:var(--sage-pale);display:flex;align-items:center;justify-content:center;color:var(--sage-deep)}
.rpe-row{display:flex;gap:4px;flex-wrap:wrap}
.rpe-dot{flex:1;min-width:32px;height:36px;border-radius:8px;background:var(--cloud);border:none;font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--graphite);cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.rpe-dot.active{background:var(--sage);color:var(--bone)}
.plan-day-card{display:flex;align-items:center;gap:16px;padding:16px;background:var(--cloud);border-radius:14px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:all var(--t-micro) var(--ease-std)}
.plan-day-card:active{background:var(--hairline)}
.plan-day-card.rest{opacity:0.65}
.plan-day-card.editing{display:block;background:var(--bone);border-color:var(--sage);cursor:default}
.plan-day-card.editing:active{background:var(--bone)}
.plan-day-left{flex-shrink:0;width:64px}
.plan-day-name{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:600}
.plan-day-num{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--stone);margin-top:2px}
.plan-day-body{flex:1;min-width:0}
.plan-day-sport-row{display:flex;align-items:center;gap:8px}
.plan-day-icon{width:28px;height:28px;border-radius:14px;background:var(--sage-pale);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.plan-day-icon.rest{background:var(--hairline);color:var(--mist)}
.plan-day-sport-name{font-size:14px;color:var(--stone);font-weight:500}
.plan-day-meta{font-size:12px;color:var(--mist);margin-top:4px;margin-left:36px}
.plan-day-action{color:var(--mist);flex-shrink:0}
.plan-sport-options{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:280px;overflow-y:auto;padding:4px;margin:0 -4px}
.plan-sport-options .sport-pick{padding:10px 4px;font-size:11px;gap:4px}
.plan-sport-options .sport-pick svg{width:18px;height:18px}
.program-grid{display:grid;gap:8px}
.program-pick{display:block;text-align:left;padding:16px;background:var(--cloud);border:1px solid transparent;border-radius:12px;cursor:pointer;transition:all var(--t-micro) var(--ease-std);font-family:var(--font-text)}
.program-pick:active{background:var(--hairline)}
.program-pick.active{background:var(--sage-pale);border-color:var(--sage)}
.program-pick-name{font-size:15px;font-weight:600;color:var(--stone);margin-bottom:2px}
.program-pick.active .program-pick-name{color:var(--sage-deep)}
.program-pick-meta{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:500;margin-bottom:8px}
.program-pick-desc{font-size:12px;color:var(--graphite);line-height:1.4}
.program-banner{padding:14px 16px;background:var(--cloud);border-radius:12px;margin-bottom:16px}
.burn-banner{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--sage-pale);border-radius:14px;margin-bottom:16px;border:1px solid var(--sage)}
.burn-banner-icon{width:36px;height:36px;border-radius:18px;background:var(--bone);color:var(--terra);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.burn-banner-content{flex:1;min-width:0}
.burn-banner-title{font-size:14px;font-weight:600;color:var(--sage-deep);line-height:1.3}
.burn-banner-sub{font-size:12px;color:var(--graphite);margin-top:4px;line-height:1.4}
.burn-banner-sub strong{color:var(--sage-deep)}
.hk-banner{background:var(--sage-pale);border:1px solid var(--sage)}
.hk-banner-icon{width:40px;height:40px;border-radius:20px;background:var(--bone);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.health-tile{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:14px;background:var(--cloud);border:1px solid transparent;border-radius:14px;color:var(--stone);font-family:var(--font-text);text-align:left;cursor:pointer;transition:all var(--t-micro) var(--ease-std);min-height:96px;width:100%}
.health-tile:active{background:var(--hairline)}
.health-tile-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:600;line-height:1.2}
.health-tile-value{display:flex;align-items:baseline;gap:4px;color:var(--stone)}
.health-tile-num{font-family:var(--font-mono);font-size:20px;font-weight:700;line-height:1}
.health-tile-unit{font-size:11px;color:var(--mist)}
.health-tile-bar{height:3px;background:var(--hairline);border-radius:2px;overflow:hidden;width:100%}
.health-tile-bar-fill{height:100%;background:var(--sage);border-radius:2px;transition:width 600ms var(--ease-out)}
.health-tile-goal{font-size:10px;color:var(--sage-deep);font-weight:500}
.health-tile-meta{font-size:11px;color:var(--mist)}
.health-snapshot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.health-snapshot-tile{display:flex;flex-direction:column;gap:4px;padding:12px;background:var(--bone);border:1px solid var(--hairline);border-radius:12px;text-align:left;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.health-snapshot-tile:active{background:var(--cloud)}
.health-snapshot-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:600}
.health-snapshot-value{display:flex;align-items:baseline}
/* === HABITUDES === */
.habit-card{padding:16px;background:var(--cloud);border-radius:14px;margin-bottom:12px}
.habit-icon{width:36px;height:36px;border-radius:18px;background:var(--bone);color:var(--graphite);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--hairline)}
.habit-icon.success{background:var(--sage-pale);color:var(--sage-deep);border-color:var(--sage)}
.habit-icon.fail{background:#F8E5DC;color:var(--terra);border-color:var(--terra)}
.habit-state-pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:var(--font-text)}
.habit-state-pill.success{background:var(--sage-pale);color:var(--sage-deep)}
.habit-state-pill.fail{background:#F8E5DC;color:var(--terra)}
.habit-btn-success{background:var(--sage);color:var(--bone);display:flex;align-items:center;justify-content:center;gap:6px}
.habit-btn-fail{background:#F8E5DC;color:var(--terra);font-weight:500}
.habit-stats{display:flex;gap:16px;flex-wrap:wrap}
.habit-stat{flex:1;min-width:80px}
.habit-stat-num{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--stone);line-height:1}
.habit-stat-num .habit-stat-sub{font-size:13px;font-weight:400;color:var(--mist)}
.habit-stat-lab{font-size:11px;color:var(--mist);margin-top:4px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600}
.habit-preset-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.habit-preset{display:flex;align-items:center;gap:12px;padding:14px;background:var(--cloud);border:1px solid transparent;border-radius:12px;color:var(--stone);font-family:var(--font-text);text-align:left;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.habit-preset:active{background:var(--sage-pale)}
.habit-preset-icon{width:32px;height:32px;border-radius:16px;background:var(--bone);color:var(--graphite);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.habit-preset-name{font-size:13px;font-weight:500}
.habit-calendar{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}
.habit-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--font-mono);font-weight:600;border-radius:4px;color:var(--graphite);background:var(--cloud);border:1px solid var(--hairline)}
.habit-day.success{background:var(--sage);color:var(--bone);border-color:var(--sage-deep)}
.habit-day.fail{background:#E8A89A;color:var(--bone);border-color:var(--terra)}
.habit-day.empty{background:var(--cloud);color:var(--hairline)}
/* === BADGES === */
.badge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.badge-tile{padding:16px 12px;background:var(--cloud);border-radius:14px;text-align:center;opacity:0.5;transition:opacity var(--t-micro) var(--ease-std)}
.badge-tile.unlocked{opacity:1;background:var(--bone);border:1px solid var(--hairline)}
.badge-tile.unlocked.tier-bronze{color:#A56D3F}
.badge-tile.unlocked.tier-silver{color:#7A8A8E}
.badge-tile.unlocked.tier-gold{color:var(--gold,#C9A84C)}
.badge-tile.unlocked.tier-platinum{color:var(--sage-deep)}
.badge-medal{margin-bottom:8px;display:flex;justify-content:center;color:inherit}
.badge-tile:not(.unlocked) .badge-medal{color:var(--mist)}
.badge-label{font-size:13px;font-weight:600;color:var(--stone);margin-bottom:4px}
.badge-desc{font-size:11px;color:var(--mist);line-height:1.3}
/* === SHARE === */
.share-card{padding:24px;background:var(--sage-pale);border:1px solid var(--sage);border-radius:20px;margin-top:8px}
.share-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.share-card-app{font-family:var(--font-text);font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--sage-deep)}
.share-card-date{font-size:11px;color:var(--graphite)}
.share-card-name{font-family:var(--font-text);font-size:24px;font-weight:600;color:var(--stone);margin-bottom:24px}
.share-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.share-stat{text-align:center;padding:12px 4px;background:var(--bone);border-radius:12px}
.share-stat-num{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--sage-deep);line-height:1}
.share-stat-lab{font-size:10px;color:var(--mist);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.share-text-preview{padding:12px;background:var(--cloud);border-radius:8px;font-size:13px;color:var(--graphite);line-height:1.5;white-space:pre-wrap;font-family:var(--font-text)}
/* === TAGS (food prefs) === */
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.tag-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:var(--cloud);border-radius:16px;font-size:13px;color:var(--stone)}
.tag-close{border:none;background:transparent;color:var(--mist);font-size:18px;line-height:1;padding:0;cursor:pointer;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:9px}
.tag-close:active{background:var(--hairline);color:var(--stone)}
/* === SOCIAL === */
.avatar{display:flex;align-items:center;justify-content:center;color:var(--bone);font-weight:600;border-radius:50%;flex-shrink:0;font-family:var(--font-text)}
.social-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;scrollbar-width:none}
.social-tabs::-webkit-scrollbar{display:none}
.social-tab{flex-shrink:0;padding:8px 14px;background:var(--cloud);border:none;border-radius:18px;font-family:var(--font-text);font-size:13px;font-weight:500;color:var(--graphite);cursor:pointer;transition:all var(--t-micro) var(--ease-std);white-space:nowrap;display:flex;align-items:center;gap:6px}
.social-tab.active{background:var(--sage);color:var(--bone);font-weight:600}
.social-tab:active{background:var(--sage-pale)}
.badge-num{background:var(--terra);color:var(--bone);font-size:10px;padding:2px 6px;border-radius:9px;font-weight:700;font-family:var(--font-mono);min-width:16px;text-align:center}
.my-card{display:flex;align-items:center;padding:14px 16px;background:var(--sage-pale);border-radius:14px;margin-bottom:8px;border:1px solid var(--sage)}
.share-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.share-strip::-webkit-scrollbar{display:none}
.share-strip-item{flex-shrink:0;width:130px;padding:14px;background:var(--cloud);border:none;border-radius:12px;text-align:left;cursor:pointer;font-family:var(--font-text);transition:all var(--t-micro) var(--ease-std)}
.share-strip-item:active{background:var(--sage-pale)}
.share-strip-day{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:600;margin-bottom:4px}
.share-strip-name{font-size:13px;color:var(--stone);font-weight:500;line-height:1.3;margin-bottom:8px;min-height:34px}
.share-strip-cta{font-size:11px;color:var(--sage-deep);font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
/* Feed posts */
.feed-post{padding:16px;background:var(--cloud);border-radius:16px;margin-bottom:12px}
.feed-post-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.feed-post-author{font-size:14px;font-weight:600;color:var(--stone);display:flex;align-items:center;gap:6px}
.feed-post-tag{font-size:9px;background:var(--sage-pale);color:var(--sage-deep);padding:2px 6px;border-radius:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.feed-post-meta{font-size:12px;color:var(--mist)}
.feed-post-body{margin-bottom:14px}
.post-stat-row{display:flex;gap:8px;flex-wrap:wrap}
.post-stat{flex:1;min-width:64px;text-align:center;padding:10px 4px;background:var(--bone);border-radius:10px}
.post-stat-num{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--stone);line-height:1}
.post-stat-lab{font-size:10px;color:var(--mist);margin-top:4px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600}
.post-pr{margin-top:12px;padding:10px 12px;background:var(--bone);border-radius:10px;border-left:3px solid var(--sage)}
.post-pr-lab{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:600}
.post-pr-val{font-size:13px;color:var(--stone);margin-top:4px}
.post-note{margin-top:10px;font-size:13px;color:var(--graphite);line-height:1.4;padding:8px 10px;background:var(--bone);border-radius:8px;font-style:italic}
.feed-post-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--hairline)}
.kudo-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;background:transparent;border:1px solid var(--hairline);border-radius:18px;color:var(--graphite);font-family:var(--font-text);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.kudo-btn:active{background:var(--cloud)}
.kudo-btn.active{background:var(--sage-pale);border-color:var(--sage);color:var(--sage-deep);font-weight:600}
.kudo-list{padding:12px;background:var(--cloud);border-radius:12px}
.kudo-item{display:flex;align-items:center;gap:8px;padding:6px 0}
.kudo-name{font-size:13px;color:var(--stone);flex:1}
.kudo-emoji{color:var(--sage-deep)}
.comment-card{display:flex;gap:10px;padding:12px;background:var(--cloud);border-radius:12px;margin-bottom:8px}
.comment-body{flex:1;min-width:0}
.comment-author{font-size:12px;font-weight:600;color:var(--stone);margin-bottom:4px}
.comment-text{font-size:13px;color:var(--graphite);line-height:1.4}
/* Profil social */
.profile-card{padding:24px;background:var(--sage-pale);border:1px solid var(--sage);border-radius:20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.profile-name{font-size:22px;font-weight:600;color:var(--stone)}
.profile-id{font-size:12px;color:var(--mist)}
.profile-bio{font-size:14px;color:var(--graphite);text-align:center;max-width:300px;line-height:1.4}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;margin-top:8px}
.profile-stat{padding:12px 4px;background:var(--bone);border-radius:12px;text-align:center}
.profile-stat-num{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--sage-deep);line-height:1}
.profile-stat-lab{font-size:10px;color:var(--mist);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.hue-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.hue-dot{width:32px;height:32px;border-radius:16px;border:2px solid transparent;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.hue-dot.active{border-color:var(--sage-deep);transform:scale(1.1)}
/* Ami card */
.friend-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--cloud);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.friend-card:active{background:var(--hairline)}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:14px;font-weight:600;color:var(--stone)}
.friend-meta{font-size:11px;color:var(--mist);margin-top:4px}
.group-icon{width:44px;height:44px;border-radius:22px;background:var(--sage-pale);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Défis */
.challenge-card{padding:16px;background:var(--cloud);border-radius:14px;margin-bottom:12px;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.challenge-card:active{background:var(--sage-pale)}
.challenge-card.finished{opacity:0.6}
.challenge-icon{width:36px;height:36px;border-radius:18px;background:var(--bone);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--hairline)}
.challenge-bar{height:6px;background:var(--hairline);border-radius:3px;overflow:hidden}
.challenge-bar-fill{height:100%;background:var(--sage);border-radius:3px;transition:width 600ms var(--ease-out)}
.rank-pill{padding:4px 10px;border-radius:14px;font-size:13px;font-weight:600;background:var(--bone);color:var(--mist);font-family:var(--font-mono)}
.rank-pill.rank-1{background:#FFF4D5;color:#9F7B0F}
.rank-pill.rank-2{background:#E8E8E8;color:#6F6F6F}
.rank-pill.rank-3{background:#F8E0CF;color:#A55621}
.leader-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--hairline)}
.leader-row:last-child{border-bottom:none}
.leader-row.me{background:var(--sage-pale);margin:0 -16px;padding-left:16px;padding-right:16px;border-radius:8px}
.leader-rank{flex-shrink:0;font-size:14px;font-weight:600;font-family:var(--font-mono);min-width:32px}
.leader-rank.rank-1,.leader-rank.rank-2,.leader-rank.rank-3{font-size:18px}
.leader-name{flex:1;font-size:13px;color:var(--stone);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leader-bar{flex-shrink:0;width:80px;height:6px;background:var(--hairline);border-radius:3px;overflow:hidden}
.leader-bar-fill{height:100%;background:var(--sage);border-radius:3px}
.leader-val{flex-shrink:0;font-size:12px;color:var(--graphite);min-width:60px;text-align:right}
/* Code modal */

// HELPERS DE RECHERCHE D'ALIMENTS
// =============================================================
function searchFoods(query) {
  if (!query) return [];
  const q = query.toLowerCase().trim();
  return FOODS.filter(f => f.name.toLowerCase().includes(q))
    .sort((a, b) => {
      // Préfère le match au début
      const aStart = a.name.toLowerCase().startsWith(q) ? 0 : 1;
      const bStart = b.name.toLowerCase().startsWith(q) ? 0 : 1;
      if (aStart !== bStart) return aStart - bStart;
      return a.name.length - b.name.length;
    })
    .slice(0, 20);
}

function findFoodById(id) {
  return FOODS.find(f => f.id === id);
}

// Calcule les macros pour une quantité donnée d'un aliment
function macrosFor(food, qty, unit) {
  if (!food) return { kcal: 0, p: 0, c: 0, l: 0 };
  const grams = unit === 'pièce' || unit === 'pcs' || unit === 'gousse' || unit === 'pot'
    ? (qty * (food.commonGrams || 100))
    : unit === 'kg' ? (qty * 1000)
    : (qty || 0);
  const factor = grams / 100;
  return {
    kcal: Math.round(food.kcal * factor),
    p: Math.round(food.p * factor * 10) / 10,
    c: Math.round(food.c * factor * 10) / 10,
    l: Math.round(food.l * factor * 10) / 10
  };
}

// =============================================================
// HELPERS HABITUDES & BADGES
// =============================================================
function habitStreak(habitId) {
  // Compte les jours consécutifs récents avec success=true (en partant d'aujourd'hui ou hier)
  const logs = (state.habitLogs || []).filter(l => l.habitId === habitId && l.success);
  if (logs.length === 0) return 0;
  const set = new Set(logs.map(l => l.date));
  const today = todayISO();
  let streak = 0;
  let cursor = new Date(today);
  // Si pas validé aujourd'hui, on peut commencer à hier (sinon on perd la streak juste parce qu'on n'a pas encore checké)
  if (!set.has(cursor.toISOString().slice(0,10))) {
    cursor.setDate(cursor.getDate() - 1);
  }
  while (set.has(cursor.toISOString().slice(0,10))) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function bestHabitStreak() {
  const habits = state.habits || [];
  if (habits.length === 0) return 0;
  return Math.max(...habits.map(h => habitStreak(h.id)));
}

function totalSavingsForHabit(habit) {
  if (!habit.costPerUnit || habit.target !== 'abstain') return 0;
  const successDays = (state.habitLogs || []).filter(l => l.habitId === habit.id && l.success).length;
  // Estimation : on suppose que la personne aurait consommé une certaine quantité par jour
  // Pour une cigarette, par défaut on prend un paquet/2j = 10 cig/jour
  const assumedDailyUnits = habit.id === 'cigarette' ? 10 : 1;
  return Math.round(successDays * assumedDailyUnits * habit.costPerUnit);
}

function checkAllBadges() {
  const already = new Set((state.unlockedBadges || []).map(b => b.badgeId));
  const newly = [];
  BADGES.forEach(b => {
    if (already.has(b.id)) return;
    try {
      if (b.test()) {
        state.unlockedBadges.push({ id: 'id-' + Math.random().toString(36).slice(2,10), badgeId: b.id, unlockedAt: Date.now() });
        newly.push(b);
      }
    } catch(e) { /* ignore */ }
  });
  if (newly.length > 0) saveState();
  return newly;
}

function healthMetric(id) { return HEALTH_METRICS.find(m => m.id === id); }

// =============================================================
// HELPERS HEALTH SAMPLES
// =============================================================
function todaysHealthValue(typeId) {
  return healthValueOnDate(typeId, todayISO());
}

function healthValueOnDate(typeId, dateISO) {
  const m = healthMetric(typeId);
  if (!m) return null;
  const samples = state.healthSamples.filter(s => s.type === typeId && s.date === dateISO);
  if (samples.length === 0) return null;
  if (m.aggregate === 'sum')  return samples.reduce((a, s) => a + s.value, 0);
  if (m.aggregate === 'avg')  return samples.reduce((a, s) => a + s.value, 0) / samples.length;
  if (m.aggregate === 'last') return samples[samples.length - 1].value;
  return samples[samples.length - 1].value;
}

function lastHealthSample(typeId) {
  const list = state.healthSamples.filter(s => s.type === typeId);
  if (list.length === 0) return null;
  return list.sort((a, b) => b.date.localeCompare(a.date))[0];
}

function healthSeries(typeId, days = 30) {
  const m = healthMetric(typeId);
  if (!m) return [];
  const now = new Date();
  const out = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0, 10);
    const v = healthValueOnDate(typeId, iso);
    out.push({ date: iso, val: v });
  }
  return out;
}

function setHealthValue(typeId, dateISO, value, source = 'manual') {
  const m = healthMetric(typeId);
  if (!m) return;
  // Pour les métriques daily simples, on remplace l'entrée du jour
  state.healthSamples = state.healthSamples.filter(s => !(s.type === typeId && s.date === dateISO));
  if (value !== null && value !== '' && !isNaN(parseFloat(value))) {
    state.healthSamples.push({
      id: 'id-' + Math.random().toString(36).slice(2, 10),
      type: typeId,
      date: dateISO,
      value: parseFloat(value),
      unit: m.unit,
      source,
      hkType: m.hk,
      timestamp: Date.now()
    });
  }
  saveState();
}

// Ajoute un échantillon d'hydratation (incrément, pas remplacement)
function addHealthSample(typeId, dateISO, value, source = 'manual') {

  });

}

// Calcul calories brûlées à partir des MET, durée et poids
function caloriesBurned(sportId, durationMin, weightKg) {

  if (!s.met) return 0;
  return Math.round((s.met * 3.5 * (weightKg || 75) / 200) * durationMin);
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_STATE);
    const parsed = JSON.parse(raw);
    const merged = { ...structuredClone(DEFAULT_STATE), ...parsed };
    // Migration : un planning avec moins de 7 jours ou des jours sans `sport` est invalidé
    if (merged.weekPlan) {
      const wp = merged.weekPlan;
      const ok = Array.isArray(wp.days) && wp.days.length === 7 && wp.days.every(d => d && d.date && d.sport);
      if (!ok) {
        console.warn('Planning corrompu, suppression');
        merged.weekPlan = null;
      }
    }
    // Migration : tableaux essentiels présents
    ['weights','measurements','workouts','meals','sleep','pantry','shoppingExtras','healthSamples','habits','habitLogs','unlockedBadges'].forEach(k => {
      if (!Array.isArray(merged[k])) merged[k] = [];
    });
    // Initialiser état social
    if (!merged.social || typeof merged.social !== 'object') {
      merged.social = {
        userId: null, displayName: null, avatarHue: undefined, bio: '',
        friends: [], groups: [], feed: [], challenges: [], weekSnapshots: []
      };
    } else {
      ['friends','groups','feed','challenges','weekSnapshots'].forEach(k => {
        if (!Array.isArray(merged.social[k])) merged.social[k] = [];
      });
    }
    if (!merged.foodPrefs || typeof merged.foodPrefs !== 'object') {
      merged.foodPrefs = { likes: [], dislikes: [], allergies: [], diet: null };
    } else {
      ['likes','dislikes','allergies'].forEach(k => {
        if (!Array.isArray(merged.foodPrefs[k])) merged.foodPrefs[k] = [];
      });
    }
    // Nettoyage des anciens champs legacy (s'ils existaient)
    delete merged.activity; delete merged.vitals; delete merged.sleepDetail;
    delete merged.hydration; delete merged.mindfulness;
    return merged;
  } catch (e) {
    console.warn('Storage corrompu, reset', e);
    return structuredClone(DEFAULT_STATE);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    console.error('Erreur sauvegarde', e);

// =============================================================
// CALCULS NUTRITIONNELS (Mifflin-St Jeor)
// =============================================================
function bmr(user) {
  // Mifflin-St Jeor
  const { sex, weight, height, age } = user;
  if (sex === 'homme') return 10 * weight + 6.25 * height - 5 * age + 5;
  return 10 * weight + 6.25 * height - 5 * age - 161;
}

// TDEE de base : couvre l'activité quotidienne hors sport (travail, déplacements,
// vie courante). Le sport est ajouté séparément pour pouvoir refléter ce que tu fais
// vraiment chaque jour, pas une moyenne théorique.
function tdee(user) {
  // 1.35 = vie active légère (debout, marche occasionnelle), c'est la base sans sport.
  // Si tu es sédentaire au bureau toute la journée, c'est plus proche de 1.25.
  // L'effort réel (séance tennis, muscu, etc.) est ajouté via burnedCaloriesOnDate().
  return Math.round(bmr(user) * 1.35);
}

function calorieTarget(user) {
  // Cible "de base" : TDEE corrigé selon l'objectif, sans sport additionnel.
  // C'est le plancher de calories à manger même les jours sans entraînement.
  const t = tdee(user);
  if (user.goal === 'seche') return Math.round(t - 400);
  if (user.goal === 'masse') return Math.round(t + 300);
  return t;
}

function macroTargets(user) {
  // Macros calées sur la cible de base. Quand on entraîne plus, on ajuste les
  // glucides via dynamicMacroTargets() en gardant les protéines stables.
  const cal = calorieTarget(user);
  const p = Math.round(user.weight * 2);
  const l = Math.round((cal * 0.25) / 9);
  const c = Math.round((cal - p * 4 - l * 9) / 4);
  return { kcal: cal, p, c, l };
}

// =============================================================
// CALORIES BRÛLÉES — pour une date donnée
// =============================================================
// Renvoie le total kcal brûlés ce jour à partir des séances enregistrées.
// - Cardio : utilise w.kcalBurned (calculé via MET au save)
// - Musculation : estime ~6 kcal/min × durée (compromis raisonnable)
function burnedCaloriesOnDate(dateISO) {
  const wList = state.workouts.filter(w => w.date === dateISO);
  return wList.reduce((sum, w) => {
    if (typeof w.kcalBurned === 'number') return sum + w.kcalBurned;
    if (w.type === 'strength' || !w.type) {
      const dur = w.duration || 0;
      // Estimation muscu : 5 MET ~= 5 × 3.5 × 75kg / 200 ≈ 6.5 kcal/min pour 75 kg.
      // On scale au poids réel.
      const weight = state.user?.weight || 75;
      return sum + Math.round(5 * 3.5 * weight / 200 * dur);
    }
    return sum;
  }, 0);
}

// Cible calorique dynamique pour une date donnée :
// = cible de base + calories brûlées par les séances de ce jour
function dynamicCalorieTarget(user, dateISO) {
  const base = calorieTarget(user);
  const burned = burnedCaloriesOnDate(dateISO);
  return { base, burned, total: base + burned };
}

// Macros dynamiques : on conserve les protéines (essentielles à la récup),
// on majore les glucides (carburant) à hauteur de l'effort, lipides ajustés
// proportionnellement.
function dynamicMacroTargets(user, dateISO) {
  const baseMacros = macroTargets(user);
  const { burned } = dynamicCalorieTarget(user, dateISO);
  if (burned <= 0) return { ...baseMacros, burned: 0, base: baseMacros.kcal };
  // Répartition de la majoration : 70% glucides, 20% lipides, 10% protéines
  const extraP = Math.round((burned * 0.10) / 4);
  const extraL = Math.round((burned * 0.20) / 9);
  const extraC = Math.round((burned * 0.70) / 4);
  return {
    kcal: baseMacros.kcal + burned,
    p: baseMacros.p + extraP,
    c: baseMacros.c + extraC,
    l: baseMacros.l + extraL,
    burned,
    base: baseMacros.kcal
  };
}

function todaysMacros() {
  const today = todayISO();
  const meals = state.meals.filter(m => m.date === today);
  return meals.reduce((acc, m) => {
    acc.kcal += m.kcal; acc.p += m.p; acc.c += m.c; acc.l += m.l;
    return acc;
  }, { kcal: 0, p: 0, c: 0, l: 0 });
}

// =============================================================
function updateStreak() {
  const today = todayISO();
  if (state.lastActiveDate === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const yISO = yesterday.toISOString().slice(0, 10);
  if (state.lastActiveDate === yISO) state.streak += 1;
  else if (state.lastActiveDate !== today) state.streak = 1;
  state.lastActiveDate = today;
  saveState();
}

// =============================================================
// PRs (records personnels) - calcul auto en validant un set
// =============================================================
function checkPR(exerciseId, kg, reps) {
  if (!kg || !reps) return null;
  const volume = kg * reps;
  const cur = state.prs[exerciseId];
  if (!cur || volume > cur.volumeKg) {
    state.prs[exerciseId] = {
      volumeKg: volume, kg: parseFloat(kg), reps: parseInt(reps), date: todayISO()
    };
    saveState();
    return true;
  }
  return false;
}

// =============================================================
// SEMAINE (lundi → dimanche)
// =============================================================
function weekDates(refDate = new Date()) {
  const d = new Date(refDate);
  const dow = (d.getDay() + 6) % 7; // 0=lundi
  d.setDate(d.getDate() - dow);
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(d);
    x.setDate(d.getDate() + i);
    return x.toISOString().slice(0, 10);
  });
}

function workoutsThisWeek() {
  const week = weekDates();
  return state.workouts.filter(w => week.includes(w.date));
}

// =============================================================
// PLAN NUTRITION (pseudo-IA locale)
// =============================================================
// Estime les calories brûlées prévues pour une date donnée, à partir du planning
// hebdomadaire et des séances déjà enregistrées.
function plannedBurnForDate(dateISO) {
  // 1. Si une séance est déjà enregistrée ce jour-là, c'est la donnée la plus fiable
  const recorded = burnedCaloriesOnDate(dateISO);
  if (recorded > 0) return recorded;
  // 2. Sinon, on regarde le planning hebdo
  const plan = state.weekPlan;
  if (!plan) return 0;
  const day = plan.days.find(d => d.date === dateISO);
  if (!day || day.sport === 'rest') return 0;
  const w = state.user?.weight || 75;
  // Musculation : ~5 MET
  if (day.sport === 'strength') {
    return Math.round(5 * 3.5 * w / 200 * (day.duration || 60));
  }
  return caloriesBurned(day.sport, day.duration || 30, w);
}

function generateMealPlan() {
  const u = state.user;
  // Mots-clés pour la détection automatique de catégories d'aliments dans les ingrédients
  const MEAT_WORDS = ['poulet','bœuf','boeuf','dinde','jambon','porc','lardon','viande hachée','steak','agneau','saucisse','bacon','chorizo'];
  const FISH_WORDS = ['thon','saumon','cabillaud','colin','poisson','crevette','crabe','sardine','maquereau','sole','truite'];
  const ANIMAL_OTHER = ['oeuf','œuf','lait','beurre','fromage','yaourt','crème','feta','mozza','mozzarella','parmesan','ricotta','chèvre','comté','emmental'];
  const GLUTEN_WORDS = ['pâtes','pâte','pain','blé','farine de blé','semoule','couscous','boulgour','seitan'];
  const LACTOSE_WORDS = ['lait','beurre','fromage','yaourt','crème','feta','mozza','parmesan','ricotta'];

  // Filtre selon préférences alimentaires
  const filterByPrefs = (recipes) => {
    const prefs = state.foodPrefs || { likes: [], dislikes: [], allergies: [], diet: null };
    const dislikes = [...(prefs.dislikes || []), ...(prefs.allergies || [])].map(s => s.toLowerCase().trim()).filter(Boolean);
    return recipes.filter(r => {
      const ingredientsText = (r.ingredients || []).map(i => (typeof i === 'string' ? i : i.name)).join(' ').toLowerCase();
      const hasAnyOf = (words) => words.some(w => ingredientsText.includes(w.toLowerCase()));
      // Régime alimentaire
      if (prefs.diet === 'vegetarian' && (hasAnyOf(MEAT_WORDS) || hasAnyOf(FISH_WORDS))) return false;
      if (prefs.diet === 'vegan' && (hasAnyOf(MEAT_WORDS) || hasAnyOf(FISH_WORDS) || hasAnyOf(ANIMAL_OTHER))) return false;
      if (prefs.diet === 'glutenFree' && hasAnyOf(GLUTEN_WORDS)) return false;
      if (prefs.diet === 'lactoseFree' && hasAnyOf(LACTOSE_WORDS)) return false;
      // Allergies + dislikes : on regarde si un ingrédient contient le mot
      if (dislikes.length > 0 && dislikes.some(bad => ingredientsText.includes(bad))) return false;
      return true;
    });
  };

  const allBreakfasts = RECIPES.filter(r => r.category === 'petit-dej');
  const allMeals = RECIPES.filter(r => r.category === 'plat');
  const allSnacks = RECIPES.filter(r => r.category === 'collation');
  // Filtres prefs
  const breakfasts = filterByPrefs(allBreakfasts);
  const meals = filterByPrefs(allMeals);
  const snacks = filterByPrefs(allSnacks);
  // Sécurité : si après filtrage on n'a plus rien, on retombe sur l'ensemble (sinon plan vide)
  const safeBreakfasts = breakfasts.length > 0 ? breakfasts : allBreakfasts;
  const safeMeals = meals.length > 0 ? meals : allMeals;
  const safeSnacks = snacks.length > 0 ? snacks : allSnacks;

  // Trier les plats par densité calorique pour pouvoir piocher selon le besoin
  const lightMeals = [...safeMeals].sort((a, b) => a.kcal - b.kcal);
  const heavyMeals = [...safeMeals].sort((a, b) => b.kcal - a.kcal);

  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  const plan = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const date = d.toISOString().slice(0, 10);
    const burn = plannedBurnForDate(date);
    let lunchPool, dinnerPool;
    if (burn >= 500) {
      lunchPool = heavyMeals.slice(0, Math.ceil(safeMeals.length * 0.5));
      dinnerPool = heavyMeals.slice(0, Math.ceil(safeMeals.length * 0.5));
    } else if (burn <= 100) {
      lunchPool = lightMeals.slice(0, Math.ceil(safeMeals.length * 0.5));
      dinnerPool = lightMeals.slice(0, Math.ceil(safeMeals.length * 0.5));
    } else {
      lunchPool = safeMeals;
      dinnerPool = safeMeals;
    }
    if (lunchPool.length === 0) lunchPool = safeMeals;
    if (dinnerPool.length === 0) dinnerPool = safeMeals;

    const dayPlan = {
      date,
      day: d.toLocaleDateString('fr-FR', { weekday: 'long' }),
      plannedBurn: burn,
      breakfast: pick(safeBreakfasts),
      lunch: pick(lunchPool),
      dinner: pick(dinnerPool),
      snack: pick(safeSnacks)
    };
    if (burn >= 400 && safeSnacks.length > 1) {
      dayPlan.snack2 = pick(safeSnacks.filter(s => s.id !== dayPlan.snack.id));
    }
    plan.push(dayPlan);
  }
  return plan;
}

// =============================================================
// NORMALISATION D'INGRÉDIENTS (pour matching)
// =============================================================
function normalizeFood(name) {
  return String(name)
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // retire accents
    .replace(/[()]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Tokens essentiels d'un ingrédient : on ignore les mots accessoires
const FOOD_STOPWORDS = new Set([
  'de','du','des','la','le','les','un','une','et','ou','au','aux','en','a','d',
  'frais','fraiche','fraiches','sec','seche','seches','cru','cuit','cuite',
  'mg','grec','blanc','blanche','rouge','rouges','noir','noire','vert','verte','verts','vertes',
  'allege','allegee','demi','ecreme','ecremee','complet','complete','nature','naturel','naturelle',
  'sauvage','basmati','rond','ronds','sashimi','dosee','dose','poudre','feuille','feuilles',
  '0','5','10','100','150','200','250','500','1','2','3','4','6','7','8','9',
  'g','kg','ml','l','tsp','tbsp','cup','pcs','piece','pieces','gousse','gousses','pincee','pincees',
  'avec','sans','pour','dans','par','en'
]);

function foodTokens(name) {
  return normalizeFood(name)
    .split(/[\s,/'']+/)
    .filter(t => t && t.length > 2 && !FOOD_STOPWORDS.has(t));
}

// Vérifie si un ingrédient de recette est présent dans la pantry
function pantryHas(ingredientName, pantryItems) {
  const ingTokens = foodTokens(ingredientName);
  if (ingTokens.length === 0) return false;
  // Token principal = le plus long (ex. "saumon" dans "Pavé de saumon frais")
  const main = ingTokens.sort((a,b) => b.length - a.length)[0];
  return pantryItems.some(p => {
    const pTokens = foodTokens(p.name);
    return pTokens.includes(main) || pTokens.some(pt => pt.includes(main) || main.includes(pt));
  });
}

// Score une recette en fonction des ingrédients dispo (pantry)
function scoreRecipe(recipe, pantryItems) {
  const total = recipe.ingredients.length;
  if (total === 0) return { score: 0, have: 0, total: 0, missing: [] };
  const have = [];
  const missing = [];
  recipe.ingredients.forEach(ing => {
    if (pantryHas(ing.name, pantryItems)) have.push(ing);
    else missing.push(ing);
  });
  // Ratio + bonus si tout y est
  const ratio = have.length / total;
  let score = ratio * 100;
  if (missing.length === 0) score += 20; // recette complètement faisable
  if (missing.length <= 2 && missing.length > 0) score += 5; // presque
  return { score: Math.round(score), have: have.length, total, missing };
}

function matchableRecipes(pantryItems, minHave = 1) {
  if (pantryItems.length === 0) return [];
  return RECIPES
    .map(r => ({ recipe: r, ...scoreRecipe(r, pantryItems) }))
    .filter(r => r.have >= minHave)
    .sort((a, b) => b.score - a.score);
}

// =============================================================
// CATÉGORISATION
// =============================================================
function categorizeFood(name) {
  const n = normalizeFood(name);
  if (/poulet|dinde|boeuf|porc|jambon|saumon|cabillaud|thon|crevett|saucisse|steak|viande|veau|agneau|escalope|pave|filet/.test(n)) return 'Boucherie / Poissonnerie';
  if (/yaourt|lait|fromage|feta|parmesan|mozzarella|chevre|creme|cottage|beurre|mascarpone|ricotta/.test(n)) return 'Crémerie';
  if (/oeuf/.test(n)) return 'Crémerie';
  if (/banane|pomme|orange|fruits|mangue|avocat|citron|carotte|courgette|tomate|salade|concombre|epinard|brocolis|haricot|champignon|poivron|oignon|ail|patate|echalote|persil|basilic|aubergine|courge|fraise|framboise|myrtille|raisin|peche|abricot|kiwi|ananas|chou|poireau|celeri|fenouil|radis|navet|betterave|gingembre/.test(n)) return 'Fruits & Légumes';
  if (/riz|quinoa|pates|pain|avoine|lentilles|farine|semoule|nouilles|granola|tortilla|galette|boulgour|couscous|sarrasin|pois chiches|haricots blancs|haricots rouges/.test(n)) return 'Épicerie sèche';
  if (/huile|miel|sucre|sel|poivre|epice|curry|cannelle|herbes|sauce|vinaigre|sirop|cacao|whey|chia|noix|amandes|noisettes|cajou|graines|tahini|moutarde|ketchup|soja/.test(n)) return 'Épicerie';
  if (/conserve|boite|bocal|legumes en|tomate en|concentre/.test(n)) return 'Conserves';
  if (/surgele|congele/.test(n)) return 'Surgelés';
  return 'Autres';
}

function shoppingListFromPlan(plan) {
  const items = {};
  plan.forEach(d => {
    [d.breakfast, d.lunch, d.dinner, d.snack, d.snack2].filter(Boolean).forEach(r => {
      r.ingredients.forEach(ing => {
        const key = ing.name.toLowerCase();
        if (!items[key]) items[key] = { name: ing.name, qty: 0, unit: ing.unit, source: 'plan' };
        items[key].qty += ing.qty / r.servings;
      });
    });
  });
  // Filtrer ce qu'on a déjà au frigo
  const pantry = state.pantry || [];
  Object.keys(items).forEach(k => {
    if (pantryHas(items[k].name, pantry)) {
      items[k].owned = true;
    }
  });
  // Ajouter les extras manuels
  (state.shoppingExtras || []).forEach(extra => {
    const key = 'extra:' + extra.id;
    items[key] = {
      name: extra.name,
      qty: extra.qty || null,
      unit: extra.unit || '',
      source: 'manual',
      extraId: extra.id
    };
  });
  // Catégoriser et grouper
  const grouped = {};
  Object.values(items).forEach(it => {
    if (it.owned) return; // on ne montre pas ce qu'on a déjà
    const cat = categorizeFood(it.name);
    grouped[cat] = grouped[cat] || [];
    grouped[cat].push(it);
  });
  return grouped;
}

// =============================================================
// PLANIFICATEUR DE SEMAINE
// =============================================================
function weekStartDate(refDate = new Date()) {
  const d = new Date(refDate);
  const dow = (d.getDay() + 6) % 7; // 0 = lundi
  d.setDate(d.getDate() - dow);
  d.setHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
}

// Suggère un planning pour la semaine en cours à partir des préférences
// availability: { mon: bool, tue: bool, ... }
// defaultSport: id du sport (ex 'strength', 'running', etc)
// time: heure HH:MM préférée
// duration: minutes par défaut
function suggestWeekPlan(availability, defaultSport, time, duration) {
  const dayKeys = ['mon','tue','wed','thu','fri','sat','sun'];
  const weekStart = new Date(weekStartDate());
  const days = [];
  // Si la musculation est choisie, on alterne avec les sessions du programme préféré
  let strengthSessionIdx = 0;
  const program = PROGRAMS[state.user?.program] || PROGRAMS.fullbody;
  for (let i = 0; i < 7; i++) {
    const date = new Date(weekStart);
    date.setDate(weekStart.getDate() + i);
    const iso = date.toISOString().slice(0, 10);
    const key = dayKeys[i];
    if (!availability[key]) {
      days.push({ date: iso, sport: 'rest', time: null, duration: 0 });
    } else {
      let sport = defaultSport;
      let extra = {};
      if (defaultSport === 'strength') {
        const sess = program.sessions[strengthSessionIdx % program.sessions.length];
        extra = { programId: state.user?.program || 'fullbody', sessionId: sess.id, sessionName: sess.name };
        strengthSessionIdx++;
      }
      days.push({ date: iso, sport, time, duration, ...extra });
    }
  }
  return { weekStart: weekStartDate(), days };
}

function dayOfWeekLabel(iso, short = false) {
  const d = new Date(iso);
  const long = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const sh   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  return (short ? sh : long)[d.getDay()];
}

// Renvoie l'entrée du jour pour un tableau (activity, vitals, sleepDetail, etc.)
function getDayEntry(arrName, dateISO) {
  const arr = state[arrName] || [];
  return arr.find(e => e.date === dateISO) || null;
}
// Upsert : crée ou met à jour l'entrée du jour
function upsertDayEntry(arrName, dateISO, patch) {
  if (!Array.isArray(state[arrName])) state[arrName] = [];
  const arr = state[arrName];
  const idx = arr.findIndex(e => e.date === dateISO);
  if (idx >= 0) {

// Objectifs par défaut alignés sur les recommandations Apple Health
function activityGoals(user) {
  const w = user?.weight || 70;
  return {
    steps: 10000,                  // par défaut Apple Health (rings)
    flights: 10,                   // recommandation cardio
    activeKcal: Math.round(w * 6), // ~420 kcal pour 70 kg, ~450 pour 75 — anneau orange Apple
    exerciseMin: 30,               // anneau vert Apple
    standMin: 12,                  // anneau bleu Apple (heures debout)
    distanceWalked: 6              // km
  };
}

// FC max théorique (formule de Tanaka, plus précise que 220 - âge)
function maxHrTheoretical(age) {
  return Math.round(208 - 0.7 * (age || 30));
}

// Zones cardio Apple-style (% FC max)
function hrZones(maxHr) {
  return {
    z1: { min: Math.round(maxHr * 0.50), max: Math.round(maxHr * 0.60), label: 'Récup', color: 'mist' },
    z2: { min: Math.round(maxHr * 0.60), max: Math.round(maxHr * 0.70), label: 'Endurance fond', color: 'sage' },
    z3: { min: Math.round(maxHr * 0.70), max: Math.round(maxHr * 0.80), label: 'Aérobie', color: 'sage-deep' },
    z4: { min: Math.round(maxHr * 0.80), max: Math.round(maxHr * 0.90), label: 'Seuil', color: 'terra' },
    z5: { min: Math.round(maxHr * 0.90), max: maxHr, label: 'Max VO2', color: 'crimson' }
  };
}

// Conversion distance pour affichage (stockage toujours en km)
function displayDistance(km, decimals = 1) {
  if (km === null || km === undefined || isNaN(km)) return '—';
  const v = isImperial() ? km / 1.609344 : km;
  return Number(v.toFixed(decimals));
}
function inputToKm(value) {
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  return isImperial() ? v * 1.609344 : v;
}
