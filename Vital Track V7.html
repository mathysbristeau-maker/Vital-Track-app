// SUPPRESSION GÉNÉRIQUE — confirmation visuelle 2 clics
// ============================================================
// Helpers : trouver l'identifiant d'une entrée (id sinon index)
function entryKey(arr, item, idx) {
  return item.id || `idx-${idx}`;
}

function requestDelete(scope, key, onConfirm) {
  // 1er clic : on demande confirmation, change l'icône en rouge
  if (state._delScope !== scope || state._delKey !== key) {
    state._delScope = scope;
    state._delKey = key;
    render();
    clearTimeout(state._delTimer);
    state._delTimer = setTimeout(() => {
      if (state._delScope === scope && state._delKey === key) {
        state._delScope = null;
        state._delKey = null;
        render();
      }
    }, 4000);
    return;
  }
  // 2e clic : suppression effective
  state._delScope = null;
  state._delKey = null;
  clearTimeout(state._delTimer);
  onConfirm();
}

function isPendingDelete(scope, key) {
  return state._delScope === scope && state._delKey === key;
}

function deleteRow(scope, idx) {
  const key = scope === 'weight' ? entryKey(state.weights, state.weights[idx], idx)
            : scope === 'measure' ? entryKey(state.measurements, state.measurements[idx], idx)
            : entryKey(state.sleep, state.sleep[idx], idx);
  requestDelete(scope, key, () => {
    if (scope === 'weight') {
      state.weights.splice(idx, 1);
      // Recale le poids "actuel" de l'utilisateur sur le dernier point restant
      if (state.weights.length > 0) {
        const last = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date)).pop();
        state.user.weight = last.kg;
      }
    } else if (scope === 'measure') {
      state.measurements.splice(idx, 1);
    } else {
      state.sleep.splice(idx, 1);
    }
    saveState();
    toast('Supprimé');
    render();
  });
}

function renderMeasurementsHistory() {
  const sorted = state.measurements
    .map((m, idx) => ({ ...m, _idx: idx }))
    .sort((a, b) => b.date.localeCompare(a.date));

  // Synthèse compacte des champs renseignés pour une mesure
  const summarize = (m) => {
    const parts = [];
    MEASURE_FIELDS.forEach(f => {
      const isPercent = f.unit === '%';
      const fmt = (v) => v === undefined ? '—' : (isPercent ? v : displayLength(v));
      if (f.pair) {
        if (m[f.keyL] !== undefined || m[f.keyR] !== undefined) {
          parts.push(`${f.label} ${fmt(m[f.keyL])}/${fmt(m[f.keyR])}`);
        }
      } else if (m[f.key] !== undefined) {
        parts.push(`${f.label} ${fmt(m[f.key])}${isPercent?'%':''}`);
      }
    });
    return parts.length ? parts.join(' · ') : 'Aucune valeur';
  };

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('progress')">${iconBack()}</button>
        <button class="btn-icon" onclick="navigate('add-measurements')">${iconPlus()}</button>

      </div>

      const key = entryKey(state.measurements, m, m._idx);
      const pending = isPendingDelete('measure', key);
      return `
        <div class="card">
          <div class="row-between mb-16">
            <div style="flex:1; min-width:0;">
              <div class="t-body" style="font-weight:600;">${fmtFullDate(m.date)}</div>

function askCoach(text) {
  if (!state._coachHistory) state._coachHistory = [];
  const response = coachRespond(text);
  if (response) {
    state._coachHistory.push({ user: text, response, timestamp: Date.now() });
    state._coachQuery = '';

    // Fallback : recherche d'exercices
    state._coachQuery = text;
    state._coachHistory.push({
      user: text,
      response: { type: 'search_fallback', title: 'Catalogue', content: text },
      timestamp: Date.now()
    });
  }
  render();
  // Scroll en bas pour voir la nouvelle réponse
  setTimeout(() => {
    const cont = document.getElementById('screenContainer');
    if (cont) cont.scrollTop = cont.scrollHeight;
  }, 50);
}

function renderCoachExchange(h, idx) {
  return `
    <div class="coach-msg-user">
      <div class="coach-msg-bubble user">${escapeHtml(h.user)}</div>
    </div>
    <div class="coach-msg-bot">
      ${renderCoachResponse(h.response, idx)}
    </div>
  `;
}

function renderCoachResponse(r, idx) {
  if (!r) return '';
  switch (r.type) {
    case 'plain':
      return `<div class="coach-msg-bubble bot"><div class="coach-msg-title">${r.title}</div><p>${r.content}</p></div>`;

    case 'load_reco': {
      const c = r.content;
      const recoBadge = c.recoveryScore >= 75 ? 'good' : c.recoveryScore >= 50 ? 'mid' : 'bad';
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <p>${c.message}</p>
          ${c.suggestedKg ? `
            <div class="reco-block mt-16">
              <div class="reco-line"><span class="reco-lab">Charge suggérée</span><span class="t-mono-sm">${c.suggestedKg} ${weightUnit()} × ${c.suggestedReps} reps</span></div>
              ${c.estimated1RM > 0 ? `<div class="reco-line"><span class="reco-lab">1RM estimé</span><span class="t-mono-sm">${c.estimated1RM} ${weightUnit()}</span></div>` : ''}
              <div class="reco-line"><span class="reco-lab">Récupération</span><span class="reco-badge ${recoBadge}">${c.recoveryScore}/100</span></div>
            </div>
            <button class="btn btn-secondary mt-16" onclick="navigate('exercise-detail', { id: '${r.exerciseId}' })">Voir la fiche exercice</button>
          ` : ''}
        </div>
      `;
    }

    case 'weekly_analysis': {
      const c = r.content;
      const wDelta = c.workoutsCount - c.workoutsCountPrev;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <div class="weekly-stats">
            <div class="weekly-stat">
              <div class="weekly-stat-num">${c.workoutsCount}</div>
              <div class="weekly-stat-lab">séances</div>
              ${wDelta !== 0 ? `<div class="weekly-stat-delta ${wDelta>0?'up':'down'}">${wDelta>0?'+':''}${wDelta}</div>` : ''}
            </div>
            <div class="weekly-stat">
              <div class="weekly-stat-num">${c.tonnageKg}</div>
              <div class="weekly-stat-lab">${weightUnit()} tonnage</div>
              ${c.tonnageDeltaPct !== 0 ? `<div class="weekly-stat-delta ${c.tonnageDeltaPct>0?'up':'down'}">${c.tonnageDeltaPct>0?'+':''}${c.tonnageDeltaPct}%</div>` : ''}
            </div>
            <div class="weekly-stat">
              <div class="weekly-stat-num">${c.avgSleep !== null ? c.avgSleep.toFixed(1) : '—'}</div>
              <div class="weekly-stat-lab">h sommeil</div>
            </div>
            <div class="weekly-stat">
              <div class="weekly-stat-num">${c.weightDelta > 0 ? '+' : ''}${displayWeight(c.weightDelta).toFixed(1)}</div>
              <div class="weekly-stat-lab">${weightUnit()} 7j</div>
            </div>
          </div>
          ${c.actions.length > 0 ? `
            <div class="reco-block mt-16">
              <div class="t-legend mb-16">À FAIRE</div>
              ${c.actions.map((a, i) => `
                <div class="action-item priority-${a.priority}">
                  <div class="action-num">${i+1}</div>
                  <div class="action-text">${a.text}</div>
                </div>
              `).join('')}
            </div>
          ` : `<p class="t-caption mt-16">Tout est nominal cette semaine.</p>`}
        </div>
      `;
    }

    case 'prediction': {
      const c = r.content;
      if (c.error) return `<div class="coach-msg-bubble bot"><div class="coach-msg-title">${r.title}</div><p>${c.error}</p></div>`;
      const trendColor = c.weeklyChange > 0 ? 'var(--terra)' : c.weeklyChange < 0 ? 'var(--sage-deep)' : 'var(--mist)';
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <div class="row-between mt-16" style="align-items:baseline;">
            <div>
              <div class="t-caption">Aujourd'hui</div>
              <div class="t-mono-lg">${displayWeight(c.currentKg)} ${weightUnit()}</div>
            </div>
            <div class="t-caption">→</div>
            <div style="text-align:right;">
              <div class="t-caption">Dans ${c.weeksAhead} sem.</div>
              <div class="t-mono-lg" style="color:${trendColor};">${displayWeight(c.projectedKg)} ${weightUnit()}</div>
            </div>
          </div>
          <div class="t-caption mt-16">Tendance : ${c.assessment}</div>
          ${c.confidenceMargin > 0 ? `<div class="t-caption">Marge ±${displayWeight(c.confidenceMargin).toFixed(1)} ${weightUnit()} (${c.dataPoints} points)</div>` : ''}
          ${c.goalMessage ? `<p class="mt-16">${c.goalMessage}</p>` : ''}
        </div>
      `;
    }

    case 'meal_suggestion': {
      const c = r.content;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <div class="t-caption mt-8">Il te reste : <strong style="color:var(--sage-deep);">${Math.max(0,Math.round(c.remaining.kcal))} kcal</strong>, ${Math.max(0,Math.round(c.remaining.p))}g P, ${Math.max(0,Math.round(c.remaining.c))}g C, ${Math.max(0,Math.round(c.remaining.l))}g L</div>
          <div class="mt-16">
            ${c.recipes.map(rec => `
              <div class="list-item" style="cursor:pointer;" onclick="navigate('recipe-detail', { id: '${rec.id}', slot: 'Suggestion', date: '${todayISO()}' })">
                <div class="list-item-icon">${iconBowl(20)}</div>
                <div class="list-item-content">
                  <div class="list-item-title">${rec.name}</div>
                  <div class="list-item-sub">${rec.kcal} kcal · ${rec.p}g P · ${rec.time||0}min</div>
                </div>
                ${iconArrow()}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    case 'generated_session': {
      const c = r.content;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <div class="t-caption">${c.duration} min · niveau ${c.level} · ~${c.totalEstimatedKcal} kcal</div>
          <div class="mt-16">
            ${c.exercises.map((ex, i) => `
              <div class="list-item">
                <div class="list-item-icon" style="font-family:var(--font-mono);font-weight:700;">${i+1}</div>
                <div class="list-item-content">
                  <div class="list-item-title">${ex.name}</div>
                  <div class="list-item-sub">${ex.sets}×${ex.reps} · repos ${ex.rest}s${ex.suggestedKg?` · ${ex.suggestedKg} ${weightUnit()}`:''}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    case 'generated_meal_plan': {
      const c = r.content;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <div class="t-caption mb-16">Plan adapté à tes préférences, ton frigo et ton planning sportif.</div>
          ${c.slice(0, 3).map(d => `
            <div class="mini-day-plan">
              <div class="t-mono-sm" style="color:var(--sage-deep);text-transform:capitalize;">${d.day} ${d.date.slice(5)}</div>
              <div class="t-caption">${d.breakfast?.name} · ${d.lunch?.name} · ${d.dinner?.name}${d.snack2?` · +collation`:''}</div>
            </div>
          `).join('')}
          ${c.length > 3 ? `<div class="t-caption mt-8">+ ${c.length - 3} jours</div>` : ''}
          <button class="btn btn-secondary mt-16" onclick="useMealPlan(); navigate('meal-plan');">Voir le plan complet</button>
        </div>
      `;
    }

    case 'alerts': {
      const c = r.content;
      if (c.length === 0) return `<div class="coach-msg-bubble bot"><div class="coach-msg-title">${r.title}</div><p>Tu navigues bien : aucun signal d'alerte sur tes données récentes.</p></div>`;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          ${c.map(a => renderAlertCard(a, true)).join('')}
        </div>
      `;
    }

    case 'search_fallback': {
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">Recherche dans les exercices</div>
          ${renderCoachResults(r.content)}
        </div>
      `;
    }

    default:
      return `<div class="coach-msg-bubble bot">${r.title || ''}<p>${r.content || ''}</p></div>`;
  }
}

function renderAlertCard(a, inline = false) {
  const cls = inline ? 'alert-inline' : 'alert-card';
  return `
    <div class="${cls} severity-${a.severity}">
      <div class="alert-content">
        <div class="alert-title">${a.title}</div>
        <div class="alert-message">${a.message}</div>
        ${a.action ? `<div class="alert-action">→ ${a.action}</div>` : ''}
      </div>
    </div>
  `;
}

function renderCoachResults(q) {
  const filtered = q ? EXERCISES.filter(e =>
    e.name.toLowerCase().includes(q.toLowerCase()) ||
    e.muscles.some(m => m.toLowerCase().includes(q.toLowerCase()))
  ) : EXERCISES.slice(0, 12);

  return `
    <div class="card-title mt-16">${q ? `${filtered.length} résultats pour « ${escapeHtml(q)} »` : `${EXERCISES.length} exercices disponibles`}</div>
    ${filtered.length === 0 ? `<div class="empty"><div class="empty-sub">Aucun exercice ne correspond.</div></div>` : filtered.slice(0, 30).map(e => `
      <div class="list-item" style="cursor:pointer;" onclick="navigate('exercise-detail', { id: '${e.id}' })">
        <div class="list-item-icon">${iconDumbbell(20)}</div>

}

function setUnitsSystem(sys) {
  if (!state.settings) state.settings = {};
  state.settings.units = sys;
  saveState();
  toast('Unités : ' + (sys === 'imperial' ? 'Imperial (lb/in)' : 'Métrique (kg/cm)'));
  render();
}

function renderSettings() {
  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('profile')">${iconBack()}</button><div></div></div>
      <h1 class="t-h1" style="margin-top:8px;">Réglages</h1>
    </div>

      <div class="card-title">Données</div>
      <p class="t-body t-graphite mb-16">Toutes tes données sont stockées localement dans ton navigateur. Aucune transmission.</p>
      <button class="btn btn-secondary" onclick="exportData()">Exporter mes données (JSON)</button>
      <div style="height:8px;"></div>
      <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Importer des données</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    </div>
    <div class="card">
      <div class="card-title" style="color:var(--crimson);">Zone de risque</div>
      <button class="btn btn-secondary" style="border-color:var(--crimson); color:var(--crimson);" onclick="resetAll()">Tout réinitialiser</button>
    </div>
    <div style="height: 100px;"></div>
  `;

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vital-track-' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Export téléchargé');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (confirm('Remplacer toutes les données actuelles ?')) {
        state = { ...DEFAULT_STATE, ...imported };
        saveState();
        toast('Import réussi');
        render();
      }
    } catch (err) {
      toast('Fichier invalide');
    }
  };
  r.readAsText(file);
}

function renderWeekPlanSetup() {
  const u = state.user;
  const ws = weekStartDate();
  // État du formulaire : tableau de 7 jours, chacun avec son sport (ou 'rest') et ses détails
  if (!state._planForm || state._planForm.weekStart !== ws) {
    const cur = (state.weekPlan && state.weekPlan.weekStart === ws && Array.isArray(state.weekPlan.days)) ? state.weekPlan : null;
    let strengthSessionIdx = 0;
    const program = PROGRAMS[u.program] || PROGRAMS.fullbody;
    state._planForm = {
      weekStart: ws,
      days: Array.from({ length: 7 }, (_, i) => {
        const date = new Date(new Date(ws));
        date.setDate(date.getDate() + i);
        const iso = date.toISOString().slice(0, 10);
        // Si on a un planning courant valide pour ce jour
        if (cur && cur.days[i] && cur.days[i].date && cur.days[i].sport) {
          // Garantir que le sport existe encore
          const validSport = SPORT_TYPES.find(s => s.id === cur.days[i].sport);
          if (validSport) return { ...cur.days[i] };
        }
        // Défaut : Lun/Mer/Ven musculation à 18h
        const defaults = [true, false, true, false, true, false, false];
        if (!defaults[i]) return { date: iso, sport: 'rest', time: null, duration: 0 };
        const sess = program.sessions[strengthSessionIdx % program.sessions.length];
        strengthSessionIdx++;
        return { date: iso, sport: 'strength', programId: u.program, sessionId: sess.id, sessionName: sess.name, time: '18:00', duration: 60 };
      })
    };
  }
  const f = state._planForm;
  const editingIdx = state._planEditIdx;
  const activeCount = f.days.filter(d => d.sport !== 'rest').length;

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('workout')">${iconBack()}</button>
        <button class="btn-icon" onclick="autoFillPlanForm()" aria-label="Auto-remplir">${iconRefresh()}</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Planifier ma semaine</h1>
      <div class="t-caption">${activeCount} séance${activeCount>1?'s':''} planifiée${activeCount>1?'s':''} · ${7-activeCount} repos</div>
    </div>

    ${f.days.map((d, i) => renderPlanDayCard(d, i, editingIdx === i)).join('')}

    <div style="height:8px;"></div>
    <button class="btn btn-primary" onclick="confirmWeekPlanV2()">Enregistrer ce planning</button>
    ${state.weekPlan && state.weekPlan.weekStart === ws ? `<div style="height:8px;"></div><button class="btn btn-secondary" onclick="clearWeekPlan()">Supprimer ce planning</button>` : ''}
    <div style="height: 100px;"></div>
  `;
}

function renderPlanDayCard(d, idx, editing) {
  // Sécurités état : si jamais d est vide ou corrompu
  if (!d || !d.date) {
    d = { date: todayISO(), sport: 'rest', time: null, duration: 0 };
  }
  // Si le sport stocké n'existe plus dans le catalogue, on retombe sur 'rest'
  if (!SPORT_TYPES.find(s => s.id === d.sport)) {
    d.sport = 'rest';
  }
  const dayName = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'][idx];
  const isRest = d.sport === 'rest';
  const sp = sportType(d.sport);
  const dt = new Date(d.date);
  const num = dt.getDate();
  const month = dt.toLocaleDateString('fr-FR', { month: 'short' });

  // Mode résumé
  if (!editing) {
    return `
      <div class="plan-day-card ${isRest?'rest':''}" onclick="state._planEditIdx=${idx}; render();">
        <div class="plan-day-left">
          <div class="plan-day-date">
            <div class="plan-day-name">${dayName}</div>
            <div class="plan-day-num">${num} ${month}</div>
          </div>
        </div>
        <div class="plan-day-body">
          ${isRest ? `
            <div class="plan-day-sport-row">
              <div class="plan-day-icon rest">${sportIcon('rest', 16)}</div>
              <div class="plan-day-sport-name t-mist">Repos</div>
            </div>
          ` : `
            <div class="plan-day-sport-row">
              <div class="plan-day-icon">${sportIcon(d.sport, 16)}</div>
              <div class="plan-day-sport-name">${d.sport==='strength' && d.sessionName ? d.sessionName : sp.label}</div>
            </div>
            <div class="plan-day-meta">${d.time||'—'} · ${d.duration||0} min</div>
          `}
        </div>
        <div class="plan-day-action">${iconEdit()}</div>
      </div>
    `;
  }

  // Mode édition
  const u = state.user;
  const program = PROGRAMS[u.program];
  return `
    <div class="plan-day-card editing">
      <div class="row-between mb-16">
        <div>
          <div class="t-body" style="font-weight: 600;">${dayName} ${num} ${month}</div>
          <div class="t-caption">Choisis un sport ou laisse en repos</div>
        </div>
        <button class="btn-icon" onclick="state._planEditIdx=null; render();">${iconCheck()}</button>
      </div>

      <div class="plan-sport-options">
        <button class="sport-pick ${d.sport==='rest'?'active':''}" onclick="setPlanDaySport(${idx},'rest')">
          ${sportIcon('rest', 22)}<span>Repos</span>
        </button>
        ${SPORT_TYPES.filter(s => s.id !== 'rest').map(s => `
          <button class="sport-pick ${d.sport===s.id?'active':''}" onclick="setPlanDaySport(${idx},'${s.id}')">
            ${sportIcon(s.id, 22)}<span>${s.label}</span>
          </button>
        `).join('')}
      </div>

      ${!isRest ? `
        ${d.sport === 'strength' ? `
          <div class="input-group" style="margin-top:16px;">
            <label class="input-label">Session du programme (${program.name})</label>
            <select class="input" onchange="setPlanDaySession(${idx}, this.value)">
              ${program.sessions.map(s => `<option value="${s.id}" ${d.sessionId===s.id?'selected':''}>${s.name}</option>`).join('')}
            </select>
          </div>
        ` : ''}

        <div class="row gap-8" style="margin-top:8px;">
          <div class="input-group" style="flex:1; margin-bottom:0;">
            <label class="input-label">Heure</label>
            <input type="time" class="input" value="${d.time||'18:00'}" oninput="setPlanDayField(${idx},'time',this.value)">
          </div>
          <div class="input-group" style="flex:1; margin-bottom:0;">
            <label class="input-label">Durée (min)</label>
            <input type="text" class="input" inputmode="numeric" value="${d.duration||60}" oninput="setPlanDayField(${idx},'duration',parseInt(this.value)||0)">
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function setPlanDaySport(idx, sportId) {
  if (!state._planForm?.days?.[idx]) return;
  const d = state._planForm.days[idx];
  d.sport = sportId;
  if (sportId === 'rest') {
    d.time = null; d.duration = 0;
    delete d.sessionId; delete d.sessionName; delete d.programId;
  } else {
    d.time = d.time || '18:00';
    d.duration = d.duration || 60;
    if (sportId === 'strength') {
      const u = state.user;
      const programId = u?.program || 'fullbody';
      const program = PROGRAMS[programId];
      if (!program) {
        delete d.sessionId; delete d.sessionName; delete d.programId;
        render();
        return;
      }
      const usedSessionIds = state._planForm.days
        .filter((dd, i) => i !== idx && dd.sport === 'strength' && dd.sessionId)
        .map(dd => dd.sessionId);
      const next = program.sessions.find(s => !usedSessionIds.includes(s.id)) || program.sessions[0];
      d.programId = programId;
      d.sessionId = next.id;
      d.sessionName = next.name;
    } else {
      delete d.sessionId; delete d.sessionName; delete d.programId;
    }
  }
  render();
}

function setPlanDaySession(idx, sessionId) {
  const d = state._planForm.days[idx];
  // Sécurité : si programId est manquant (état corrompu), on le récupère du user
  const programId = d.programId || state.user?.program || 'fullbody';
  const program = PROGRAMS[programId];
  if (!program) {
    toast('Programme introuvable');
    return;
  }
  const sess = program.sessions.find(s => s.id === sessionId);
  if (!sess) {
    toast('Session introuvable');
    return;
  }
  d.programId = programId;
  d.sessionId = sessionId;
  d.sessionName = sess.name;
  render();
}

function setPlanDayField(idx, field, value) {
  if (!state._planForm?.days?.[idx]) return;
  state._planForm.days[idx][field] = value;
}

function autoFillPlanForm() {
  // Reset le form en pré-remplissant Lun/Mer/Ven musculation
  const ws = weekStartDate();
  delete state._planForm;
  delete state._planEditIdx;
  render();
  toast('Suggestion auto-générée');
}

function confirmWeekPlanV2() {
  const f = state._planForm;
  const active = f.days.filter(d => d.sport !== 'rest').length;
  if (active === 0) return toast('Planifie au moins un jour');
  state.weekPlan = { weekStart: f.weekStart, days: f.days };
  state._planEditIdx = null;
  saveState();
  toast('Planning enregistré');
  navigate('workout');
}

function clearWeekPlan() {
  if (state._clearPlanPending) {
    clearTimeout(state._clearPlanTimer);
    state._clearPlanPending = false;
    state.weekPlan = null;
    saveState();
    toast('Planning supprimé');
    navigate('workout');
    return;
  }
  state._clearPlanPending = true;
  toast('Reclique pour confirmer la suppression');
  state._clearPlanTimer = setTimeout(()=>{ state._clearPlanPending = false; }, 3000);
}

  const setVal = (val) => `state._activeCardio.fields['${field.key}']=${JSON.stringify(val)}`;
  switch (field.type) {
    case 'distance':
      return `<div class="input-group">
        <label class="input-label">${field.label} (${distanceUnit()})</label>
        <input type="text" class="input" inputmode="decimal" value="${v}" placeholder="ex : ${isImperial()?'3.2':'5.0'}" oninput="state._activeCardio.fields['${field.key}']=this.value">
      </div>`;
    case 'meters':
      return `<div class="input-group">
        <label class="input-label">${field.label} (m)</label>
        <input type="text" class="input" inputmode="numeric" value="${v}" placeholder="ex : 250" oninput="state._activeCardio.fields['${field.key}']=this.value">
      </div>`;
    case 'count':
      return `<div class="input-group">
        <label class="input-label">${field.label}</label>
        <input type="text" class="input" inputmode="numeric" value="${v}" oninput="state._activeCardio.fields['${field.key}']=this.value">
      </div>`;
    case 'bpm':
      return `<div class="input-group">
        <label class="input-label">${field.label} (bpm)</label>

function toggleCardioTimer() {
  const c = state._activeCardio;
  if (!c) return;
  if (c.runningSince) {
    c.elapsedMs = (c.elapsedMs || 0) + (Date.now() - c.runningSince);
    c.runningSince = null;
  } else {
    c.runningSince = Date.now();
  }
  render();
}

function abortCardio() {
  if (state._abortPending) {
    clearTimeout(state._abortTimer);
    state._abortPending = false;
    state._activeCardio = null;
    navigate('workout');
    return;
  }
  state._abortPending = true;
  toast('Re-clique sur retour pour abandonner');
  state._abortTimer = setTimeout(()=>{ state._abortPending = false; }, 3000);
}

function finishCardio() {
  const c = state._activeCardio;
  if (!c) return;
  if (c.runningSince) {
    c.elapsedMs = (c.elapsedMs || 0) + (Date.now() - c.runningSince);
    c.runningSince = null;
  }
  const realDuration = Math.max(1, Math.round((c.elapsedMs || 0) / 60000));
  const kcal = caloriesBurned(c.sport, realDuration, state.user?.weight);

  // Normaliser le champ "distance" (s'il existe) vers km pour stockage cohérent
  const fields = { ...(c.fields || {}) };
  const sport = sportType(c.sport);
  (sport.fields || []).forEach(f => {
    const raw = fields[f.key];
    if (raw === '' || raw === undefined || raw === null) return;
    if (f.type === 'distance') {
      const n = parseFloat(raw) || 0;
      fields[f.key] = isImperial() ? (n * 1.609344) : n;
    } else if (['meters','count','bpm'].includes(f.type)) {
      const n = parseFloat(raw);
      if (!isNaN(n)) fields[f.key] = n;
    } else if (f.type === 'speed') {
      const n = parseFloat(raw);
      if (!isNaN(n)) fields[f.key] = isImperial() ? (n * 1.609344) : n;
    }
    // strings (time, pool, stroke, yoga…) restent telles quelles
  });

  state.workouts.push({
    id: c.id,
    date: c.date,
    type: 'cardio',
    sport: c.sport,
    duration: realDuration,
    fields,
    rpe: c.rpe,
    notes: c.notes || '',
    kcalBurned: kcal,
    exercises: []
  });
  state._activeCardio = null;
  saveState();
  const newBadgesCardio = checkAllBadges();
  if (newBadgesCardio.length > 0) {
    toast(`Séance enregistrée · Nouveau badge : ${newBadgesCardio[0].label}`);
  } else {
    toast(`Séance enregistrée · ~${kcal} kcal`);
  }
  navigate('workout');
}

// ============================================================

// ============================================================
function sportIcon(id, size = 18) {
  const s = sportType(id);
  const w = size, h = size;
  const i = s.icon;
  const sw = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">';
  switch(i){
    case 'dumbbell': return sw+'<path d="M3 12 L6 12 M18 12 L21 12 M6 8 L6 16 M18 8 L18 16 M9 6 L9 18 M15 6 L15 18 M9 12 L15 12"/></svg>';
    case 'run': return sw+'<circle cx="14" cy="5" r="2"/><path d="M9 11 L13 8 L16 11 L19 11 M13 8 L11 14 L14 17 L14 21 M11 14 L7 16 M11 14 L8 21"/></svg>';

function appleRing(label, ratio, val, goal, unit, colorVar) {
  const r = 32, c = 2 * Math.PI * r;
  const offset = c * (1 - Math.min(1, ratio));
  const colorMap = { crimson: 'var(--crimson)', sage: 'var(--sage)', terra: 'var(--terra)', 'sage-deep': 'var(--sage-deep)' };
  const stroke = colorMap[colorVar] || 'var(--sage)';
  return `
    <div class="apple-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="${r}" stroke="var(--cloud)" stroke-width="8" fill="none"/>
        <circle cx="40" cy="40" r="${r}" stroke="${stroke}" stroke-width="8" fill="none"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
          transform="rotate(-90 40 40)" style="transition: stroke-dashoffset 800ms var(--ease-out);"/>
      </svg>
      <div class="apple-ring-label">${label}</div>
      <div class="apple-ring-value">${val}<span class="apple-ring-unit">${unit}</span></div>
    </div>
  `;
}

function formatSleepHHMM(min) {
  if (!min) return '0:00';
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return `${h}h${String(m).padStart(2,'0')}`;
}

function sleepPhasesBar(sd) {
  const total = (sd.deepMin || 0) + (sd.remMin || 0) + (sd.lightMin || 0) + (sd.awakeMin || 0);
  if (!total) return '<div class="t-caption">Phases non saisies.</div>';
  const pct = (m) => ((m || 0) / total) * 100;
  return `
    <div class="sleep-phases-bar">
      <div class="sleep-phase deep" style="width:${pct(sd.deepMin)}%;" title="Profond"></div>
      <div class="sleep-phase rem" style="width:${pct(sd.remMin)}%;" title="REM"></div>
      <div class="sleep-phase light" style="width:${pct(sd.lightMin)}%;" title="Léger"></div>

function renderHealthTile(metric, today) {
  const last = lastHealthSample(metric.id);

  const ratio = (hasGoal && todayValue !== null) ? Math.min(todayValue / metric.goal, 1) : 0;
  const formatted = todayValue !== null ? formatHealthValue(todayValue, metric) : '—';

  return `
    <button class="health-tile" onclick="navigate('health-metric', { id: '${metric.id}' })">

function formatHealthValue(value, metric) {
  if (value === null || value === undefined || isNaN(value)) return '—';
  const dec = metric.decimals !== undefined ? metric.decimals : 0;
  // Pas avec séparateur de milliers
  if (metric.id === 'stepCount') {
    return Math.round(value).toLocaleString('fr-FR');
  }
  return value.toFixed(dec);
}

function healthChart(data, metric) {
  const W = 320, H = 140;
  if (data.filter(p => p.val !== null).length < 2) {
    return `<div class="empty" style="padding:24px;"><div class="empty-sub">Pas assez de points pour une courbe.</div></div>`;
  }
  const vals = data.filter(p => p.val !== null).map(p => p.val);
  let minY = Math.min(...vals), maxY = Math.max(...vals);
  if (metric.goal && metric.goal > maxY) maxY = metric.goal;
  if (maxY - minY < 1) { maxY += 1; minY -= 1; }
  const yScale = v => H - ((v - minY) / (maxY - minY)) * H;
  const xs = data.map((_, i) => (i / (data.length - 1)) * W);
  // Bars pour les sommes (pas, étages, calories), line pour les avg/last (FC, etc.)
  const isBar = metric.aggregate === 'sum';

  if (isBar) {
    const bw = Math.max(2, W / data.length - 2);
    return `
      <div class="chart-wrap">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          ${metric.goal ? `<line class="chart-target" x1="0" y1="${yScale(metric.goal)}" x2="${W}" y2="${yScale(metric.goal)}"/>` : ''}
          ${data.map((p, i) => {
            if (p.val === null) return '';
            const x = xs[i] - bw / 2;
            const y = yScale(p.val);
            return `<rect x="${x}" y="${y}" width="${bw}" height="${H - y}" fill="var(--sage)" rx="1"/>`;
          }).join('')}
        </svg>
      </div>
    `;
  } else {
    const filled = data.map((p, i) => ({ x: xs[i], y: p.val !== null ? yScale(p.val) : null }));
    const segments = [];
    let cur = '';
    filled.forEach((p, i) => {
      if (p.y === null) { if (cur) { segments.push(cur); cur = ''; } return; }
      cur += (cur ? ' L ' : 'M ') + p.x + ' ' + p.y;
    });
    if (cur) segments.push(cur);
    return `
      <div class="chart-wrap">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          ${segments.map(d => `<path class="chart-line" d="${d}"/>`).join('')}
          ${data.map((p, i) => p.val !== null ? `<circle class="chart-dot" cx="${xs[i]}" cy="${yScale(p.val)}" r="2.5"/>` : '').join('')}
        </svg>
      </div>
    `;
  }
}

function saveHealthQuickEntry() {
  const date = document.getElementById('qe_date').value;
  if (!date) return toast('Date requise');
  const quickFields = ['stepCount','flightsClimbed','activeEnergyBurned','distanceWalkingRunning','restingHeartRate','dietaryWater','vo2Max','heartRateVariabilitySDNN'];
  let count = 0;
  quickFields.forEach(typeId => {
    const el = document.getElementById('qe_' + typeId);
    if (!el) return;
    const raw = el.value.replace(/\\s/g, '').replace(',','.');
    if (raw === '') return;
    const n = parseFloat(raw);
    if (!isNaN(n)) {
      setHealthValue(typeId, date, n, 'manual');
      count++;
    }
  });
  if (count === 0) return toast('Aucune valeur saisie');
  toast(`${count} mesure${count>1?'s':''} enregistrée${count>1?'s':''}`);
  navigate('health-hub');
}

  switch (iconId) {
    case 'smoke':  return sw+'<path d="M3 16 L17 16 M19 16 L21 16"/><path d="M14 8 C 14 4, 18 4, 18 8 C 18 11, 16 11, 16 13"/></svg>';
    case 'glass':  return sw+'<path d="M7 4 L17 4 L15 14 A 2 2 0 0 1 13 16 L 11 16 A 2 2 0 0 1 9 14 Z"/><path d="M12 16 L 12 20 M9 20 L15 20"/></svg>';
    case 'candy':  return sw+'<circle cx="12" cy="12" r="4"/><path d="M5 8 L8 11 L8 13 L5 16 Z"/><path d="M19 8 L16 11 L16 13 L19 16 Z"/></svg>';
    case 'screen': return sw+'<rect x="4" y="5" width="16" height="11" rx="1.5"/><path d="M9 20 L15 20 M12 16 L 12 20"/></svg>';
    case 'flask':  return sw+'<path d="M9 3 L15 3 M10 3 L10 9 L5 18 A 2 2 0 0 0 7 21 L 17 21 A 2 2 0 0 0 19 18 L 14 9 L 14 3"/></svg>';

    case 'burger': return sw+'<path d="M3 9 C 3 6, 7 4, 12 4 C 17 4, 21 6, 21 9 L 3 9 Z"/><path d="M3 12 L21 12 M3 15 L21 15"/><path d="M5 18 L19 18 A 2 2 0 0 1 19 18 L 17 20 L 7 20 Z"/></svg>';

function logHabit(habitId, success, count) {
  if (!state.habitLogs) state.habitLogs = [];
  const today = todayISO();
  // Remplace l'éventuel log du jour
  state.habitLogs = state.habitLogs.filter(l => !(l.habitId === habitId && l.date === today));
  state.habitLogs.push({
    id: 'id-' + Math.random().toString(36).slice(2,10),
    habitId, date: today, count: count || 0, success: !!success,
    createdAt: Date.now()
  });
  saveState();
  const newBadges = checkAllBadges();
  if (newBadges.length > 0) {
    toast(`Nouveau badge : ${newBadges[0].label}`);
  } else {
    toast(success ? 'Bravo, journée tenue' : 'Saisi');
  }
  render();
}

function promptHabitFail(habitId) {
  // Mini-prompt : on incrémente +1 si déjà fail, sinon on log fail count=1
  const today = todayISO();
  const existing = state.habitLogs.find(l => l.habitId === habitId && l.date === today);
  const count = (existing && !existing.success ? existing.count : 0) + 1;
  logHabit(habitId, false, count);
}

function undoHabitLog(habitId) {
  const today = todayISO();
  state.habitLogs = state.habitLogs.filter(l => !(l.habitId === habitId && l.date === today));
  saveState();
  toast('Saisie annulée');
  render();
}

function deleteHabit(id) {
  if (state._delHabitPending === id) {
    state.habits = (state.habits || []).filter(h => h.id !== id);
    state.habitLogs = (state.habitLogs || []).filter(l => l.habitId !== id);
    state._delHabitPending = null;
    saveState();
    toast('Habitude supprimée');
    navigate('habits');
    return;
  }
  state._delHabitPending = id;
  toast('Reclique pour confirmer');
  setTimeout(()=>{ state._delHabitPending = null; }, 3000);
  render();
}

function copyShareText() {
  const u = state.user;
  const lastWeight = state.weights[state.weights.length - 1]?.kg || u.weight;
  const startWeight = state.weights[0]?.kg || u.weight;
  const delta = lastWeight - startWeight;
  const txt = `Mon parcours sur Vital Track 💪
${state.workouts.length} séance${state.workouts.length>1?'s':''} · ${state.streak} jour${state.streak>1?'s':''} de série · ${delta>0?'+':''}${displayWeight(delta).toFixed(1)} ${weightUnit()} depuis le départ`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(() => toast('Copié dans le presse-papier'));
  } else {
    toast('Copie manuelle nécessaire');
  }
}

function renderFoodPrefs() {

function setFoodPrefDiet(diet) {
  if (!state.foodPrefs) state.foodPrefs = { likes: [], dislikes: [], allergies: [], diet: null };
  state.foodPrefs.diet = diet;
  saveState();
  render();
}

function addFoodPrefItem(key) {
  const input = document.getElementById('fp_' + key);
  if (!input) return;
  const value = input.value.trim();
  if (!value) return toast('Tape quelque chose');
  if (!state.foodPrefs) state.foodPrefs = { likes: [], dislikes: [], allergies: [], diet: null };
  if (!state.foodPrefs[key]) state.foodPrefs[key] = [];
  if (state.foodPrefs[key].some(v => v.toLowerCase() === value.toLowerCase())) {
    return toast('Déjà dans la liste');
  }
  state.foodPrefs[key].push(value);
  saveState();
  toast('Ajouté');
  render();
}

function removeFoodPrefItem(key, idx) {
  if (!state.foodPrefs?.[key]) return;
  state.foodPrefs[key].splice(idx, 1);
  saveState();
  render();
}

function reshareWorkoutCode(postId) {
  const post = state.social.feed.find(p => p.id === postId);

  // On reconstruit le code à partir des données du post
  const r = publishMyWorkoutToFeed(post.payload._wid || post.id);
  // Si le workout d'origine n'est plus là, on régénère depuis le post lui-même
  const fallback = encodePayload('workout', {
    pid: post.id, aid: post.authorId, an: post.authorName, ah: post.authorHue,
    ts: post.timestamp, w: post.payload
  });
  showCodeModal({
    title: 'Re-partager',
    description: 'Voici le code de ce post :',
    code: r.code || fallback,
    backTo: 'social-feed'
  });
}

// MODAL D'AFFICHAGE D'UN CODE À COPIER
// =============================================================
function showCodeModal({ title, description, code, backTo }) {
  state._codeModal = { title, description, code, backTo: backTo || 'social-feed' };
  render();
}

function closeCodeModal() {
  state._codeModal = null;
  render();
}

function copyModalCode() {
  if (!state._codeModal) return;
  const code = state._codeModal.code;
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(code).then(() => toast('Code copié'));
  } else {
    // Fallback : sélection
    const ta = document.createElement('textarea');
    ta.value = code; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Code copié'); } catch(e) { toast('Copie manuelle nécessaire'); }
    document.body.removeChild(ta);
  }
}

function shareModalCode() {
  if (!state._codeModal) return;
  const code = state._codeModal.code;
  const txt = `${state._codeModal.title || 'Code Vital Track'}\n\n${code}\n\n(Colle ce code dans Vital Track via le bouton +)`;
  if (navigator.share) {
    navigator.share({ text: txt, title: 'Vital Track' }).catch(()=>{});
  } else {
    copyModalCode();
  }
}

function processImportCode() {
  const el = document.getElementById('importCode');
  if (!el) return;
  const code = el.value.trim();
  if (!code) return toast('Colle un code');
  const r = importAnyCode(code);
  if (r.error) return toast(r.error);
  // Routage selon le type
  const type = decodePayload(code).type;
  switch (type) {
    case 'profile':
      toast(r.updated ? 'Ami mis à jour' : `${r.friend.displayName} ajouté`);
      navigate('social-friends');
      break;
    case 'workout':
      toast(`${r.post.authorName} a partagé une séance`);
      navigate('social-feed');
      break;
    case 'kudos':
      toast(`Réaction reçue !`);
      navigate('social-post-detail', { id: r.post.id });
      break;
    case 'challenge':
      toast(`Défi rejoint : ${r.challenge.name}`);
      navigate('social-challenge-detail', { id: r.challenge.id });
      break;
    case 'joinResp':
      toast(`Score d'ami mis à jour`);
      navigate('social-challenge-detail', { id: r.challenge.id });
      break;
    case 'weekScore':
      toast(`Score hebdo importé`);
      navigate('social-leaderboard');
      break;
    case 'group':
      toast(`Cercle rejoint`);
      navigate('social-groups');
      break;
    default:
      toast('Importé');
      navigate('social-feed');
  }
}

  const friends = state.social.friends || [];
  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="goBack('social-feed')">${iconBack()}</button>
        <button class="btn-icon" onclick="navigate('social-import')">${iconPlus()}</button>
      </div>
      <h1 class="t-h1" style="margin-top:8px;">Amis</h1>
      <div class="t-caption">${friends.length} ami${friends.length>1?'s':''}</div>
    </div>

    ${friends.length === 0 ? `
      <div class="card">
        <p class="t-body t-graphite mb-16" style="line-height:1.5;">Aucun ami pour l'instant. Demande à tes potes leur "code de profil" et colle-le dans l'app.</p>
        <button class="btn btn-primary" onclick="navigate('social-import')">Coller un code reçu</button>
        <div style="height:8px;"></div>
        <button class="btn btn-secondary" onclick="shareMyProfile()">Partager mon profil</button>

    ` : friends.map(f => `
      <div class="friend-card" onclick="navigate('social-friend-detail', { id: '${f.userId}' })">
        ${avatarHTML(f.displayName, f.avatarHue, 44)}
        <div class="friend-info">
          <div class="friend-name">${f.displayName}</div>
          <div class="friend-meta">${f.stats?.w || 0} séances · streak ${f.stats?.sk || 0}${f.bio ? ` · ${escapeHtml(f.bio)}` : ''}</div>
        </div>
        ${iconArrow()}
      </div>
    `).join('')}

    <div style="height: 100px;"></div>
  `;
}

function renderFriendDetail() {
  const id = state._viewParams?.id;
  ensureSocialDefaults();
  const f = state.social.friends.find(x => x.userId === id);
  if (!f) { navigate('social-friends'); return ''; }
  const posts = (state.social.feed || []).filter(p => p.authorId === id);

  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="goBack('social-friends')">${iconBack()}</button>
        <button class="btn-icon" onclick="removeFriend('${id}')" style="${state._delFriendPending===id?'background:var(--crimson); color:var(--bone);':''}">${state._delFriendPending===id?iconCheck():iconTrash()}</button>
      </div>
      ${state._delFriendPending===id ? `<div class="t-caption mt-8" style="color:var(--crimson);">Re-clique sur ✓ pour retirer ${f.displayName}</div>` : ''}
    </div>

    <div class="profile-card">
      ${avatarHTML(f.displayName, f.avatarHue, 80)}
      <div class="profile-name">${f.displayName}</div>
      <div class="profile-id">ID <span class="t-mono-sm">${f.userId}</span></div>
      ${f.bio ? `<div class="profile-bio">${escapeHtml(f.bio)}</div>` : ''}
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-num">${f.stats?.w || 0}</div>
          <div class="profile-stat-lab">séances</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${f.stats?.sk || 0}</div>
          <div class="profile-stat-lab">streak</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${f.stats?.bd || 0}</div>
          <div class="profile-stat-lab">badges</div>
        </div>
      </div>
      <div class="t-caption mt-16">Mis à jour ${fmtRelative(f.lastUpdate)}</div>
    </div>

    <div class="card-title mt-16">Ses séances dans ton feed</div>
    ${posts.length === 0 ? `<div class="card"><p class="t-body t-graphite">${f.displayName} ne t'a pas encore partagé de séance.</p></div>` : posts.map(p => renderFeedPost(p)).join('')}

    <div style="height: 100px;"></div>
  `;
}

function fmtRelative(timestamp) {
  if (!timestamp) return '—';
  const diff = Date.now() - timestamp;
  const days = Math.floor(diff / 86400000);
  if (days === 0) return "aujourd'hui";
  if (days === 1) return 'hier';
  if (days < 7) return `il y a ${days} jours`;
  if (days < 30) return `il y a ${Math.floor(days/7)} semaine${Math.floor(days/7)>1?'s':''}`;
  return `il y a ${Math.floor(days/30)} mois`;
}

function removeFriend(id) {
  if (state._delFriendPending === id) {
    state.social.friends = state.social.friends.filter(f => f.userId !== id);
    state._delFriendPending = null;
    saveState();
    toast('Ami retiré');
    navigate('social-friends');
    return;
  }
  state._delFriendPending = id;
  toast('Reclique pour confirmer');
  setTimeout(()=>{ state._delFriendPending = null; }, 3000);
  render();
}

// =============================================================
// DÉTAIL D'UN POST (avec kudos et commentaires)
// =============================================================
function renderPostDetail() {
  const id = state._viewParams?.id;
  ensureSocialDefaults();
  const post = (state.social.feed || []).find(p => p.id === id);
  if (!post) { navigate('social-feed'); return ''; }
  const w = post.payload;
  const isCardio = w.t === 'cardio';
  const myKudo = post.kudos.find(k => k.authorId === state.social.userId);

  const kudosByKind = {};
  post.kudos.forEach(k => { kudosByKind[k.kind] = (kudosByKind[k.kind] || []).concat([k]); });

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('social-feed')">${iconBack()}</button><div></div></div>
    </div>

    <div class="feed-post">
      <div class="feed-post-header">
        ${avatarHTML(post.authorName, post.authorHue, 44)}
        <div style="flex:1; min-width:0;">
          <div class="feed-post-author">${post.authorName}${post.own?'<span class="feed-post-tag">moi</span>':''}</div>
          <div class="feed-post-meta">${fmtFullDate(post.date)} · ${isCardio?sportType(w.s).label:'Musculation'}</div>
        </div>
      </div>
      <div class="feed-post-body">
        ${isCardio ? renderCardioPostBody(w) : renderStrengthPostBody(w)}
      </div>
      <div class="feed-post-actions">
        <button class="kudo-btn ${myKudo?.kind==='kudo'?'active':''}" onclick="quickKudo('${post.id}', 'kudo')">${iconClap()} Bravo</button>
        <button class="kudo-btn ${myKudo?.kind==='fire'?'active':''}" onclick="quickKudo('${post.id}', 'fire')">${iconFlame(16)} Feu</button>
        <button class="kudo-btn ${myKudo?.kind==='strong'?'active':''}" onclick="quickKudo('${post.id}', 'strong')">${iconMuscle(16)} Costaud</button>
      </div>
    </div>

    ${post.kudos.length > 0 ? `
      <div class="card-title mt-16">Réactions (${post.kudos.length})</div>
      <div class="kudo-list">
        ${post.kudos.map(k => `
          <div class="kudo-item">
            ${avatarHTML(k.authorName, k.authorHue, 28)}
            <span class="kudo-name">${k.authorName}</span>
            <span class="kudo-emoji">${kudoIcon(k.kind, 16)}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <div class="card-title mt-16">Commentaires (${post.comments.length})</div>
    ${post.comments.length === 0 ? '<div class="card"><p class="t-caption">Aucun commentaire pour l\'instant.</p></div>' : post.comments.map(c => `
      <div class="comment-card">
        ${avatarHTML(c.authorName, c.authorHue, 32)}
        <div class="comment-body">
          <div class="comment-author">${c.authorName}</div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
      </div>
    `).join('')}

    <div class="card mt-16">
      <div class="input-group">
        <label class="input-label">Ajouter un commentaire</label>
        <textarea class="input" id="commentText" rows="2" maxlength="280" placeholder="Bien joué !" style="height:auto; resize:vertical;"></textarea>
      </div>
      <button class="btn btn-primary" onclick="postComment('${post.id}')">Commenter</button>
      ${!post.own ? `<div class="t-caption mt-8" style="line-height:1.4;">Ton commentaire sera ajouté localement et un code sera généré pour le transmettre à ${post.authorName}.</div>` : ''}
    </div>

    <div style="height: 100px;"></div>
  `;
}

function quickKudo(postId, kind) {
  const r = addLocalKudos(postId, kind);
  if (r.error) return toast(r.error);
  const post = state.social.feed.find(p => p.id === postId);
  if (post && post.own) {
    toast('Réaction enregistrée');
    render();
    return;
  }
  // Sinon : on génère le code à envoyer à l'auteur
  showCodeModal({
    title: 'Code de réaction',
    description: `Envoie ce code à ${post.authorName} pour qu'il/elle voie ton kudo. Sinon, tape directement sur "Copier" et colle-le dans WhatsApp.`,
    code: r.code,
    backTo: 'social-feed'
  });
}

function postComment(postId) {
  const el = document.getElementById('commentText');
  if (!el) return;
  const text = el.value.trim();
  if (!text) return toast('Écris quelque chose');
  const r = addLocalComment(postId, text);
  if (r.error) return toast(r.error);
  const post = state.social.feed.find(p => p.id === postId);
  if (post && post.own) {
    toast('Commentaire ajouté');
    el.value = '';
    render();
    return;
  }
  showCodeModal({
    title: 'Code de commentaire',
    description: `Ton commentaire est ajouté localement. Envoie ce code à ${post.authorName} pour qu'il/elle le voie.`,
    code: r.code,
    backTo: 'social-post-detail'
  });
}

function deletePost(postId) {
  if (state._delPostPending === postId) {
    state.social.feed = state.social.feed.filter(p => p.id !== postId);
    state._delPostPending = null;
    saveState();
    toast('Post supprimé');
    render();
    return;
  }
  state._delPostPending = postId;
  toast('Reclique pour confirmer');
  setTimeout(()=>{ state._delPostPending = null; }, 3000);
}

// Icônes kudos
function kudoIcon(kind, size = 16) {
  if (kind === 'kudo') return iconClap(size);
  if (kind === 'fire') return iconFlame(size);
  if (kind === 'strong') return iconMuscle(size);
  return iconHeart(size);
}
const iconClap = (s=18) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11 L9 4 M12 11 L12 3 M15 11 L15 4 M6 12 L6 7 M6 14 C 4 14, 4 12, 6 12 M9 11 C 9 13, 12 13, 12 11 M9 11 L9 18 A 4 4 0 0 0 13 22 L 14 22 A 5 5 0 0 0 19 17 L 19 11 C 19 9, 17 9, 17 11"/></svg>`;
const iconMuscle = (s=18) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8 C 5 5, 9 4, 12 5 L 18 7 C 20 8, 20 11, 18 11 L 14 11 C 14 13, 17 14, 17 17 C 17 20, 12 20, 11 17 L 9 13 C 7 13, 5 11, 5 8 Z"/></svg>`;
const iconChat = (s=18) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 A 2 2 0 0 1 6 4 L 18 4 A 2 2 0 0 1 20 6 L 20 16 A 2 2 0 0 1 18 18 L 9 18 L 5 21 L 5 18 A 1 1 0 0 1 4 17 Z"/></svg>`;
const iconShare = (s=18) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="9" y1="11" x2="15" y2="7"/><line x1="9" y1="13" x2="15" y2="17"/></svg>`;
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function renderChallenges() {
  ensureSocialDefaults();
  refreshMyChallengesProgress();
  const challenges = state.social.challenges || [];
  const active = challenges.filter(c => c.deadline > Date.now());
  const finished = challenges.filter(c => c.deadline <= Date.now());

  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="goBack('social-feed')">${iconBack()}</button>
        <button class="btn-icon" onclick="navigate('social-challenge-create')">${iconPlus()}</button>
      </div>
      <h1 class="t-h1" style="margin-top:8px;">Défis</h1>
      <div class="t-caption">${active.length} actif${active.length>1?'s':''}${finished.length>0 ? ` · ${finished.length} terminé${finished.length>1?'s':''}` : ''}</div>
    </div>

    ${active.length === 0 ? `
      <div class="card">
        <div class="row gap-16">
          <div class="hk-banner-icon">${iconFlame(22)}</div>
          <div style="flex:1; min-width:0;">
            <div class="t-body" style="font-weight:600;">Aucun défi en cours</div>
            <div class="t-caption mt-8" style="line-height:1.5;">Lance un défi (X séances en Y jours, distance cumulée, pas...) et invite tes amis. Chacun tracke ses progrès, vous échangez vos scores via codes.</div>
          </div>
        </div>
        <button class="btn btn-primary mt-16" onclick="navigate('social-challenge-create')">Créer un défi</button>
        <div style="height:8px;"></div>
        <button class="btn btn-secondary" onclick="navigate('social-import')">Rejoindre via code</button>
      </div>
    ` : `
      <div class="card-title">En cours</div>
      ${active.map(c => renderChallengeCard(c)).join('')}
    `}

    ${finished.length > 0 ? `
      <div class="card-title mt-24">Terminés</div>
      ${finished.slice(0, 5).map(c => renderChallengeCard(c, true)).join('')}
    ` : ''}

    <div style="height: 100px;"></div>
  `;
}

function renderChallengeCard(c, finished = false) {
  const meta = CHALLENGE_TYPES[c.type] || { label: c.type, unit: '' };
  const me = c.participants.find(p => p.userId === state.social.userId);
  const myProgress = me ? me.progress : 0;
  const ratio = c.target > 0 ? Math.min(1, myProgress / c.target) : 0;
  const daysLeft = Math.max(0, Math.ceil((c.deadline - Date.now()) / 86400000));
  // Classement local
  const sorted = [...c.participants].sort((a, b) => (b.progress||0) - (a.progress||0));
  const myRank = sorted.findIndex(p => p.userId === state.social.userId) + 1;

  return `
    <div class="challenge-card ${finished?'finished':''}" onclick="navigate('social-challenge-detail', { id: '${c.id}' })">
      <div class="row-between mb-16">
        <div class="row gap-12" style="flex:1; min-width:0;">
          <div class="challenge-icon">${sportIcon(meta.icon, 18)}</div>
          <div style="flex:1; min-width:0;">
            <div class="t-body" style="font-weight:600;">${escapeHtml(c.name)}</div>
            <div class="t-caption">${meta.label} · ${c.target} ${meta.unit}${finished?' · terminé':` · ${daysLeft}j restants`}</div>
          </div>
        </div>
        ${myRank > 0 ? `<div class="rank-pill rank-${myRank<=3?myRank:'other'}">${myRank===1?'🥇':myRank===2?'🥈':myRank===3?'🥉':'#'+myRank}</div>` : ''}
      </div>
      <div class="challenge-bar"><div class="challenge-bar-fill" style="width:${ratio*100}%;"></div></div>
      <div class="row-between mt-8">
        <div class="t-caption"><span class="t-mono-sm">${formatChallengeProgress(myProgress, c.type)}</span> / ${formatChallengeProgress(c.target, c.type)} ${meta.unit}</div>
        <div class="t-caption">${c.participants.length} participant${c.participants.length>1?'s':''}</div>
      </div>
    </div>
  `;
}

function formatChallengeProgress(value, type) {
  if (type === 'cardio_distance') return value.toFixed(1);
  if (type === 'tonnage_total') return Math.round(value);
  if (type === 'steps_total') return Math.round(value).toLocaleString('fr-FR');
  return Math.round(value);
}

function renderChallengeDetail() {
  const id = state._viewParams?.id;
  ensureSocialDefaults();
  refreshMyChallengesProgress();
  const c = (state.social.challenges || []).find(x => x.id === id);
  if (!c) { navigate('social-challenges'); return ''; }
  const meta = CHALLENGE_TYPES[c.type] || { label: c.type, unit: '' };
  const finished = c.deadline <= Date.now();
  const daysLeft = Math.max(0, Math.ceil((c.deadline - Date.now()) / 86400000));
  const sorted = [...c.participants].sort((a, b) => (b.progress||0) - (a.progress||0));

  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="goBack('social-challenges')">${iconBack()}</button>
        <button class="btn-icon" onclick="deleteChallenge('${c.id}')" style="${state._delChallengePending===c.id?'background:var(--crimson); color:var(--bone);':''}">${state._delChallengePending===c.id?iconCheck():iconTrash()}</button>
      </div>
      <h1 class="t-h1" style="margin-top:8px;">${escapeHtml(c.name)}</h1>
      <div class="t-caption">${meta.label} · ${c.target} ${meta.unit}${finished?' · ⚐ terminé':` · ${daysLeft} jours restants`}</div>
    </div>

    <div class="card">
      <div class="card-title">Classement</div>
      ${sorted.map((p, i) => {
        const isMe = p.userId === state.social.userId;
        const ratio = c.target > 0 ? Math.min(1, p.progress / c.target) : 0;
        return `
          <div class="leader-row ${isMe?'me':''}">
            <div class="leader-rank rank-${i+1<=3?i+1:'other'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
            ${avatarHTML(p.displayName, p.avatarHue, 32)}
            <div class="leader-name">${p.displayName}${isMe?' (toi)':''}</div>
            <div class="leader-bar"><div class="leader-bar-fill" style="width:${ratio*100}%;"></div></div>
            <div class="leader-val">${formatChallengeProgress(p.progress, c.type)}</div>
          </div>
        `;
      }).join('')}
    </div>

    ${!finished ? `
      <div class="card">
        <div class="card-title">Actions</div>
        <button class="btn btn-primary" onclick="shareMyChallengeProgress('${c.id}')">Partager mon score</button>
        <div style="height:8px;"></div>
        <button class="btn btn-secondary" onclick="shareChallengeInvite('${c.id}')">Inviter un ami</button>
        <p class="t-caption mt-16" style="line-height:1.5;">Tu peux partager ton score actuel. Tes amis colleront le code dans leur app pour mettre à jour le classement chez eux.</p>
      </div>
    ` : ''}

    <div style="height: 100px;"></div>
  `;
}

function shareChallengeInvite(challengeId) {
  const r = buildChallengeInviteCode(challengeId);
  if (r.error) return toast(r.error);
  showCodeModal({
    title: 'Inviter au défi',
    description: 'Envoie ce code à un ami pour qu\'il rejoigne ce défi.',
    code: r.code,
    backTo: 'social-challenge-detail'
  });
}

function shareMyChallengeProgress(challengeId) {
  refreshMyChallengesProgress();
  const r = buildChallengeProgressCode(challengeId);
  if (r.error) return toast(r.error);
  showCodeModal({
    title: 'Partager mon score',
    description: `Tu es à ${r.progress} sur ce défi. Envoie ce code à tes co-participants pour qu'ils voient ton avancée.`,
    code: r.code,
    backTo: 'social-challenge-detail'
  });
}

function deleteChallenge(id) {
  if (state._delChallengePending === id) {
    state.social.challenges = state.social.challenges.filter(c => c.id !== id);
    state._delChallengePending = null;
    saveState();
    toast('Défi supprimé');
    navigate('social-challenges');
    return;
  }
  state._delChallengePending = id;
  toast('Reclique pour confirmer');
  setTimeout(()=>{ state._delChallengePending = null; }, 3000);
  render();
}

function renderChallengeCreate() {
  if (!state._challengeForm) {
    state._challengeForm = { name: '', type: 'workouts_count', target: 12, days: 30 };
  }
  const f = state._challengeForm;
  const types = Object.entries(CHALLENGE_TYPES);
  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('social-challenges')">${iconBack()}</button><div></div></div>
      <h1 class="t-h1" style="margin-top:8px;">Nouveau défi</h1>
      <div class="t-caption">Lance un challenge à tes amis</div>
    </div>

    <div class="card">
      <div class="input-group">
        <label class="input-label">Nom</label>
        <input type="text" class="input" id="ch_name" value="${escapeHtml(f.name)}" placeholder="ex : Avril 12 séances" oninput="state._challengeForm.name=this.value">
      </div>

      <div class="input-group">
        <label class="input-label">Type</label>
        <div class="sport-grid">
          ${types.map(([id, t]) => `
            <button class="sport-pick ${f.type===id?'active':''}" onclick="state._challengeForm.type='${id}'; render();">
              ${sportIcon(t.icon, 22)}<span>${t.label}</span>
            </button>
          `).join('')}
        </div>
      </div>

      <div class="row gap-8">
        <div class="input-group" style="flex:1;">
          <label class="input-label">Objectif (${CHALLENGE_TYPES[f.type].unit})</label>
          <input type="text" class="input" id="ch_target" value="${f.target}" inputmode="decimal" oninput="state._challengeForm.target=parseFloat(this.value)||0">
        </div>
        <div class="input-group" style="flex:1;">
          <label class="input-label">Durée (jours)</label>
          <input type="text" class="input" id="ch_days" value="${f.days}" inputmode="numeric" oninput="state._challengeForm.days=parseInt(this.value)||0">
        </div>
      </div>

      <button class="btn btn-primary" onclick="confirmCreateChallenge()">Créer ce défi</button>
    </div>

    <div style="height: 100px;"></div>
  `;
}

function confirmCreateChallenge() {
  const f = state._challengeForm;
  if (!f.name || !f.name.trim()) return toast('Nom obligatoire');
  if (!f.target || f.target <= 0) return toast('Objectif > 0');
  if (!f.days || f.days <= 0) return toast('Durée > 0 jours');
  const ch = createChallenge(f);
  state._challengeForm = null;
  toast('Défi créé');
  // Propose direct l'invitation
  const r = buildChallengeInviteCode(ch.id);
  showCodeModal({
    title: 'Défi créé · Invite tes amis',
    description: 'Envoie ce code à tes amis pour qu\'ils rejoignent le défi. Tu peux aussi le partager plus tard.',
    code: r.code,
    backTo: 'social-challenge-detail',
    afterClose: () => navigate('social-challenge-detail', { id: ch.id })
  });
}

function renderLeaderboard() {
  ensureSocialDefaults();
  const me = myCurrentWeekScore();
  const week = me.week;
  const friendsScores = (state.social.weekSnapshots || []).filter(s => s.week === week);
  const all = [me, ...friendsScores];
  // 4 classements possibles : séances, tonnage, cardio min, sommeil moyen, pas
  const metric = state._lbMetric || 'w';
  const metrics = [
    { id: 'w', label: 'Séances', unit: '' },
    { id: 't', label: 'Tonnage', unit: weightUnit() },
    { id: 'c', label: 'Cardio', unit: 'min' },
    { id: 'st', label: 'Pas', unit: 'pas' },
    { id: 'sl', label: 'Sommeil moyen', unit: 'h' }
  ];
  const sorted = [...all].sort((a, b) => (b.stats[metric] || 0) - (a.stats[metric] || 0));

  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="goBack('social-feed')">${iconBack()}</button>
        <button class="btn-icon" onclick="shareMyWeekScore()" aria-label="Partager mon score">${iconShare(18)}</button>
      </div>
      <h1 class="t-h1" style="margin-top:8px;">Classement</h1>
      <div class="t-caption">Semaine du ${fmtFullDate(week)}</div>
    </div>

    <div class="row gap-8 mb-16" style="flex-wrap:wrap;">
      ${metrics.map(m => `
        <button class="chip ${metric===m.id?'active':''}" onclick="state._lbMetric='${m.id}'; render();">${m.label}</button>
      `).join('')}
    </div>

    <div class="card">
      ${sorted.length === 1 ? `
        <p class="t-body t-graphite mb-16" style="line-height:1.5;">Pour comparer, demande à tes amis leur "score hebdo" (bouton ${iconShare(12)} en haut). Quand tu colles leur code, ils apparaissent ici.</p>
      ` : ''}
      ${sorted.map((s, i) => {
        const isMe = s.isMe;
        const value = s.stats[metric] || 0;
        const formatted = metric === 'st' ? value.toLocaleString('fr-FR') : (metric === 'sl' || metric === 't' ? value : Math.round(value));
        const max = Math.max(...sorted.map(x => x.stats[metric] || 0)) || 1;
        const ratio = value / max;
        return `
          <div class="leader-row ${isMe?'me':''}">
            <div class="leader-rank rank-${i+1<=3?i+1:'other'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
            ${avatarHTML(s.displayName, s.avatarHue, 32)}
            <div class="leader-name">${s.displayName}${isMe?' (toi)':''}</div>
            <div class="leader-bar"><div class="leader-bar-fill" style="width:${ratio*100}%;"></div></div>
            <div class="leader-val"><span class="t-mono-sm">${formatted}</span> ${metrics.find(m=>m.id===metric).unit}</div>
          </div>
        `;
      }).join('')}
    </div>

    ${friendsScores.length > 0 ? `
      <div class="t-caption mt-16">Scores reçus de tes amis pour cette semaine. Pour la semaine prochaine, redemande-leur un code ${iconShare(12)} dimanche soir.</div>
    ` : ''}

    <div style="height: 100px;"></div>
  `;
}

  const code = buildWeekScoreCode();
  showCodeModal({

    description: 'Envoie ce code à tes amis pour comparer. Ils colleront le code chez eux pour te voir dans leur classement.',

  const amount = parseFloat(document.getElementById('bud_amount').value);

  if (!days || days <= 0) return toast('Durée invalide');
  setFoodBudget(amount, days);
  toast('Budget enregistré');
  state._regenShopping = true;
  navigate('shopping-list');
}

function saveCustomPrice() {
  const name = document.getElementById('po_name').value.trim();
  const price = parseFloat(document.getElementById('po_price').value);
  if (!name) return toast('Nom requis');
  if (!price || price <= 0) return toast('Prix invalide');
  const existing = lookupIngredientPrice(name);
  const unit = existing?.unit || 'kg';
  setPriceOverride(name, price, unit);
  toast('Prix enregistré');
  state._regenShopping = true;
  document.getElementById('po_name').value = '';
  document.getElementById('po_price').value = '';
  render();
}

function removeCustomPrice(name) {
  setPriceOverride(name, null);
  toast('Supprimé');
  state._regenShopping = true;
  render();
}

      <button class="chip ${filter==='all'?'active':''}" onclick="setRecipePickerFilter('all')">Toutes</button>
      <button class="chip ${filter==='petit-dej'?'active':''}" onclick="setRecipePickerFilter('petit-dej')">Petit-déj</button>
      <button class="chip ${filter==='plat'?'active':''}" onclick="setRecipePickerFilter('plat')">Plats</button>
      <button class="chip ${filter==='collation'?'active':''}" onclick="setRecipePickerFilter('collation')">Collations</button>

    ${recipes.length === 0 ? `

        <div class="empty-title">Aucune recette</div>
        <div class="empty-sub">Aucune recette ne correspond à tes filtres et préférences.</div>
      </div>
    ` : recipes.map(r => {
      const isChosen = chosen.has(r.id);
      const ingredientCount = (r.ingredients||[]).length;
      return `
        <div class="recipe-pick-card ${isChosen?'chosen':''}" onclick="toggleRecipePick('${r.id}')">
          <div class="recipe-pick-check ${isChosen?'on':''}">${isChosen?iconCheck():''}</div>

        </div>

    }).join('')}

    ${chosen.size > 0 ? `
      <div class="action-bar">
        <button class="btn btn-primary" onclick="confirmRecipePicker()">Générer la liste pour ${chosen.size} recette${chosen.size>1?'s':''}</button>
      </div>
    ` : ''}

    <div style="height: 140px;"></div>
  `;
}

function onRecipePickerQuery(value) {
  state._recipePickerQuery = value;
}

function setRecipePickerFilter(filter) {
  state._recipePickerFilter = filter;
  render();
}

function toggleRecipePick(id) {
  if (!state._chosenRecipes) state._chosenRecipes = [];
  const idx = state._chosenRecipes.indexOf(id);
  if (idx >= 0) state._chosenRecipes.splice(idx, 1);
  else state._chosenRecipes.push(id);
  render();
}

function confirmRecipePicker() {
  if (!state._chosenRecipes || state._chosenRecipes.length === 0) {

  state._shoppingMode = 'recipes';
  state._regenShopping = true;
  saveState();
  navigate('shopping-list');
}

// PARCOURS NUTRITION UNIFIÉ — wizard 4 étapes
// ============================================================
function renderNutriWizard() {
  const step = state._nutriStep || 1;
  const totalSteps = 4;
  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="navigate('nutrition')">${iconBack()}</button>
        <div class="t-caption">${step} / ${totalSteps}</div>
      </div>
      <div class="wizard-progress">
        ${[1,2,3,4].map(i => `<div class="wp-dot ${i<=step?'active':''} ${i<step?'done':''}"></div>`).join('')}
      </div>
      <h1 class="t-h1" style="margin-top: 16px;">${wizStepTitle(step)}</h1>
      <div class="t-caption">${wizStepSub(step)}</div>
    </div>

    ${step === 1 ? renderWizStep1() : ''}
    ${step === 2 ? renderWizStep2() : ''}
    ${step === 3 ? renderWizStep3() : ''}
    ${step === 4 ? renderWizStep4() : ''}

    <div class="action-bar">
      <div class="row gap-8">
        ${step > 1 ? `<button class="btn btn-secondary" style="flex:1;" onclick="wizPrev()">Retour</button>` : ''}
        <button class="btn btn-primary" style="flex:2;" onclick="wizNext()">${step === totalSteps ? 'Terminer' : 'Suivant'}</button>
      </div>
    </div>
    <div style="height: 140px;"></div>
  `;
}

function wizStepTitle(s) {
  return ['Tes préférences', 'Ton frigo actuel', 'Ton budget', 'Ton plan repas'][s-1];
}
function wizStepSub(s) {
  return [
    'Pour t\'éviter ce que tu n\'aimes pas',
    'Ce qu\'on a déjà sous la main',
    'Adapté à tes courses',
    'Calibré sur tes besoins caloriques'
  ][s-1];
}

function wizNext() {
  const step = state._nutriStep || 1;
  if (step < 4) {
    state._nutriStep = step + 1;
    if (step + 1 === 4) {
      // Génère le plan calibré
      try {
        state._currentMealPlan = generateCalibratedMealPlan({ days: 7 });
      } catch (e) {
        toast('Erreur génération plan'); console.error(e);
      }
    }
    saveState();
    render();
  } else {
    state._nutritionOnboarded = true;
    state._nutriStep = 1;
    saveState();
    toast('Parcours terminé');
    navigate('nutrition');
  }
}
function wizPrev() {
  state._nutriStep = Math.max(1, (state._nutriStep || 1) - 1);
  saveState();
  render();
}

// ÉTAPE 1 : Préférences
function renderWizStep1() {
  if (!state.foodPrefs) state.foodPrefs = { likes: [], dislikes: [], allergies: [], diet: null };
  const p = state.foodPrefs;
  const diets = [
    { k: null, label: 'Aucun' }, { k: 'vegetarian', label: 'Végétarien' },
    { k: 'vegan', label: 'Végan' }, { k: 'glutenFree', label: 'Sans gluten' },

  return `

      <div class="row gap-8" style="flex-wrap:wrap;">
        ${diets.map(d => `
          <button class="chip ${p.diet===d.k?'active':''}" onclick="setDietWiz('${d.k===null?'':d.k}')">${d.label}</button>
        `).join('')}
      </div>
    </div>

    ${renderPrefList('likes', 'Aliments aimés', p.likes, 'Saumon, avocat, etc.')}

    ${renderPrefList('allergies', 'Allergies', p.allergies, 'Arachides, gluten...')}
  `;
}

function renderPrefList(key, label, items, placeholder) {
  return `
    <div class="card">
      <div class="card-title">${label}</div>
      <div class="row gap-8 mb-16">
        <input type="text" class="input" id="prefInput_${key}" placeholder="${placeholder}" style="height:44px;" onkeydown="if(event.key==='Enter'){addPrefWiz('${key}');}">
        <button class="btn-icon" style="background:var(--sage); color:var(--bone); width:44px; height:44px;" onclick="addPrefWiz('${key}')">${iconPlus()}</button>
      </div>
      <div class="row gap-8" style="flex-wrap:wrap;">
        ${(items||[]).map((it,i) => `
          <div class="pref-tag">${escapeHtml(it)}<button onclick="removePrefWiz('${key}',${i})">×</button></div>
        `).join('')}
      </div>
    </div>
  `;
}

function setDietWiz(d) {
  if (!state.foodPrefs) state.foodPrefs = { likes:[], dislikes:[], allergies:[], diet:null };
  state.foodPrefs.diet = d || null;
  saveState();
  render();
}
function addPrefWiz(key) {
  const input = document.getElementById('prefInput_' + key);
  const v = input?.value.trim();
  if (!v) return;
  if (!state.foodPrefs) state.foodPrefs = { likes:[], dislikes:[], allergies:[], diet:null };
  if (!state.foodPrefs[key]) state.foodPrefs[key] = [];
  if (!state.foodPrefs[key].includes(v)) state.foodPrefs[key].push(v);
  input.value = '';
  saveState();
  render();
}
function removePrefWiz(key, idx) {
  if (!state.foodPrefs?.[key]) return;
  state.foodPrefs[key].splice(idx, 1);
  saveState();
  render();
}

  return `

function pickStockSuggestion(foodId) {
  const f = findFoodById(foodId);

  const nameEl = document.getElementById('stockName');
  const qtyEl = document.getElementById('stockQty');
  const unitEl = document.getElementById('stockUnit');

function addStockManual() {
  const name = document.getElementById('stockName')?.value.trim();

  document.getElementById('stockName').value = '';

function removeStockItem(id) {
  state.pantry = (state.pantry || []).filter(p => p.id !== id);

function closeFoodModal() {
  const m = document.getElementById('foodModal');
  if (m) { m.style.display = 'none'; m.innerHTML = ''; }
}

function confirmFoodLog(foodId) {
  const qty = parseFloat(document.getElementById('fmQty')?.value);
  const unit = document.getElementById('fmUnit')?.value || 'g';
  const slot = document.getElementById('fmSlot')?.value || 'snack';
  if (!qty || qty <= 0) return toast('Quantité invalide');
  const result = logFoodFromCatalog(foodId, qty, unit, slot);
  if (result.error) return toast(result.error);
  // Récents
  if (!state._ftRecent) state._ftRecent = [];
  state._ftRecent = [foodId, ...state._ftRecent.filter(id => id !== foodId)].slice(0, 10);
  saveState();
  closeFoodModal();
  toast('Aliment ajouté');
  navigate('nutrition');
}

function addQuickMeal() {
  const name = document.getElementById('ftQuickName')?.value.trim();
  const kcal = parseInt(document.getElementById('ftQuickKcal')?.value) || 0;
  const p = parseFloat(document.getElementById('ftQuickP')?.value) || 0;
  const c = parseFloat(document.getElementById('ftQuickC')?.value) || 0;
  const l = parseFloat(document.getElementById('ftQuickL')?.value) || 0;
  if (!name) return toast('Nom requis');
  if (!kcal) return toast('Calories requises');
  if (!state.meals) state.meals = [];
  state.meals.push({
    id: 'm_' + Math.random().toString(36).slice(2, 10),
    date: todayISO(), name, slot: 'snack',
    kcal, p, c, l, addedAt: Date.now()
  });
  saveState();
  toast('Ajouté');
  navigate('nutrition');
}

// VUE : REPAS EXPRESS (selon ce qu'il reste à manger)
// ============================================================
function renderExpressMeals() {
  const today = todayISO();
  const t = dailyTargets();
  const dayMeals = state.meals.filter(m => m.date === today);
  const eaten = dayMeals.reduce((s, m) => ({
    kcal: s.kcal + (m.kcal||0), p: s.p + (m.p||0), c: s.c + (m.c||0), l: s.l + (m.l||0)
  }), { kcal:0, p:0, c:0, l:0 });
  const remaining = {
    kcal: Math.max(0, t.kcal - eaten.kcal),
    p: Math.max(0, t.p - eaten.p),
    c: Math.max(0, t.c - eaten.c),
    l: Math.max(0, t.l - eaten.l)
  };
  const suggestions = expressMealSuggestions(today, 5);
  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('nutrition')">${iconBack()}</button><div></div></div>
      <h1 class="t-h1" style="margin-top: 8px;">Repas express</h1>
      <div class="t-caption">Recettes rapides adaptées à ce qu'il te reste à manger</div>
    </div>

    <div class="card">
      <div class="card-title">Reste à manger aujourd'hui</div>
      <div class="row" style="align-items:baseline; gap:6px;">
        <div class="t-mono-xl">${remaining.kcal}</div>
        <div class="t-caption">kcal</div>
      </div>
      <div class="t-caption mt-8">${remaining.p}g protéines · ${remaining.c}g glucides · ${remaining.l}g lipides</div>
    </div>

    ${suggestions.length === 0 ? `
      <div class="empty"><div class="empty-title">Aucune suggestion</div></div>
    ` : suggestions.map(r => `
      <div class="card express-card">
        <div class="row gap-12">
          <div style="flex:1; min-width:0;">
            <div class="t-caption">${r.time||0} min · ${r.kcal} kcal · ${r.p}g P</div>
            <div class="t-body" style="font-weight:500;">${escapeHtml(r.name)}</div>
            <div class="t-caption mt-8">${(r.tags||[]).slice(0,3).join(' · ')}</div>
          </div>
          <button class="btn-small btn-primary-mini" onclick="onValidateMeal('${r.id}','snack',1)">Mangé</button>
        </div>
      </div>
    `).join('')}

    <div style="height: 100px;"></div>
  `;
}

  const water = todayWaterGlasses();

  const last7 = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const date = d.toISOString().slice(0,10);
    last7.push({ date, day: d.toLocaleDateString('fr-FR',{weekday:'short'}), glasses: state.hydration[date]?.glasses || 0 });
  }
  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('nutrition')">${iconBack()}</button><div></div></div>
