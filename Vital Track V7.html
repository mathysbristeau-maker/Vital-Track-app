<script>
// ============================================================
// VITAL TRACK — MOTEUR IA LOCAL
// ============================================================
// Système expert qui croise toutes les données utilisateur pour
// produire des recommandations, alertes, prédictions et générer
// du contenu personnalisé. 100% local, pas de réseau.
// ============================================================

// =============================================================
// 1. RECOMMANDATIONS DE CHARGES PROGRESSIVES
// =============================================================

// Calcule le 1RM estimé à partir d'une charge × reps (formule d'Epley)
function epley1RM(weight, reps) {
  const w = parseFloat(weight) || 0;
  const r = parseInt(reps) || 0;
  if (w <= 0 || r <= 0) return 0;
  if (r === 1) return w;
  return w * (1 + r / 30);
}

// Renvoie les sets historiques d'un exercice (max 30 dernières séances)
function exerciseHistory(exerciseId, limit = 30) {
  const sets = [];
  state.workouts
    .filter(w => w.type !== 'cardio' && w.exercises)
    .slice(-limit)
    .reverse()
    .forEach(w => {
      const ex = w.exercises.find(e => e.exerciseId === exerciseId);
      if (!ex || !ex.sets) return;
      ex.sets.forEach(s => {
        if (s.kg && s.reps) {
          sets.push({
            date: w.date,
            kg: parseFloat(s.kg),
            reps: parseInt(s.reps),
            estimated1RM: epley1RM(s.kg, s.reps)
          });
        }
      });
    });
  return sets;
}

// Best 1RM estimé sur les N derniers jours
function bestRecent1RM(exerciseId, days = 30) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  return Math.max(0,
    ...exerciseHistory(exerciseId, 50)
      .filter(s => s.date >= cutoffISO)
      .map(s => s.estimated1RM)
  );
}

// Évalue le score de récupération (0-100) en fonction du sommeil et de la FC repos
function recoveryScore() {
  // Sommeil : moyenne 7 derniers jours
  const recentSleep = state.sleep.slice(-7);
  const avgSleep = recentSleep.length > 0
    ? recentSleep.reduce((s, x) => s + (x.hours || 0), 0) / recentSleep.length
    : 7;
  // FC repos : dernière mesure
  const lastHR = lastHealthSample('restingHeartRate');
  const baseHR = lastHR ? lastHR.value : null;
  // Volume séances 7 derniers jours
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  const recentWorkouts = state.workouts.filter(w => w.date >= cutoffISO).length;

  let score = 70; // baseline
  // Sommeil
  if (avgSleep >= 8) score += 15;
  else if (avgSleep >= 7) score += 8;
  else if (avgSleep >= 6) score += 0;
  else if (avgSleep >= 5) score -= 10;
  else score -= 25;
  // Surcharge entrainement
  if (recentWorkouts >= 6) score -= 12;
  else if (recentWorkouts >= 5) score -= 5;
  // FC repos : si élevée par rapport à valeur de référence (60), -10
  if (baseHR && baseHR > 70) score -= 8;
  if (baseHR && baseHR > 80) score -= 12;

  return Math.max(0, Math.min(100, score));
}

// Recommande les charges pour la prochaine séance d'un exercice
function recommendLoadFor(exerciseId, targetReps = 10) {
  const history = exerciseHistory(exerciseId, 5);
  const def = EXERCISES.find(e => e.id === exerciseId);
  if (history.length === 0) {
    return {
      strategy: 'first_time',
      message: "Première séance sur cet exercice. Commence léger pour valider ta technique, puis monte progressivement.",
      suggestedKg: null,
      suggestedReps: targetReps
    };
  }

  // Dernière séance enregistrée
  const lastSession = history[0];
  const lastDate = lastSession.date;
  const lastSets = history.filter(s => s.date === lastDate);
  const heaviestSet = lastSets.reduce((a, b) => (a.kg > b.kg ? a : b));

  // 1RM théorique
  const best1RM = bestRecent1RM(exerciseId, 30);
  // Charge cible pour atteindre `targetReps` reps : on inverse Epley
  // 1RM = kg × (1 + reps/30) → kg = 1RM / (1 + reps/30)
  let targetKg = best1RM / (1 + targetReps / 30);
  // Arrondi au 2.5 le plus proche (pas de plaques)
  targetKg = Math.round(targetKg / 2.5) * 2.5;

  // Recovery factor
  const rec = recoveryScore();
  let recoveryAdj = 1;
  let recoveryNote = '';
  if (rec < 50) {
    recoveryAdj = 0.93; // -7%
    recoveryNote = " Ta récup' est basse, j'ai allégé un peu.";
    targetKg = Math.round(targetKg * recoveryAdj / 2.5) * 2.5;
  } else if (rec >= 85) {
    recoveryAdj = 1.025; // +2.5%
    recoveryNote = " Tu es bien récupéré, on peut pousser un poil.";
    targetKg = Math.round(targetKg * recoveryAdj / 2.5) * 2.5;
  }

  // Comparaison à la dernière séance
  let strategy, message;
  const heavyKg = heaviestSet.kg;
  const heavyReps = heaviestSet.reps;

  if (heavyReps >= targetReps + 2) {
    // Tu as fait largement plus de reps que demandé → progression
    strategy = 'progression';
    message = `Ta dernière séance était trop facile (${heavyReps} reps × ${heavyKg} ${weightUnit()}). Monte à ${targetKg} ${weightUnit()} pour ${targetReps} reps.${recoveryNote}`;
  } else if (heavyReps >= targetReps - 1) {
    // Pile dans la cible → maintenir ou +2.5
    targetKg = Math.max(heavyKg + 2.5, targetKg);
    strategy = 'maintain_progress';
    message = `Tu étais à ${heavyKg} ${weightUnit()} × ${heavyReps} reps. Essaie ${targetKg} ${weightUnit()} cette fois.${recoveryNote}`;
  } else if (heavyReps >= targetReps - 3) {
    // Tu as raté la cible de 2-3 reps → on garde
    targetKg = heavyKg;
    strategy = 'hold';
    message = `Tu n'as pas atteint ${targetReps} reps la dernière fois (${heavyReps}). Garde ${heavyKg} ${weightUnit()} et essaie d'en ajouter une.${recoveryNote}`;
  } else {
    // Tu as bien raté → on baisse
    targetKg = Math.max(2.5, heavyKg - 5);
    strategy = 'deload';
    message = `Tu as nettement raté la cible (${heavyReps}/${targetReps}). Allège à ${targetKg} ${weightUnit()} et reconstruis.${recoveryNote}`;
  }

  return {
    strategy,
    message,
    suggestedKg: targetKg,
    suggestedReps: targetReps,
    historyLastKg: heavyKg,
    historyLastReps: heavyReps,
    recoveryScore: rec,
    estimated1RM: Math.round(best1RM * 10) / 10
  };
}

// =============================================================
// 2. GÉNÉRATION DE SÉANCES SUR-MESURE
// =============================================================

// Mapping muscle simplifié → groupes en cohérence avec EXERCISES
const MUSCLE_GROUPS = {
  push: ['pectoraux', 'épaules', 'deltoïdes antérieurs', 'triceps', 'pec'],
  pull: ['dos', 'dorsaux', 'biceps', 'lombaires', 'trapèzes', 'trap'],
  legs: ['quadriceps', 'fessiers', 'ischio-jambiers', 'mollets', 'jambes', 'glutéaux'],
  core: ['abdominaux', 'gainage', 'obliques', 'tronc']
};

function muscleMatch(exMuscles, group) {
  const tokens = MUSCLE_GROUPS[group] || [];
  return exMuscles.some(m => tokens.some(t => m.toLowerCase().includes(t)));
}

// Génère une séance sur-mesure
// opts: { duration:45-90, focus:'push'|'pull'|'legs'|'fullbody'|'core', equipment:['barbell','dumbbell','bodyweight','machine','cable'], level:'beginner'|'intermediate'|'advanced' }
function generateCustomSession(opts = {}) {
  const duration = opts.duration || 60;
  const focus = opts.focus || 'fullbody';
  const equipment = opts.equipment && opts.equipment.length ? opts.equipment : null;
  const level = opts.level || 'intermediate';

  // Détermine combien d'exercices selon durée (≈10min/exercice avec échauf+repos)
  const targetCount = Math.max(3, Math.min(8, Math.floor(duration / 10)));

  // Filtre par équipement disponible (si précisé)
  let pool = EXERCISES.filter(e => {
    if (!equipment) return true;
    const eq = (e.equipment || '').toLowerCase();
    return equipment.some(req => {
      if (req === 'bodyweight') return eq.includes('poids du corps') || eq.includes('aucun') || eq === '';
      if (req === 'barbell') return eq.includes('barre') || eq.includes('barbell');
      if (req === 'dumbbell') return eq.includes('haltère') || eq.includes('dumbbell');
      if (req === 'machine') return eq.includes('machine');
      if (req === 'cable') return eq.includes('câble') || eq.includes('cable') || eq.includes('poulie');
      return false;
    });
  });
  if (pool.length < targetCount) pool = EXERCISES; // fallback large

  // Compose selon le focus
  const picks = [];
  const usedIds = new Set();
  const pickFromGroup = (group, n) => {
    const candidates = pool.filter(e => !usedIds.has(e.id) && muscleMatch(e.muscles, group));
    // Préfère les exercices polyarticulaires (souvent en premier dans la liste pour chaque muscle)
    candidates.sort((a, b) => (b.muscles?.length || 1) - (a.muscles?.length || 1));
    for (let i = 0; i < Math.min(n, candidates.length); i++) {
      picks.push(candidates[i]);
      usedIds.add(candidates[i].id);
    }
  };

  if (focus === 'push') {
    pickFromGroup('push', Math.ceil(targetCount * 0.7));
    pickFromGroup('core', targetCount - picks.length);
  } else if (focus === 'pull') {
    pickFromGroup('pull', Math.ceil(targetCount * 0.7));
    pickFromGroup('core', targetCount - picks.length);
  } else if (focus === 'legs') {
    pickFromGroup('legs', Math.ceil(targetCount * 0.8));
    pickFromGroup('core', targetCount - picks.length);
  } else if (focus === 'core') {
    pickFromGroup('core', targetCount);
  } else {
    // Full body : équilibre push/pull/legs/core
    const each = Math.max(1, Math.floor(targetCount / 4));
    pickFromGroup('push', each);
    pickFromGroup('pull', each);
    pickFromGroup('legs', each);
    pickFromGroup('core', targetCount - picks.length);
  }

  // Pour chaque exercice : recommandation séries/reps/charge selon niveau et historique
  const sessionExercises = picks.map(ex => {
    const rec = recommendLoadFor(ex.id, 10);
    let sets, reps, rest;
    if (level === 'beginner') { sets = 3; reps = '10-12'; rest = 60; }
    else if (level === 'advanced') { sets = 4; reps = '6-10'; rest = 90; }
    else { sets = 4; reps = '8-12'; rest = 75; }
    // Ajuste rest pour les isos
    if (muscleMatch(ex.muscles, 'core')) rest = 45;
    return {
      exerciseId: ex.id,
      name: ex.name,
      sets, reps, rest,
      suggestedKg: rec.suggestedKg,
      reasoning: rec.message
    };
  });

  return {
    name: `Séance sur-mesure ${focusLabel(focus)}`,
    focus,
    duration,
    level,
    exercises: sessionExercises,
    totalEstimatedKcal: Math.round(5 * 3.5 * (state.user?.weight || 75) / 200 * duration)
  };
}

function focusLabel(focus) {
  return { push: 'Pousser', pull: 'Tirer', legs: 'Jambes', core: 'Gainage', fullbody: 'Full body' }[focus] || focus;
}

// =============================================================
// 3. GÉNÉRATION DE REPAS INTELLIGENTE
// =============================================================
// On garde generateMealPlan() existant (filtre prefs + planning sportif)
// mais on ajoute un score de pertinence pour chaque recette

function recipeRelevanceScore(recipe, context) {
  const { burn, lastUsedDate, frigo, prefs } = context;
  let score = 50;
  // Densité calorique selon effort
  if (burn >= 500 && recipe.kcal >= 500) score += 15;
  if (burn >= 500 && recipe.kcal < 350) score -= 20;
  if (burn <= 100 && recipe.kcal < 400) score += 10;
  // Variété : on évite si utilisé récemment
  if (lastUsedDate) {
    const daysSince = (Date.now() - new Date(lastUsedDate).getTime()) / 86400000;
    if (daysSince < 2) score -= 30;
    else if (daysSince < 4) score -= 10;
  }
  // Frigo : recettes dont on a déjà les ingrédients
  if (frigo && frigo.length && recipe.ingredients) {
    const have = recipe.ingredients.filter(i => {
      const name = (typeof i === 'string' ? i : i.name).toLowerCase();
      return frigo.some(f => name.includes(f.toLowerCase()) || f.toLowerCase().includes(name));
    }).length;
    score += have * 5;
  }
  // Préférences likes
  if (prefs?.likes?.length && recipe.ingredients) {
    const matches = recipe.ingredients.filter(i => {
      const name = (typeof i === 'string' ? i : i.name).toLowerCase();
      return prefs.likes.some(l => name.includes(l.toLowerCase()));
    }).length;
    score += matches * 8;
  }
  return score;
}

// Génère un plan de repas IA intelligent (remplace generateMealPlan basique quand appelé)
function generateSmartMealPlan() {
  const u = state.user;
  const breakfasts = RECIPES.filter(r => r.category === 'petit-dej');
  const meals = RECIPES.filter(r => r.category === 'plat');
  const snacks = RECIPES.filter(r => r.category === 'collation');
  const prefs = state.foodPrefs;
  const frigo = (state.pantry || []).map(p => p.name);

  // Filtre prefs (réutilise les filtres de generateMealPlan via préfiltrage)
  const filterByPrefs = (recipes) => {
    if (!prefs) return recipes;
    const dislikes = [...(prefs.dislikes || []), ...(prefs.allergies || [])].map(s => s.toLowerCase().trim()).filter(Boolean);
    const MEAT = ['poulet','bœuf','boeuf','dinde','jambon','porc','lardon','viande','steak','agneau','saucisse','bacon','chorizo'];
    const FISH = ['thon','saumon','cabillaud','colin','poisson','crevette','crabe','sardine','maquereau','sole','truite'];
    const ANIMAL = ['oeuf','œuf','lait','beurre','fromage','yaourt','crème','feta','mozza','parmesan','ricotta','chèvre','comté','emmental'];
    const GLUTEN = ['pâtes','pâte','pain','blé','farine','semoule','couscous','boulgour','seitan'];
    const LACTOSE = ['lait','beurre','fromage','yaourt','crème','feta','mozza','parmesan','ricotta'];
    return recipes.filter(r => {
      const txt = (r.ingredients || []).map(i => typeof i === 'string' ? i : i.name).join(' ').toLowerCase();
      const hasAny = (words) => words.some(w => txt.includes(w));
      if (prefs.diet === 'vegetarian' && (hasAny(MEAT) || hasAny(FISH))) return false;
      if (prefs.diet === 'vegan' && (hasAny(MEAT) || hasAny(FISH) || hasAny(ANIMAL))) return false;
      if (prefs.diet === 'glutenFree' && hasAny(GLUTEN)) return false;
      if (prefs.diet === 'lactoseFree' && hasAny(LACTOSE)) return false;
      if (dislikes.length > 0 && dislikes.some(bad => txt.includes(bad))) return false;
      return true;
    });
  };

  const safeBfs = filterByPrefs(breakfasts).length > 0 ? filterByPrefs(breakfasts) : breakfasts;
  const safeMls = filterByPrefs(meals).length > 0 ? filterByPrefs(meals) : meals;
  const safeSks = filterByPrefs(snacks).length > 0 ? filterByPrefs(snacks) : snacks;

  // Pour chaque jour, on score et on prend le meilleur, en évitant les répétitions sur 7 jours
  const usedRecent = {}; // recipeId → date dernière utilisation
  const plan = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const date = d.toISOString().slice(0, 10);
    const burn = plannedBurnForDate(date);

    const pickBest = (pool) => {
      const ctx = (recipe) => ({ burn, lastUsedDate: usedRecent[recipe.id], frigo, prefs });
      // Score chaque candidat puis pick top + un peu de hasard pour ne pas être déterministe
      const scored = pool.map(r => ({ r, s: recipeRelevanceScore(r, ctx(r)) + Math.random() * 10 }));
      scored.sort((a, b) => b.s - a.s);
      const top = scored[0].r;
      usedRecent[top.id] = date;
      return top;
    };

    const dayPlan = {
      date,
      day: d.toLocaleDateString('fr-FR', { weekday: 'long' }),
      plannedBurn: burn,
      breakfast: pickBest(safeBfs),
      lunch: pickBest(safeMls),
      dinner: pickBest(safeMls),
      snack: pickBest(safeSks)
    };
    if (burn >= 400 && safeSks.length > 1) {
      const remaining = safeSks.filter(s => s.id !== dayPlan.snack.id);
      if (remaining.length > 0) dayPlan.snack2 = pickBest(remaining);
    }
    plan.push(dayPlan);
  }
  return plan;
}

// =============================================================
// 4. ANALYSE HEBDO AUTOMATIQUE
// =============================================================
function weeklyAnalysis() {
  const now = new Date();
  const cutoff = new Date(now); cutoff.setDate(now.getDate() - 7);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  const prevCutoff = new Date(now); prevCutoff.setDate(now.getDate() - 14);
  const prevCutoffISO = prevCutoff.toISOString().slice(0, 10);

  const thisWeekWorkouts = state.workouts.filter(w => w.date >= cutoffISO);
  const lastWeekWorkouts = state.workouts.filter(w => w.date >= prevCutoffISO && w.date < cutoffISO);

  // Tonnage total (séances de muscu)
  const tonnageOf = (workouts) => workouts.filter(w => w.type !== 'cardio').reduce((sum, w) => {
    return sum + (w.exercises || []).reduce((s, e) => {
      return s + (e.sets || []).reduce((s2, set) => {
        return s2 + (parseFloat(set.kg) || 0) * (parseInt(set.reps) || 0);
      }, 0);
    }, 0);
  }, 0);

  const thisTonnage = tonnageOf(thisWeekWorkouts);
  const lastTonnage = tonnageOf(lastWeekWorkouts);
  const tonnageDelta = lastTonnage > 0 ? ((thisTonnage - lastTonnage) / lastTonnage) * 100 : 0;

  // Sommeil moyen
  const recentSleep = state.sleep.filter(s => s.date >= cutoffISO);
  const avgSleep = recentSleep.length > 0 ? recentSleep.reduce((s, x) => s + x.hours, 0) / recentSleep.length : null;

  // Poids
  const recentWeights = state.weights.filter(w => w.date >= cutoffISO);
  const weightStart = recentWeights[0]?.kg;
  const weightEnd = recentWeights[recentWeights.length - 1]?.kg;
  const weightDelta = (weightStart && weightEnd) ? weightEnd - weightStart : 0;

  // Calories moyennes
  const recentMeals = state.meals.filter(m => m.date >= cutoffISO);
  const dayBuckets = {};
  recentMeals.forEach(m => {
    if (!dayBuckets[m.date]) dayBuckets[m.date] = 0;
    dayBuckets[m.date] += m.kcal || 0;
  });
  const days = Object.keys(dayBuckets);
  const avgKcal = days.length > 0 ? days.reduce((s, d) => s + dayBuckets[d], 0) / days.length : 0;

  // Calories cible
  const targetKcal = state.user ? calorieTarget(state.user) : 2200;

  // ACTIONS CONCRÈTES (max 3)
  const actions = [];
  // 1. Séances : trop ou pas assez ?
  if (thisWeekWorkouts.length === 0) {
    actions.push({ priority: 'high', text: "Cette semaine zéro séance. Prévois-en au moins 2 sur les 7 prochains jours, même courtes." });
  } else if (thisWeekWorkouts.length < 3 && (state.user?.goal === 'masse' || state.user?.goal === 'seche')) {
    actions.push({ priority: 'medium', text: `${thisWeekWorkouts.length} séance${thisWeekWorkouts.length>1?'s':''} cette semaine. Pour ${state.user.goal === 'masse' ? 'la prise de masse' : 'la sèche'}, vise 4 à 5 séances/semaine.` });
  } else if (thisWeekWorkouts.length >= 6) {
    actions.push({ priority: 'medium', text: `${thisWeekWorkouts.length} séances : c'est beaucoup. Prévois 1 jour de repos complet pour ne pas tomber en surentraînement.` });
  }
  // 2. Sommeil
  if (avgSleep !== null && avgSleep < 6.5) {
    actions.push({ priority: 'high', text: `Tu dors ${avgSleep.toFixed(1)}h en moyenne. Sous 6h30, ta récupération et ta perte de gras sont impactées. Vise 7h30+.` });
  } else if (avgSleep !== null && avgSleep < 7 && state.user?.goal !== 'maintenance') {
    actions.push({ priority: 'medium', text: `${avgSleep.toFixed(1)}h de sommeil/nuit, c'est limite. 30 minutes de plus feraient une vraie différence.` });
  }
  // 3. Calories
  if (avgKcal > 0) {
    const ratio = avgKcal / targetKcal;
    if (state.user?.goal === 'seche' && ratio > 1.05) {
      actions.push({ priority: 'high', text: `Tu manges ${Math.round(avgKcal)} kcal/j, soit ${Math.round((ratio-1)*100)}% au-dessus de ta cible. La sèche ne marchera pas.` });
    } else if (state.user?.goal === 'masse' && ratio < 0.95) {
      actions.push({ priority: 'high', text: `Tu manges ${Math.round(avgKcal)} kcal/j, soit ${Math.round((1-ratio)*100)}% sous ta cible. Pour prendre de la masse, il faut surplus.` });
    } else if (Math.abs(ratio - 1) < 0.05) {
      actions.push({ priority: 'low', text: `Tu es très bien sur tes calories : ${Math.round(avgKcal)} kcal/j en moyenne. Continue comme ça.` });
    }
  }
  // 4. Cohérence poids vs objectif
  if (state.user?.goal === 'seche' && weightDelta > 0.3) {
    actions.push({ priority: 'medium', text: `+${weightDelta.toFixed(1)} ${weightUnit()} cette semaine alors qu'on cherche à sécher. Vérifie tes calories et ton sodium.` });
  } else if (state.user?.goal === 'masse' && weightDelta < -0.3) {
    actions.push({ priority: 'medium', text: `${weightDelta.toFixed(1)} ${weightUnit()} cette semaine. Pour prendre, il faut un peu de surplus. Mange plus.` });
  }

  return {
    period: { from: cutoffISO, to: todayISO() },
    workoutsCount: thisWeekWorkouts.length,
    workoutsCountPrev: lastWeekWorkouts.length,
    tonnageKg: Math.round(thisTonnage),
    tonnageDeltaPct: Math.round(tonnageDelta),
    avgSleep,
    weightDelta,
    avgKcal: Math.round(avgKcal),
    targetKcal,
    actions: actions.slice(0, 3)
  };
}

// =============================================================
// 5. PRÉDICTION DU POIDS
// =============================================================
function predictWeight(weeksAhead = 4) {
  const data = state.weights.slice(-30);
  if (data.length < 4) {
    return { error: "Pas assez de données. Pèse-toi régulièrement pendant 1 à 2 semaines pour activer la prédiction." };
  }
  // Régression linéaire simple : x = jours depuis le 1er point, y = kg
  const start = new Date(data[0].date).getTime();
  const points = data.map(d => ({
    x: (new Date(d.date).getTime() - start) / 86400000,
    y: d.kg
  }));
  const n = points.length;
  const sumX = points.reduce((s, p) => s + p.x, 0);
  const sumY = points.reduce((s, p) => s + p.y, 0);
  const sumXY = points.reduce((s, p) => s + p.x * p.y, 0);
  const sumXX = points.reduce((s, p) => s + p.x * p.x, 0);
  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  // Slope = kg/jour. On projette à weeksAhead*7 jours après le dernier point
  const lastX = points[n - 1].x;
  const projDays = weeksAhead * 7;
  const projectedKg = slope * (lastX + projDays) + intercept;
  // Erreur résiduelle (RMSE) pour intervalle de confiance
  const predicted = points.map(p => slope * p.x + intercept);
  const residuals = points.map((p, i) => Math.pow(p.y - predicted[i], 2));
  const rmse = Math.sqrt(residuals.reduce((s, r) => s + r, 0) / n);

  const weeklyChange = slope * 7;
  let assessment;
  if (Math.abs(weeklyChange) < 0.1) {
    assessment = "Stable, pas de tendance claire";
  } else if (weeklyChange > 0) {
    assessment = `+${weeklyChange.toFixed(2)} ${weightUnit()}/semaine en moyenne`;
  } else {
    assessment = `${weeklyChange.toFixed(2)} ${weightUnit()}/semaine en moyenne`;
  }

  // Comparaison à l'objectif
  let goalMessage = '';
  if (state.user?.targetWeight) {
    const target = state.user.targetWeight;
    const current = points[n - 1].y;
    const distance = target - current;
    const goingRightWay = (distance > 0 && slope > 0) || (distance < 0 && slope < 0) || (Math.abs(distance) < 0.5);
    if (Math.abs(slope) < 0.001) {
      goalMessage = "Ton poids est stable. À ce rythme, tu n'atteins pas ta cible.";
    } else if (!goingRightWay) {
      const direction = distance > 0 ? "monter" : "descendre";
      goalMessage = `Tu veux ${direction} (cible ${target} ${weightUnit()}) mais ton poids va dans l'autre sens. Inverse la tendance.`;
    } else {
      const daysToGoal = distance / slope;
      if (daysToGoal > 0 && daysToGoal < 365) {
        const weeks = Math.round(daysToGoal / 7);
        goalMessage = `Au rythme actuel, tu atteins ta cible (${target} ${weightUnit()}) dans ~${weeks} semaine${weeks>1?'s':''}.`;
      } else {
        goalMessage = "À ce rythme, ta cible est lointaine (>1 an). Ajuste le programme pour aller plus vite.";
      }
    }
  }

  return {
    currentKg: Math.round(points[n - 1].y * 10) / 10,
    projectedKg: Math.round(projectedKg * 10) / 10,
    weeksAhead,
    weeklyChange: Math.round(weeklyChange * 100) / 100,
    confidenceMargin: Math.round(rmse * 1.96 * 10) / 10, // ~95%
    assessment,
    goalMessage,
    dataPoints: n
  };
}

// 6. ALERTES INTELLIGENTES
// =============================================================
function detectAlerts() {
  const alerts = [];
  const u = state.user;
  if (!u) return alerts;
  const today = todayISO();
  const cutoff7 = new Date(); cutoff7.setDate(cutoff7.getDate() - 7);
  const cutoff7ISO = cutoff7.toISOString().slice(0, 10);
  const cutoff14 = new Date(); cutoff14.setDate(cutoff14.getDate() - 14);
  const cutoff14ISO = cutoff14.toISOString().slice(0, 10);
  const cutoff21 = new Date(); cutoff21.setDate(cutoff21.getDate() - 21);
  const cutoff21ISO = cutoff21.toISOString().slice(0, 10);

  // 1. SURENTRAÎNEMENT
  const recent7 = state.workouts.filter(w => w.date >= cutoff7ISO);
  const recentSleep = state.sleep.filter(s => s.date >= cutoff7ISO);
  const avgSleep = recentSleep.length > 0 ? recentSleep.reduce((s, x) => s + x.hours, 0) / recentSleep.length : null;
  const restingHR = lastHealthSample('restingHeartRate');
  if (recent7.length >= 6 && avgSleep !== null && avgSleep < 6.5) {
    alerts.push({
      severity: 'high', icon: 'flame',
      title: 'Risque de surentraînement',
      message: `${recent7.length} séances en 7 jours + ${avgSleep.toFixed(1)}h de sommeil. Ton corps n'a pas le temps de récupérer.`,
      action: 'Prévois 1-2 jours de repos complet et dors 8h+ minimum 2 nuits.'
    });
  } else if (recent7.length >= 6) {
    alerts.push({
      severity: 'medium', icon: 'flame',
      title: 'Volume d\'entraînement élevé',
      message: `${recent7.length} séances en 7 jours. Surveille ta récup'.`,
      action: '1 jour off bien marqué cette semaine.'
    });
  }

  // 2. PLATEAU POIDS
  const weights3w = state.weights.filter(w => w.date >= cutoff21ISO);
  if (weights3w.length >= 6 && u.goal !== 'maintenance') {
    const start = weights3w[0].kg;
    const end = weights3w[weights3w.length - 1].kg;
    const totalDelta = Math.abs(end - start);
    if (totalDelta < 0.5) {
      const goalLabel = u.goal === 'seche' ? 'sèche' : 'prise de masse';
      alerts.push({
        severity: 'medium', icon: 'list',
        title: 'Plateau détecté',
        message: `Ton poids stagne depuis 3 semaines (${totalDelta.toFixed(1)} ${weightUnit()} de variation seulement). En ${goalLabel}, c'est un signal.`,
        action: u.goal === 'seche' ? 'Réduis de 150-200 kcal/jour ou ajoute 1 séance de cardio.' : 'Augmente de 200 kcal/jour, focus sur les glucides.'
      });
    }
  }

  // 3. SOMMEIL INSUFFISANT (3+ jours sous 6h)
  const last7Sleep = state.sleep.filter(s => s.date >= cutoff7ISO);
  const lowNights = last7Sleep.filter(s => s.hours < 6).length;
  if (lowNights >= 3) {
    alerts.push({
      severity: 'high', icon: 'moon',
      title: 'Manque de sommeil critique',
      message: `${lowNights} nuits sous 6h cette semaine. Ta récupération musculaire et ta perte de gras sont compromises.`,
      action: 'Couche-toi 30 min plus tôt cette semaine, écran off 1h avant.'
    });
  }

  // 4. SOUS-ALIMENTATION CHRONIQUE (sèche : cible non atteinte 5+ jours)
  if (u.goal === 'seche') {
    const recentMeals = state.meals.filter(m => m.date >= cutoff7ISO);
    const buckets = {};
    recentMeals.forEach(m => { buckets[m.date] = (buckets[m.date] || 0) + (m.kcal || 0); });
    const minTarget = calorieTarget(u) - 200;
    const lowDays = Object.values(buckets).filter(v => v < minTarget * 0.7).length;
    if (lowDays >= 4) {
      alerts.push({
        severity: 'medium', icon: 'list',
        title: 'Restriction trop forte',
        message: `${lowDays} jours sous 70% de ta cible. Trop bas en sèche : ralentit le métabolisme et perd du muscle.`,
        action: 'Reviens à ta cible (-300/-400 kcal max). La régularité prime sur la sévérité.'
      });
    }
  }

  // 5. PROTÉINES INSUFFISANTES (sur 7 jours)
  const recentMealsP = state.meals.filter(m => m.date >= cutoff7ISO);
  const dailyP = {};
  recentMealsP.forEach(m => { dailyP[m.date] = (dailyP[m.date] || 0) + (m.p || 0); });
  const pDays = Object.values(dailyP);
  if (pDays.length >= 4) {
    const avgP = pDays.reduce((s, v) => s + v, 0) / pDays.length;
    const minP = u.weight * 1.6;
    if (avgP < minP) {
      alerts.push({
        severity: 'low', icon: 'list',
        title: 'Protéines insuffisantes',
        message: `${Math.round(avgP)}g/jour en moyenne. Pour ton poids (${u.weight} ${weightUnit()}), vise au moins ${Math.round(minP)}g.`,
        action: 'Ajoute 1 portion de poulet, fromage blanc 0%, ou shaker entre 2 repas.'
      });
    }
  }

  // 6. FC REPOS QUI MONTE (signe de fatigue ou maladie)
  const allHR = state.healthSamples.filter(s => s.type === 'restingHeartRate').sort((a, b) => a.date.localeCompare(b.date));
  if (allHR.length >= 6) {
    const recent3 = allHR.slice(-3);
    const previous3 = allHR.slice(-6, -3);
    const avgRecent = recent3.reduce((s, x) => s + x.value, 0) / 3;
    const avgPrev = previous3.reduce((s, x) => s + x.value, 0) / 3;
    if (avgRecent - avgPrev > 5) {
      alerts.push({
        severity: 'medium', icon: 'heart',
        title: 'FC au repos en hausse',
        message: `Ta FC repos est passée de ${Math.round(avgPrev)} à ${Math.round(avgRecent)} bpm. Souvent un signe de fatigue ou de maladie qui s'installe.`,
        action: 'Allège la semaine, hydrate-toi bien, surveille un éventuel rhume.'
      });
    }
  }

  // 7. AUCUNE PESÉE DEPUIS 14 JOURS (en transformation)
  if (u.goal !== 'maintenance') {
    const lastWeight = state.weights[state.weights.length - 1];
    if (lastWeight) {
      const daysSince = (Date.now() - new Date(lastWeight.date).getTime()) / 86400000;
      if (daysSince > 14) {
        alerts.push({
          severity: 'low', icon: 'list',
          title: 'Pas de pesée récente',
          message: `Dernière pesée il y a ${Math.round(daysSince)} jours. Sans données, on navigue à l'aveugle.`,
          action: 'Pèse-toi demain matin à jeun.'
        });
      }
    }
  }

  return alerts;
}

// =============================================================
// 7. COACH CONVERSATIONNEL — RECONNAISSANCE D'INTENTION
// =============================================================
const COACH_INTENTS = [
  { id: 'whatToDo',   patterns: [/que (faire|dois.je|conseilles? tu)/i, /quoi (faire|au programme)/i, /aujourd.?hui/i] },
  { id: 'analysis',   patterns: [/(comment je vais|comment ça va|fais le point|bilan|résum[éè]|analyse)/i, /ma progression|mon parcours/i] },
  { id: 'predict',    patterns: [/dans (\d+) ?(semaines?|mois)|cible|objectif/i, /(quand|combien.*temps).*(atteins|atteindre)/i, /prédiction|projection/i] },
  { id: 'whatToEat',  patterns: [/que (manger|cuisiner)|que.*(soir|midi|déjeuner|dîner)/i, /faim|repas/i, /reste.*manger/i] },
  { id: 'loadReco',   patterns: [/quelle?.*charge|combien.*pousser|combien.*soulev/i, /\b(charge|kg|poids).*(prochaine|sur)/i] },
  { id: 'generate',   patterns: [/(crée|génère|propose|fais).*(séance|entraînement)/i, /séance.*sur.?mesure/i] },
  { id: 'alerts',     patterns: [/alertes?|problèmes?|attention|risques?/i] },
  { id: 'meals',      patterns: [/(génère|fais|propose).*(plan|repas|menu)/i, /plan.*(semaine|repas)/i] }
];

function detectIntent(text) {
  const t = text.trim();
  if (!t) return null;
  for (const intent of COACH_INTENTS) {
    if (intent.patterns.some(p => p.test(t))) return intent.id;
  }
  return null;
}

// Détecte l'exercice dont parle l'utilisateur (matching fuzzy basé sur les noms)
function detectExerciseInText(text) {
  const t = text.toLowerCase();
  // Tokens du texte (mots isolés)
  const textTokens = new Set(t.split(/[\s,.'?!:;()-]+/).filter(Boolean));

  // 1. Match parfait : tous les tokens du nom sont des tokens isolés du texte
  const wordMatches = EXERCISES.filter(e => {
    const nameTokens = e.name.toLowerCase().split(/[\s,'-]+/).filter(Boolean);
    return nameTokens.every(w => textTokens.has(w));
  });
  if (wordMatches.length > 0) {
    wordMatches.sort((a, b) => {
      const aWords = a.name.split(/[\s,'-]+/).length;
      const bWords = b.name.split(/[\s,'-]+/).length;
      // Préfère le nom qui matche le plus exactement (= a le moins de mots additionnels)
      if (aWords !== bWords) return bWords - aWords; // plus de mots = nom plus précis
      return a.name.length - b.name.length;
    });
    // Si plusieurs candidats, on prend celui avec le moins de mots (générique gagne pour "squat", spécifique gagne pour "box squat")
    // En pratique, si l'utilisateur dit juste "squat", il veut "Squat" pas "Box squat"
    // Donc on inverse : on préfère le moins de mots
    wordMatches.sort((a, b) => {
      const aWords = a.name.split(/[\s,'-]+/).length;
      const bWords = b.name.split(/[\s,'-]+/).length;
      return aWords - bWords;
    });
    return wordMatches[0];
  }

  // 2. Match d'aliases courts
  const aliases = {
    'dc': 'developpe-couche',
    'sdt': 'soulever-de-terre',
    'developpe couche': 'developpe-couche',
    'développé couché': 'developpe-couche',
    'developpe militaire': 'developpe-militaire',
    'développé militaire': 'developpe-militaire',
    'soulevé de terre': 'soulever-de-terre',
    'tractions': 'tractions',
    'rowing': 'rowing-barre',
    'curl': 'curl-barre',
    'dips': 'dips',
    'pompes': 'pompes',
    'fente': 'fentes-haltères',
    'fentes': 'fentes-haltères',
    'squat': 'squat'
  };
  for (const [alias, exId] of Object.entries(aliases)) {
    if (t.includes(alias)) {
      const found = EXERCISES.find(e => e.id === exId);
      if (found) return found;
    }
  }

  // 3. Match large : au moins un mot >3 lettres du nom est un token du texte
  const candidates = EXERCISES.filter(e => {
    const words = e.name.toLowerCase().split(/[\s,'-]+/).filter(w => w.length > 3);
    return words.length > 0 && words.every(w => textTokens.has(w));
  });
  if (candidates.length > 0) {
    candidates.sort((a, b) => {
      const aWords = a.name.split(/[\s,'-]+/).length;
      const bWords = b.name.split(/[\s,'-]+/).length;
      if (aWords !== bWords) return aWords - bWords;
      return a.name.length - b.name.length;
    });
    return candidates[0];
  }

  return null;
}

// Compose la réponse du coach selon l'intention détectée et le contexte
function coachRespond(text) {
  const intent = detectIntent(text);
  const exMention = detectExerciseInText(text);
  const u = state.user;

  // Cas spécial : tu mentionnes un exercice → recommandation de charge
  if (exMention) {
    const rec = recommendLoadFor(exMention.id, 10);
    return {
      type: 'load_reco',
      title: `${exMention.name}`,
      content: rec,
      exerciseId: exMention.id
    };
  }

  switch (intent) {
    case 'whatToDo': {
      const today = todayISO();
      const ws = weekStartDate();
      const plan = (state.weekPlan && state.weekPlan.weekStart === ws) ? state.weekPlan : null;
      const todayPlan = plan?.days.find(d => d.date === today);
      const alerts = detectAlerts().filter(a => a.severity !== 'low');
      let recommendation = '';
      if (alerts.length > 0) {
        recommendation = `Avant tout : ${alerts[0].message} → ${alerts[0].action}`;
      } else if (todayPlan && todayPlan.sport === 'rest') {
        recommendation = "Aujourd'hui c'est repos selon ton planning. Profite-en pour bien dormir et bien manger.";
      } else if (todayPlan && todayPlan.sport === 'strength') {
        recommendation = `Au programme : ${todayPlan.sessionName || 'séance muscu'} (${todayPlan.duration||60}min). Ouvre l'onglet Séance pour démarrer.`;
      } else if (todayPlan) {
        const sp = sportType(todayPlan.sport);
        recommendation = `Au programme : ${sp.label}, ${todayPlan.duration||30} min. Lance la séance depuis l'onglet Séance.`;
      } else {
        recommendation = "Pas de planning pour cette semaine. Va dans Séance → Planifier ma semaine pour t'organiser.";
      }
      return { type: 'plain', title: "Ce qu'il faut faire", content: recommendation };
    }

    case 'analysis': {
      const r = weeklyAnalysis();
      return { type: 'weekly_analysis', title: 'Bilan de la semaine', content: r };
    }

    case 'predict': {
      // Cherche un nombre de semaines dans le texte
      const m = text.match(/(\d+)\s*(semaines?|mois)/i);
      let weeks = 4;
      if (m) weeks = (m[2].startsWith('mois') ? parseInt(m[1]) * 4 : parseInt(m[1]));
      weeks = Math.max(1, Math.min(52, weeks));
      const p = predictWeight(weeks);
      return { type: 'prediction', title: `Projection à ${weeks} semaine${weeks>1?'s':''}`, content: p };
    }

    case 'whatToEat': {
      // Calcule ce qui reste pour la cible du jour
      const dyn = dynamicMacroTargets(state.user, todayISO());
      const today = todayISO();
      const todayMeals = state.meals.filter(m => m.date === today);
      const eaten = todayMeals.reduce((s, m) => ({
        kcal: s.kcal + (m.kcal||0), p: s.p + (m.p||0), c: s.c + (m.c||0), l: s.l + (m.l||0)
      }), { kcal: 0, p: 0, c: 0, l: 0 });
      const remaining = {
        kcal: dyn.kcal - eaten.kcal,
        p: dyn.p - eaten.p,
        c: dyn.c - eaten.c,
        l: dyn.l - eaten.l
      };
      // Trouve une recette adaptée : kcal proche de remaining/2 (un repas), p à hauteur, frigo si possible
      const meals = RECIPES.filter(r => r.category === 'plat' || r.category === 'collation');
      const targetKcal = Math.max(200, remaining.kcal / 2);
      const scored = meals.map(r => {
        let s = -Math.abs(r.kcal - targetKcal); // proche de la cible
        // Bonus si protéines bien dosées
        if (r.p && remaining.p > 0) s += Math.min(20, (r.p / remaining.p) * 20);
        // Bonus frigo
        const frigo = (state.pantry || []).map(p => p.name.toLowerCase());
        if (frigo.length && r.ingredients) {
          const matches = r.ingredients.filter(i => {
            const n = (typeof i === 'string' ? i : i.name).toLowerCase();
            return frigo.some(f => n.includes(f) || f.includes(n));
          }).length;
          s += matches * 8;
        }
        return { r, s };
      });
      scored.sort((a, b) => b.s - a.s);
      const top = scored.slice(0, 3).map(x => x.r);
      return { type: 'meal_suggestion', title: 'Mes suggestions', content: { remaining, recipes: top } };
    }

    case 'loadReco': {
      // Pas d'exercice spécifique mentionné mais l'intention est claire
      return { type: 'plain', title: 'Recommandation de charge', content: "Pour quel exercice ? Tape son nom (ex : développé couché, squat, soulevé de terre)." };
    }

    case 'generate': {
      // Génère une séance par défaut
      const session = generateCustomSession({ duration: 60, focus: 'fullbody', level: 'intermediate' });
      return { type: 'generated_session', title: session.name, content: session };
    }

    case 'meals': {
      const plan = generateSmartMealPlan();
      return { type: 'generated_meal_plan', title: 'Plan repas 7 jours', content: plan };
    }

    case 'alerts': {
      const alerts = detectAlerts();
      return { type: 'alerts', title: alerts.length === 0 ? 'Aucune alerte' : `${alerts.length} alerte${alerts.length>1?'s':''}`, content: alerts };
    }

    default:
      return null; // → fallback Coach existant (catalogue d'exercices)
  }
}

<script>
// ============================================================
// VITAL TRACK — MODULE SOCIAL P2P PAR CODES
// ============================================================
// Architecture : pas de serveur. Tout passe par des codes texte
// que les utilisateurs s'échangent via leurs apps de messagerie.
// Chaque code = un payload JSON encodé (b64url + checksum).
// Préfixe VT2-... pour identification rapide.
// ============================================================

// Génération d'un identifiant utilisateur unique stable (créé à l'inscription)
function ensureSocialId() {
  if (!state.social) state.social = {};
  if (!state.social.userId) {
    // Format court : 6 caractères alphanumériques
    state.social.userId = randomShortId(6);
  }
  return state.social.userId;
}

function randomShortId(len = 6) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // pas de O/0/I/1 pour éviter confusion
  let out = '';
  for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
}

// =============================================================
// ENCODAGE / DÉCODAGE DES CODES
// =============================================================
// Format : VT2-<type>-<base64url(payload)>-<checksum>
// type = 'P' (profil), 'W' (workout), 'C' (challenge), 'J' (join challenge),
//        'L' (leaderboard snapshot), 'K' (kudo/comment), 'G' (groupe)

function b64urlEncode(str) {
  // base64 URL-safe : remplace + et / par - et _, retire les =
  return btoa(unescape(encodeURIComponent(str)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}
function b64urlDecode(str) {
  // Restaure le padding et inverse les remplacements
  let s = str.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  return decodeURIComponent(escape(atob(s)));
}

// Checksum simple : somme modulo 36, encodée en base 36 (1 caractère)
function shortChecksum(str) {
  let sum = 0;
  for (let i = 0; i < str.length; i++) sum = (sum + str.charCodeAt(i)) % 1296;
  return sum.toString(36).padStart(2, '0').toUpperCase();
}

const PAYLOAD_TYPES = {
  profile:    'P',
  workout:    'W',
  challenge:  'C',
  joinResp:   'J',
  weekScore:  'L',
  kudos:      'K',
  group:      'G'
};

function encodePayload(typeKey, payload) {
  const typeChar = PAYLOAD_TYPES[typeKey];
  if (!typeChar) throw new Error('Unknown payload type ' + typeKey);
  // Réduit la taille : strip undefined / null
  const json = JSON.stringify(payload);
  const encoded = b64urlEncode(json);
  const check = shortChecksum(encoded);
  return `VT2-${typeChar}-${encoded}-${check}`;
}

function decodePayload(code) {
  const trimmed = (code || '').trim();
  if (!trimmed.startsWith('VT2-')) {
    return { error: 'Format invalide. Un code Vital Track commence par VT2-...' };
  }
  const parts = trimmed.split('-');
  if (parts.length < 4) return { error: 'Code incomplet.' };
  const typeChar = parts[1];
  const check = parts[parts.length - 1];
  const encoded = parts.slice(2, -1).join('-');
  if (shortChecksum(encoded) !== check) {
    return { error: 'Code corrompu (checksum invalide). Demande à ton ami de te le renvoyer.' };
  }
  // Trouve le type par caractère
  const typeKey = Object.keys(PAYLOAD_TYPES).find(k => PAYLOAD_TYPES[k] === typeChar);
  if (!typeKey) return { error: 'Type de code inconnu.' };
  try {
    const payload = JSON.parse(b64urlDecode(encoded));
    return { ok: true, type: typeKey, payload };
  } catch (e) {
    return { error: 'Code illisible.' };
  }
}

// =============================================================
// MODÈLE DE DONNÉES SOCIAL
// =============================================================
// state.social = {
//   userId: 'AB3X7Y',                 // mon ID stable
//   displayName: 'Alexis',            // nom affiché aux amis (peut différer du firstName)
//   avatarHue: 132,                   // teinte HSL pour avatar généré
//   bio: '...',                       // optionnel
//   friends: [                        // amis ajoutés
//     { userId, displayName, avatarHue, bio, addedAt, lastUpdate }
//   ],
//   groups: [                         // cercles privés
//     { id, name, members:[{userId, displayName, avatarHue}], createdAt, ownerId }
//   ],
//   feed: [                           // posts (les miens et ceux des amis importés via codes)
//     { id, type, authorId, authorName, authorHue, date, payload, kudos:[], comments:[] }
//   ],
//   challenges: [                     // défis créés ou rejoints
//     { id, name, type, target, deadline, createdBy, createdAt,
//       participants:[{userId, displayName, avatarHue, progress, joinedAt, lastUpdate}] }
//   ],
//   weekSnapshots: []                 // mes scores hebdomadaires partagés (pour classement)
// };

function ensureSocialDefaults() {
  if (!state.social) state.social = {};
  if (!state.social.userId) state.social.userId = randomShortId(6);
  if (!state.social.displayName) state.social.displayName = state.user?.firstName || 'Anonyme';
  if (state.social.avatarHue === undefined) state.social.avatarHue = (state.social.userId.charCodeAt(0) * 7) % 360;
  if (!Array.isArray(state.social.friends)) state.social.friends = [];
  if (!Array.isArray(state.social.groups)) state.social.groups = [];
  if (!Array.isArray(state.social.feed)) state.social.feed = [];
  if (!Array.isArray(state.social.challenges)) state.social.challenges = [];
  if (!Array.isArray(state.social.weekSnapshots)) state.social.weekSnapshots = [];
}

// =============================================================
// PROFIL PUBLIC : génération et import du code de profil
// =============================================================
function buildProfileCode() {
  ensureSocialDefaults();
  const payload = {
    u: state.social.userId,
    n: state.social.displayName,
    h: state.social.avatarHue,
    b: state.social.bio || '',
    s: {
      // Stats publiques résumées
      w: state.workouts.length,
      sk: state.streak,
      bd: (state.unlockedBadges || []).length,
      go: state.user?.goal || null
    },
    t: Date.now()
  };
  return encodePayload('profile', payload);
}

function importFriendFromCode(code) {
  const r = decodePayload(code);
  if (r.error) return { error: r.error };
  if (r.type !== 'profile') return { error: 'Ce code n\'est pas un profil. Utilise le bouton correspondant.' };
  const p = r.payload;
  if (!p.u || !p.n) return { error: 'Profil incomplet.' };
  ensureSocialDefaults();
  if (p.u === state.social.userId) return { error: 'C\'est ton propre code de profil.' };
  // Si déjà ami, on met à jour ses infos
  const existing = state.social.friends.find(f => f.userId === p.u);
  if (existing) {
    existing.displayName = p.n;
    existing.avatarHue = p.h;
    existing.bio = p.b;
    existing.stats = p.s;
    existing.lastUpdate = Date.now();
    saveState();
    return { ok: true, friend: existing, updated: true };
  }
  const friend = {
    userId: p.u,
    displayName: p.n,
    avatarHue: p.h ?? 200,
    bio: p.b || '',
    stats: p.s || {},
    addedAt: Date.now(),
    lastUpdate: Date.now()
  };
  state.social.friends.push(friend);
  saveState();
  return { ok: true, friend, updated: false };
}

// =============================================================
// POST DE SÉANCE : génération et import
// =============================================================
function buildWorkoutPostCode(workoutId) {
  ensureSocialDefaults();
  const w = state.workouts.find(x => x.id === workoutId);
  if (!w) return { error: 'Séance introuvable' };
  // Compress : on ne garde que l'essentiel
  let summary = {
    id: w.id,
    d: w.date,
    t: w.type || 'strength',
    dur: w.duration || 0
  };
  if (w.type === 'cardio') {
    summary.s = w.sport;
    summary.k = w.kcalBurned;
    summary.r = w.rpe;
    summary.f = w.fields || {};
    summary.n = w.notes || '';
  } else {
    // Muscu : tonnage, nb sets, top set
    const sets = (w.exercises || []).flatMap(e => e.sets || []);
    const tonnage = sets.reduce((a, s) => a + (parseFloat(s.kg)||0) * (parseInt(s.reps)||0), 0);
    summary.ton = Math.round(tonnage);
    summary.nb = sets.length;
    summary.ex = (w.exercises || []).length;
    // Top exo (le plus gros set)
    if (sets.length > 0) {
      const top = sets.reduce((a, b) => ((parseFloat(a.kg)||0) > (parseFloat(b.kg)||0) ? a : b));
      const topEx = (w.exercises || []).find(e => (e.sets || []).includes(top));
      const def = topEx ? EXERCISES.find(x => x.id === topEx.exerciseId) : null;
      if (def && top.kg && top.reps) {
        summary.top = { name: def.name, kg: parseFloat(top.kg), reps: parseInt(top.reps) };
      }
    }
  }
  const payload = {
    pid: 'p_' + Math.random().toString(36).slice(2, 10),
    aid: state.social.userId,
    an: state.social.displayName,
    ah: state.social.avatarHue,
    ts: Date.now(),
    w: summary
  };
  return { code: encodePayload('workout', payload), payload };
}

function importPostFromCode(code) {
  const r = decodePayload(code);
  if (r.error) return { error: r.error };
  if (r.type !== 'workout') return { error: 'Ce code n\'est pas un post de séance.' };
  const p = r.payload;
  if (!p.aid || !p.an || !p.w) return { error: 'Post incomplet.' };
  ensureSocialDefaults();
  if (p.aid === state.social.userId) return { error: 'C\'est ta propre séance.' };
  // Évite les doublons
  if (state.social.feed.some(f => f.id === p.pid)) {
    return { error: 'Ce post est déjà dans ton feed.' };
  }
  const post = {
    id: p.pid,
    type: 'workout',
    authorId: p.aid,
    authorName: p.an,
    authorHue: p.ah ?? 200,
    date: new Date(p.ts || Date.now()).toISOString().slice(0, 10),
    timestamp: p.ts || Date.now(),
    payload: p.w,
    kudos: [],
    comments: []
  };
  state.social.feed.unshift(post);
  // Limite le feed à 200 posts
  if (state.social.feed.length > 200) state.social.feed = state.social.feed.slice(0, 200);
  saveState();
  return { ok: true, post };
}

// =============================================================
// MES POSTS PROPRES : on les ajoute aussi dans le feed local
// pour qu'on les voie même sans les exporter (= ils servent
// d'historique partagé local)
// =============================================================
function publishMyWorkoutToFeed(workoutId) {
  const built = buildWorkoutPostCode(workoutId);
  if (built.error) return built;
  ensureSocialDefaults();
  const p = built.payload;
  if (state.social.feed.some(f => f.id === p.pid)) return { ok: true, alreadyIn: true, code: built.code };
  state.social.feed.unshift({
    id: p.pid,
    type: 'workout',
    authorId: p.aid,
    authorName: p.an,
    authorHue: p.ah,
    date: new Date(p.ts).toISOString().slice(0, 10),
    timestamp: p.ts,
    payload: p.w,
    kudos: [],
    comments: [],
    own: true
  });
  saveState();
  return { ok: true, code: built.code, post: state.social.feed[0] };
}

// =============================================================
// KUDOS & COMMENTAIRES (réponses asynchrones via codes courts)
// =============================================================
function buildKudosCode(postId, kind = 'kudo', text = '') {
  ensureSocialDefaults();
  const payload = {
    pid: postId,
    fid: state.social.userId,
    fn: state.social.displayName,
    fh: state.social.avatarHue,
    k: kind, // 'kudo' | 'fire' | 'strong' | 'comment'
    t: text,
    ts: Date.now()
  };
  return encodePayload('kudos', payload);
}

function importKudosFromCode(code) {
  const r = decodePayload(code);
  if (r.error) return r;
  if (r.type !== 'kudos') return { error: 'Ce code n\'est pas un kudo / commentaire.' };
  const p = r.payload;
  ensureSocialDefaults();
  const post = state.social.feed.find(f => f.id === p.pid);
  if (!post) return { error: 'Post introuvable. Tu as dû recevoir un kudo pour un post que tu n\'as plus.' };
  if (p.k === 'comment' && p.t) {
    post.comments.push({
      authorId: p.fid, authorName: p.fn, authorHue: p.fh,
      text: p.t, timestamp: p.ts
    });
  } else {
    // Kudo (avec son type emoji-like)
    if (!post.kudos.some(k => k.authorId === p.fid && k.kind === p.k)) {
      post.kudos.push({
        authorId: p.fid, authorName: p.fn, authorHue: p.fh,
        kind: p.k, timestamp: p.ts
      });
    }
  }
  saveState();
  return { ok: true, post, type: p.k };
}

// J'aime / encourage un post sur mon feed (si c'est celui d'un ami)
function addLocalKudos(postId, kind = 'kudo') {
  ensureSocialDefaults();
  const post = state.social.feed.find(f => f.id === postId);
  if (!post) return { error: 'Post introuvable' };
  // On l'ajoute localement, et on génère le code à envoyer à l'auteur
  if (!post.kudos.some(k => k.authorId === state.social.userId && k.kind === kind)) {
    post.kudos.push({
      authorId: state.social.userId,
      authorName: state.social.displayName,
      authorHue: state.social.avatarHue,
      kind, timestamp: Date.now()
    });
  }
  saveState();
  return { ok: true, code: buildKudosCode(postId, kind) };
}

function addLocalComment(postId, text) {
  ensureSocialDefaults();
  const post = state.social.feed.find(f => f.id === postId);
  if (!post) return { error: 'Post introuvable' };
  if (!text || !text.trim()) return { error: 'Commentaire vide' };
  const trimmed = text.trim().slice(0, 280);
  post.comments.push({
    authorId: state.social.userId,
    authorName: state.social.displayName,
    authorHue: state.social.avatarHue,
    text: trimmed,
    timestamp: Date.now()
  });
  saveState();
  return { ok: true, code: buildKudosCode(postId, 'comment', trimmed) };
}

// =============================================================
// DÉFIS COLLECTIFS
// =============================================================
// Types de défis :
// - workouts_count : X séances en Y jours
// - cardio_distance : X km cumulés en Y jours
// - steps_total    : X pas cumulés en Y jours
// - tonnage_total  : X kg de tonnage en Y jours
// - streak         : X jours actifs consécutifs

const CHALLENGE_TYPES = {
  workouts_count:  { label: 'Nombre de séances',     unit: 'séances', icon: 'flame' },
  cardio_distance: { label: 'Distance cardio',       unit: 'km',      icon: 'run' },
  steps_total:     { label: 'Pas cumulés',           unit: 'pas',     icon: 'walk' },
  tonnage_total:   { label: 'Tonnage total',         unit: 'kg',      icon: 'dumbbell' },
  streak:          { label: 'Jours actifs',          unit: 'jours',   icon: 'flame' }
};

function createChallenge({ name, type, target, days }) {
  ensureSocialDefaults();
  const now = Date.now();
  const deadline = now + days * 86400000;
  const ch = {
    id: 'ch_' + Math.random().toString(36).slice(2, 10),
    name: name.trim().slice(0, 60),
    type,
    target: parseFloat(target) || 0,
    days,
    deadline,
    createdBy: state.social.userId,
    createdByName: state.social.displayName,
    createdAt: now,
    startedAt: now,
    participants: [{
      userId: state.social.userId,
      displayName: state.social.displayName,
      avatarHue: state.social.avatarHue,
      progress: 0,
      joinedAt: now,
      lastUpdate: now
    }]
  };
  state.social.challenges.unshift(ch);
  saveState();
  return ch;
}

function buildChallengeInviteCode(challengeId) {
  ensureSocialDefaults();
  const ch = state.social.challenges.find(c => c.id === challengeId);
  if (!ch) return { error: 'Défi introuvable' };
  const payload = {
    id: ch.id,
    n: ch.name,
    t: ch.type,
    g: ch.target,
    d: ch.days,
    dl: ch.deadline,
    by: ch.createdBy,
    bn: ch.createdByName,
    ca: ch.createdAt
  };
  return { code: encodePayload('challenge', payload) };
}

function importChallengeFromCode(code) {
  const r = decodePayload(code);
  if (r.error) return r;
  if (r.type !== 'challenge') return { error: 'Ce code n\'est pas une invitation à un défi.' };
  const p = r.payload;
  ensureSocialDefaults();
  // Si déjà rejoint, on l'indique
  if (state.social.challenges.some(c => c.id === p.id)) {
    return { error: 'Tu participes déjà à ce défi.' };
  }
  const now = Date.now();
  const ch = {
    id: p.id,
    name: p.n,
    type: p.t,
    target: p.g,
    days: p.d,
    deadline: p.dl,
    createdBy: p.by,
    createdByName: p.bn,
    createdAt: p.ca,
    startedAt: now,
    isJoined: true,
    participants: [
      { userId: p.by, displayName: p.bn, avatarHue: 200, progress: 0, lastUpdate: p.ca },
      { userId: state.social.userId, displayName: state.social.displayName, avatarHue: state.social.avatarHue, progress: 0, joinedAt: now, lastUpdate: now }
    ]
  };
  state.social.challenges.unshift(ch);
  saveState();
  return { ok: true, challenge: ch };
}

// Calcule la progression locale d'un défi (basée sur mes données entre startedAt et deadline)
function computeMyChallengeProgress(challenge) {
  const startISO = new Date(challenge.startedAt || challenge.createdAt).toISOString().slice(0, 10);
  const endISO = new Date(challenge.deadline).toISOString().slice(0, 10);
  const u = state.user;
  switch (challenge.type) {
    case 'workouts_count':
      return state.workouts.filter(w => w.date >= startISO && w.date <= endISO).length;
    case 'cardio_distance':
      return state.workouts
        .filter(w => w.date >= startISO && w.date <= endISO && w.type === 'cardio')
        .reduce((s, w) => s + ((w.fields?.distance) || w.distance || 0), 0);
    case 'steps_total':
      return (state.healthSamples || [])
        .filter(s => s.type === 'stepCount' && s.date >= startISO && s.date <= endISO)
        .reduce((sum, s) => sum + s.value, 0);
    case 'tonnage_total':
      return state.workouts
        .filter(w => w.date >= startISO && w.date <= endISO && w.type !== 'cardio')
        .reduce((s, w) => s + (w.exercises || []).reduce((a, e) =>
          a + (e.sets || []).reduce((b, st) => b + (parseFloat(st.kg)||0) * (parseInt(st.reps)||0), 0), 0), 0);
    case 'streak':
      // jours uniques actifs entre start et end
      const set = new Set();
      state.workouts.forEach(w => { if (w.date >= startISO && w.date <= endISO) set.add(w.date); });
      return set.size;
    default: return 0;
  }
}

// Met à jour ma progression dans tous les défis actifs
function refreshMyChallengesProgress() {
  ensureSocialDefaults();
  const now = Date.now();
  state.social.challenges.forEach(ch => {
    const me = ch.participants.find(p => p.userId === state.social.userId);
    if (!me) return;
    const progress = computeMyChallengeProgress(ch);
    me.progress = progress;
    me.lastUpdate = now;
  });
  saveState();
}

// Génère un code de progrès (pour partager mon avancée à mes co-participants)
function buildChallengeProgressCode(challengeId) {
  ensureSocialDefaults();
  const ch = state.social.challenges.find(c => c.id === challengeId);
  if (!ch) return { error: 'Défi introuvable' };
  const me = ch.participants.find(p => p.userId === state.social.userId);
  if (!me) return { error: 'Tu ne participes pas à ce défi' };
  const progress = computeMyChallengeProgress(ch);
  const payload = {
    cid: ch.id,
    uid: state.social.userId,
    un: state.social.displayName,
    uh: state.social.avatarHue,
    p: progress,
    ts: Date.now()
  };
  return { code: encodePayload('joinResp', payload), progress };
}

function importChallengeProgressFromCode(code) {
  const r = decodePayload(code);
  if (r.error) return r;
  if (r.type !== 'joinResp') return { error: 'Ce code n\'est pas un score de défi.' };
  const p = r.payload;
  ensureSocialDefaults();
  const ch = state.social.challenges.find(c => c.id === p.cid);
  if (!ch) return { error: 'Tu ne participes pas à ce défi (ou code invalide).' };
  // Met à jour ou ajoute le participant
  let participant = ch.participants.find(x => x.userId === p.uid);
  if (!participant) {
    participant = {
      userId: p.uid, displayName: p.un, avatarHue: p.uh ?? 200,
      progress: p.p, joinedAt: p.ts, lastUpdate: p.ts
    };
    ch.participants.push(participant);
  } else {
    participant.displayName = p.un;
    participant.avatarHue = p.uh ?? participant.avatarHue;
    participant.progress = p.p;
    participant.lastUpdate = p.ts;
  }
  saveState();
  return { ok: true, challenge: ch, participant };
}

// =============================================================
// CLASSEMENT HEBDOMADAIRE
// =============================================================
function buildWeekScoreCode() {
  ensureSocialDefaults();
  const now = new Date();
  const cutoff = new Date(now); cutoff.setDate(now.getDate() - 7);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  const ws = state.workouts.filter(w => w.date >= cutoffISO);
  const tonnage = ws.filter(w => w.type !== 'cardio').reduce((s, w) =>
    s + (w.exercises || []).reduce((a, e) =>
      a + (e.sets || []).reduce((b, st) => b + (parseFloat(st.kg)||0) * (parseInt(st.reps)||0), 0), 0), 0);
  const cardioMin = ws.filter(w => w.type === 'cardio').reduce((s, w) => s + (w.duration || 0), 0);
  const sleepAvg = state.sleep.filter(s => s.date >= cutoffISO).reduce((sum, s, _, arr) => sum + s.hours / arr.length, 0) || 0;
  const steps = (state.healthSamples || [])
    .filter(s => s.type === 'stepCount' && s.date >= cutoffISO)
    .reduce((sum, s) => sum + s.value, 0);

  const payload = {
    uid: state.social.userId,
    un: state.social.displayName,
    uh: state.social.avatarHue,
    week: weekStartDate(),
    s: {
      w: ws.length,
      t: Math.round(tonnage),
      c: cardioMin,
      sl: Math.round(sleepAvg * 10) / 10,
      st: Math.round(steps)
    },
    ts: Date.now()
  };
  return encodePayload('weekScore', payload);
}

function importWeekScoreFromCode(code) {
  const r = decodePayload(code);
  if (r.error) return r;
  if (r.type !== 'weekScore') return { error: 'Ce code n\'est pas un score hebdo.' };
  const p = r.payload;
  ensureSocialDefaults();
  // On stocke dans state.social.weekSnapshots, en remplaçant si même user + même semaine
  state.social.weekSnapshots = (state.social.weekSnapshots || [])
    .filter(s => !(s.userId === p.uid && s.week === p.week));
  state.social.weekSnapshots.push({
    userId: p.uid,
    displayName: p.un,
    avatarHue: p.uh ?? 200,
    week: p.week,
    stats: p.s,
    timestamp: p.ts
  });
  saveState();
  return { ok: true, snap: p };
}

// Calcule mon propre score hebdo (sans encodage) pour l'inclure dans le classement
function myCurrentWeekScore() {
  ensureSocialDefaults();
  const now = new Date();
  const cutoff = new Date(now); cutoff.setDate(now.getDate() - 7);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  const ws = state.workouts.filter(w => w.date >= cutoffISO);
  const tonnage = ws.filter(w => w.type !== 'cardio').reduce((s, w) =>
    s + (w.exercises || []).reduce((a, e) =>
      a + (e.sets || []).reduce((b, st) => b + (parseFloat(st.kg)||0) * (parseInt(st.reps)||0), 0), 0), 0);
  const cardioMin = ws.filter(w => w.type === 'cardio').reduce((s, w) => s + (w.duration || 0), 0);
  const sleepAvg = state.sleep.filter(s => s.date >= cutoffISO).reduce((sum, s, _, arr) => sum + s.hours / arr.length, 0) || 0;
  const steps = (state.healthSamples || [])
    .filter(s => s.type === 'stepCount' && s.date >= cutoffISO)
    .reduce((sum, s) => sum + s.value, 0);
  return {
    userId: state.social.userId,
    displayName: state.social.displayName,
    avatarHue: state.social.avatarHue,
    week: weekStartDate(),
    isMe: true,
    stats: {
      w: ws.length,
      t: Math.round(tonnage),
      c: cardioMin,
      sl: Math.round(sleepAvg * 10) / 10,
      st: Math.round(steps)
    }
  };
}

// =============================================================
// GROUPES / CERCLES PRIVÉS
// =============================================================
function createGroup(name) {
  ensureSocialDefaults();
  const g = {
    id: 'g_' + Math.random().toString(36).slice(2, 10),
    name: name.trim().slice(0, 40),
    ownerId: state.social.userId,
    members: [{
      userId: state.social.userId,
      displayName: state.social.displayName,
      avatarHue: state.social.avatarHue
    }],
    createdAt: Date.now()
  };
  state.social.groups.unshift(g);
  saveState();
  return g;
}

function buildGroupInviteCode(groupId) {
  ensureSocialDefaults();
  const g = state.social.groups.find(x => x.id === groupId);
  if (!g) return { error: 'Cercle introuvable' };
  const payload = {
    id: g.id,
    n: g.name,
    o: g.ownerId,
    on: g.members.find(m => m.userId === g.ownerId)?.displayName || 'Inconnu',
    m: g.members,
    ts: Date.now()
  };
  return { code: encodePayload('group', payload) };
}

function importGroupFromCode(code) {
  const r = decodePayload(code);
  if (r.error) return r;
  if (r.type !== 'group') return { error: 'Ce code n\'est pas une invitation à un cercle.' };
  const p = r.payload;
  ensureSocialDefaults();
  if (state.social.groups.some(g => g.id === p.id)) {
    return { error: 'Tu fais déjà partie de ce cercle.' };
  }
  // S'auto-ajouter
  const members = [...(p.m || [])];
  if (!members.some(m => m.userId === state.social.userId)) {
    members.push({
      userId: state.social.userId,
      displayName: state.social.displayName,
      avatarHue: state.social.avatarHue
    });
  }
  state.social.groups.unshift({
    id: p.id,
    name: p.n,
    ownerId: p.o,
    members,
    createdAt: p.ts || Date.now(),
    isJoined: true
  });
  saveState();
  return { ok: true };
}

// =============================================================
// DISPATCHER UNIVERSEL : un code reçu → on l'ajoute au bon endroit
// =============================================================
function importAnyCode(code) {
  const r = decodePayload(code);
  if (r.error) return r;
  switch (r.type) {
    case 'profile':   return importFriendFromCode(code);
    case 'workout':   return importPostFromCode(code);
    case 'kudos':     return importKudosFromCode(code);
    case 'challenge': return importChallengeFromCode(code);
    case 'joinResp':  return importChallengeProgressFromCode(code);
    case 'weekScore': return importWeekScoreFromCode(code);
    case 'group':     return importGroupFromCode(code);
    default: return { error: 'Type de code non géré.' };
  }
}

// =============================================================
// LOOKUP DE PRIX (avec overrides utilisateur + fallback)
// =============================================================
function lookupIngredientPrice(name) {
  if (!name) return null;
  const key = String(name).toLowerCase().trim();
  // 1. Override utilisateur
  if (state.priceOverrides && state.priceOverrides[key]) {
    return { ...state.priceOverrides[key], source: 'custom' };
  }
  // 2. Match exact
  if (FOOD_PRICES[key]) return { ...FOOD_PRICES[key], source: 'catalog' };
  // 3. Match partiel : on cherche un ingrédient du catalogue qui contient le mot ou inverse
  const partial = Object.keys(FOOD_PRICES).find(k =>
    key.includes(k) || k.includes(key)
  );
  if (partial) return { ...FOOD_PRICES[partial], source: 'partial', matchedAs: partial };
  // 4. Détection par mots-clés -> catégorie
  const cat = guessCategory(key);
  if (cat && CATEGORY_AVG_PRICES[cat]) return { ...CATEGORY_AVG_PRICES[cat], cat, source: 'category', estimated: true };
  // 5. Fallback générique
  return { ...CATEGORY_AVG_PRICES.divers, cat: 'divers', source: 'default', estimated: true };
}

function guessCategory(name) {
  const t = name.toLowerCase();
  if (/poulet|dinde|porc|bœuf|boeuf|viande|jambon|lardon|saucisse|steak|veau|agneau/.test(t)) return 'viande';
  if (/poisson|saumon|thon|cabillaud|crevette|colin|sardine|maquereau|truite|sole/.test(t)) return 'poisson';
  if (/œuf|oeuf/.test(t)) return 'oeuf';
  if (/lait|fromage|yaourt|beurre|crème|feta|mozza|ricotta|chèvre/.test(t)) return 'lait';
  if (/pâte|pâtes|riz|quinoa|semoule|boulgour|avoine|pain|patate|lentille|pois chiche|haricot/.test(t)) return 'feculents';
  if (/banane|pomme|orange|fraise|fruit|raisin|datte|kiwi|mangue|ananas|abricot|prune/.test(t)) return 'fruits';
  if (/tomate|salade|épinard|brocoli|carotte|courgette|aubergine|poivron|champignon|oignon|ail|concombre|haricot vert|chou/.test(t)) return 'legumes';
  if (/amande|noix|noisette|cacahuète|graine|chia/.test(t)) return 'oleagineux';
  if (/huile|vinaigre|sauce|moutarde|pesto/.test(t)) return 'condiments';
  if (/curry|paprika|cannelle|cumin|sel|poivre|herbe|bouillon|épice/.test(t)) return 'epices';
  if (/miel|sucre|chocolat|cacao|sirop|confiture/.test(t)) return 'sucre';
  return null;
}

// =============================================================
// ESTIMATION DU COÛT D'UN INGRÉDIENT SELON SA QUANTITÉ
// =============================================================
// Logique :
// - Si l'unité de prix correspond à l'unité de la recette, multiplication directe
// - Sinon on convertit la quantité de la recette vers l'unité du prix
// - Pour les ingrédients vendus à la pièce mais dosés en g/ml dans les recettes
//   (cube de bouillon, bouquet de persil, citron...), on utilise gramsPerPiece
//   et mlPerPiece pour faire la conversion correcte
function estimateCost(name, qty, unit) {
  const price = lookupIngredientPrice(name);
  if (!price) return 0;
  const q = parseFloat(qty) || 0;
  if (q <= 0) return 0;

  const recipeUnit = (unit || '').toLowerCase().trim();
  const priceUnit = price.unit;

  // Convertit la quantité de la recette en équivalent dans l'unité du prix
  let priceableQty = q;

  if (priceUnit === 'kg') {
    if (recipeUnit === 'g') priceableQty = q / 1000;
    else if (recipeUnit === 'kg') priceableQty = q;
    else if (recipeUnit === 'pièce' || recipeUnit === 'pcs' || recipeUnit === '') {
      // La recette compte des pièces mais le prix est au kg
      // → on utilise gramsPerPiece si dispo, sinon 100g/pièce par défaut
      const gpp = price.gramsPerPiece || 100;
      priceableQty = (q * gpp) / 1000;
    }
    else if (recipeUnit === 'ml' || recipeUnit === 'cl' || recipeUnit === 'l') {
      // Approximation densité = 1g/ml pour conversion
      const grams = recipeUnit === 'ml' ? q : recipeUnit === 'cl' ? q * 10 : q * 1000;
      priceableQty = grams / 1000;
    }
    else priceableQty = q / 1000; // fallback grammes

  } else if (priceUnit === 'l') {
    if (recipeUnit === 'ml') priceableQty = q / 1000;
    else if (recipeUnit === 'cl') priceableQty = q / 100;
    else if (recipeUnit === 'l') priceableQty = q;
    else if (recipeUnit === 'g' || recipeUnit === 'kg') {
      // Ex : crème en grammes → on convertit g→ml (densité ≈1)
      const ml = recipeUnit === 'g' ? q : q * 1000;
      priceableQty = ml / 1000;
    }
    else if (recipeUnit === 'pièce' || recipeUnit === 'pcs' || recipeUnit === '') {
      // 1 "pièce" de liquide = bouteille typique 250ml (cas rare)
      priceableQty = (q * 250) / 1000;
    }
    else priceableQty = q / 1000;

  } else if (priceUnit === 'pièce') {
    if (recipeUnit === 'pièce' || recipeUnit === 'pcs' || recipeUnit === '') {
      priceableQty = q;
    }
    else if (recipeUnit === 'g') {
      // Ex : 10g de persil sur un bouquet de 30g → 0.33 bouquet
      const gpp = price.gramsPerPiece || 100;
      priceableQty = q / gpp;
    }
    else if (recipeUnit === 'kg') {
      const gpp = price.gramsPerPiece || 100;
      priceableQty = (q * 1000) / gpp;
    }
    else if (recipeUnit === 'ml') {
      // Ex : 200ml de bouillon avec mlPerPiece=500 → 0.4 cube
      const mpp = price.mlPerPiece || 500;
      priceableQty = q / mpp;
    }
    else if (recipeUnit === 'cl') {
      const mpp = price.mlPerPiece || 500;
      priceableQty = (q * 10) / mpp;
    }
    else if (recipeUnit === 'l') {
      const mpp = price.mlPerPiece || 500;
      priceableQty = (q * 1000) / mpp;
    }
    else priceableQty = q;
  }

  return Math.max(0, priceableQty * price.price);
}

// Définit un override de prix pour un ingrédient (saisi par l'utilisateur)
function setPriceOverride(name, price, unit) {
  if (!state.priceOverrides) state.priceOverrides = {};
  const key = name.toLowerCase().trim();
  if (price === null || price === undefined || price === '') {
    delete state.priceOverrides[key];
  } else {
    state.priceOverrides[key] = { price: parseFloat(price), unit: unit || 'kg' };
  }
  saveState();
}

// =============================================================
// CONFIG BUDGET
// =============================================================
function ensureFoodBudget() {
  if (!state.foodBudget) {
    state.foodBudget = {
      amount: 60,        // budget en €
      durationDays: 7,   // durée en jours (semaine par défaut)
      lastUpdated: Date.now()
    };
  }
  return state.foodBudget;
}

function setFoodBudget(amount, durationDays) {
  ensureFoodBudget();
  state.foodBudget.amount = parseFloat(amount) || 0;
  state.foodBudget.durationDays = parseInt(durationDays) || 7;
  state.foodBudget.lastUpdated = Date.now();
  saveState();
}

// =============================================================
// SHOPPING LIST V2 — GÉNÉRATEUR INTELLIGENT
// =============================================================
// Modes :
// - 'plan'    : à partir du plan repas IA (besoins exacts pour cuisiner)
// - 'likes'   : priorise les ingrédients aimés + base + plan repas
// - 'recipes' : à partir d'une sélection manuelle de recettes

function generateShoppingListV2(mode = 'plan', options = {}) {
  ensureFoodBudget();
  const budget = state.foodBudget.amount;
  const days = state.foodBudget.durationDays;
  const prefs = state.foodPrefs || { likes: [], dislikes: [], allergies: [], diet: null };
  const pantry = (state.pantry || []).map(p => p.name.toLowerCase());

  let recipes = [];

  if (mode === 'plan') {
    // Utilise le plan repas IA pour la durée demandée — déduplique les recettes
    // pour ne pas multiplier les portions × 4 repas × 7 jours
    const plan = (typeof generateSmartMealPlan === 'function')
      ? generateSmartMealPlan().slice(0, days)
      : [];
    const seen = new Set();
    plan.forEach(d => {
      ['breakfast', 'lunch', 'dinner', 'snack', 'snack2'].forEach(slot => {
        if (d[slot] && !seen.has(d[slot].id)) {
          seen.add(d[slot].id);
          recipes.push(d[slot]);
        }
      });
    });
  } else if (mode === 'recipes') {
    // Sélection manuelle (passée dans options.recipeIds)
    const ids = options.recipeIds || [];
    recipes = ids.map(id => RECIPES.find(r => r.id === id)).filter(Boolean);
  } else if (mode === 'likes') {
    // Combine : (a) plan repas (dédupliqué), (b) on ajoute des recettes contenant des "likes"
    const plan = (typeof generateSmartMealPlan === 'function')
      ? generateSmartMealPlan().slice(0, days)
      : [];
    const seen = new Set();
    plan.forEach(d => {
      ['breakfast', 'lunch', 'dinner', 'snack'].forEach(slot => {
        if (d[slot] && !seen.has(d[slot].id)) {
          seen.add(d[slot].id);
          recipes.push(d[slot]);
        }
      });
    });
    // Ajoute jusqu'à 5 recettes qui contiennent des likes (sans répéter)
    if (prefs.likes && prefs.likes.length > 0) {
      const candidates = RECIPES.filter(r => {
        if (seen.has(r.id)) return false;
        const ingredientsText = (r.ingredients || []).map(i => i.name || i).join(' ').toLowerCase();
        return prefs.likes.some(like => ingredientsText.includes(like.toLowerCase()));
      });
      candidates.slice(0, 5).forEach(r => { seen.add(r.id); recipes.push(r); });
    }
  }

  // Filtre selon le régime (vegetarian/vegan/etc.) en réutilisant la logique de filtrage prefs
  // (ici on fait une version simplifiée car on travaille sur la liste, pas sur le plan)
  if (prefs.diet || (prefs.dislikes || []).length > 0 || (prefs.allergies || []).length > 0) {
    recipes = recipes.filter(r => isRecipeCompatibleWithPrefs(r, prefs));
  }

  // Agrège les ingrédients et calcule les coûts
  const items = aggregateIngredients(recipes, pantry);

  // Tri par catégorie pour l'affichage
  items.forEach(it => {
    const price = lookupIngredientPrice(it.name);
    it.cat = price?.cat || guessCategory(it.name) || 'divers';
    it.priceInfo = price;
    it.cost = estimateCost(it.name, it.qty, it.unit);
  });

  // Calcul du total et arbitrage budget
  const totalCost = items.reduce((s, it) => s + it.cost, 0);
  const overBudget = totalCost > budget;

  return {
    mode,
    items,
    totalCost: Math.round(totalCost * 100) / 100,
    budget,
    overBudget,
    deltaBudget: Math.round((totalCost - budget) * 100) / 100,
    recipeCount: recipes.length,
    days,
    generatedAt: Date.now()
  };
}

// Vérifie si une recette respecte les préférences alimentaires
function isRecipeCompatibleWithPrefs(recipe, prefs) {
  if (!recipe.ingredients) return true;
  const txt = recipe.ingredients.map(i => i.name || i).join(' ').toLowerCase();
  const dislikes = [...(prefs.dislikes || []), ...(prefs.allergies || [])].map(s => s.toLowerCase().trim()).filter(Boolean);
  const MEAT = ['poulet','bœuf','boeuf','dinde','jambon','porc','lardon','viande','steak','agneau','saucisse','bacon'];
  const FISH = ['thon','saumon','cabillaud','colin','poisson','crevette','crabe','sardine','maquereau','sole','truite'];
  const ANIMAL = ['oeuf','œuf','lait','beurre','fromage','yaourt','crème','feta','mozza','parmesan','ricotta','chèvre'];
  const GLUTEN = ['pâtes','pâte','pain','blé','farine','semoule','couscous','boulgour','seitan'];
  const LACTOSE = ['lait','beurre','fromage','yaourt','crème','feta','mozza','parmesan','ricotta'];
  const hasAny = (words) => words.some(w => txt.includes(w));
  if (prefs.diet === 'vegetarian' && (hasAny(MEAT) || hasAny(FISH))) return false;
  if (prefs.diet === 'vegan' && (hasAny(MEAT) || hasAny(FISH) || hasAny(ANIMAL))) return false;
  if (prefs.diet === 'glutenFree' && hasAny(GLUTEN)) return false;
  if (prefs.diet === 'lactoseFree' && hasAny(LACTOSE)) return false;
  if (dislikes.length > 0 && dislikes.some(bad => txt.includes(bad))) return false;
  return true;
}

// Agrège les ingrédients de plusieurs recettes en consolidant les quantités
// Soustrait ce qui est déjà au frigo
function aggregateIngredients(recipes, pantry) {
  const acc = {};
  recipes.forEach(r => {
    (r.ingredients || []).forEach(ing => {
      const name = (typeof ing === 'string' ? ing : ing.name).trim();
      const key = name.toLowerCase();
      const qty = typeof ing === 'object' ? (parseFloat(ing.qty) || 1) : 1;
      const unit = typeof ing === 'object' ? (ing.unit || 'pièce') : 'pièce';
      // Ignore si déjà au frigo (matching simple)
      const inPantry = pantry.some(p => key.includes(p) || p.includes(key));
      if (inPantry) {
        if (!acc[key]) acc[key] = { name, qty: 0, unit, fromRecipes: [], inPantry: true };
        acc[key].fromRecipes.push(r.name);
        return;
      }
      if (!acc[key]) {
        acc[key] = { name, qty: 0, unit, fromRecipes: [], inPantry: false };
      }
      acc[key].qty += qty;
      acc[key].fromRecipes.push(r.name);
    });
  });
  // Garde uniquement ceux qui ne sont pas déjà au frigo
  return Object.values(acc).filter(x => !x.inPantry);
}

// =============================================================
// COCHER UN ITEM = passer au frigo automatiquement
// =============================================================
function checkShoppingItem(itemKey) {
  if (!state.shoppingChecked) state.shoppingChecked = {};
  state.shoppingChecked[itemKey] = !state.shoppingChecked[itemKey];
  // Si on coche : ajout au frigo
  if (state.shoppingChecked[itemKey]) {
    const list = state._currentShoppingList?.items || [];
    const item = list.find(it => it.name.toLowerCase() === itemKey);
    if (item) {
      addToPantryFromShopping(item);
    }
  }
  saveState();
}

function addToPantryFromShopping(item) {
  if (!state.pantry) state.pantry = [];
  // Évite les doublons
  if (state.pantry.some(p => p.name.toLowerCase() === item.name.toLowerCase())) return;
  state.pantry.push({
    id: 'p_' + Math.random().toString(36).slice(2, 10),
    name: item.name,
    addedAt: Date.now(),
    fromShopping: true
  });
}

// Vide la liste des items cochés (les retire mais les laisse au frigo)
function clearCheckedItems() {
  if (!state._currentShoppingList || !state.shoppingChecked) return;
  const checkedKeys = Object.keys(state.shoppingChecked).filter(k => state.shoppingChecked[k]);
  state._currentShoppingList.items = state._currentShoppingList.items.filter(
    it => !checkedKeys.includes(it.name.toLowerCase())
  );
  // Reset le tracking de cochage
  state.shoppingChecked = {};
  saveState();
}
