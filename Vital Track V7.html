<script>
// ============================================================
// MOTEUR NUTRITION V2 — Calibrage, stocks quantifiés, décrément
// ============================================================

// =============================================================
// 1. STOCKS FRIGO QUANTIFIÉS
// =============================================================
// Migration : transforme les anciens objets pantry simple {name, id, addedAt}
// en stocks {id, name, qty, unit, addedAt}
function migratePantryToStocks() {
  if (!Array.isArray(state.pantry)) state.pantry = [];
  state.pantry.forEach(item => {
    if (item.qty === undefined || item.qty === null) {
      // Estimation par défaut selon le type
      const food = FOODS.find(f => item.name && f.name.toLowerCase() === item.name.toLowerCase());
      if (food && food.unit === 'pièce') {
        item.qty = 1; item.unit = 'pièce';
      } else if (food) {
        item.qty = food.commonGrams || 100; item.unit = 'g';
      } else {
        item.qty = 100; item.unit = 'g';
      }
    }
    if (!item.unit) item.unit = 'g';
  });
}

// Ajoute ou augmente le stock d'un ingrédient
function addToStock(name, qty, unit) {
  if (!state.pantry) state.pantry = [];
  const lname = name.trim();
  const existing = state.pantry.find(p => p.name.toLowerCase() === lname.toLowerCase() && p.unit === unit);
  if (existing) {
    existing.qty += parseFloat(qty) || 0;
    existing.lastUpdated = Date.now();
  } else {
    state.pantry.push({
      id: 'p_' + Math.random().toString(36).slice(2, 10),
      name: lname,
      qty: parseFloat(qty) || 0,
      unit: unit || 'g',
      addedAt: Date.now(),
      lastUpdated: Date.now()
    });
  }
  saveState();
}

// Retire une quantité du stock (peut passer en négatif côté affichage mais on coupe à 0)
function removeFromStock(name, qty, unit) {
  if (!state.pantry) return;
  const item = state.pantry.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (!item) return;
  // Conversion d'unité simple si différente
  let qtyToRemove = parseFloat(qty) || 0;
  if (item.unit !== unit) {
    qtyToRemove = convertQty(qtyToRemove, unit, item.unit, name);
  }
  item.qty -= qtyToRemove;
  item.lastUpdated = Date.now();
  // Si stock à zéro ou négatif, on retire
  if (item.qty <= 0.5) {
    state.pantry = state.pantry.filter(p => p.id !== item.id);
  }
  saveState();
}

// Convertit une qty d'une unité à une autre (approximations simples)
function convertQty(qty, fromUnit, toUnit, ingredientName) {
  if (fromUnit === toUnit) return qty;
  // g <-> kg
  if (fromUnit === 'g' && toUnit === 'kg') return qty / 1000;
  if (fromUnit === 'kg' && toUnit === 'g') return qty * 1000;
  if (fromUnit === 'ml' && toUnit === 'l') return qty / 1000;
  if (fromUnit === 'l' && toUnit === 'ml') return qty * 1000;
  // pièce -> g via gramsPerPiece du food catalogue
  if ((fromUnit === 'pièce' || fromUnit === 'pcs' || fromUnit === 'gousse' || fromUnit === 'pot') && (toUnit === 'g' || toUnit === 'kg')) {
    const food = FOODS.find(f => f.name.toLowerCase() === (ingredientName || '').toLowerCase());
    const gpp = food?.commonGrams || 100;
    return toUnit === 'g' ? qty * gpp : qty * gpp / 1000;
  }
  if ((fromUnit === 'g' || fromUnit === 'kg') && (toUnit === 'pièce' || toUnit === 'pcs' || toUnit === 'gousse' || toUnit === 'pot')) {
    const food = FOODS.find(f => f.name.toLowerCase() === (ingredientName || '').toLowerCase());
    const gpp = food?.commonGrams || 100;
    const grams = fromUnit === 'g' ? qty : qty * 1000;
    return grams / gpp;
  }
  // ml ↔ g (densité ≈1)
  if (fromUnit === 'ml' && toUnit === 'g') return qty;
  if (fromUnit === 'g' && toUnit === 'ml') return qty;
  return qty; // fallback
}

// =============================================================
// 2. DÉCRÉMENT AUTOMATIQUE FRIGO QUAND ON VALIDE UN REPAS
// =============================================================
function consumeRecipeFromStock(recipe, portions = 1) {
  if (!recipe || !recipe.ingredients) return [];
  const consumed = [];
  recipe.ingredients.forEach(ing => {
    const name = typeof ing === 'string' ? ing : ing.name;
    const qty = (typeof ing === 'object' ? (parseFloat(ing.qty) || 0) : 0) * portions;
    const unit = typeof ing === 'object' ? (ing.unit || 'pièce') : 'pièce';
    if (qty <= 0) return;
    // Cherche dans le stock
    const item = state.pantry.find(p => p.name.toLowerCase() === name.toLowerCase());
    if (item) {
      const before = item.qty;
      removeFromStock(name, qty, unit);
      consumed.push({ name, qtyConsumed: qty, unit, hadInStock: true });
    } else {
      consumed.push({ name, qtyConsumed: qty, unit, hadInStock: false });
    }
  });
  return consumed;
}

// =============================================================
// 3. CALIBRAGE CALORIQUE — ajuste portions pour atteindre cibles
// =============================================================
// Calcule les cibles macros du jour (existant + ajustement effort sportif)
function dailyTargets() {
  const u = state.user;
  if (!u) return { kcal: 2200, p: 100, c: 250, l: 70 };
  // Réutilise dynamicMacroTargets si dispo
  if (typeof dynamicMacroTargets === 'function') {
    return dynamicMacroTargets(u, todayISO());
  }
  // Fallback simple
  const baseKcal = calorieTarget ? calorieTarget(u) : 2200;
  return {
    kcal: baseKcal,
    p: Math.round(u.weight * 1.8),
    c: Math.round(baseKcal * 0.5 / 4),
    l: Math.round(baseKcal * 0.25 / 9)
  };
}

// Distribue les cibles entre les repas (petit-déj 25%, déjeuner 35%, dîner 30%, collation 10%)
function mealTargets(slot, targets = null) {
  const t = targets || dailyTargets();
  const ratios = {
    breakfast: 0.25, lunch: 0.35, dinner: 0.30, snack: 0.10, snack2: 0.10
  };
  const ratio = ratios[slot] || 0.25;
  return {
    kcal: Math.round(t.kcal * ratio),
    p: Math.round(t.p * ratio),
    c: Math.round(t.c * ratio),
    l: Math.round(t.l * ratio)
  };
}

// Score d'adéquation d'une recette à des cibles macros
// Plus le score est bas, mieux c'est (0 = parfait)
function macroFit(recipe, target) {
  if (!recipe) return Infinity;
  const kcalDiff = Math.abs((recipe.kcal || 0) - target.kcal) / target.kcal;
  const pDiff = Math.abs((recipe.p || 0) - target.p) / Math.max(1, target.p);
  const cDiff = Math.abs((recipe.c || 0) - target.c) / Math.max(1, target.c);
  const lDiff = Math.abs((recipe.l || 0) - target.l) / Math.max(1, target.l);
  // Pondération : kcal pèse 2x, P 1.5x, C/L 1x
  return kcalDiff * 2 + pDiff * 1.5 + cDiff + lDiff;
}

// Génère un plan repas calibré sur les cibles macros (remplace generateSmartMealPlan)
function generateCalibratedMealPlan(opts = {}) {
  const days = opts.days || 7;
  const targets = dailyTargets();
  const prefs = state.foodPrefs || { likes: [], dislikes: [], allergies: [], diet: null };
  const budget = opts.budget || null; // 'low'|'mid'|'high'|null

  // Filtrage par budget si demandé
  let availableRecipes = RECIPES.slice();
  if (budget) {
    availableRecipes = availableRecipes.filter(r => !r.budget || r.budget === budget || r.budget === 'low');
  }
  // Filtrage par préférences
  if (typeof isRecipeCompatibleWithPrefs === 'function') {
    availableRecipes = availableRecipes.filter(r => isRecipeCompatibleWithPrefs(r, prefs));
  }
  if (availableRecipes.length < 5) availableRecipes = RECIPES.slice(); // fallback

  const breakfasts = availableRecipes.filter(r => r.category === 'petit-dej');
  const meals = availableRecipes.filter(r => r.category === 'plat');
  const snacks = availableRecipes.filter(r => r.category === 'collation');

  const safeBfs = breakfasts.length ? breakfasts : RECIPES.filter(r => r.category === 'petit-dej');
  const safeMls = meals.length ? meals : RECIPES.filter(r => r.category === 'plat');
  const safeSks = snacks.length ? snacks : RECIPES.filter(r => r.category === 'collation');

  const usedRecent = {};

  const plan = [];
  for (let i = 0; i < days; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const date = d.toISOString().slice(0, 10);
    const burn = (typeof plannedBurnForDate === 'function') ? plannedBurnForDate(date) : 0;
    // Ajuste les targets du jour selon l'effort
    const dayTargets = {
      kcal: targets.kcal + burn,
      p: targets.p + Math.round(burn * 0.05),
      c: targets.c + Math.round(burn * 0.7 / 4),
      l: targets.l
    };

    // Choisit la meilleure recette pour chaque slot, en évitant les répétitions récentes
    const pickBestForSlot = (pool, slot) => {
      const slotTarget = mealTargets(slot, dayTargets);
      const candidates = pool.map(r => {
        let score = macroFit(r, slotTarget);
        // Pénalité si utilisée récemment
        if (usedRecent[r.id]) {
          const daysSince = (new Date(date).getTime() - new Date(usedRecent[r.id]).getTime()) / 86400000;
          if (daysSince < 3) score += 2;
          else if (daysSince < 6) score += 1;
        }
        // Bonus likes
        if (prefs.likes && prefs.likes.length > 0 && r.ingredients) {
          const txt = r.ingredients.map(i => i.name || i).join(' ').toLowerCase();
          const matches = prefs.likes.filter(l => txt.includes(l.toLowerCase())).length;
          score -= matches * 0.3;
        }
        return { r, score };
      });
      candidates.sort((a, b) => a.score - b.score);
      // Prend top 3 et un peu de hasard
      const top = candidates.slice(0, 3);
      const pick = top[Math.floor(Math.random() * top.length)].r;
      usedRecent[pick.id] = date;
      return pick;
    };

    const dayPlan = {
      date,
      day: d.toLocaleDateString('fr-FR', { weekday: 'long' }),
      plannedBurn: burn,
      dayTargets,
      breakfast: pickBestForSlot(safeBfs, 'breakfast'),
      lunch: pickBestForSlot(safeMls, 'lunch'),
      dinner: pickBestForSlot(safeMls, 'dinner'),
      snack: pickBestForSlot(safeSks, 'snack')
    };

    // Si on est très loin de la cible, ajoute un snack supplémentaire
    const totalKcal = (dayPlan.breakfast?.kcal||0) + (dayPlan.lunch?.kcal||0) + (dayPlan.dinner?.kcal||0) + (dayPlan.snack?.kcal||0);
    const deficit = dayTargets.kcal - totalKcal;
    if (deficit > 200) {
      // Ajoute un 2e snack pour combler
      const remaining = safeSks.filter(s => s.id !== dayPlan.snack?.id);
      if (remaining.length > 0) {
        dayPlan.snack2 = pickBestForSlot(remaining, 'snack2');
      }
    }

    // Calcule les portions ajustées pour chaque recette afin d'atteindre exactement la cible kcal du slot
    const adjustPortion = (recipe, slot, dayTargets) => {
      if (!recipe) return 1;
      const slotTarget = mealTargets(slot, dayTargets);
      const ratio = slotTarget.kcal / Math.max(1, recipe.kcal);
      // On limite l'ajustement entre 0.5 et 1.8 pour rester réaliste
      return Math.max(0.5, Math.min(1.8, Math.round(ratio * 10) / 10));
    };
    dayPlan.portions = {
      breakfast: adjustPortion(dayPlan.breakfast, 'breakfast', dayTargets),
      lunch: adjustPortion(dayPlan.lunch, 'lunch', dayTargets),
      dinner: adjustPortion(dayPlan.dinner, 'dinner', dayTargets),
      snack: adjustPortion(dayPlan.snack, 'snack', dayTargets),
      snack2: dayPlan.snack2 ? adjustPortion(dayPlan.snack2, 'snack2', dayTargets) : 1
    };

    // Total réel calculé avec portions ajustées
    let actualKcal = Math.round(
      ((dayPlan.breakfast?.kcal||0) * dayPlan.portions.breakfast) +
      ((dayPlan.lunch?.kcal||0) * dayPlan.portions.lunch) +
      ((dayPlan.dinner?.kcal||0) * dayPlan.portions.dinner) +
      ((dayPlan.snack?.kcal||0) * dayPlan.portions.snack) +
      ((dayPlan.snack2?.kcal||0) * (dayPlan.portions.snack2 || 1))
    );

    // 2e passe d'ajustement global : si on est encore loin, on rééquilibre proportionnellement
    const remainingDeviation = (dayTargets.kcal - actualKcal) / Math.max(1, actualKcal);
    if (Math.abs(remainingDeviation) > 0.05 && actualKcal > 0) {
      const globalCorrection = 1 + remainingDeviation;
      ['breakfast','lunch','dinner','snack','snack2'].forEach(s => {
        if (dayPlan.portions[s] !== undefined) {
          let p = dayPlan.portions[s] * globalCorrection;
          p = Math.max(0.5, Math.min(1.8, Math.round(p * 10) / 10));
          dayPlan.portions[s] = p;
        }
      });
      actualKcal = Math.round(
        ((dayPlan.breakfast?.kcal||0) * dayPlan.portions.breakfast) +
        ((dayPlan.lunch?.kcal||0) * dayPlan.portions.lunch) +
        ((dayPlan.dinner?.kcal||0) * dayPlan.portions.dinner) +
        ((dayPlan.snack?.kcal||0) * dayPlan.portions.snack) +
        ((dayPlan.snack2?.kcal||0) * (dayPlan.portions.snack2 || 1))
      );
    }
    dayPlan.actualKcal = actualKcal;

    plan.push(dayPlan);
  }
  return plan;
}

// =============================================================
// 4. SCORE NUTRITIONNEL DU JOUR
// =============================================================
// Renvoie un score 0-100 selon adéquation calories + macros + diversité
function dailyNutritionScore(date) {
  const dayMeals = state.meals.filter(m => m.date === date);
  if (dayMeals.length === 0) return null;
  const eaten = dayMeals.reduce((s, m) => ({
    kcal: s.kcal + (m.kcal||0),
    p: s.p + (m.p||0),
    c: s.c + (m.c||0),
    l: s.l + (m.l||0)
  }), { kcal: 0, p: 0, c: 0, l: 0 });
  const t = dailyTargets();
  let score = 100;
  // Pénalité écart kcal (>15% = malus)
  const kcalDeviation = Math.abs(eaten.kcal - t.kcal) / Math.max(1, t.kcal);
  if (kcalDeviation > 0.05) score -= Math.min(40, (kcalDeviation - 0.05) * 100);
  // Pénalité protéines insuffisantes
  if (eaten.p < t.p * 0.85) score -= Math.min(25, (1 - eaten.p / Math.max(1,t.p)) * 50);
  // Pénalité diversité : moins de 3 repas = malus
  if (dayMeals.length < 3) score -= (3 - dayMeals.length) * 8;
  return Math.max(0, Math.min(100, Math.round(score)));
}

// =============================================================
// 5. SUGGESTIONS REPAS EXPRESS (selon ce qu'il reste à manger)
// =============================================================
function expressMealSuggestions(date, count = 3) {
  const t = dailyTargets();
  const dayMeals = state.meals.filter(m => m.date === date);
  const eaten = dayMeals.reduce((s, m) => ({
    kcal: s.kcal + (m.kcal||0), p: s.p + (m.p||0), c: s.c + (m.c||0), l: s.l + (m.l||0)
  }), { kcal: 0, p: 0, c: 0, l: 0 });
  const remaining = {
    kcal: Math.max(100, t.kcal - eaten.kcal),
    p: Math.max(0, t.p - eaten.p),
    c: Math.max(0, t.c - eaten.c),
    l: Math.max(0, t.l - eaten.l)
  };
  const prefs = state.foodPrefs || {};
  // Filtrage prefs + tri par adéquation aux macros restantes + temps de prép
  let candidates = RECIPES.filter(r => r.category !== 'petit-dej');
  if (typeof isRecipeCompatibleWithPrefs === 'function') {
    candidates = candidates.filter(r => isRecipeCompatibleWithPrefs(r, prefs));
  }
  // On vise un repas qui couvre ~50% du restant
  const targetKcal = remaining.kcal * 0.5;
  candidates = candidates.map(r => {
    let s = Math.abs(r.kcal - targetKcal);
    // Bonus si rapide (≤20 min)
    if (r.time && r.time <= 15) s -= 50;
    else if (r.time && r.time <= 25) s -= 20;
    // Pénalité si protéines insuffisantes vs reste
    if (r.p < remaining.p * 0.3) s += 50;
    return { r, s };
  });
  candidates.sort((a, b) => a.s - b.s);
  return candidates.slice(0, count).map(x => x.r);
}

// =============================================================
// 6. JOURNAL HYDRATATION
// =============================================================
function ensureHydration() {
  if (!state.hydration) state.hydration = {}; // { '2026-05-04': { glasses: 6 } }
}
function todayWaterGlasses() {
  ensureHydration();
  return state.hydration[todayISO()]?.glasses || 0;
}
function logWaterGlass(delta = 1) {
  ensureHydration();
  const today = todayISO();
  if (!state.hydration[today]) state.hydration[today] = { glasses: 0 };
  state.hydration[today].glasses = Math.max(0, state.hydration[today].glasses + delta);
  saveState();
}
function dailyWaterTarget() {
  const u = state.user;
  if (!u) return 8;
  // 35 ml/kg ; 1 verre = 250 ml
  return Math.round((u.weight * 35) / 250);
}

// =============================================================
// 7. TRACKING LIBRE — ajoute un aliment du catalogue à un repas
// =============================================================
function logFoodFromCatalog(foodId, qty, unit, slot = 'snack') {
  const food = findFoodById(foodId);
  if (!food) return { error: 'Aliment introuvable' };
  const macros = macrosFor(food, qty, unit);
  if (!state.meals) state.meals = [];
  state.meals.push({
    id: 'm_' + Math.random().toString(36).slice(2, 10),
    date: todayISO(),
    name: `${food.name} (${qty} ${unit})`,
    foodId: foodId,
    slot,
    kcal: macros.kcal,
    p: macros.p,
    c: macros.c,
    l: macros.l,
    qty: parseFloat(qty),
    unit,
    addedAt: Date.now()
  });
  saveState();
  return { ok: true, meal: state.meals[state.meals.length - 1] };
}

// Valide un repas de la planification (depuis le plan)
// → ajoute aux meals du jour ET décrémente le frigo
function validateMealFromPlan(recipe, slot, portion = 1) {
  if (!recipe) return { error: 'Recette manquante' };
  if (!state.meals) state.meals = [];
  state.meals.push({
    id: 'm_' + Math.random().toString(36).slice(2, 10),
    date: todayISO(),
    name: recipe.name,
    recipeId: recipe.id,
    slot,
    kcal: Math.round((recipe.kcal || 0) * portion),
    p: Math.round((recipe.p || 0) * portion * 10) / 10,
    c: Math.round((recipe.c || 0) * portion * 10) / 10,
    l: Math.round((recipe.l || 0) * portion * 10) / 10,
    portion,
    addedAt: Date.now()
  });
  // Décrément frigo
  const consumed = consumeRecipeFromStock(recipe, portion);
  saveState();
  return { ok: true, consumed };
}

  const sleepAvg = state.sleep.slice(-7).reduce((a, s) => a + s.hours, 0) / Math.max(state.sleep.slice(-7).length, 1);

  // Séance du jour
  const program = PROGRAMS[u.program];
  const todayDay = new Date().getDay();
  const session = program.sessions[(todayDay - 1 + program.sessions.length) % program.sessions.length];

  const greeting = getGreeting();

  return `
    <div class="screen-header">
      <div class="greeting">${greeting}</div>
      <div class="row-between">
        <h1 class="t-h1">${u.firstName}</h1>
        <div class="row gap-8">
          <button class="btn-icon" onclick="navigate('social-feed')" aria-label="Social">${iconGroup(18)}</button>
          <button class="btn-icon" onclick="navigate('profile')">${iconUser()}</button>
        </div>
      </div>
    </div>

    <div class="streak-card">
      <div class="streak-icon">${iconFlame()}</div>
      <div class="streak-content">
        <div class="streak-num">${state.streak} jour${state.streak>1?'s':''}</div>
        <div class="streak-label">${state.streak >= 3 ? 'Tu tiens le rythme. Continue.' : 'Ouvre l\'app chaque jour pour bâtir ta série.'}</div>
      </div>
    </div>

    ${(() => {
      const homeAlerts = detectAlerts().filter(a => a.severity === 'high').slice(0, 2);
      if (homeAlerts.length === 0) return '';
      return `<div class="card-title">Coach IA</div>` + homeAlerts.map(a => renderAlertCard(a)).join('') + `<button class="btn-tertiary mt-8" style="font-size:13px;" onclick="navigate('coach')">Voir toutes les alertes →</button><div style="height:16px;"></div>`;
    })()}

    <div class="quick-stats">
      <div class="stat-tile" onclick="navigate('progress')" style="cursor:pointer;">
        <div class="stat-tile-label">Poids</div>
        <div class="stat-tile-value">${displayWeight(lastWeight)}<span class="stat-tile-unit">${weightUnit()}</span></div>
        <div class="stat-tile-trend">${weightDelta !== '—' ? (weightDelta > 0 ? '+' : '') + weightDelta + ' / 30j' : 'Premier point'}</div>
      </div>
      <div class="stat-tile" onclick="navigate('workout')" style="cursor:pointer;">
        <div class="stat-tile-label">Séances</div>
        <div class="stat-tile-value">${weekWorkouts}<span class="stat-tile-unit">/${program.sessions.length}</span></div>
        <div class="stat-tile-trend">cette semaine</div>
      </div>
      <div class="stat-tile" onclick="navigate('add-sleep')" style="cursor:pointer;">
        <div class="stat-tile-label">Sommeil</div>
        <div class="stat-tile-value">${sleepAvg.toFixed(1)}<span class="stat-tile-unit">h</span></div>
        <div class="stat-tile-trend">moyenne 7j</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Macros aujourd'hui</span>
        <button class="btn-tertiary" onclick="navigate('nutrition')" style="font-size: 13px;">Détail →</button>
      </div>
      <div class="calorie-ring-wrap">
        <svg class="ring-svg" width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-track" cx="90" cy="90" r="78" stroke-width="12"/>
          <circle class="ring-progress" cx="90" cy="90" r="78" stroke-width="12" stroke-dasharray="490" stroke-dashoffset="${ringOffset}"/>
        </svg>
        <div class="ring-center">
          <div class="num">${macros.kcal}</div>
          <div class="unit">kcal consommées</div>
          <div class="sub">/ ${targets.kcal}</div>
        </div>
      </div>
      ${macroBar('Protéines', macros.p, targets.p, 'g')}
      ${macroBar('Glucides', macros.c, targets.c, 'g')}
      ${macroBar('Lipides', macros.l, targets.l, 'g')}
    </div>

    <div class="card">
      <div class="card-title">
        <span>Séance du jour</span>
        <span class="t-caption">${session.name}</span>
      </div>
      <div class="row gap-16 mb-16">
        <div class="list-item-icon" style="width:48px; height:48px; border-radius:16px;">${iconDumbbell()}</div>
        <div style="flex:1;">
          <div class="t-body" style="font-weight:500;">${session.exercises.length} exercices</div>
          <div class="t-caption">environ ${session.duration} min</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startSession('${u.program}','${session.id}')">Démarrer la séance</button>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Sommeil</span>
        <button class="btn-tertiary" onclick="navigate('add-sleep')" style="font-size: 13px;">Saisir →</button>
      </div>
      ${(() => {
        const last = state.sleep[state.sleep.length - 1];
        if (!last) return '<div class="t-caption">Aucune donnée pour l\'instant.</div>';
        return `
          <div class="row gap-16">
            <div>
              <div class="t-mono-lg">${Math.floor(last.hours)}h ${Math.round((last.hours % 1) * 60)}</div>
              <div class="t-caption mt-8">Couché ${last.bedtime || '—'} · réveil ${last.wake || '—'}</div>
            </div>
            <div style="flex:1;"></div>
            <div class="t-caption text-right">Qualité<br><span class="t-mono-sm" style="color:var(--sage-deep);">${'★'.repeat(last.quality)}${'☆'.repeat(5-last.quality)}</span></div>
          </div>
        `;
      })()}
    </div>

    <div style="height: 100px;"></div>
  `;
}

function macroBar(name, val, target, unit) {
  const pct = Math.min((val / target) * 100, 100);
  return `
    <div class="macro-row">
      <div class="macro-head">
        <span class="macro-name">${name}</span>
        <span class="macro-vals">${Math.round(val)}<span class="total"> / ${target} ${unit}</span></span>
      </div>
      <div class="macro-bar"><div class="macro-bar-fill" style="width: ${pct}%;"></div></div>
    </div>
  `;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'Bonne nuit';
  if (h < 12) return 'Bonjour';
  if (h < 18) return "Bonne après-midi";
  return 'Bonsoir';
}

// WORKOUT
// ============================================================
function renderWorkout() {
  const u = state.user;
  const program = PROGRAMS[u.program];
  const today = todayISO();
  const ws = weekStartDate();
  // Planning ne vaut que pour la semaine en cours
  const plan = (state.weekPlan && state.weekPlan.weekStart === ws) ? state.weekPlan : null;
  const doneByDate = {};
  state.workouts.forEach(w => { doneByDate[w.date] = (doneByDate[w.date] || 0) + 1; });

  return `
    <div class="screen-header">
      <h1 class="t-h1" style="margin-bottom: 4px;">Séance</h1>
      <div class="t-caption">${fmtFullDate(today)}</div>
    </div>

    ${plan ? renderWeekPlanCard(plan, today, doneByDate) : renderNoPlanCard()}

    <div class="card-title mt-24 row-between">
      <span>Lancer rapide</span>
      <button class="btn-tertiary" style="font-size:13px;" onclick="navigate('sport-picker')">Tous les sports →</button>
    </div>
    <div class="quick-sport-grid">
      ${['strength','running','cycling','swimming','walking','yoga'].map(id => {
        const s = sportType(id);
        return `<button class="quick-sport" onclick="quickStartSport('${id}')">${sportIcon(id, 24)}<span>${s.label}</span></button>`;
      }).join('')}
    </div>

    <div class="card-title mt-24 row-between">
      <span>Programme</span>
      <button class="btn-tertiary" style="font-size:13px;" onclick="state._programPickerOpen=!state._programPickerOpen; render();">
        ${state._programPickerOpen ? 'Fermer' : 'Changer'} ${state._programPickerOpen ? '' : '→'}
      </button>
    </div>

    ${state._programPickerOpen ? `
      <div class="card">
        <div class="t-caption mb-16">Choisis le programme qui te convient. Le changement est instantané et n'efface aucune donnée.</div>
        <div class="program-grid">
          ${Object.entries(PROGRAMS).map(([id, prog]) => `
            <button class="program-pick ${u.program===id?'active':''}" onclick="changeProgram('${id}')">
              <div class="program-pick-name">${prog.name}</div>
              <div class="program-pick-meta">${prog.sessions.length} séance${prog.sessions.length>1?'s':''}/sem</div>
              <div class="program-pick-desc">${prog.description}</div>
            </button>
          `).join('')}
        </div>
      </div>
    ` : `
      <div class="program-banner">
        <div class="row-between" style="align-items:center;">
          <div style="flex:1; min-width:0;">
            <div class="t-body" style="font-weight:600;">${program.name}</div>
            <div class="t-caption mt-8">${program.description}</div>
          </div>
        </div>
      </div>
    `}

    ${program.sessions.map(s => `
      <div class="card" style="cursor:pointer;" onclick="startSession('${u.program}','${s.id}')">
        <div class="row-between mb-16">
          <div style="flex:1; min-width:0;">
            <div class="t-h2">${s.name}</div>
            <div class="t-caption mt-8">${s.exercises.length} exercices · environ ${s.duration} min</div>
          </div>
          <div class="btn-icon">${iconArrow()}</div>
        </div>
        <div class="t-caption">${s.exercises.slice(0,3).map(e => EXERCISES.find(x=>x.id===e.exerciseId)?.name).filter(Boolean).join(' · ')}${s.exercises.length>3?' ...':''}</div>
      </div>
    `).join('')}

    <div class="card-title mt-24">Historique</div>
    <button class="btn btn-secondary" onclick="navigate('workout-history')">Voir mes séances passées (${state.workouts.length})</button>

    <div style="height: 120px;"></div>
  `;
}

function changeProgram(programId) {
  if (!PROGRAMS[programId]) return;
  state.user.program = programId;
  state._programPickerOpen = false;
  saveState();
  toast('Programme : ' + PROGRAMS[programId].name);
  render();
}

function renderNoPlanCard() {
  return `
    <div class="card" style="background: var(--sage-pale);">
      <div class="card-title" style="color: var(--sage-deep);">Planifie ta semaine</div>
      <p class="t-body t-graphite mb-16" style="line-height:1.5;">Réponds à un mini-questionnaire (jours dispo, type de séance, horaire) et l'app construit ton planning sur-mesure.</p>
      <button class="btn btn-primary" onclick="navigate('week-plan-setup')">Planifier ma semaine</button>
    </div>
  `;
}

function renderWeekPlanCard(plan, today, doneByDate) {
  const todayDay = plan.days.find(d => d.date === today);
  return `
    <div class="card-title" style="margin-top: 8px;" >
      <span>Cette semaine</span>
      <button class="btn-tertiary" style="font-size:13px;" onclick="navigate('week-plan-setup')">Modifier</button>
    </div>
    <div class="week-grid mb-16">
      ${plan.days.map(d => {
        const dt = new Date(d.date);
        const dn = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'][(dt.getDay()+6)%7];
        const num = dt.getDate();
        const isToday = d.date === today;
        const done = doneByDate[d.date];
        const isRest = d.sport === 'rest';
        const cls = isToday ? 'today' : (done ? 'done' : (isRest ? 'rest' : 'planned'));
        const icon = isRest ? iconSun(14) : sportIcon(d.sport, 14);
        return `<div class="week-day ${cls}" onclick="state._planDayPreview='${d.date}'; render();">
          <div class="week-day-name">${dn}</div>
          <div class="week-day-num">${num}</div>
          <div class="week-day-pill">${icon}</div>
        </div>`;
      }).join('')}
    </div>

    ${todayDay ? renderTodayPlanned(todayDay) : ''}
  `;
}

function renderTodayPlanned(d) {
  if (d.sport === 'rest') {
    return `
      <div class="card">
        <div class="row gap-16">
          <div class="list-item-icon" style="background:var(--cloud); color:var(--mist);">${iconSun()}</div>
          <div style="flex:1;">
            <div class="t-h2">Jour de repos</div>
            <div class="t-caption mt-8">Profite-en. Tu peux quand même lancer une séance si tu veux.</div>
          </div>
        </div>
      </div>
    `;
  }
  const s = sportType(d.sport);
  if (s.category === 'strength' && d.programId && d.sessionId) {
    const program = PROGRAMS[d.programId];
    const sess = program?.sessions.find(x => x.id === d.sessionId);
    if (sess) {
      return `
        <div class="card" style="cursor:pointer;" onclick="startSession('${d.programId}','${d.sessionId}')">
          <div class="row-between mb-16">
            <div class="row gap-16" style="flex:1; min-width:0;">
              <div class="list-item-icon">${sportIcon('strength')}</div>
              <div style="flex:1; min-width:0;">
                <div class="t-h2">${sess.name}</div>
                <div class="t-caption mt-8">Aujourd'hui${d.time?` · ${d.time}`:''}${d.duration?` · ${d.duration} min`:''}</div>
              </div>
            </div>
            <div class="btn-icon">${iconArrow()}</div>
          </div>
        </div>
      `;
    }
  }
  // Cardio / mobilité
  return `
    <div class="card" style="cursor:pointer;" onclick="startCardio('${d.sport}', ${d.duration||30})">
      <div class="row-between mb-16">
        <div class="row gap-16" style="flex:1; min-width:0;">
          <div class="list-item-icon">${sportIcon(d.sport)}</div>
          <div style="flex:1; min-width:0;">
            <div class="t-h2">${s.label}</div>
            <div class="t-caption mt-8">Aujourd'hui${d.time?` · ${d.time}`:''}${d.duration?` · ${d.duration} min`:''}</div>
          </div>
        </div>
        <div class="btn-icon">${iconArrow()}</div>
      </div>
    </div>
  `;
}

function quickStartSport(id) {
  const s = sportType(id);
  if (s.category === 'strength') {
    // On ouvre la liste des sessions du programme actuel
    navigate('workout');
    toast('Choisis une séance ci-dessous');
    return;
  }
  startCardio(id, 30);
}

function startCardio(sportId, defaultDuration = 30) {
  state._activeCardio = {
    id: uid(),
    date: todayISO(),
    sport: sportId,
    elapsedMs: 0,
    runningSince: null,
    duration: defaultDuration,
    notes: '',
    rpe: null,
    fields: {}   // valeurs des champs spécifiques au sport
  };
  navigate('cardio-session');
}

function startSession(programId, sessionId) {
  const session = PROGRAMS[programId].sessions.find(s => s.id === sessionId);
  // Initialise une nouvelle séance en mémoire
  state._activeWorkout = {
    id: uid(),
    date: todayISO(),
    programId, sessionId,
    elapsedMs: 0,             // temps total accumulé
    runningSince: null,       // timestamp si chrono actif, null si en pause
    exercises: session.exercises.map(e => ({
      exerciseId: e.exerciseId,
      sets: Array.from({ length: e.sets }, () => ({ kg: '', reps: '', done: false }))
    }))
  };
  navigate('workout-session');
}

function renderWorkoutSession() {
  const w = state._activeWorkout;
  if (!w) { navigate('workout'); return ''; }
  const session = PROGRAMS[w.programId].sessions.find(s => s.id === w.sessionId);
  // Compteur global de séries faites
  const totalSets = w.exercises.reduce((a,e)=>a+e.sets.length,0);
  const doneSets = w.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);

  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="abortSession()">${iconBack()}</button>
        <button class="session-timer-pill ${w.runningSince?'running':'paused'}" onclick="toggleSessionTimer()" aria-label="Pause / reprendre chrono">
          ${w.runningSince ? '<span class="pulse-dot"></span>' : iconPlay()}
          <span id="sessionTimer">${formatElapsed(activeWorkoutElapsedMs())}</span>
        </button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">${session.name}</h1>
      <div class="row-between" style="margin-top:8px;">
        <div class="t-caption">${w.exercises.length} exercice${w.exercises.length>1?'s':''}${!w.runningSince?' · chrono en pause':''}</div>
        <div class="t-caption"><span class="t-mono-sm" style="color:var(--sage-deep);">${doneSets}</span><span class="t-mono-sm">/${totalSets}</span> séries</div>
      </div>
    </div>

    ${w.exercises.map((ex, i) => {
      const def = EXERCISES.find(e => e.id === ex.exerciseId);
      const target = ex.target || session.exercises[i] || { sets: ex.sets.length, reps: '8-12', rest: 75 };
      const editing = state._editingTarget === i;
      const customName = ex.customName;
      return `
        <div class="card">
          <div class="row-between mb-16">
            <div class="row gap-16" style="flex:1; min-width: 0;">
              <div class="list-item-icon" style="width:36px; height:36px; border-radius:12px; font-family: var(--font-mono); font-size: 13px; font-weight: 700;">${i+1}</div>
              <div style="flex:1; min-width: 0;">
                <div class="t-body" style="font-weight: 600;">${customName || def?.name || ex.exerciseId}${ex.custom?' <span class="t-legend" style="color:var(--sage-deep);">perso</span>':''}</div>
                <div class="t-caption">
                  ${editing ? '' : `${target.sets} séries · ${target.reps} reps · repos ${target.rest}s`}
                </div>
              </div>
            </div>
            <div class="row gap-8">
              <button class="btn-icon" onclick="toggleEditTarget(${i})" aria-label="Modifier cibles">${editing?iconCheck():iconEdit()}</button>
              ${!ex.custom ? `<button class="btn-icon" onclick="navigate('exercise-detail', { id: '${ex.exerciseId}' })">${iconInfo()}</button>` : `<button class="btn-icon" onclick="removeExerciseFromSession(${i})">${iconClose()}</button>`}
            </div>
          </div>

          ${editing ? `
            <div class="target-editor">
              <div class="row gap-8">
                <div class="input-group" style="flex:1; margin-bottom:0;">
                  <label class="input-label">Reps cible</label>
                  <input type="text" class="input" value="${target.reps}" oninput="updateTarget(${i},'reps',this.value)" style="height:44px;">
                </div>
                <div class="input-group" style="flex:1; margin-bottom:0;">
                  <label class="input-label">Repos (s)</label>
                  <input type="text" class="input" value="${target.rest}" inputmode="numeric" oninput="updateTarget(${i},'rest',parseInt(this.value)||0)" style="height:44px;">
                </div>
              </div>
              <div class="row gap-8 mt-16">
                <button class="btn-small" style="flex:1; background:var(--cloud);" onclick="addSetTo(${i})">+ Série</button>
                ${ex.sets.length > 1 ? `<button class="btn-small" style="flex:1; background:var(--cloud);" onclick="removeSetFrom(${i})">− Série</button>` : ''}
              </div>
            </div>
          ` : ''}

          <div class="set-headers">
            <div>#</div><div>Charge</div><div>Reps</div><div></div>
          </div>
          ${ex.sets.map((s, si) => `
            <div class="set-row ${s.done?'done':''}" id="set-${i}-${si}">
              <span class="set-num">${si+1}</span>
              <input class="set-input" inputmode="decimal" value="${s.kg}" placeholder="${weightUnit()}" oninput="updateSet(${i},${si},'kg',this.value)">
              <input class="set-input" inputmode="numeric" value="${s.reps}" placeholder="reps" oninput="updateSet(${i},${si},'reps',this.value)">
              <button class="set-check" onclick="toggleSetDone(${i},${si})">${iconCheck()}</button>
            </div>
          `).join('')}

          ${target.rest > 0 ? `
            <button class="rest-trigger" onclick="startRestTimer(${target.rest})" aria-label="Démarrer minuteur repos">
              ${iconClock()} <span>Repos ${target.rest}s</span>
            </button>
          ` : ''}
        </div>
      `;
    }).join('')}

    <div class="card add-exo-card" onclick="openAddExoToSession()">
      <div class="row gap-16" style="align-items:center;">
        <div class="list-item-icon" style="background:var(--bone); border:1px dashed var(--sage); color:var(--sage-deep);">${iconPlus()}</div>
        <div style="flex:1;">
          <div class="t-body" style="font-weight:500; color:var(--sage-deep);">Ajouter un exercice</div>
          <div class="t-caption">Choisis dans le catalogue ou crée-en un</div>
        </div>
      </div>
    </div>

    <div style="height: 140px;"></div>

    <div class="action-bar no-tabbar">
      <button class="btn btn-primary" onclick="finishSession()">Séance terminée · ${doneSets}/${totalSets}</button>
    </div>

    <div id="restModal" class="rest-modal" style="display:none;">
      <div class="rest-modal-card">
        <div class="rest-modal-label">Repos</div>
        <div class="rest-modal-time" id="restTime">00:00</div>
        <div class="rest-modal-actions">
          <button class="btn-small" style="background:var(--cloud);" onclick="restAddTime(-15)">−15s</button>
          <button class="btn-small" style="background:var(--cloud);" onclick="restAddTime(15)">+15s</button>
          <button class="btn-small" style="background:var(--crimson); color:var(--bone);" onclick="stopRestTimer()">Stop</button>
        </div>
      </div>
    </div>
  `;
}

function toggleEditTarget(idx) {
  state._editingTarget = state._editingTarget === idx ? null : idx;
  render();
}

function updateTarget(idx, field, value) {
  const ex = state._activeWorkout.exercises[idx];
  if (!ex.target) {
    const session = PROGRAMS[state._activeWorkout.programId].sessions.find(s=>s.id===state._activeWorkout.sessionId);
    ex.target = { ...(session.exercises[idx] || { sets: ex.sets.length, reps: '8-12', rest: 75 }) };
  }
  ex.target[field] = value;
}

function addSetTo(idx) {
  state._activeWorkout.exercises[idx].sets.push({ kg: '', reps: '', done: false });
  render();
}

function removeSetFrom(idx) {
  const sets = state._activeWorkout.exercises[idx].sets;
  if (sets.length > 1) sets.pop();
  render();
}

function removeExerciseFromSession(idx) {
  state._activeWorkout.exercises.splice(idx, 1);
  if (state._editingTarget === idx) state._editingTarget = null;
  render();
}

function openAddExoToSession() {
  state._addExoOpen = true;
  state._addExoQuery = '';
  state._addExoCustom = false;
  navigate('add-exo-to-session');
}

function renderAddExoToSession() {
  if (!state._activeWorkout) { navigate('workout'); return ''; }
  const q = state._addExoQuery || '';
  const isCustom = state._addExoCustom;

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('workout-session')">${iconBack()}</button><div></div></div>
      <h1 class="t-h1" style="margin-top: 8px;">Ajouter un exercice</h1>
      <div class="t-caption">À cette séance uniquement</div>

// MINUTEUR DE REPOS
// ============================================================
function startRestTimer(seconds) {
  state._rest = { remaining: seconds, total: seconds, startAt: Date.now() };
  showRestModal();
  tickRestTimer();
}

function showRestModal() {
  const m = document.getElementById('restModal');
  if (m) m.style.display = 'flex';
}

function hideRestModal() {
  const m = document.getElementById('restModal');
  if (m) m.style.display = 'none';
}

function stopRestTimer() {
  state._rest = null;
  hideRestModal();
}

function restAddTime(delta) {
  if (!state._rest) return;
  state._rest.remaining = Math.max(0, state._rest.remaining + delta);
  state._rest.total = Math.max(state._rest.total, state._rest.remaining);
  updateRestDisplay();
}

function tickRestTimer() {
  if (!state._rest) return;
  const el = document.getElementById('restTime');
  if (!el) { state._rest = null; return; }
  state._rest.remaining = Math.max(0, state._rest.remaining - 1);
  updateRestDisplay();
  if (state._rest.remaining <= 0) {
    // Vibration courte si supportée + son visuel
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    toast('Repos terminé');
    setTimeout(() => stopRestTimer(), 1500);
    return;
  }
  setTimeout(tickRestTimer, 1000);
}

function updateRestDisplay() {
  const el = document.getElementById('restTime');
  if (!el || !state._rest) return;
  const r = state._rest.remaining;
  el.textContent = `${String(Math.floor(r/60)).padStart(2,'0')}:${String(r%60).padStart(2,'0')}`;
  // Couleur selon temps restant
  if (r <= 5) el.style.color = 'var(--crimson)';
  else if (r <= 15) el.style.color = 'var(--terra)';
  else el.style.color = 'var(--stone)';
}

// ============================================================
// HELPERS UNITÉS
// ============================================================
function unitsSystem() {
  return state.settings?.units || 'metric';
}
function isImperial() { return unitsSystem() === 'imperial'; }
function weightUnit() { return isImperial() ? 'lb' : 'kg'; }
function lengthUnit() { return isImperial() ? 'in' : 'cm'; }
function distanceUnit() { return isImperial() ? 'mi' : 'km'; }
function heightUnit() { return isImperial() ? 'ft' : 'cm'; }
// Conversions (jamais stockées convertes ; le storage reste en métrique)
function kgToLb(kg) { return kg * 2.2046226218; }
function lbToKg(lb) { return lb / 2.2046226218; }
function cmToIn(cm) { return cm / 2.54; }
function inToCm(inch) { return inch * 2.54; }
// Affiche un poids stocké (kg) selon l'unité courante
function displayWeight(kg, decimals = 1) {
  if (kg === null || kg === undefined || isNaN(kg)) return '—';
  const v = isImperial() ? kgToLb(kg) : kg;
  return Number(v.toFixed(decimals));
}
function displayLength(cm, decimals = 1) {
  if (cm === null || cm === undefined || isNaN(cm)) return '—';
  const v = isImperial() ? cmToIn(cm) : cm;
  return Number(v.toFixed(decimals));
}
// Convertit une valeur saisie (selon l'unité courante) en métrique pour le stockage
function inputToKg(value) {
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  return isImperial() ? lbToKg(v) : v;
}
function inputToCm(value) {
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  return isImperial() ? inToCm(v) : v;
}
// Affichage de la taille : 175cm en métrique, 5'9" en imperial
function formatHeightDisplay(cm) {
  if (cm === null || cm === undefined || isNaN(cm)) return '—';
  if (!isImperial()) return cm + ' cm';
  const totalIn = cmToIn(cm);
  const ft = Math.floor(totalIn / 12);
  const inch = Math.round(totalIn - ft * 12);
  return ft + "'" + inch + '"';
}

const iconEdit = () => `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3 L15 7 L7 15 L3 15 L3 11 Z"/></svg>`;

function updateSet(exIdx, setIdx, field, value) {
  state._activeWorkout.exercises[exIdx].sets[setIdx][field] = value;
}

function toggleSetDone(exIdx, setIdx) {
  const set = state._activeWorkout.exercises[exIdx].sets[setIdx];
  set.done = !set.done;
  if (set.done && set.kg && set.reps) {
    const exId = state._activeWorkout.exercises[exIdx].exerciseId;
    const isPR = checkPR(exId, set.kg, set.reps);
    if (isPR) toast('Nouveau record sur ' + EXERCISES.find(e=>e.id===exId).name + ' !');
  }
  document.getElementById(`set-${exIdx}-${setIdx}`).classList.toggle('done', set.done);
}

function abortSession() {
  // Pas de confirm() natif (bloqué partout) — on confirme via le bouton retour qui re-clic
  if (state._abortPending) {
    clearTimeout(state._abortTimer);
    state._abortPending = false;
    state._activeWorkout = null;
    navigate('workout');
    return;
  }
  state._abortPending = true;
  toast('Re-clique sur retour pour abandonner');
  state._abortTimer = setTimeout(() => { state._abortPending = false; }, 3000);
}

function activeWorkoutElapsedMs() {
  const w = state._activeWorkout;
  if (!w) return 0;
  let total = w.elapsedMs || 0;
  if (w.runningSince) total += Date.now() - w.runningSince;
  return total;
}

function formatElapsed(ms) {
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function toggleSessionTimer() {
  const w = state._activeWorkout;
  if (!w) return;
  if (w.runningSince) {
    // Pause
    w.elapsedMs = (w.elapsedMs || 0) + (Date.now() - w.runningSince);
    w.runningSince = null;
  } else {
    // Reprise
    w.runningSince = Date.now();
  }
  render();
}

function finishSession() {
  const w = state._activeWorkout;
  if (!w) return;
  // Stop chrono si encore actif
  if (w.runningSince) {
    w.elapsedMs = (w.elapsedMs || 0) + (Date.now() - w.runningSince);
    w.runningSince = null;
  }
  w.duration = Math.round((w.elapsedMs || 0) / 60000);
  w.type = 'strength';
  // Filtre les sets non remplis
  w.exercises.forEach(ex => {
    ex.sets = ex.sets.filter(s => s.kg || s.reps || s.done);
  });
  state.workouts.push(w);
  state._activeWorkout = null;
  saveState();
  const newBadges = checkAllBadges();
  if (newBadges.length > 0) {
    toast(`Séance enregistrée · Nouveau badge : ${newBadges[0].label}`);
  } else {
    toast('Séance enregistrée. Bravo !');
  }
  navigate('workout');
}

function deleteWorkout(id) {
  // Premier clic : on demande confirmation visuelle
  if (state._deleteConfirm !== id) {
    state._deleteConfirm = id;
    render();
    // Reset auto au bout de 4 secondes si pas de second clic
    clearTimeout(state._deleteConfirmTimer);
    state._deleteConfirmTimer = setTimeout(() => {
      if (state._deleteConfirm === id) {
        state._deleteConfirm = null;
        render();
      }
    }, 4000);
    return;
  }
  // Deuxième clic : on supprime
  state._deleteConfirm = null;
  clearTimeout(state._deleteConfirmTimer);
  state.workouts = state.workouts.filter(w => w.id !== id);
  // Recalculer les PRs depuis les séances restantes
  state.prs = {};
  state.workouts.forEach(w => {
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => {
        const kg = parseFloat(s.kg), reps = parseInt(s.reps);
        if (kg && reps && s.done) {
          const vol = kg * reps;
          const cur = state.prs[ex.exerciseId];
          if (!cur || vol > cur.volumeKg) {
            state.prs[ex.exerciseId] = { volumeKg: vol, kg, reps, date: w.date };
          }
        }
      });
    });
  });
  saveState();
  toast('Séance supprimée');
  render();
}

      </div>
    </div>

    <div style="height: 100px;"></div>
  `;
}

function scoreLabel(s) {
  if (s >= 90) return 'excellent';
  if (s >= 80) return 'très bon';
  if (s >= 65) return 'correct';
  if (s >= 45) return 'à ajuster';
  return 'écart important';
}

function slotLabel(slot) {
  return { breakfast:'Petit-déj', lunch:'Déjeuner', dinner:'Dîner', snack:'Collation', snack2:'Collation', other:'Autre' }[slot] || slot || 'Repas';
}

function renderTodayPlanCards(dayPlan, todayMeals) {
  if (!dayPlan) return '';
  const slots = [
    { key: 'breakfast', label: 'Petit-déj' },
    { key: 'lunch', label: 'Déjeuner' },
    { key: 'dinner', label: 'Dîner' },
    { key: 'snack', label: 'Collation' }
  ];
  if (dayPlan.snack2) slots.push({ key: 'snack2', label: 'Collation 2' });
  return slots.map(s => {
    const r = dayPlan[s.key];
    if (!r) return '';
    const portion = dayPlan.portions?.[s.key] || 1;
    const kcalAdj = Math.round((r.kcal||0) * portion);
    const validated = todayMeals.some(m => m.recipeId === r.id && m.slot === s.key);
    return `
      <div class="card plan-meal-card ${validated?'validated':''}">
        <div class="row gap-12">
          <div style="flex:1; min-width:0;">
            <div class="t-caption">${s.label} · ${kcalAdj} kcal${portion!==1?` (×${portion})`:''}</div>
            <div class="t-body" style="font-weight:500;">${escapeHtml(r.name)}</div>
            <div class="t-caption mt-8">${r.time||0} min · ${Math.round(r.p*portion)}g P</div>
          </div>
          ${validated
            ? `<div class="meal-validated">${iconCheck(16)}</div>`
            : `<button class="btn-small btn-primary-mini" onclick="onValidateMeal('${r.id}','${s.key}',${portion})">Mangé</button>`}
        </div>
        <div class="row gap-8 mt-8">
          <button class="btn-tertiary" style="font-size:12px;" onclick="navigate('recipe-detail-${r.id}')">Recette →</button>
        </div>
      </div>
    `;
  }).join('');
}

function onValidateMeal(recipeId, slot, portion) {
  const r = RECIPES.find(x => x.id === recipeId);
  if (!r) return toast('Recette introuvable');
  const result = validateMealFromPlan(r, slot, portion);
  if (result.error) return toast(result.error);
  const stockHits = (result.consumed || []).filter(c => c.hadInStock).length;
  toast(`Repas validé · ${stockHits} ingrédients retirés du frigo`);
  render();
}

function deleteMeal(id) {
  state.meals = state.meals.filter(m => m.id !== id);
  saveState();
  render();
}

let _currentPlan = null;
function regeneratePlan() {
  _currentPlan = generateMealPlan();
  toast('Nouveau plan généré');
  render();
}

function renderMealPlan() {
  if (!_currentPlan) _currentPlan = generateMealPlan();
  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('nutrition')">${iconBack()}</button>
      <button class="btn-icon" onclick="regeneratePlan()">${iconRefresh()}</button></div>
      <h1 class="t-h1" style="margin-top: 8px;">Plan 7 jours</h1>
      <div class="t-caption">Adapté à ton planning sportif</div>
    </div>
    ${_currentPlan.map(d => {
      const slots = d.snack2 ? ['breakfast','lunch','snack','dinner','snack2'] : ['breakfast','lunch','dinner','snack'];
      const totalKcal = slots.reduce((sum, s) => sum + (d[s]?.kcal || 0), 0);
      return `
        <div class="card">
          <div class="row-between mb-16">
            <div>
              <div class="t-h3">${d.day} ${fmtDate(d.date)}</div>
              <div class="t-caption mt-8">${totalKcal} kcal · ${d.plannedBurn > 0 ? `effort prévu : <span style="color:var(--terra);">+${d.plannedBurn} kcal</span>` : 'jour de repos'}</div>
            </div>
          </div>
          ${slots.map(slot => {
            const r = d[slot];
            if (!r) return '';
            const slotName = { breakfast:'Petit-déj', lunch:'Déjeuner', dinner:'Dîner', snack:'Collation', snack2:'Collation pré/post-effort' }[slot];
            return `
              <div class="list-item" onclick="navigate('recipe-detail', { id: '${r.id}', slot: '${slotName}', date: '${d.date}' })" style="cursor:pointer;">
                <div class="list-item-icon">${iconBowl()}</div>
                <div class="list-item-content">
                  <div class="list-item-title">${r.name}</div>
                  <div class="list-item-sub">${slotName} · ${r.kcal} kcal · ${r.p}g P</div>
                </div>
                ${iconArrow()}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }).join('')}
    <div style="height: 100px;"></div>
  `;
}

function renderShoppingList() {
  ensureFoodBudget();
  const budget = state.foodBudget;
  const mode = state._shoppingMode || 'plan';
  // Si la liste n'existe pas ou est obsolète, on la régénère
  if (!state._currentShoppingList || state._regenShopping) {
    state._currentShoppingList = generateShoppingListV2(mode, { recipeIds: state._chosenRecipes || [] });
    state._regenShopping = false;
  }
  const list = state._currentShoppingList;
  if (!state.shoppingChecked) state.shoppingChecked = {};

  // Articles ajoutés manuellement (extras)
  const extras = (state.shoppingExtras || []).map(e => ({
    name: e.name, qty: e.qty || 1, unit: e.unit || 'pièce',
    cost: estimateCost(e.name, e.qty || 1, e.unit || 'pièce'),
    extraId: e.id, isExtra: true
  }));
  const allItems = [...list.items, ...extras];
  // Calcul total avec extras
  const totalCost = list.totalCost + extras.reduce((s, x) => s + x.cost, 0);
  const overBudget = totalCost > budget.amount;
  const checkedCount = Object.values(state.shoppingChecked).filter(Boolean).length;

  // Groupe par catégorie pour affichage
  const grouped = {};
  allItems.forEach(it => {
    const cat = it.cat || guessCategory(it.name) || 'divers';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(it);
  });
  const CAT_ORDER = ['viande','poisson','oeuf','lait','feculents','legumes','fruits','oleagineux','condiments','epices','sucre','divers'];
  const CAT_LABELS = { viande:'Viandes', poisson:'Poissons', oeuf:'Œufs', lait:'Produits laitiers', feculents:'Féculents', legumes:'Légumes & herbes', fruits:'Fruits', oleagineux:'Oléagineux & graines', condiments:'Huiles & condiments', epices:'Épices', sucre:'Sucré', divers:'Divers' };
  const catKeys = CAT_ORDER.filter(k => grouped[k]);

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('nutrition')">${iconBack()}</button>
        <button class="btn-icon" onclick="state._regenShopping=true; render();" aria-label="Régénérer">${iconRefresh()}</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Liste de courses</h1>
      <div class="t-caption">${list.recipeCount} recette${list.recipeCount>1?'s':''} · ${list.days} jour${list.days>1?'s':''} · ${allItems.length} article${allItems.length>1?'s':''}</div>
    </div>

    ${renderBudgetWidget(totalCost, budget, overBudget)}

    <div class="row gap-8 mb-16" style="flex-wrap: wrap;">
      <button class="chip ${mode==='plan'?'active':''}" onclick="setShoppingMode('plan')">${iconList(14)} Plan IA</button>
      <button class="chip ${mode==='likes'?'active':''}" onclick="setShoppingMode('likes')">${iconHeart(14)} Likes prio</button>
      <button class="chip ${mode==='recipes'?'active':''}" onclick="setShoppingMode('recipes')">${iconBowl(14)} Recettes choisies</button>
    </div>

    ${mode === 'recipes' && (state._chosenRecipes||[]).length === 0 ? `
      <div class="card" style="background:var(--sage-pale);">
        <p class="t-body t-graphite mb-16" style="line-height:1.5;">Choisis les recettes que tu veux faire cette semaine, puis l'app te génère la liste exacte des courses.</p>
        <button class="btn btn-primary" onclick="navigate('recipe-picker')">Choisir mes recettes</button>
      </div>
    ` : ''}

    ${mode === 'recipes' && (state._chosenRecipes||[]).length > 0 ? `
      <div class="row-between mb-16" style="padding: 0 4px;">
        <div class="t-caption"><span class="t-mono-sm">${state._chosenRecipes.length}</span> recette${state._chosenRecipes.length>1?'s':''} sélectionnée${state._chosenRecipes.length>1?'s':''}</div>
        <button class="btn-tertiary" style="font-size:13px;" onclick="navigate('recipe-picker')">Modifier →</button>
      </div>
    ` : ''}

    <div class="card" style="padding: 16px;">
      <div class="t-caption mb-8" style="font-weight:500;">Ajouter à la liste</div>
      <div class="row gap-8">
        <input type="text" class="input" id="extraInput" placeholder="ex : tomates cerises" style="height: 44px;" onkeydown="if(event.key==='Enter')addShoppingExtra()">
        <button class="btn-icon" style="background: var(--sage); color: var(--bone); width: 44px; height: 44px;" onclick="addShoppingExtra()">${iconPlus()}</button>
      </div>
    </div>

    ${allItems.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">${iconBowl(40)}</div>
        <div class="empty-title">Liste vide</div>
        <div class="empty-sub">Ajoute des articles ci-dessus, ou tu as déjà tout ce qu'il faut au frigo.</div>
      </div>
    ` : catKeys.map(cat => `
      <div class="shopping-section">
        <div class="shopping-section-title">${CAT_LABELS[cat]}</div>
        ${grouped[cat].map((it, i) => {
          const key = it.name.toLowerCase();
          const checked = state.shoppingChecked[key];
          const priceInfo = it.priceInfo || lookupIngredientPrice(it.name);
          const priceTag = it.cost > 0 ? `${it.cost.toFixed(2)} €` : '';
          const estimateLabel = priceInfo?.estimated ? ' • estimé' : '';
          return `
            <div class="shopping-item ${checked?'checked':''}">
              <div class="shopping-checkbox" onclick="toggleShoppingV2('${key}')">${iconCheck()}</div>
              <div class="shopping-name" onclick="toggleShoppingV2('${key}')">
                <div>${it.name}${it.isExtra?' <span class="t-legend" style="color:var(--sage-deep); margin-left:4px;">ajouté</span>':''}</div>
                <div class="shopping-name-sub">${it.qty ? `${formatQty(it.qty)} ${it.unit||''}` : ''} ${priceTag ? `· ${priceTag}${estimateLabel}` : ''}</div>
              </div>
              ${it.isExtra ? `<button class="btn-icon" style="width:32px; height:32px; margin-left:4px;" onclick="removeShoppingExtra('${it.extraId}')">${iconClose()}</button>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `).join('')}

    ${checkedCount > 0 ? `
      <div class="action-bar">
        <button class="btn btn-primary" onclick="finalizeShoppingList()">Valider ${checkedCount} article${checkedCount>1?'s':''} acheté${checkedCount>1?'s':''} → frigo</button>
      </div>
    ` : ''}

    <div style="height: 140px;"></div>
  `;
}

function formatQty(qty) {
  if (qty >= 1000) return (qty/1000).toFixed(1) + 'k';
  if (qty >= 100) return Math.round(qty);
  if (qty >= 10) return qty.toFixed(0);
  return Math.round(qty * 10) / 10;
}

function renderBudgetWidget(totalCost, budget, overBudget) {
  const ratio = budget.amount > 0 ? Math.min(1, totalCost / budget.amount) : 0;
  return `
    <div class="budget-widget ${overBudget?'over':''}">
      <div class="row-between mb-8">
        <div class="t-caption" style="font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--mist);">Budget ${budget.durationDays}j</div>
        <button class="btn-tertiary" style="font-size:12px; padding: 0;" onclick="navigate('budget-settings')">Modifier →</button>
      </div>
      <div class="row" style="align-items:baseline; gap:6px;">
        <div class="t-mono-xl">${totalCost.toFixed(2)}</div>
        <div class="t-caption">€</div>
        <div style="flex:1;"></div>
        <div class="t-caption">/ <span class="t-mono-sm">${budget.amount.toFixed(0)}</span> €</div>
      </div>
      <div class="budget-bar">
        <div class="budget-bar-fill" style="width:${ratio*100}%;"></div>
      </div>
      ${overBudget ? `<div class="budget-warning">+${(totalCost - budget.amount).toFixed(2)} € au-dessus du budget</div>` : `<div class="t-caption mt-8">${(budget.amount - totalCost).toFixed(2)} € restants</div>`}
    </div>
  `;
}

function setShoppingMode(mode) {
  state._shoppingMode = mode;
  state._regenShopping = true;
  render();
}

function toggleShoppingV2(key) {
  if (!state.shoppingChecked) state.shoppingChecked = {};
  state.shoppingChecked[key] = !state.shoppingChecked[key];
  saveState();
  render();
}

function finalizeShoppingList() {
  const checkedKeys = Object.keys(state.shoppingChecked || {}).filter(k => state.shoppingChecked[k]);
  if (checkedKeys.length === 0) return toast('Aucun article coché');
  // Récupère les items concernés et les passe au frigo
  const allItems = [
    ...(state._currentShoppingList?.items || []),
    ...((state.shoppingExtras || []).map(e => ({ name: e.name, isExtra: true, extraId: e.id })))
  ];
  let added = 0;
  checkedKeys.forEach(k => {
    const item = allItems.find(it => it.name.toLowerCase() === k);
    if (item) {
      // Évite doublons
      if (!state.pantry.some(p => p.name.toLowerCase() === item.name.toLowerCase())) {
        state.pantry.push({
          id: 'p_' + Math.random().toString(36).slice(2, 10),
          name: item.name,
          addedAt: Date.now(),
          fromShopping: true
        });
        added++;
      }
      // Si c'est un extra, on le retire des extras
      if (item.isExtra) {
        state.shoppingExtras = (state.shoppingExtras || []).filter(e => e.id !== item.extraId);
      }
    }
  });
  // Retire les items de la liste
  if (state._currentShoppingList) {
    state._currentShoppingList.items = state._currentShoppingList.items.filter(
      it => !checkedKeys.includes(it.name.toLowerCase())
    );
  }
  state.shoppingChecked = {};
  saveState();
  toast(`${added} article${added>1?'s':''} ajouté${added>1?'s':''} au frigo`);
  render();
}

function addShoppingExtra() {
  const input = document.getElementById('extraInput');
  const name = input.value.trim();
  if (!name) return toast('Tape un nom d\'article');
  if (!state.shoppingExtras) state.shoppingExtras = [];
  state.shoppingExtras.push({ id: uid(), name, addedAt: Date.now() });
  saveState();
  input.value = '';
  toast('Ajouté à la liste');
  render();
}

function removeShoppingExtra(id) {
  state.shoppingExtras = (state.shoppingExtras || []).filter(e => e.id !== id);
  saveState();
  render();
}

// MON FRIGO (PANTRY)
// ============================================================
function renderPantry() {
  if (!state.pantry) state.pantry = [];
  const items = state.pantry;
  const grouped = {};
  items.forEach(it => {
    const cat = categorizeFood(it.name);
    grouped[cat] = grouped[cat] || [];
    grouped[cat].push(it);
  });

  const matchable = matchableRecipes(items, 2);

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button><div></div></div>
      <h1 class="t-h1" style="margin-top: 8px;">Mon frigo</h1>
      <div class="t-caption">${items.length} ingrédient${items.length>1?'s':''} disponible${items.length>1?'s':''}</div>
    </div>

    <div class="card" style="padding: 16px;">
      <div class="t-caption mb-8" style="font-weight:500;">Qu'as-tu dans ton frigo ou ton placard ?</div>
      <div class="row gap-8">
        <input type="text" class="input" id="pantryInput" placeholder="ex : poulet, riz, courgettes…" style="height: 44px;" onkeydown="if(event.key==='Enter')addPantryItem()">
        <button class="btn-icon" style="background: var(--sage); color: var(--bone); width: 44px; height: 44px;" onclick="addPantryItem()">${iconPlus()}</button>
      </div>
      ${items.length > 0 ? `<div class="t-caption mt-16">Tu peux aussi taper plusieurs ingrédients séparés par des virgules.</div>` : `
        <div class="t-caption mt-16">Une fois rempli, je te proposerai des recettes faisables avec ce que tu as.</div>
      `}
    </div>

    ${items.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">${iconFridge(40)}</div>
        <div class="empty-title">Frigo vide</div>
        <div class="empty-sub">Commence par ajouter ce que tu as déjà chez toi pour découvrir les recettes possibles.</div>
      </div>
    ` : ''}

    ${Object.entries(grouped).map(([cat, list]) => `
      <div class="shopping-section">
        <div class="shopping-section-title">${cat}</div>
        ${list.map(it => `
          <div class="shopping-item">
            <div class="shopping-checkbox" style="background: var(--sage); border-color: var(--sage); color: var(--bone);">${iconCheck()}</div>
            <div class="shopping-name">${it.name}</div>
            <button class="btn-icon" style="width:32px; height:32px;" onclick="removePantryItem('${it.id}')">${iconClose()}</button>
          </div>
        `).join('')}
      </div>
    `).join('')}

    ${matchable.length > 0 ? `
      <div class="card" style="background: var(--sage-pale);">
        <div class="card-title" style="color: var(--sage-deep);">${iconSparkle()} ${matchable.length} recettes possibles avec ce que tu as</div>
        <button class="btn btn-primary" onclick="navigate('recipe-suggestions')">Voir les recettes</button>
      </div>
    ` : ''}

    <div style="height: 100px;"></div>
  `;
}

function addPantryItem() {
  const input = document.getElementById('pantryInput');
  const raw = input.value.trim();
  if (!raw) return toast('Tape un ingrédient');
  // Support multi-saisie : virgules
  const names = raw.split(/[,;]/).map(s => s.trim()).filter(Boolean);
  if (!state.pantry) state.pantry = [];
  let added = 0;
  names.forEach(name => {
    // Évite les doublons exacts (insensibles à la casse)
    if (!state.pantry.some(p => normalizeFood(p.name) === normalizeFood(name))) {
      state.pantry.push({ id: uid(), name, addedAt: Date.now() });
      added++;
    }
  });
  saveState();
  input.value = '';
  if (added === 0) toast('Déjà dans ton frigo');
  else toast(added > 1 ? `${added} ingrédients ajoutés` : 'Ajouté au frigo');
  render();
}

function removePantryItem(id) {
  state.pantry = (state.pantry || []).filter(p => p.id !== id);
  saveState();
  render();
}

// RECETTES POSSIBLES (matching)
// ============================================================
function renderRecipeSuggestions() {
  const items = state.pantry || [];
  const prefs = state.foodPrefs || { likes: [], dislikes: [], allergies: [], diet: null };
  if (items.length === 0) {
    return `
      <div class="screen-header">
        <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button><div></div></div>
        <h1 class="t-h1" style="margin-top: 8px;">Recettes possibles</h1>
      </div>
      <div class="empty">
        <div class="empty-icon">${iconBowl(40)}</div>
        <div class="empty-title">Frigo vide</div>
        <div class="empty-sub">Ajoute d'abord des ingrédients dans ton frigo pour que je te propose des recettes.</div>
      </div>
      <button class="btn btn-primary" onclick="navigate('pantry')">Remplir mon frigo</button>
    `;
  }

  // Match avec les ingrédients du frigo, puis filtre prefs
  const matches = matchableRecipes(items, 1).filter(m => isRecipeCompatibleWithPrefs(m.recipe, prefs));
  const filter = state._suggestFilter || 'all';
  let filtered = matches;
  if (filter === 'ready') filtered = matches.filter(m => m.missing.length === 0);
  if (filter === 'almost') filtered = matches.filter(m => m.missing.length > 0 && m.missing.length <= 3);

  // Bonus : si l'utilisateur a des likes, on remonte les recettes contenant des likes en haut
  if (prefs.likes && prefs.likes.length > 0) {
    filtered.sort((a, b) => {
      const aTxt = (a.recipe.ingredients || []).map(i => i.name || i).join(' ').toLowerCase();
      const bTxt = (b.recipe.ingredients || []).map(i => i.name || i).join(' ').toLowerCase();
      const aHits = prefs.likes.filter(l => aTxt.includes(l.toLowerCase())).length;
      const bHits = prefs.likes.filter(l => bTxt.includes(l.toLowerCase())).length;
      if (bHits !== aHits) return bHits - aHits;
      return a.missing.length - b.missing.length;
    });
  }

  const hasPrefs = prefs.diet || (prefs.dislikes||[]).length > 0 || (prefs.allergies||[]).length > 0 || (prefs.likes||[]).length > 0;

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button>
        <button class="btn-icon" onclick="navigate('pantry')">${iconFridge()}</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Recettes possibles</h1>
      <div class="t-caption">À partir de ${items.length} ingrédient${items.length>1?'s':''} de ton frigo${hasPrefs?', selon tes préférences':''}</div>
    </div>

    ${hasPrefs ? `
      <div class="card" style="background: var(--sage-pale); padding: 12px 16px; margin-bottom: 16px;">
        <div class="t-caption" style="line-height:1.5;">
          ${prefs.diet ? `Régime : <strong>${prefs.diet}</strong> · ` : ''}
          ${(prefs.likes||[]).length > 0 ? `<strong>${prefs.likes.length}</strong> aimés · ` : ''}
          ${(prefs.dislikes||[]).length > 0 ? `<strong>${prefs.dislikes.length}</strong> détestés · ` : ''}
          ${(prefs.allergies||[]).length > 0 ? `<strong>${prefs.allergies.length}</strong> allergies` : ''}
        </div>
        <button class="btn-tertiary" style="font-size:12px; padding: 0; margin-top: 4px;" onclick="navigate('food-prefs')">Modifier mes préférences →</button>
      </div>
    ` : ''}

    <div class="row gap-8 mb-16">
      <button class="chip ${filter==='all'?'active':''}" onclick="setSuggestFilter('all')">Toutes (${matches.length})</button>
      <button class="chip ${filter==='ready'?'active':''}" onclick="setSuggestFilter('ready')">Prêtes (${matches.filter(m=>m.missing.length===0).length})</button>
      <button class="chip ${filter==='almost'?'active':''}" onclick="setSuggestFilter('almost')">Presque (${matches.filter(m=>m.missing.length>0&&m.missing.length<=3).length})</button>
    </div>

    ${filtered.length === 0 ? `
      <div class="empty">

function renderMeasureKinetics() {
  const goal = state.user?.goal || 'maintenance';
  // Pour chaque champ, déterminer s'il est "tracké" (au moins 1 mesure historique avec valeur)
  const items = [];

  MEASURE_FIELDS.forEach(f => {
    if (f.pair) {
      // On affiche les 2 côtés côte à côte si au moins un a une valeur
      const seriesL = state.measurements.map(m => ({ date: m.date, val: m[f.keyL] })).filter(p => typeof p.val === 'number');
      const seriesR = state.measurements.map(m => ({ date: m.date, val: m[f.keyR] })).filter(p => typeof p.val === 'number');
      if (seriesL.length === 0 && seriesR.length === 0) return;
      items.push(renderPairedMeasure(f, seriesL, seriesR, goal));
    } else {
      const series = state.measurements.map(m => ({ date: m.date, val: m[f.key] })).filter(p => typeof p.val === 'number');
      if (series.length === 0) return;
      items.push(renderSingleMeasure(f, series, goal));
    }
  });

  if (items.length === 0) {
    return `<div class="t-caption">Aucune mensuration enregistrée. Saisis-les pour suivre ta composition corporelle.</div>`;
  }
  return items.join('');
}

// Détermine la sémantique d'une variation pour un champ donné
function trendSemantic(fieldKey, delta, goal) {
  // delta > 0 = augmentation, delta < 0 = diminution
  const muscleGroups = ['arm','forearm','thigh','calf','chest','shoulder','neck'];
  const isMuscle = muscleGroups.includes(fieldKey);
  const fatTracked = ['waist','hips','bf'];
  const isFat = fatTracked.includes(fieldKey);
  // Champs où l'augmentation est TOUJOURS positive
  const alwaysGood = ['water','muscle'];

  if (Math.abs(delta) < 0.05) return 'neutral';

  if (alwaysGood.includes(fieldKey)) {
    return delta > 0 ? 'good' : 'bad';
  }
  if (isFat) {
    if (goal === 'masse') return delta > 0 ? 'mild' : 'good';
    return delta < 0 ? 'good' : 'bad';
  }
  if (isMuscle) {
    if (goal === 'seche') return delta < 0 ? 'mild' : 'good';
    if (goal === 'masse') return delta > 0 ? 'good' : 'bad';
    return 'neutral';
  }
  return 'neutral';
}

function trendColor(sem) {
  // sage (positif), terra (négatif), mist (neutre/léger)
  if (sem === 'good') return 'var(--sage-deep)';
  if (sem === 'bad')  return 'var(--terra)';
  return 'var(--mist)';
}

function trendArrow(delta) {
  if (Math.abs(delta) < 0.05) return iconDash();
  return delta > 0 ? iconUp() : iconDown();
}

function sparkline(series, color) {
  if (series.length === 0) return '';
  const W = 84, H = 32, PAD = 2;
  if (series.length === 1) {
    // Un seul point : ligne plate au centre
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <circle cx="${W/2}" cy="${H/2}" r="2" fill="${color}"/>
    </svg>`;
  }
  const vals = series.map(p => p.val);
  let minY = Math.min(...vals), maxY = Math.max(...vals);
  if (maxY - minY < 0.5) { minY -= 0.5; maxY += 0.5; }
  const xs = series.map((_, i) => PAD + (i / (series.length - 1)) * (W - 2*PAD));
  const ys = vals.map(v => H - PAD - ((v - minY) / (maxY - minY)) * (H - 2*PAD));
  const path = series.map((_, i) => `${i===0?'M':'L'} ${xs[i].toFixed(1)} ${ys[i].toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xs[xs.length-1].toFixed(1)}" cy="${ys[ys.length-1].toFixed(1)}" r="2" fill="${color}"/>
  </svg>`;
}

function renderSingleMeasure(field, series, goal) {
  const isPercent = field.unit === '%';
  const displayUnit = isPercent ? '%' : lengthUnit();
  // Conversion du series pour l'affichage
  const seriesView = isPercent ? series : series.map(p => ({ date: p.date, val: displayLength(p.val) }));
  const last = seriesView[seriesView.length - 1];
  const prev = seriesView.length > 1 ? seriesView[seriesView.length - 2] : null;
  const delta = prev ? last.val - prev.val : 0;
  // Sémantique sur la donnée brute (kg, cm) — peu importe l'unité d'affichage
  const rawDelta = series.length > 1 ? series[series.length-1].val - series[series.length-2].val : 0;
  const sem = prev ? trendSemantic(field.key, rawDelta, goal) : 'neutral';
  const color = trendColor(sem);
  const sign = delta > 0 ? '+' : '';
  const deltaTxt = prev ? `${sign}${delta.toFixed(1)} ${displayUnit}` : 'Premier point';

  return `
    <div class="kinetic-row">
      <div class="kinetic-label">
        <div class="kinetic-name">${field.label}</div>
        <div class="kinetic-meta">${series.length} point${series.length>1?'s':''}</div>
      </div>
      <div class="kinetic-value">
        <span class="t-mono-sm">${last.val}</span>
        <span class="t-caption" style="margin-left:2px;">${displayUnit}</span>
      </div>
      <div class="kinetic-spark">${sparkline(seriesView, color)}</div>
      <div class="kinetic-trend" style="color:${color};">
        ${prev ? trendArrow(delta) : ''}
        <span class="kinetic-delta">${deltaTxt}</span>
      </div>
    </div>
  `;
}

function renderPairedMeasure(field, seriesL, seriesR, goal) {
  const isPercent = field.unit === '%';
  const displayUnit = isPercent ? '%' : lengthUnit();
  const buildSide = (lab, series) => {
    if (series.length === 0) {
      return `
        <div class="kinetic-side">
          <div class="kinetic-side-lab">${lab}</div>
          <div class="kinetic-side-val t-mist">—</div>
        </div>
      `;
    }
    const seriesView = isPercent ? series : series.map(p => ({ date: p.date, val: displayLength(p.val) }));
    const last = seriesView[seriesView.length - 1];
    const prev = seriesView.length > 1 ? seriesView[seriesView.length - 2] : null;
    const delta = prev ? last.val - prev.val : 0;
    const rawDelta = series.length > 1 ? series[series.length-1].val - series[series.length-2].val : 0;
    const sem = prev ? trendSemantic(field.key, rawDelta, goal) : 'neutral';
    const color = trendColor(sem);
    const sign = delta > 0 ? '+' : '';
    return `
      <div class="kinetic-side">
        <div class="kinetic-side-lab">${lab}</div>
        <div class="kinetic-side-val"><span class="t-mono-sm">${last.val}</span><span class="t-caption" style="margin-left:2px;">${displayUnit}</span></div>
        <div class="kinetic-side-spark">${sparkline(seriesView, color)}</div>
        <div class="kinetic-side-trend" style="color:${color};">${prev ? `${trendArrow(delta)}<span>${sign}${delta.toFixed(1)}</span>` : '<span class="t-caption">1er</span>'}</div>
      </div>
    `;
  };
  return `
    <div class="kinetic-row paired">
      <div class="kinetic-name" style="margin-bottom:8px;">${field.label}</div>
      <div class="kinetic-pair">
        ${buildSide('Gauche', seriesL)}
        <div class="kinetic-pair-sep"></div>
        ${buildSide('Droit', seriesR)}
      </div>
    </div>
  `;
}

const iconUp = () => `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8 L6 4 L9 8"/></svg>`;
const iconDown = () => `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4 L6 8 L9 4"/></svg>`;
const iconDash = () => `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6 L9 6"/></svg>`;

function filterByPeriod(weights, days) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - parseInt(days));
  return weights.filter(w => new Date(w.date) >= cutoff);
}

function weightChart(data, target) {
  if (data.length < 2) {
    return `<div class="empty" style="padding:24px;"><div class="empty-sub">${data.length===0?'Pas encore de données.':'Saisis au moins 2 points pour voir la courbe.'}</div></div>`;
  }
  const W = 320, H = 160;
  const conv = isImperial() ? kgToLb : (v=>v);
  const xs = data.map((d,i)=>(i/(data.length-1))*W);
  const ys = data.map(d=>conv(d.kg));
  const targetView = conv(target);
  const minY = Math.min(...ys, targetView) - 1;
  const maxY = Math.max(...ys, targetView) + 1;
  const yScale = v => H - ((v - minY) / (maxY - minY)) * H;
  const path = data.map((d,i)=>`${i===0?'M':'L'} ${xs[i]} ${yScale(conv(d.kg))}`).join(' ');
  const area = path + ` L ${W} ${H} L 0 ${H} Z`;
  const targetY = yScale(targetView);
  return `
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <line class="chart-target" x1="0" y1="${targetY}" x2="${W}" y2="${targetY}"/>
        <path class="chart-area" d="${area}"/>
        <path class="chart-line" d="${path}"/>
        <circle class="chart-dot" cx="${xs[xs.length-1]}" cy="${yScale(ys[ys.length-1])}" r="4"/>
      </svg>
    </div>
  `;
}

function sleepBars(sleep) {
  const dayNames = ['L','M','M','J','V','S','D'];
  const max = Math.max(...sleep.map(s=>s.hours), 9);
  return `
    <div style="display:flex; align-items:flex-end; gap:8px; height:80px;">
      ${sleep.map(s => {
        const d = new Date(s.date);
        const dn = dayNames[(d.getDay()+6)%7];
        const h = (s.hours / max) * 100;
        return `
          <div style="flex:1; display:flex; flex-direction:column; align-items:center;">
            <div style="width:100%; background:var(--sage); border-radius:4px; height:${h}%; min-height:4px;"></div>
            <div class="t-legend mt-8">${dn}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}
