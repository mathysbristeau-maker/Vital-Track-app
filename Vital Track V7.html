    </div>

    <div class="card">
      <div class="row" style="align-items:baseline; gap:8px;">
        <div class="t-mono-xl">${water}</div>
        <div class="t-caption">/ ${target} verres aujourd'hui</div>
      </div>
      <div class="hydra-bar mt-16"><div class="hydra-bar-fill" style="width:${Math.min(100,water/Math.max(1,target)*100)}%;"></div></div>
      <div class="row gap-8 mt-16">
        <button class="btn btn-secondary" style="flex:1;" onclick="logWaterGlass(-1); render();" ${water<=0?'disabled':''}>− Verre</button>
        <button class="btn btn-primary" style="flex:2;" onclick="logWaterGlass(1); render();">+ Verre (250 ml)</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">7 derniers jours</div>
      <div class="row gap-8" style="align-items:flex-end; height:80px;">
        ${last7.map(d => {
          const h = Math.min(80, (d.glasses / Math.max(1,target)) * 80);
          return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
            <div style="flex:1; display:flex; flex-direction:column; justify-content:flex-end; width:100%;">
              <div style="background: var(--sage); height:${h}px; border-radius:4px 4px 0 0;"></div>

            <div class="t-legend">${d.day}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="height: 100px;"></div>
  `;
}

    </div>

    ${items.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">${iconFridge(40)}</div>
        <div class="empty-title">Frigo vide</div>
        <div class="empty-sub">Ajoute ce que tu as déjà chez toi pour qu'on puisse t'aider à cuisiner.</div>
      </div>
    ` : cats.map(cat => `
      <div class="shopping-section">
        <div class="shopping-section-title">${CAT_LABELS[cat]}</div>
        ${grouped[cat].map(it => `
          <div class="stock-item">
            <div style="flex:1; min-width:0;">
              <div class="t-body" style="font-weight:500;">${escapeHtml(it.name)}</div>
              <div class="t-caption">${formatQty(it.qty)} ${it.unit}${it.lastUpdated && (Date.now() - it.lastUpdated < 86400000) ? ' · maj récente' : ''}</div>
            </div>
            <button class="btn-icon" onclick="editStockItem('${it.id}')">${iconEdit()}</button>
            <button class="btn-icon" onclick="removeStockItem('${it.id}')">${iconClose()}</button>
          </div>
        `).join('')}
      </div>
    `).join('')}

    <div style="height: 100px;"></div>
  `;
}

function onPantryNameInput() {
  const v = document.getElementById('pName')?.value || '';
  const sug = document.getElementById('pSuggest');
  if (!sug || v.length < 2) { if (sug) sug.innerHTML = ''; return; }
  const matches = searchFoods(v).slice(0, 5);
  sug.innerHTML = matches.length === 0 ? '' : `
    <div class="suggestions">
      ${matches.map(f => `<div class="suggestion-item" onclick="pickPantrySuggestion('${f.id}')">${escapeHtml(f.name)}</div>`).join('')}
    </div>
  `;
}

function pickPantrySuggestion(foodId) {
  const f = findFoodById(foodId);
  if (!f) return;
  document.getElementById('pName').value = f.name;
  document.getElementById('pQty').value = f.commonGrams || 100;
  document.getElementById('pUnit').value = f.unit || 'g';
  document.getElementById('pSuggest').innerHTML = '';
}

function addPantryV2() {
  const name = document.getElementById('pName')?.value.trim();
  const qty = parseFloat(document.getElementById('pQty')?.value);
  const unit = document.getElementById('pUnit')?.value || 'g';
  if (!name) return toast('Nom requis');
  if (!qty || qty <= 0) return toast('Quantité invalide');
  addToStock(name, qty, unit);
  toast('Ajouté');
  document.getElementById('pName').value = '';
  document.getElementById('pQty').value = '';
  render();
}

function editStockItem(id) {
  const item = (state.pantry || []).find(p => p.id === id);
  if (!item) return;
  const newQty = prompt(`Nouvelle quantité pour ${item.name} (${item.unit}) :`, item.qty);
  if (newQty === null) return;
  const v = parseFloat(newQty);
  if (isNaN(v) || v < 0) return toast('Valeur invalide');
  if (v === 0) {
    state.pantry = state.pantry.filter(p => p.id !== id);
  } else {
    item.qty = v;
    item.lastUpdated = Date.now();
  }
  saveState();
  render();
}


setInterval(() => {
  if (currentView === 'workout-session' && state._activeWorkout && state._activeWorkout.runningSince) {
    const el = document.getElementById('sessionTimer');
    if (el) el.textContent = formatElapsed(activeWorkoutElapsedMs());
  }
  if (currentView === 'cardio-session' && state._activeCardio && state._activeCardio.runningSince) {
    const el = document.getElementById('cardioTimer');
    if (el) {
      const ms = (state._activeCardio.elapsedMs || 0) + (Date.now() - state._activeCardio.runningSince);
      el.textContent = formatElapsed(ms);
    }
  }
}, 1000);

// ============================================================
// DÉMARRAGE
// ============================================================
function boot() {
  if (state.user && state.user.firstName) {
    updateStreak();
    navigate('home');
  } else {
    navigate('welcome');
  }
}


// Heure réelle dans la status bar
function updateClock(){
  const d=new Date();
  document.getElementById('statusTime').textContent = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
updateClock();
setInterval(updateClock,30000);

// Démarrage
boot();
</script>
</body>
</html>
