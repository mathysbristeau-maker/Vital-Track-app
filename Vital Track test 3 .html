<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Vital Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VITAL TRACK — Webapp complète, monofichier, localStorage
   Charte graphique v1.0 strictement respectée
   ============================================================ */
:root {
  --bone:#FAFAF8; --cloud:#F4F5F2; --hairline:#E8E8E5;
  --sage-pale:#E8EFE9; --sage:#8AA89B; --sage-deep:#5C7A6D;
  --stone:#1A1F1C; --graphite:#4A5550; --mist:#8E9893;
  --terra:#D4956A; --crimson:#C5524A;
  --font-display:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
  --font-text:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif;
  --font-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;
  --r-input:8px; --r-button:12px; --r-card:16px; --r-pill:28px;
  --t-micro:150ms; --t-comp:300ms;
  --ease-std:cubic-bezier(0.4,0,0.2,1);
  --ease-out:cubic-bezier(0,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bone);color:var(--stone);font-family:var(--font-text);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{overflow:hidden}
button{font-family:inherit}
input,select,textarea{font-family:inherit}
.app-frame{width:100%;max-width:430px;height:100vh;margin:0 auto;background:var(--bone);position:relative;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--hairline);border-right:1px solid var(--hairline)}
@media(min-width:768px){body{background:var(--cloud);display:flex;align-items:center;justify-content:center}.app-frame{height:min(900px,100vh);max-height:900px;border-radius:32px;border:1px solid var(--hairline);overflow:hidden}}
.status-bar{height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--stone)}
.status-bar .right-icons{display:flex;align-items:center;gap:6px}
.screen-container{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 24px 24px;scrollbar-width:none;animation:fadeIn 300ms var(--ease-out)}
.screen-container::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.t-display{font-family:var(--font-display);font-size:34px;font-weight:700;line-height:1.2;letter-spacing:-0.5px}
.t-h1{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1.2;letter-spacing:-0.3px}
.t-h2{font-family:var(--font-display);font-size:20px;font-weight:600;line-height:1.3}
.t-h3{font-family:var(--font-display);font-size:16px;font-weight:600;line-height:1.3}
.t-body{font-family:var(--font-text);font-size:15px;font-weight:400;line-height:1.4}
.t-caption{font-family:var(--font-text);font-size:12px;font-weight:400;color:var(--mist)}
.t-legend{font-family:var(--font-text);font-size:10px;font-weight:400;color:var(--mist)}
.t-mono-xl{font-family:var(--font-mono);font-size:44px;font-weight:700;line-height:1;letter-spacing:-1px}
.t-mono-lg{font-family:var(--font-mono);font-size:28px;font-weight:700;line-height:1}
.t-mono{font-family:var(--font-mono);font-size:16px;font-weight:600}
.t-mono-sm{font-family:var(--font-mono);font-size:13px;font-weight:500}
.t-graphite{color:var(--graphite)} .t-mist{color:var(--mist)} .t-sage{color:var(--sage-deep)}
.screen-header{padding-top:8px;padding-bottom:24px}
.screen-header .greeting{color:var(--mist);font-size:13px;font-weight:500;margin-bottom:4px}
.card{background:var(--cloud);border-radius:var(--r-card);padding:24px;margin-bottom:16px}
.card.bone{background:var(--bone);border:1px solid var(--hairline)}
.card-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.btn{height:56px;border:none;border-radius:var(--r-pill);font-family:var(--font-display);font-size:17px;font-weight:600;cursor:pointer;transition:all var(--t-micro) var(--ease-std);display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 24px;width:100%}
.btn-primary{background:var(--sage);color:var(--bone)}
.btn-primary:active{background:var(--sage-deep)}
.btn-secondary{background:transparent;color:var(--stone);border:1px solid var(--hairline)}
.btn-tertiary{background:transparent;color:var(--sage-deep);height:auto;padding:8px;border:none;cursor:pointer;font-family:var(--font-display);font-weight:600}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-small{height:36px;font-size:13px;padding:0 16px;border-radius:18px;width:auto;border:none;cursor:pointer;font-family:var(--font-display);font-weight:600}
.btn-icon{width:44px;height:44px;border-radius:22px;display:inline-flex;align-items:center;justify-content:center;background:var(--cloud);border:none;cursor:pointer;color:var(--stone);transition:background var(--t-micro)}
.btn-icon:active{background:var(--hairline)}
.input-group{margin-bottom:16px}
.input-label{display:block;font-size:13px;color:var(--mist);margin-bottom:8px;font-weight:500}
.input{width:100%;height:56px;background:var(--cloud);border:1px solid transparent;border-radius:var(--r-button);padding:0 16px;font-family:var(--font-text);font-size:17px;color:var(--stone);transition:border-color var(--t-micro) var(--ease-std)}
.input:focus{outline:none;border-color:var(--sage)}
select.input{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14' fill='none' stroke='%238E9893' stroke-width='2'><path d='M3 5 L7 9 L11 5'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:40px}
.chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:16px;background:var(--cloud);color:var(--stone);font-family:var(--font-text);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all var(--t-micro) var(--ease-std)}
.chip.active{background:var(--sage-pale);color:var(--sage-deep)}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tab-bar{height:84px;flex-shrink:0;background:var(--bone);border-top:1px solid var(--hairline);display:flex;align-items:flex-start;justify-content:space-around;padding-top:12px;padding-bottom:24px}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--mist);padding:4px 8px;transition:color var(--t-micro) var(--ease-std);flex:1}
.tab-item.active{color:var(--sage-deep)}
.tab-item .tab-label{font-size:11px;font-weight:500}
.tab-item svg{width:24px;height:24px}
.calorie-ring-wrap{display:flex;align-items:center;justify-content:center;margin:8px 0 24px;position:relative}
.ring-svg{transform:rotate(-90deg)}
.ring-track{stroke:var(--sage-pale);fill:none}
.ring-progress{stroke:var(--sage);fill:none;stroke-linecap:round;transition:stroke-dashoffset 800ms var(--ease-out)}
.ring-center{position:absolute;text-align:center;display:flex;flex-direction:column;align-items:center}
.ring-center .num{font-family:var(--font-mono);font-size:44px;font-weight:700;color:var(--stone);line-height:1;letter-spacing:-1px}
.ring-center .unit{font-family:var(--font-text);font-size:13px;color:var(--mist);margin-top:8px}
.ring-center .sub{font-family:var(--font-mono);font-size:13px;color:var(--mist);margin-top:4px}
.macro-row{margin-bottom:16px}
.macro-row:last-child{margin-bottom:0}
.macro-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.macro-name{font-size:13px;color:var(--graphite);font-weight:500}
.macro-vals{font-family:var(--font-mono);font-size:13px;color:var(--stone);font-weight:600}
.macro-vals .total{color:var(--mist);font-weight:500}
.macro-bar{height:6px;background:var(--sage-pale);border-radius:3px;overflow:hidden}
.macro-bar-fill{height:100%;background:var(--sage);border-radius:3px;transition:width 800ms var(--ease-out)}
.list-item{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--hairline)}
.list-item:last-child{border-bottom:none}
.list-item-icon{width:40px;height:40px;border-radius:20px;background:var(--sage-pale);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--sage-deep)}
.list-item-content{flex:1;min-width:0}
.list-item-title{font-size:15px;font-weight:500;color:var(--stone);margin-bottom:2px}
.list-item-sub{font-size:13px;color:var(--mist)}
.list-item-trail{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--graphite)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.week-day{aspect-ratio:1/1.4;background:var(--cloud);border-radius:12px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all var(--t-micro) var(--ease-std);border:1px solid transparent}
.week-day.today{background:var(--sage-pale);border-color:var(--sage)}
.week-day.done{background:var(--sage)}
.week-day.done .week-day-name,.week-day.done .week-day-num{color:var(--bone)}
.week-day-name{font-size:11px;color:var(--mist);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.week-day-num{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--stone);margin-top:4px}
.week-day.today .week-day-name,.week-day.today .week-day-num{color:var(--sage-deep)}
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-tile{background:var(--cloud);border-radius:16px;padding:16px;text-align:left}
.stat-tile-label{font-size:11px;color:var(--mist);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.stat-tile-value{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--stone)}
.stat-tile-unit{font-family:var(--font-mono);font-size:13px;color:var(--mist);font-weight:500;margin-left:2px}
.stat-tile-trend{font-size:11px;color:var(--sage-deep);margin-top:4px;font-weight:500}
.streak-card{background:var(--bone);border:1px solid var(--hairline);border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.streak-icon{width:48px;height:48px;border-radius:24px;background:var(--sage-pale);display:flex;align-items:center;justify-content:center;color:var(--terra);flex-shrink:0}
.streak-content{flex:1}
.streak-num{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--stone);line-height:1}
.streak-label{font-size:13px;color:var(--mist);margin-top:4px}
.chart-wrap{height:180px;position:relative;margin-bottom:16px}
.chart-wrap svg{width:100%;height:100%}
.chart-line{fill:none;stroke:var(--sage);stroke-width:2}
.chart-area{fill:var(--sage-pale);opacity:0.5}
.chart-target{fill:none;stroke:var(--mist);stroke-width:1;stroke-dasharray:4 4}
.chart-dot{fill:var(--sage-deep)}
.period-selector{display:flex;background:var(--cloud);border-radius:12px;padding:4px;margin-bottom:24px}
.period-btn{flex:1;background:none;border:none;padding:8px 4px;font-family:var(--font-text);font-size:13px;font-weight:500;color:var(--mist);border-radius:8px;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.period-btn.active{background:var(--bone);color:var(--stone)}
.exercise-guide{background:var(--cloud);border-radius:16px;padding:24px;margin-bottom:16px}
.exercise-guide h3{font-family:var(--font-display);font-size:20px;font-weight:600;margin-bottom:8px;color:var(--stone)}
.exercise-guide .muscles{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.exercise-guide .muscle-tag{background:var(--sage-pale);color:var(--sage-deep);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500}
.exercise-guide ol{padding-left:20px;margin-bottom:16px}
.exercise-guide ol li{font-size:14px;color:var(--graphite);margin-bottom:8px;line-height:1.5}
.exercise-guide .pro-tip{background:var(--sage-pale);border-radius:12px;padding:16px;margin-top:16px}
.exercise-guide .pro-tip-label{font-size:11px;font-weight:600;color:var(--sage-deep);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.exercise-guide .pro-tip-text{font-size:13px;color:var(--graphite);line-height:1.5}
.chat-input-wrap{display:flex;gap:8px;align-items:center;margin-top:8px}
.chat-input{flex:1;height:48px;background:var(--cloud);border:none;border-radius:24px;padding:0 20px;font-family:var(--font-text);font-size:15px}
.chat-input:focus{outline:none}
.onboarding-screen{display:flex;flex-direction:column;height:100%;padding:16px 24px 24px;animation:fadeIn 300ms var(--ease-out)}
.onboarding-content{flex:1;display:flex;flex-direction:column;justify-content:center}
.onboarding-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--sage),var(--sage-deep));display:flex;align-items:center;justify-content:center;color:var(--bone);margin-bottom:32px}
.onboarding-title{font-family:var(--font-display);font-size:32px;font-weight:700;line-height:1.15;letter-spacing:-0.5px;margin-bottom:16px}
.onboarding-subtitle{font-size:16px;color:var(--mist);line-height:1.5;margin-bottom:32px}
.step-dots{display:flex;gap:6px;margin-bottom:24px}
.step-dot{height:4px;border-radius:2px;background:var(--hairline);flex:1;transition:background var(--t-micro)}
.step-dot.active{background:var(--sage)}
.segment-group{display:grid;gap:8px;margin-bottom:24px}
.segment-option{background:var(--cloud);border:1px solid transparent;border-radius:12px;padding:16px 20px;font-family:var(--font-text);font-size:15px;color:var(--stone);cursor:pointer;text-align:left;transition:all var(--t-micro) var(--ease-std);display:flex;align-items:center;justify-content:space-between}
.segment-option.selected{border-color:var(--sage);background:var(--sage-pale);color:var(--sage-deep)}
.segment-option .check{opacity:0;color:var(--sage-deep);transition:opacity var(--t-micro)}
.segment-option.selected .check{opacity:1}
.recipe-image{height:200px;border-radius:16px;background:linear-gradient(135deg,var(--sage-pale),var(--cloud));margin-bottom:16px;display:flex;align-items:center;justify-content:center;color:var(--sage-deep)}
.recipe-meta{display:flex;gap:24px;margin-bottom:24px}
.recipe-meta-item .label{font-size:11px;color:var(--mist);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.recipe-meta-item .value{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--stone)}
.measure-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--hairline)}
.measure-item:last-child{border-bottom:none}
.measure-name{font-size:15px;color:var(--stone)}
.measure-value{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--graphite)}
.kinetic-row{display:grid;grid-template-columns:1fr auto 96px auto;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--hairline)}
.kinetic-row:last-child{border-bottom:none}
.kinetic-row.paired{display:block;padding:14px 0;border-bottom:1px solid var(--hairline)}
.kinetic-row.paired:last-child{border-bottom:none}
.kinetic-label{display:flex;flex-direction:column;gap:2px;min-width:0}
.kinetic-name{font-size:14px;color:var(--stone);font-weight:500}
.kinetic-meta{font-size:11px;color:var(--mist)}
.kinetic-value{display:flex;align-items:baseline;color:var(--stone)}
.kinetic-spark{width:96px;height:32px;display:flex;align-items:center}
.kinetic-spark .spark{width:100%;height:100%}
.kinetic-trend{display:flex;align-items:center;gap:4px;justify-content:flex-end;min-width:72px}
.kinetic-delta{font-family:var(--font-mono);font-size:12px;font-weight:600;white-space:nowrap}
.kinetic-pair{display:grid;grid-template-columns:1fr 1px 1fr;gap:12px;align-items:stretch}
.kinetic-pair-sep{background:var(--hairline);width:1px}
.kinetic-side{display:flex;flex-direction:column;gap:6px}
.kinetic-side-lab{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);font-weight:500}
.kinetic-side-val{display:flex;align-items:baseline;color:var(--stone)}
.kinetic-side-spark{height:28px;display:flex;align-items:center}
.kinetic-side-spark .spark{width:100%;height:100%}
.kinetic-side-trend{display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:12px;font-weight:600}
.hist-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--hairline)}
.hist-row:last-child{border-bottom:none}
.hist-content{flex:1;min-width:0}
.hist-primary{display:flex;align-items:baseline;color:var(--stone)}
.hist-meta{font-size:12px;color:var(--mist);margin-top:4px}
.btn-icon.pending{background:var(--crimson);color:var(--bone)}
.match-badge{font-family:var(--font-mono);font-size:13px;font-weight:700;padding:6px 10px;border-radius:8px;background:var(--cloud);color:var(--graphite);white-space:nowrap}
.match-badge.ready{background:var(--sage-pale);color:var(--sage-deep)}
.match-badge.almost{background:#FFF4E8;color:var(--terra)}
.match-badge.partial{background:var(--cloud);color:var(--mist)}
.match-bar{height:4px;background:var(--hairline);border-radius:2px;overflow:hidden;margin-top:4px}
.match-bar-fill{height:100%;border-radius:2px;transition:width 600ms var(--ease-out)}
.match-bar-fill.ready{background:var(--sage-deep)}
.match-bar-fill.almost{background:var(--terra)}
.match-bar-fill.partial{background:var(--mist)}
.shopping-item .shopping-name{cursor:pointer}
.session-timer-pill{display:flex;align-items:center;gap:8px;background:var(--sage-pale);color:var(--sage-deep);padding:8px 14px;border-radius:20px;font-family:var(--font-mono);font-size:14px;font-weight:600}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
.target-editor{background:var(--bone);border:1px solid var(--hairline);border-radius:12px;padding:16px;margin-bottom:16px}
.rest-trigger{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:40px;margin-top:12px;background:var(--bone);border:1px dashed var(--sage);border-radius:12px;color:var(--sage-deep);font-family:var(--font-text);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.rest-trigger:active{background:var(--sage-pale)}
.add-exo-card{background:var(--bone);border:1px dashed var(--sage);cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.add-exo-card:active{background:var(--sage-pale)}
.rest-modal{position:absolute;inset:0;background:rgba(26,31,28,0.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;animation:fadeIn 200ms var(--ease-out)}
.rest-modal-card{background:var(--bone);border-radius:24px;padding:40px 24px;text-align:center;width:100%;max-width:320px}
.rest-modal-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--mist);font-weight:600;margin-bottom:12px}
.rest-modal-time{font-family:var(--font-mono);font-size:64px;font-weight:700;color:var(--stone);line-height:1;letter-spacing:-2px;margin-bottom:24px}
.rest-modal-actions{display:flex;gap:8px;justify-content:center}
.session-timer-pill{border:none;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.session-timer-pill.paused{background:var(--cloud);color:var(--graphite)}
.session-timer-pill.paused:active{background:var(--hairline)}
.day-toggle-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day-toggle{padding:14px 4px;border-radius:12px;background:var(--cloud);color:var(--mist);border:1px solid transparent;font-family:var(--font-text);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;transition:all var(--t-micro) var(--ease-std)}
.day-toggle.active{background:var(--sage);color:var(--bone);border-color:var(--sage-deep)}
.sport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.action-bar{position:absolute;bottom:84px;left:0;right:0;padding:16px 24px;background:linear-gradient(to top,var(--bone) 60%,transparent);z-index:10}

.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.col{display:flex;flex-direction:column}
.gap-8{gap:8px} .gap-16{gap:16px}
.mt-8{margin-top:8px} .mt-16{margin-top:16px} .mt-24{margin-top:24px}
.mb-16{margin-bottom:16px} .mb-24{margin-bottom:24px}
.text-right{text-align:right}
#toast{position:absolute;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--stone);color:var(--bone);padding:12px 20px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:all 250ms var(--ease-std);z-index:200;max-width:80%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

function sportType(id) { return SPORT_TYPES.find(s => s.id === id) || SPORT_TYPES[0]; }

// Calcul calories brûlées à partir des MET, durée et poids
function caloriesBurned(sportId, durationMin, weightKg) {
  const s = sportType(sportId);
  if (!s.met) return 0;
  return Math.round((s.met * 3.5 * (weightKg || 75) / 200) * durationMin);
}

    return { ...structuredClone(DEFAULT_STATE), ...parsed };
  } catch (e) {
    console.warn('Storage corrompu, reset', e);
    return structuredClone(DEFAULT_STATE);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Erreur sauvegarde', e);
    toast('Sauvegarde impossible. Mémoire saturée ?');
  }
}

function resetAll() {
  if (confirm('Tout réinitialiser ? Tu perdras toutes tes données.')) {
    localStorage.removeItem(STORAGE_KEY);
    state = structuredClone(DEFAULT_STATE);
    location.reload();
  }
}

const todayISO = () => new Date().toISOString().slice(0, 10);
const fmtDate = (iso) => {

// =============================================================
// CALCULS NUTRITIONNELS (Mifflin-St Jeor)
// =============================================================
function bmr(user) {
  // Mifflin-St Jeor
  const { sex, weight, height, age } = user;
  if (sex === 'homme') return 10 * weight + 6.25 * height - 5 * age + 5;
  return 10 * weight + 6.25 * height - 5 * age - 161;
}

// TDEE de base : couvre l'activité quotidienne hors sport (travail, déplacements,
// vie courante). Le sport est ajouté séparément pour pouvoir refléter ce que tu fais
// vraiment chaque jour, pas une moyenne théorique.
function tdee(user) {
  // 1.35 = vie active légère (debout, marche occasionnelle), c'est la base sans sport.
  // Si tu es sédentaire au bureau toute la journée, c'est plus proche de 1.25.
  // L'effort réel (séance tennis, muscu, etc.) est ajouté via burnedCaloriesOnDate().
  return Math.round(bmr(user) * 1.35);
}

function calorieTarget(user) {
  // Cible "de base" : TDEE corrigé selon l'objectif, sans sport additionnel.
  // C'est le plancher de calories à manger même les jours sans entraînement.
  const t = tdee(user);
  if (user.goal === 'seche') return Math.round(t - 400);
  if (user.goal === 'masse') return Math.round(t + 300);
  return t;
}

function macroTargets(user) {
  // Macros calées sur la cible de base. Quand on entraîne plus, on ajuste les
  // glucides via dynamicMacroTargets() en gardant les protéines stables.
  const cal = calorieTarget(user);
  const p = Math.round(user.weight * 2);
  const l = Math.round((cal * 0.25) / 9);
  const c = Math.round((cal - p * 4 - l * 9) / 4);
  return { kcal: cal, p, c, l };
}

// =============================================================
// CALORIES BRÛLÉES — pour une date donnée
// =============================================================
// Renvoie le total kcal brûlés ce jour à partir des séances enregistrées.
// - Cardio : utilise w.kcalBurned (calculé via MET au save)
// - Musculation : estime ~6 kcal/min × durée (compromis raisonnable)
function burnedCaloriesOnDate(dateISO) {
  const wList = state.workouts.filter(w => w.date === dateISO);
  return wList.reduce((sum, w) => {
    if (typeof w.kcalBurned === 'number') return sum + w.kcalBurned;
    if (w.type === 'strength' || !w.type) {
      const dur = w.duration || 0;
      // Estimation muscu : 5 MET ~= 5 × 3.5 × 75kg / 200 ≈ 6.5 kcal/min pour 75 kg.
      // On scale au poids réel.
      const weight = state.user?.weight || 75;
      return sum + Math.round(5 * 3.5 * weight / 200 * dur);
    }
    return sum;
  }, 0);
}

// Cible calorique dynamique pour une date donnée :
// = cible de base + calories brûlées par les séances de ce jour
function dynamicCalorieTarget(user, dateISO) {
  const base = calorieTarget(user);
  const burned = burnedCaloriesOnDate(dateISO);
  return { base, burned, total: base + burned };
}

// Macros dynamiques : on conserve les protéines (essentielles à la récup),
// on majore les glucides (carburant) à hauteur de l'effort, lipides ajustés
// proportionnellement.
function dynamicMacroTargets(user, dateISO) {
  const baseMacros = macroTargets(user);
  const { burned } = dynamicCalorieTarget(user, dateISO);
  if (burned <= 0) return { ...baseMacros, burned: 0, base: baseMacros.kcal };
  // Répartition de la majoration : 70% glucides, 20% lipides, 10% protéines
  const extraP = Math.round((burned * 0.10) / 4);
  const extraL = Math.round((burned * 0.20) / 9);
  const extraC = Math.round((burned * 0.70) / 4);
  return {
    kcal: baseMacros.kcal + burned,
    p: baseMacros.p + extraP,
    c: baseMacros.c + extraC,
    l: baseMacros.l + extraL,
    burned,
    base: baseMacros.kcal
  };
}

// =============================================================
// CALCULS — JOURNÉE COURANTE
// =============================================================
function todaysMacros() {
  const today = todayISO();
  const meals = state.meals.filter(m => m.date === today);
  return meals.reduce((acc, m) => {
    acc.kcal += m.kcal; acc.p += m.p; acc.c += m.c; acc.l += m.l;
    return acc;
  }, { kcal: 0, p: 0, c: 0, l: 0 });
}

// =============================================================
// STREAK
// =============================================================
function updateStreak() {
  const today = todayISO();
  if (state.lastActiveDate === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const yISO = yesterday.toISOString().slice(0, 10);
  if (state.lastActiveDate === yISO) state.streak += 1;
  else if (state.lastActiveDate !== today) state.streak = 1;
  state.lastActiveDate = today;
  saveState();
}

// =============================================================
// PRs (records personnels) - calcul auto en validant un set
// =============================================================
function checkPR(exerciseId, kg, reps) {
  if (!kg || !reps) return null;
  const volume = kg * reps;
  const cur = state.prs[exerciseId];
  if (!cur || volume > cur.volumeKg) {
    state.prs[exerciseId] = {
      volumeKg: volume, kg: parseFloat(kg), reps: parseInt(reps), date: todayISO()
    };
    saveState();
    return true;
  }
  return false;
}

// =============================================================
// SEMAINE (lundi → dimanche)
// =============================================================
function weekDates(refDate = new Date()) {
  const d = new Date(refDate);
  const dow = (d.getDay() + 6) % 7; // 0=lundi
  d.setDate(d.getDate() - dow);
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(d);
    x.setDate(d.getDate() + i);
    return x.toISOString().slice(0, 10);
  });
}

function workoutsThisWeek() {
  const week = weekDates();
  return state.workouts.filter(w => week.includes(w.date));
}

// =============================================================
// PLAN NUTRITION (pseudo-IA locale)
// =============================================================
// Estime les calories brûlées prévues pour une date donnée, à partir du planning
// hebdomadaire et des séances déjà enregistrées.
function plannedBurnForDate(dateISO) {
  // 1. Si une séance est déjà enregistrée ce jour-là, c'est la donnée la plus fiable
  const recorded = burnedCaloriesOnDate(dateISO);
  if (recorded > 0) return recorded;
  // 2. Sinon, on regarde le planning hebdo
  const plan = state.weekPlan;
  if (!plan) return 0;
  const day = plan.days.find(d => d.date === dateISO);
  if (!day || day.sport === 'rest') return 0;
  const w = state.user?.weight || 75;
  // Musculation : ~5 MET
  if (day.sport === 'strength') {
    return Math.round(5 * 3.5 * w / 200 * (day.duration || 60));
  }
  return caloriesBurned(day.sport, day.duration || 30, w);
}

function generateMealPlan() {
  const u = state.user;
  const breakfasts = RECIPES.filter(r => r.category === 'petit-dej');
  const meals = RECIPES.filter(r => r.category === 'plat');
  const snacks = RECIPES.filter(r => r.category === 'collation');
  // Trier les plats par densité calorique pour pouvoir piocher selon le besoin
  const lightMeals = [...meals].sort((a, b) => a.kcal - b.kcal);
  const heavyMeals = [...meals].sort((a, b) => b.kcal - a.kcal);

  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  const plan = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const date = d.toISOString().slice(0, 10);
    const burn = plannedBurnForDate(date);
    // Stratégie de sélection des plats selon l'effort prévu
    let lunchPool, dinnerPool;
    if (burn >= 500) {
      // Gros effort : on privilégie les plats les plus caloriques (top 50%)
      lunchPool = heavyMeals.slice(0, Math.ceil(meals.length * 0.5));
      dinnerPool = heavyMeals.slice(0, Math.ceil(meals.length * 0.5));
    } else if (burn <= 100) {
      // Repos : plats plus légers (50% les moins caloriques)
      lunchPool = lightMeals.slice(0, Math.ceil(meals.length * 0.5));
      dinnerPool = lightMeals.slice(0, Math.ceil(meals.length * 0.5));
    } else {
      lunchPool = meals;
      dinnerPool = meals;
    }
    // Snack supplémentaire si effort > 400 kcal
    const dayPlan = {
      date,
      day: d.toLocaleDateString('fr-FR', { weekday: 'long' }),
      plannedBurn: burn,
      breakfast: pick(breakfasts),
      lunch: pick(lunchPool),
      dinner: pick(dinnerPool),
      snack: pick(snacks)
    };
    if (burn >= 400) {
      // Ajoute un second snack pour absorber l'extra
      dayPlan.snack2 = pick(snacks.filter(s => s.id !== dayPlan.snack.id) || snacks);
    }
    plan.push(dayPlan);
  }
  return plan;
}

// =============================================================
// NORMALISATION D'INGRÉDIENTS (pour matching)
// =============================================================
function normalizeFood(name) {
  return String(name)
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // retire accents
    .replace(/[()]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Tokens essentiels d'un ingrédient : on ignore les mots accessoires
const FOOD_STOPWORDS = new Set([
  'de','du','des','la','le','les','un','une','et','ou','au','aux','en','a','d',
  'frais','fraiche','fraiches','sec','seche','seches','cru','cuit','cuite',
  'mg','grec','blanc','blanche','rouge','rouges','noir','noire','vert','verte','verts','vertes',
  'allege','allegee','demi','ecreme','ecremee','complet','complete','nature','naturel','naturelle',
  'sauvage','basmati','rond','ronds','sashimi','dosee','dose','poudre','feuille','feuilles',
  '0','5','10','100','150','200','250','500','1','2','3','4','6','7','8','9',
  'g','kg','ml','l','tsp','tbsp','cup','pcs','piece','pieces','gousse','gousses','pincee','pincees',
  'avec','sans','pour','dans','par','en'
]);

function foodTokens(name) {
  return normalizeFood(name)
    .split(/[\s,/'']+/)
    .filter(t => t && t.length > 2 && !FOOD_STOPWORDS.has(t));
}

// Vérifie si un ingrédient de recette est présent dans la pantry
function pantryHas(ingredientName, pantryItems) {
  const ingTokens = foodTokens(ingredientName);
  if (ingTokens.length === 0) return false;
  // Token principal = le plus long (ex. "saumon" dans "Pavé de saumon frais")
  const main = ingTokens.sort((a,b) => b.length - a.length)[0];
  return pantryItems.some(p => {
    const pTokens = foodTokens(p.name);
    return pTokens.includes(main) || pTokens.some(pt => pt.includes(main) || main.includes(pt));
  });
}

// Score une recette en fonction des ingrédients dispo (pantry)
function scoreRecipe(recipe, pantryItems) {
  const total = recipe.ingredients.length;
  if (total === 0) return { score: 0, have: 0, total: 0, missing: [] };
  const have = [];
  const missing = [];
  recipe.ingredients.forEach(ing => {
    if (pantryHas(ing.name, pantryItems)) have.push(ing);
    else missing.push(ing);
  });
  // Ratio + bonus si tout y est
  const ratio = have.length / total;
  let score = ratio * 100;
  if (missing.length === 0) score += 20; // recette complètement faisable
  if (missing.length <= 2 && missing.length > 0) score += 5; // presque
  return { score: Math.round(score), have: have.length, total, missing };
}

function matchableRecipes(pantryItems, minHave = 1) {
  if (pantryItems.length === 0) return [];
  return RECIPES
    .map(r => ({ recipe: r, ...scoreRecipe(r, pantryItems) }))
    .filter(r => r.have >= minHave)
    .sort((a, b) => b.score - a.score);
}

// =============================================================
// CATÉGORISATION
// =============================================================
function categorizeFood(name) {
  const n = normalizeFood(name);
  if (/poulet|dinde|boeuf|porc|jambon|saumon|cabillaud|thon|crevett|saucisse|steak|viande|veau|agneau|escalope|pave|filet/.test(n)) return 'Boucherie / Poissonnerie';
  if (/yaourt|lait|fromage|feta|parmesan|mozzarella|chevre|creme|cottage|beurre|mascarpone|ricotta/.test(n)) return 'Crémerie';
  if (/oeuf/.test(n)) return 'Crémerie';
  if (/banane|pomme|orange|fruits|mangue|avocat|citron|carotte|courgette|tomate|salade|concombre|epinard|brocolis|haricot|champignon|poivron|oignon|ail|patate|echalote|persil|basilic|aubergine|courge|fraise|framboise|myrtille|raisin|peche|abricot|kiwi|ananas|chou|poireau|celeri|fenouil|radis|navet|betterave|gingembre/.test(n)) return 'Fruits & Légumes';
  if (/riz|quinoa|pates|pain|avoine|lentilles|farine|semoule|nouilles|granola|tortilla|galette|boulgour|couscous|sarrasin|pois chiches|haricots blancs|haricots rouges/.test(n)) return 'Épicerie sèche';
  if (/huile|miel|sucre|sel|poivre|epice|curry|cannelle|herbes|sauce|vinaigre|sirop|cacao|whey|chia|noix|amandes|noisettes|cajou|graines|tahini|moutarde|ketchup|soja/.test(n)) return 'Épicerie';
  if (/conserve|boite|bocal|legumes en|tomate en|concentre/.test(n)) return 'Conserves';
  if (/surgele|congele/.test(n)) return 'Surgelés';
  return 'Autres';
}

function shoppingListFromPlan(plan) {
  const items = {};
  plan.forEach(d => {
    [d.breakfast, d.lunch, d.dinner, d.snack, d.snack2].filter(Boolean).forEach(r => {
      r.ingredients.forEach(ing => {
        const key = ing.name.toLowerCase();
        if (!items[key]) items[key] = { name: ing.name, qty: 0, unit: ing.unit, source: 'plan' };
        items[key].qty += ing.qty / r.servings;
      });
    });
  });
  // Filtrer ce qu'on a déjà au frigo
  const pantry = state.pantry || [];
  Object.keys(items).forEach(k => {
    if (pantryHas(items[k].name, pantry)) {
      items[k].owned = true;
    }
  });
  // Ajouter les extras manuels
  (state.shoppingExtras || []).forEach(extra => {
    const key = 'extra:' + extra.id;
    items[key] = {
      name: extra.name,
      qty: extra.qty || null,
      unit: extra.unit || '',
      source: 'manual',
      extraId: extra.id
    };
  });
  // Catégoriser et grouper
  const grouped = {};
  Object.values(items).forEach(it => {
    if (it.owned) return; // on ne montre pas ce qu'on a déjà
    const cat = categorizeFood(it.name);
    grouped[cat] = grouped[cat] || [];
    grouped[cat].push(it);
  });
  return grouped;
}

// =============================================================
// PLANIFICATEUR DE SEMAINE
// =============================================================
function weekStartDate(refDate = new Date()) {
  const d = new Date(refDate);
  const dow = (d.getDay() + 6) % 7; // 0 = lundi
  d.setDate(d.getDate() - dow);
  d.setHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
}

// Suggère un planning pour la semaine en cours à partir des préférences
// availability: { mon: bool, tue: bool, ... }
// defaultSport: id du sport (ex 'strength', 'running', etc)
// time: heure HH:MM préférée
// duration: minutes par défaut
function suggestWeekPlan(availability, defaultSport, time, duration) {
  const dayKeys = ['mon','tue','wed','thu','fri','sat','sun'];
  const weekStart = new Date(weekStartDate());
  const days = [];
  // Si la musculation est choisie, on alterne avec les sessions du programme préféré
  let strengthSessionIdx = 0;
  const program = PROGRAMS[state.user?.program] || PROGRAMS.fullbody;
  for (let i = 0; i < 7; i++) {
    const date = new Date(weekStart);
    date.setDate(weekStart.getDate() + i);
    const iso = date.toISOString().slice(0, 10);
    const key = dayKeys[i];
    if (!availability[key]) {
      days.push({ date: iso, sport: 'rest', time: null, duration: 0 });
    } else {
      let sport = defaultSport;
      let extra = {};
      if (defaultSport === 'strength') {
        const sess = program.sessions[strengthSessionIdx % program.sessions.length];
        extra = { programId: state.user?.program || 'fullbody', sessionId: sess.id, sessionName: sess.name };
        strengthSessionIdx++;
      }
      days.push({ date: iso, sport, time, duration, ...extra });
    }
  }
  return { weekStart: weekStartDate(), days };
}

function dayOfWeekLabel(iso, short = false) {
  const d = new Date(iso);
  const long = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const sh   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  return (short ? sh : long)[d.getDay()];
}

function ob3Finish() {
  const target = inputToKg(document.getElementById('ob_target').value);
  const deadline = document.getElementById('ob_deadline').value.trim();
  if (!target || !deadline) return toast('Remplis tous les champs');
  state.user = { ...state.user, targetWeight: target, deadline };

  if (state.weights.length === 0) {

  const lastWeight = state.weights[state.weights.length - 1]?.kg || u.weight;

  const weekWorkouts = workoutsThisWeek().length;
  const sleepAvg = state.sleep.slice(-7).reduce((a, s) => a + s.hours, 0) / Math.max(state.sleep.slice(-7).length, 1);

  // Séance du jour

        <div class="stat-tile-value">${displayWeight(lastWeight)}<span class="stat-tile-unit">${weightUnit()}</span></div>

      </div>
      <div class="stat-tile" onclick="navigate('workout')" style="cursor:pointer;">
        <div class="stat-tile-label">Séances</div>
        <div class="stat-tile-value">${weekWorkouts}<span class="stat-tile-unit">/${program.sessions.length}</span></div>
        <div class="stat-tile-trend">cette semaine</div>

      <div class="stat-tile" onclick="navigate('add-sleep')" style="cursor:pointer;">
        <div class="stat-tile-label">Sommeil</div>
        <div class="stat-tile-value">${sleepAvg.toFixed(1)}<span class="stat-tile-unit">h</span></div>
        <div class="stat-tile-trend">moyenne 7j</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Macros aujourd'hui</span>
        <button class="btn-tertiary" onclick="navigate('nutrition')" style="font-size: 13px;">Détail →</button>
      </div>
      <div class="calorie-ring-wrap">
        <svg class="ring-svg" width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-track" cx="90" cy="90" r="78" stroke-width="12"/>
          <circle class="ring-progress" cx="90" cy="90" r="78" stroke-width="12" stroke-dasharray="490" stroke-dashoffset="${ringOffset}"/>
        </svg>
        <div class="ring-center">
          <div class="num">${macros.kcal}</div>
          <div class="unit">kcal consommées</div>
          <div class="sub">/ ${targets.kcal}</div>
        </div>
      </div>
      ${macroBar('Protéines', macros.p, targets.p, 'g')}
      ${macroBar('Glucides', macros.c, targets.c, 'g')}
      ${macroBar('Lipides', macros.l, targets.l, 'g')}
    </div>

    <div class="card">
      <div class="card-title">
        <span>Séance du jour</span>
        <span class="t-caption">${session.name}</span>
      </div>
      <div class="row gap-16 mb-16">
        <div class="list-item-icon" style="width:48px; height:48px; border-radius:16px;">${iconDumbbell()}</div>
        <div style="flex:1;">
          <div class="t-body" style="font-weight:500;">${session.exercises.length} exercices</div>
          <div class="t-caption">environ ${session.duration} min</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startSession('${u.program}','${session.id}')">Démarrer la séance</button>
    </div>

        <button class="btn-tertiary" onclick="navigate('add-sleep')" style="font-size: 13px;">Saisir →</button>

      ${(() => {
        const last = state.sleep[state.sleep.length - 1];
        if (!last) return '<div class="t-caption">Aucune donnée pour l\'instant.</div>';
        return `
          <div class="row gap-16">
            <div>
              <div class="t-mono-lg">${Math.floor(last.hours)}h ${Math.round((last.hours % 1) * 60)}</div>

            <div style="flex:1;"></div>

          </div>
        `;
      })()}
    </div>

    <div style="height: 100px;"></div>
  `;

function macroBar(name, val, target, unit) {
  const pct = Math.min((val / target) * 100, 100);
  return `
    <div class="macro-row">
      <div class="macro-head">
        <span class="macro-name">${name}</span>
        <span class="macro-vals">${Math.round(val)}<span class="total"> / ${target} ${unit}</span></span>
      </div>
      <div class="macro-bar"><div class="macro-bar-fill" style="width: ${pct}%;"></div></div>
    </div>
  `;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'Bonne nuit';
  if (h < 12) return 'Bonjour';
  if (h < 18) return "Bonne après-midi";
  return 'Bonsoir';
}

    </div>
  `;

function renderWeekPlanCard(plan, today, doneByDate) {
  const todayDay = plan.days.find(d => d.date === today);
  return `
    <div class="card-title" style="margin-top: 8px;" >
      <span>Cette semaine</span>
      <button class="btn-tertiary" style="font-size:13px;" onclick="navigate('week-plan-setup')">Modifier</button>
    </div>
    <div class="week-grid mb-16">
      ${plan.days.map(d => {
        const dt = new Date(d.date);
        const dn = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'][(dt.getDay()+6)%7];
        const num = dt.getDate();
        const isToday = d.date === today;
        const done = doneByDate[d.date];
        const isRest = d.sport === 'rest';
        const cls = isToday ? 'today' : (done ? 'done' : (isRest ? 'rest' : 'planned'));
        const icon = isRest ? iconSun(14) : sportIcon(d.sport, 14);
        return `<div class="week-day ${cls}" onclick="state._planDayPreview='${d.date}'; render();">
          <div class="week-day-name">${dn}</div>
          <div class="week-day-num">${num}</div>
          <div class="week-day-pill">${icon}</div>
        </div>`;
      }).join('')}
    </div>

    ${todayDay ? renderTodayPlanned(todayDay) : ''}
  `;
}

function renderTodayPlanned(d) {
  if (d.sport === 'rest') {
    return `
      <div class="card">
        <div class="row gap-16">
          <div class="list-item-icon" style="background:var(--cloud); color:var(--mist);">${iconSun()}</div>
          <div style="flex:1;">
            <div class="t-h2">Jour de repos</div>
            <div class="t-caption mt-8">Profite-en. Tu peux quand même lancer une séance si tu veux.</div>
          </div>
        </div>
      </div>
    `;
  }
  const s = sportType(d.sport);
  if (s.category === 'strength' && d.programId && d.sessionId) {
    const program = PROGRAMS[d.programId];
    const sess = program?.sessions.find(x => x.id === d.sessionId);
    if (sess) {
      return `
        <div class="card" style="cursor:pointer;" onclick="startSession('${d.programId}','${d.sessionId}')">
          <div class="row-between mb-16">
            <div class="row gap-16" style="flex:1; min-width:0;">

              <div style="flex:1; min-width:0;">
                <div class="t-h2">${sess.name}</div>
                <div class="t-caption mt-8">Aujourd'hui${d.time?` · ${d.time}`:''}${d.duration?` · ${d.duration} min`:''}</div>

            </div>
            <div class="btn-icon">${iconArrow()}</div>
          </div>
        </div>

  return `
    <div class="card" style="cursor:pointer;" onclick="startCardio('${d.sport}', ${d.duration||30})">
      <div class="row-between mb-16">
        <div class="row gap-16" style="flex:1; min-width:0;">
          <div class="list-item-icon">${sportIcon(d.sport)}</div>
          <div style="flex:1; min-width:0;">
            <div class="t-h2">${s.label}</div>
            <div class="t-caption mt-8">Aujourd'hui${d.time?` · ${d.time}`:''}${d.duration?` · ${d.duration} min`:''}</div>
          </div>
        </div>
        <div class="btn-icon">${iconArrow()}</div>
      </div>
    </div>
  `;
}

function quickStartSport(id) {
  const s = sportType(id);
  if (s.category === 'strength') {

    navigate('workout');
    toast('Choisis une séance ci-dessous');
    return;
  }
  startCardio(id, 30);
}

function startCardio(sportId, defaultDuration = 30) {
  state._activeCardio = {
    id: uid(),
    date: todayISO(),
    sport: sportId,
    elapsedMs: 0,
    runningSince: null,
    duration: defaultDuration,
    notes: '',
    rpe: null,
    fields: {}   // valeurs des champs spécifiques au sport
  };
  navigate('cardio-session');
}

function startSession(programId, sessionId) {
  const session = PROGRAMS[programId].sessions.find(s => s.id === sessionId);
  // Initialise une nouvelle séance en mémoire
  state._activeWorkout = {
    id: uid(),
    date: todayISO(),
    programId, sessionId,
    elapsedMs: 0,             // temps total accumulé
    runningSince: null,       // timestamp si chrono actif, null si en pause
    exercises: session.exercises.map(e => ({
      exerciseId: e.exerciseId,
      sets: Array.from({ length: e.sets }, () => ({ kg: '', reps: '', done: false }))
    }))
  };
  navigate('workout-session');
}

  const w = state._activeWorkout;
  if (!w) { navigate('workout'); return ''; }
  const session = PROGRAMS[w.programId].sessions.find(s => s.id === w.sessionId);
  // Compteur global de séries faites
  const totalSets = w.exercises.reduce((a,e)=>a+e.sets.length,0);
  const doneSets = w.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);

  return `
    <div class="screen-header">
      <div class="row-between">
        <button class="btn-icon" onclick="abortSession()">${iconBack()}</button>
        <button class="session-timer-pill ${w.runningSince?'running':'paused'}" onclick="toggleSessionTimer()" aria-label="Pause / reprendre chrono">
          ${w.runningSince ? '<span class="pulse-dot"></span>' : iconPlay()}
          <span id="sessionTimer">${formatElapsed(activeWorkoutElapsedMs())}</span>

function toggleEditTarget(idx) {
  state._editingTarget = state._editingTarget === idx ? null : idx;
  render();
}

function updateTarget(idx, field, value) {
  const ex = state._activeWorkout.exercises[idx];
  if (!ex.target) {
    const session = PROGRAMS[state._activeWorkout.programId].sessions.find(s=>s.id===state._activeWorkout.sessionId);
    ex.target = { ...(session.exercises[idx] || { sets: ex.sets.length, reps: '8-12', rest: 75 }) };
  }
  ex.target[field] = value;
}

function addSetTo(idx) {
  state._activeWorkout.exercises[idx].sets.push({ kg: '', reps: '', done: false });
  render();
}

function removeSetFrom(idx) {
  const sets = state._activeWorkout.exercises[idx].sets;
  if (sets.length > 1) sets.pop();
  render();
}

function removeExerciseFromSession(idx) {
  state._activeWorkout.exercises.splice(idx, 1);
  if (state._editingTarget === idx) state._editingTarget = null;
  render();
}

function openAddExoToSession() {
  state._addExoOpen = true;
  state._addExoQuery = '';
  state._addExoCustom = false;
  navigate('add-exo-to-session');
}

// AJOUT EXERCICE EN COURS DE SÉANCE

function addCatalogExoToSession(exId) {
  const def = EXERCISES.find(e => e.id === exId);
  if (!def) return;
  state._activeWorkout.exercises.push({
    exerciseId: exId,
    target: { sets: 3, reps: '8-12', rest: 75 },

  });
  toast(def.name + ' ajouté');
  navigate('workout-session');

function addCustomExoToSession() {
  const name = document.getElementById('cx_name').value.trim();
  const sets = parseInt(document.getElementById('cx_sets').value) || 3;
  const reps = document.getElementById('cx_reps').value.trim() || '8-12';

  if (!name) return toast('Donne un nom');
  state._activeWorkout.exercises.push({
    exerciseId: 'custom-' + uid(),
    custom: true,
    customName: name,
    target: { sets, reps, rest },
    sets: Array.from({ length: sets }, () => ({ kg: '', reps: '', done: false }))
  });
  toast(name + ' ajouté');

// ============================================================
// MINUTEUR DE REPOS
// ============================================================
function startRestTimer(seconds) {
  state._rest = { remaining: seconds, total: seconds, startAt: Date.now() };
  showRestModal();
  tickRestTimer();
}

function showRestModal() {
  const m = document.getElementById('restModal');
  if (m) m.style.display = 'flex';
}

function hideRestModal() {
  const m = document.getElementById('restModal');
  if (m) m.style.display = 'none';
}

function stopRestTimer() {
  state._rest = null;
  hideRestModal();
}

function restAddTime(delta) {
  if (!state._rest) return;
  state._rest.remaining = Math.max(0, state._rest.remaining + delta);
  state._rest.total = Math.max(state._rest.total, state._rest.remaining);
  updateRestDisplay();
}

function tickRestTimer() {
  if (!state._rest) return;
  const el = document.getElementById('restTime');
  if (!el) { state._rest = null; return; }
  state._rest.remaining = Math.max(0, state._rest.remaining - 1);
  updateRestDisplay();
  if (state._rest.remaining <= 0) {
    // Vibration courte si supportée + son visuel
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    toast('Repos terminé');
    setTimeout(() => stopRestTimer(), 1500);
    return;
  }
  setTimeout(tickRestTimer, 1000);
}

function updateRestDisplay() {
  const el = document.getElementById('restTime');
  if (!el || !state._rest) return;
  const r = state._rest.remaining;
  el.textContent = `${String(Math.floor(r/60)).padStart(2,'0')}:${String(r%60).padStart(2,'0')}`;
  // Couleur selon temps restant
  if (r <= 5) el.style.color = 'var(--crimson)';
  else if (r <= 15) el.style.color = 'var(--terra)';
  else el.style.color = 'var(--stone)';
}

// ============================================================
// HELPERS UNITÉS
// ============================================================
function unitsSystem() {
  return state.settings?.units || 'metric';
}
function isImperial() { return unitsSystem() === 'imperial'; }
function weightUnit() { return isImperial() ? 'lb' : 'kg'; }
function lengthUnit() { return isImperial() ? 'in' : 'cm'; }
function distanceUnit() { return isImperial() ? 'mi' : 'km'; }
function heightUnit() { return isImperial() ? 'ft' : 'cm'; }
// Conversions (jamais stockées convertes ; le storage reste en métrique)
function kgToLb(kg) { return kg * 2.2046226218; }
function lbToKg(lb) { return lb / 2.2046226218; }
function cmToIn(cm) { return cm / 2.54; }
function inToCm(inch) { return inch * 2.54; }
// Affiche un poids stocké (kg) selon l'unité courante
function displayWeight(kg, decimals = 1) {
  if (kg === null || kg === undefined || isNaN(kg)) return '—';
  const v = isImperial() ? kgToLb(kg) : kg;
  return Number(v.toFixed(decimals));
}
function displayLength(cm, decimals = 1) {
  if (cm === null || cm === undefined || isNaN(cm)) return '—';
  const v = isImperial() ? cmToIn(cm) : cm;
  return Number(v.toFixed(decimals));
}
// Convertit une valeur saisie (selon l'unité courante) en métrique pour le stockage
function inputToKg(value) {
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  return isImperial() ? lbToKg(v) : v;
}
function inputToCm(value) {
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  return isImperial() ? inToCm(v) : v;
}
// Affichage de la taille : 175cm en métrique, 5'9" en imperial
function formatHeightDisplay(cm) {
  if (cm === null || cm === undefined || isNaN(cm)) return '—';
  if (!isImperial()) return cm + ' cm';
  const totalIn = cmToIn(cm);
  const ft = Math.floor(totalIn / 12);
  const inch = Math.round(totalIn - ft * 12);
  return ft + "'" + inch + '"';
}

const iconEdit = () => `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3 L15 7 L7 15 L3 15 L3 11 Z"/></svg>`;

function updateSet(exIdx, setIdx, field, value) {
  state._activeWorkout.exercises[exIdx].sets[setIdx][field] = value;
}

function toggleSetDone(exIdx, setIdx) {
  const set = state._activeWorkout.exercises[exIdx].sets[setIdx];
  set.done = !set.done;
  if (set.done && set.kg && set.reps) {
    const exId = state._activeWorkout.exercises[exIdx].exerciseId;
    const isPR = checkPR(exId, set.kg, set.reps);
    if (isPR) toast('Nouveau record sur ' + EXERCISES.find(e=>e.id===exId).name + ' !');
  }
  document.getElementById(`set-${exIdx}-${setIdx}`).classList.toggle('done', set.done);
}

function abortSession() {
  // Pas de confirm() natif (bloqué partout) — on confirme via le bouton retour qui re-clic
  if (state._abortPending) {
    clearTimeout(state._abortTimer);
    state._abortPending = false;
    state._activeWorkout = null;
    navigate('workout');
    return;
  }
  state._abortPending = true;
  toast('Re-clique sur retour pour abandonner');
  state._abortTimer = setTimeout(() => { state._abortPending = false; }, 3000);
}

function activeWorkoutElapsedMs() {
  const w = state._activeWorkout;
  if (!w) return 0;
  let total = w.elapsedMs || 0;
  if (w.runningSince) total += Date.now() - w.runningSince;
  return total;
}

function formatElapsed(ms) {
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function toggleSessionTimer() {
  const w = state._activeWorkout;
  if (!w) return;
  if (w.runningSince) {
    // Pause
    w.elapsedMs = (w.elapsedMs || 0) + (Date.now() - w.runningSince);
    w.runningSince = null;
  } else {
    // Reprise
    w.runningSince = Date.now();
  }
  render();
}

function finishSession() {
  const w = state._activeWorkout;
  if (!w) return;
  // Stop chrono si encore actif
  if (w.runningSince) {
    w.elapsedMs = (w.elapsedMs || 0) + (Date.now() - w.runningSince);
    w.runningSince = null;
  }
  w.duration = Math.round((w.elapsedMs || 0) / 60000);
  w.type = 'strength';
  // Filtre les sets non remplis
  w.exercises.forEach(ex => {
    ex.sets = ex.sets.filter(s => s.kg || s.reps || s.done);
  });
  state.workouts.push(w);
  state._activeWorkout = null;
  saveState();
  toast('Séance enregistrée. Bravo !');
  navigate('workout');
}

const iconPlay = () => `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M3 2 L11 7 L3 12 Z"/></svg>`;
const iconPause = () => `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="3" y="2" width="3" height="10" rx="0.5"/><rect x="8" y="2" width="3" height="10" rx="0.5"/></svg>`;

function renderWorkoutHistory() {
  const sorted = [...state.workouts].sort((a, b) => b.date.localeCompare(a.date));

      const tonnage = w.exercises.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(parseFloat(s.kg)||0)*(parseInt(s.reps)||0),0),0);
      return `

function deleteWorkout(id) {
  // Premier clic : on demande confirmation visuelle
  if (state._deleteConfirm !== id) {
    state._deleteConfirm = id;
    render();
    // Reset auto au bout de 4 secondes si pas de second clic
    clearTimeout(state._deleteConfirmTimer);
    state._deleteConfirmTimer = setTimeout(() => {
      if (state._deleteConfirm === id) {
        state._deleteConfirm = null;
        render();
      }
    }, 4000);
    return;
  }
  // Deuxième clic : on supprime
  state._deleteConfirm = null;
  clearTimeout(state._deleteConfirmTimer);
  state.workouts = state.workouts.filter(w => w.id !== id);
  // Recalculer les PRs depuis les séances restantes
  state.prs = {};
  state.workouts.forEach(w => {
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => {
        const kg = parseFloat(s.kg), reps = parseInt(s.reps);
        if (kg && reps && s.done) {
          const vol = kg * reps;
          const cur = state.prs[ex.exerciseId];
          if (!cur || vol > cur.volumeKg) {
            state.prs[ex.exerciseId] = { volumeKg: vol, kg, reps, date: w.date };
          }
        }
      });
    });
  });
  saveState();
  toast('Séance supprimée');
  render();
}

function renderNutrition() {

  const todayMeals = state.meals.filter(m => m.date === today);

  return `
    <div class="screen-header">

function removeShoppingExtra(id) {

function toggleShopping(key) {

function renderPantry() {

      `}
    </div>

    ${items.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">${iconFridge(40)}</div>
        <div class="empty-title">Frigo vide</div>
        <div class="empty-sub">Commence par ajouter ce que tu as déjà chez toi pour découvrir les recettes possibles.</div>
      </div>
    ` : ''}

    ${Object.entries(grouped).map(([cat, list]) => `
      <div class="shopping-section">
        <div class="shopping-section-title">${cat}</div>
        ${list.map(it => `
          <div class="shopping-item">
            <div class="shopping-checkbox" style="background: var(--sage); border-color: var(--sage); color: var(--bone);">${iconCheck()}</div>
            <div class="shopping-name">${it.name}</div>

          </div>
        `).join('')}

      <div class="card" style="background: var(--sage-pale);">
        <div class="card-title" style="color: var(--sage-deep);">${iconSparkle()} ${matchable.length} recettes possibles avec ce que tu as</div>
        <button class="btn btn-primary" onclick="navigate('recipe-suggestions')">Voir les recettes</button>
      </div>
    ` : ''}

    <div style="height: 100px;"></div>
  `;
}

function addPantryItem() {
  const input = document.getElementById('pantryInput');
  const raw = input.value.trim();
  if (!raw) return toast('Tape un ingrédient');
  // Support multi-saisie : virgules
  const names = raw.split(/[,;]/).map(s => s.trim()).filter(Boolean);
  if (!state.pantry) state.pantry = [];
  let added = 0;
  names.forEach(name => {
    // Évite les doublons exacts (insensibles à la casse)
    if (!state.pantry.some(p => normalizeFood(p.name) === normalizeFood(name))) {
      state.pantry.push({ id: uid(), name, addedAt: Date.now() });
      added++;
    }
  });
  saveState();
  input.value = '';
  if (added === 0) toast('Déjà dans ton frigo');
  else toast(added > 1 ? `${added} ingrédients ajoutés` : 'Ajouté au frigo');
  render();
}

function removePantryItem(id) {
  state.pantry = (state.pantry || []).filter(p => p.id !== id);
  saveState();
  render();
}

// ============================================================
function renderRecipeSuggestions() {
  const items = state.pantry || [];
  if (items.length === 0) {
    return `
      <div class="screen-header">
        <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button><div></div></div>
        <h1 class="t-h1" style="margin-top: 8px;">Recettes possibles</h1>
      </div>
      <div class="empty">
        <div class="empty-icon">${iconBowl(40)}</div>
        <div class="empty-title">Frigo vide</div>
        <div class="empty-sub">Ajoute d'abord des ingrédients dans ton frigo pour que je te propose des recettes.</div>
      </div>
      <button class="btn btn-primary" onclick="navigate('pantry')">Remplir mon frigo</button>
    `;
  }

  const matches = matchableRecipes(items, 1);
  const filter = state._suggestFilter || 'all';
  let filtered = matches;
  if (filter === 'ready') filtered = matches.filter(m => m.missing.length === 0);
  if (filter === 'almost') filtered = matches.filter(m => m.missing.length > 0 && m.missing.length <= 3);

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button>
        <button class="btn-icon" onclick="navigate('pantry')">${iconFridge()}</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Recettes possibles</h1>
      <div class="t-caption">À partir de ${items.length} ingrédient${items.length>1?'s':''} de ton frigo</div>
    </div>

    <div class="row gap-8 mb-16">
      <button class="chip ${filter==='all'?'active':''}" onclick="setSuggestFilter('all')">Toutes (${matches.length})</button>
      <button class="chip ${filter==='ready'?'active':''}" onclick="setSuggestFilter('ready')">Prêtes (${matches.filter(m=>m.missing.length===0).length})</button>
      <button class="chip ${filter==='almost'?'active':''}" onclick="setSuggestFilter('almost')">Presque (${matches.filter(m=>m.missing.length>0&&m.missing.length<=3).length})</button>
    </div>

    ${filtered.length === 0 ? `
      <div class="empty">
        <div class="empty-title">Aucune recette ne correspond</div>
        <div class="empty-sub">Ajoute plus d'ingrédients à ton frigo ou change de filtre.</div>
      </div>
    ` : filtered.slice(0, 30).map(m => {
      const r = m.recipe;
      const ratio = m.have / m.total;
      const ready = m.missing.length === 0;
      return `
        <div class="card" style="cursor:pointer;" onclick="navigate('recipe-detail', { id: '${r.id}', slot: '${r.category==='petit-dej'?'Petit-déj':r.category==='collation'?'Collation':'Repas'}', date: '${todayISO()}' })">
          <div class="row-between mb-16">
            <div style="flex:1; min-width:0;">
              <div class="t-body" style="font-weight:600;">${r.name}</div>
              <div class="t-caption mt-8">${r.kcal} kcal · ${r.p}g P · ${r.time} min</div>
            </div>
            <div class="match-badge ${ready?'ready':m.missing.length<=2?'almost':'partial'}">
              ${m.have}/${m.total}
            </div>
          </div>
          <div class="match-bar"><div class="match-bar-fill ${ready?'ready':m.missing.length<=2?'almost':'partial'}" style="width: ${ratio*100}%;"></div></div>
          ${m.missing.length === 0 ? `
            <div class="t-caption mt-8" style="color: var(--sage-deep); font-weight: 500;">${iconCheck()} Tu as tout ce qu'il faut</div>
          ` : `
            <div class="t-caption mt-8">Manque : <span style="color: var(--graphite);">${m.missing.slice(0,3).map(i=>i.name).join(', ')}${m.missing.length>3?` et ${m.missing.length-3} autre${m.missing.length-3>1?'s':''}`:''}</span></div>
          `}
        </div>
      `;
    }).join('')}

    <div style="height: 100px;"></div>
  `;
}

function setSuggestFilter(f) {
  state._suggestFilter = f;
  render();
}

function renderMeasureKinetics() {
  const goal = state.user?.goal || 'maintenance';
  // Pour chaque champ, déterminer s'il est "tracké" (au moins 1 mesure historique avec valeur)
  const items = [];

  MEASURE_FIELDS.forEach(f => {
    if (f.pair) {
      // On affiche les 2 côtés côte à côte si au moins un a une valeur
      const seriesL = state.measurements.map(m => ({ date: m.date, val: m[f.keyL] })).filter(p => typeof p.val === 'number');
      const seriesR = state.measurements.map(m => ({ date: m.date, val: m[f.keyR] })).filter(p => typeof p.val === 'number');
      if (seriesL.length === 0 && seriesR.length === 0) return;
      items.push(renderPairedMeasure(f, seriesL, seriesR, goal));
    } else {
      const series = state.measurements.map(m => ({ date: m.date, val: m[f.key] })).filter(p => typeof p.val === 'number');
      if (series.length === 0) return;
      items.push(renderSingleMeasure(f, series, goal));
    }
  });

  if (items.length === 0) {
    return `<div class="t-caption">Aucune mensuration enregistrée. Saisis-les pour suivre ta composition corporelle.</div>`;
  }
  return items.join('');
}

// Détermine la sémantique d'une variation pour un champ donné
function trendSemantic(fieldKey, delta, goal) {
  // delta > 0 = augmentation, delta < 0 = diminution
  const muscleGroups = ['arm','forearm','thigh','calf','chest','shoulder','neck'];
  const isMuscle = muscleGroups.includes(fieldKey);
  const fatTracked = ['waist','hips','bf'];
  const isFat = fatTracked.includes(fieldKey);
  // Champs où l'augmentation est TOUJOURS positive
  const alwaysGood = ['water','muscle'];

  if (Math.abs(delta) < 0.05) return 'neutral';

  if (alwaysGood.includes(fieldKey)) {
    return delta > 0 ? 'good' : 'bad';
  }
  if (isFat) {
    if (goal === 'masse') return delta > 0 ? 'mild' : 'good';
    return delta < 0 ? 'good' : 'bad';
  }
  if (isMuscle) {
    if (goal === 'seche') return delta < 0 ? 'mild' : 'good';
    if (goal === 'masse') return delta > 0 ? 'good' : 'bad';
    return 'neutral';
  }
  return 'neutral';
}

function trendColor(sem) {
  // sage (positif), terra (négatif), mist (neutre/léger)
  if (sem === 'good') return 'var(--sage-deep)';
  if (sem === 'bad')  return 'var(--terra)';
  return 'var(--mist)';
}

function trendArrow(delta) {
  if (Math.abs(delta) < 0.05) return iconDash();
  return delta > 0 ? iconUp() : iconDown();
}

function sparkline(series, color) {
  if (series.length === 0) return '';
  const W = 84, H = 32, PAD = 2;
  if (series.length === 1) {
    // Un seul point : ligne plate au centre
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <circle cx="${W/2}" cy="${H/2}" r="2" fill="${color}"/>
    </svg>`;
  }
  const vals = series.map(p => p.val);
  let minY = Math.min(...vals), maxY = Math.max(...vals);
  if (maxY - minY < 0.5) { minY -= 0.5; maxY += 0.5; }
  const xs = series.map((_, i) => PAD + (i / (series.length - 1)) * (W - 2*PAD));
  const ys = vals.map(v => H - PAD - ((v - minY) / (maxY - minY)) * (H - 2*PAD));
  const path = series.map((_, i) => `${i===0?'M':'L'} ${xs[i].toFixed(1)} ${ys[i].toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xs[xs.length-1].toFixed(1)}" cy="${ys[ys.length-1].toFixed(1)}" r="2" fill="${color}"/>
  </svg>`;
}

function renderSingleMeasure(field, series, goal) {
  const isPercent = field.unit === '%';
  const displayUnit = isPercent ? '%' : lengthUnit();
  // Conversion du series pour l'affichage
  const seriesView = isPercent ? series : series.map(p => ({ date: p.date, val: displayLength(p.val) }));
  const last = seriesView[seriesView.length - 1];
  const prev = seriesView.length > 1 ? seriesView[seriesView.length - 2] : null;
  const delta = prev ? last.val - prev.val : 0;
  // Sémantique sur la donnée brute (kg, cm) — peu importe l'unité d'affichage
  const rawDelta = series.length > 1 ? series[series.length-1].val - series[series.length-2].val : 0;
  const sem = prev ? trendSemantic(field.key, rawDelta, goal) : 'neutral';
  const color = trendColor(sem);
  const sign = delta > 0 ? '+' : '';
  const deltaTxt = prev ? `${sign}${delta.toFixed(1)} ${displayUnit}` : 'Premier point';

  return `
    <div class="kinetic-row">
      <div class="kinetic-label">
        <div class="kinetic-name">${field.label}</div>
        <div class="kinetic-meta">${series.length} point${series.length>1?'s':''}</div>
      </div>
      <div class="kinetic-value">
        <span class="t-mono-sm">${last.val}</span>
        <span class="t-caption" style="margin-left:2px;">${displayUnit}</span>
      </div>
      <div class="kinetic-spark">${sparkline(seriesView, color)}</div>
      <div class="kinetic-trend" style="color:${color};">
        ${prev ? trendArrow(delta) : ''}
        <span class="kinetic-delta">${deltaTxt}</span>
      </div>
    </div>
  `;
}

function renderPairedMeasure(field, seriesL, seriesR, goal) {
  const isPercent = field.unit === '%';
  const displayUnit = isPercent ? '%' : lengthUnit();
  const buildSide = (lab, series) => {
    if (series.length === 0) {
      return `
        <div class="kinetic-side">
          <div class="kinetic-side-lab">${lab}</div>
          <div class="kinetic-side-val t-mist">—</div>
        </div>
      `;
    }
    const seriesView = isPercent ? series : series.map(p => ({ date: p.date, val: displayLength(p.val) }));
    const last = seriesView[seriesView.length - 1];
    const prev = seriesView.length > 1 ? seriesView[seriesView.length - 2] : null;
    const delta = prev ? last.val - prev.val : 0;
    const rawDelta = series.length > 1 ? series[series.length-1].val - series[series.length-2].val : 0;
    const sem = prev ? trendSemantic(field.key, rawDelta, goal) : 'neutral';
    const color = trendColor(sem);
    const sign = delta > 0 ? '+' : '';
    return `
      <div class="kinetic-side">
        <div class="kinetic-side-lab">${lab}</div>
        <div class="kinetic-side-val"><span class="t-mono-sm">${last.val}</span><span class="t-caption" style="margin-left:2px;">${displayUnit}</span></div>
        <div class="kinetic-side-spark">${sparkline(seriesView, color)}</div>
        <div class="kinetic-side-trend" style="color:${color};">${prev ? `${trendArrow(delta)}<span>${sign}${delta.toFixed(1)}</span>` : '<span class="t-caption">1er</span>'}</div>
      </div>
    `;
  };
  return `
    <div class="kinetic-row paired">
      <div class="kinetic-name" style="margin-bottom:8px;">${field.label}</div>
      <div class="kinetic-pair">
        ${buildSide('Gauche', seriesL)}
        <div class="kinetic-pair-sep"></div>
        ${buildSide('Droit', seriesR)}
      </div>
    </div>
  `;
}

const iconUp = () => `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8 L6 4 L9 8"/></svg>`;
const iconDown = () => `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4 L6 8 L9 4"/></svg>`;
const iconDash = () => `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6 L9 6"/></svg>`;

function setPeriod(p) {
  state._period = p;
  render();
}

function filterByPeriod(weights, days) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - parseInt(days));
  return weights.filter(w => new Date(w.date) >= cutoff);
}

function weightChart(data, target) {
  if (data.length < 2) {
    return `<div class="empty" style="padding:24px;"><div class="empty-sub">${data.length===0?'Pas encore de données.':'Saisis au moins 2 points pour voir la courbe.'}</div></div>`;
  }
  const W = 320, H = 160;
  const conv = isImperial() ? kgToLb : (v=>v);
  const xs = data.map((d,i)=>(i/(data.length-1))*W);
  const ys = data.map(d=>conv(d.kg));
  const targetView = conv(target);
  const minY = Math.min(...ys, targetView) - 1;
  const maxY = Math.max(...ys, targetView) + 1;
  const yScale = v => H - ((v - minY) / (maxY - minY)) * H;
  const path = data.map((d,i)=>`${i===0?'M':'L'} ${xs[i]} ${yScale(conv(d.kg))}`).join(' ');
  const area = path + ` L ${W} ${H} L 0 ${H} Z`;
  const targetY = yScale(targetView);
  return `
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <line class="chart-target" x1="0" y1="${targetY}" x2="${W}" y2="${targetY}"/>
        <path class="chart-area" d="${area}"/>
        <path class="chart-line" d="${path}"/>
        <circle class="chart-dot" cx="${xs[xs.length-1]}" cy="${yScale(ys[ys.length-1])}" r="4"/>
      </svg>
    </div>
  `;
}

function sleepBars(sleep) {
  const dayNames = ['L','M','M','J','V','S','D'];
  const max = Math.max(...sleep.map(s=>s.hours), 9);
  return `
    <div style="display:flex; align-items:flex-end; gap:8px; height:80px;">
      ${sleep.map(s => {
        const d = new Date(s.date);
        const dn = dayNames[(d.getDay()+6)%7];
        const h = (s.hours / max) * 100;
        return `
          <div style="flex:1; display:flex; flex-direction:column; align-items:center;">
            <div style="width:100%; background:var(--sage); border-radius:4px; height:${h}%; min-height:4px;"></div>
            <div class="t-legend mt-8">${dn}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function saveMeasurements() {
  const m = { id: uid(), date: todayISO() };
  const PERCENT_KEYS = new Set(['bf','water','muscle']);
  ALL_MEASURE_KEYS.forEach(k => {
    const el = document.getElementById('me_'+k);
    if (!el) return;
    if (PERCENT_KEYS.has(k)) {
      const v = parseFloat(el.value);
      if (!isNaN(v)) m[k] = v;
    } else {
      const v = inputToCm(el.value);
      if (v !== null) m[k] = v;
    }
  });
  const hasAny = ALL_MEASURE_KEYS.some(k => m[k] !== undefined);
  if (!hasAny) return toast('Aucune mesure saisie');
  state.measurements.push(m);
  saveState();
  toast('Mensurations enregistrées');
  navigate('progress');
}

let _sleepQ = 4;
function setSleepQuality(n, el) {
  _sleepQ = n;
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function saveSleep() {
  const bed = document.getElementById('s_bed').value;
  const wake = document.getElementById('s_wake').value;
  let h = parseFloat(document.getElementById('s_hours').value);
  if (!h && bed && wake) {
    const [bH, bM] = bed.split(':').map(Number);
    const [wH, wM] = wake.split(':').map(Number);
    let mins = (wH*60+wM) - (bH*60+bM);
    if (mins < 0) mins += 24*60;
    h = +(mins/60).toFixed(2);
  }
  if (!h) return toast('Durée requise');
  state.sleep.push({
    id: uid(),
    date: document.getElementById('s_date').value,
    hours: h, quality: _sleepQ, bedtime: bed, wake
  });
  saveState();
  toast('Sommeil enregistré');
  navigate('progress');
}

// ============================================================
// SUPPRESSION GÉNÉRIQUE — confirmation visuelle 2 clics
// ============================================================
// Helpers : trouver l'identifiant d'une entrée (id sinon index)
function entryKey(arr, item, idx) {
  return item.id || `idx-${idx}`;
}

function requestDelete(scope, key, onConfirm) {
  // 1er clic : on demande confirmation, change l'icône en rouge
  if (state._delScope !== scope || state._delKey !== key) {
    state._delScope = scope;
    state._delKey = key;
    render();
    clearTimeout(state._delTimer);
    state._delTimer = setTimeout(() => {
      if (state._delScope === scope && state._delKey === key) {
        state._delScope = null;
        state._delKey = null;
        render();
      }
    }, 4000);
    return;
  }
  // 2e clic : suppression effective
  state._delScope = null;
  state._delKey = null;
  clearTimeout(state._delTimer);
  onConfirm();
}

function isPendingDelete(scope, key) {
  return state._delScope === scope && state._delKey === key;
}

function deleteRow(scope, idx) {
  const key = scope === 'weight' ? entryKey(state.weights, state.weights[idx], idx)
            : scope === 'measure' ? entryKey(state.measurements, state.measurements[idx], idx)
            : entryKey(state.sleep, state.sleep[idx], idx);
  requestDelete(scope, key, () => {
    if (scope === 'weight') {
      state.weights.splice(idx, 1);
      // Recale le poids "actuel" de l'utilisateur sur le dernier point restant
      if (state.weights.length > 0) {
        const last = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date)).pop();
        state.user.weight = last.kg;
      }
    } else if (scope === 'measure') {
      state.measurements.splice(idx, 1);
    } else {
      state.sleep.splice(idx, 1);
    }
    saveState();
    toast('Supprimé');
    render();
  });
}

function renderMeasurementsHistory() {
  const sorted = state.measurements
    .map((m, idx) => ({ ...m, _idx: idx }))
    .sort((a, b) => b.date.localeCompare(a.date));

  // Synthèse compacte des champs renseignés pour une mesure
  const summarize = (m) => {
    const parts = [];
    MEASURE_FIELDS.forEach(f => {
      const isPercent = f.unit === '%';
      const fmt = (v) => v === undefined ? '—' : (isPercent ? v : displayLength(v));
      if (f.pair) {
        if (m[f.keyL] !== undefined || m[f.keyR] !== undefined) {
          parts.push(`${f.label} ${fmt(m[f.keyL])}/${fmt(m[f.keyR])}`);
        }
      } else if (m[f.key] !== undefined) {
        parts.push(`${f.label} ${fmt(m[f.key])}${isPercent?'%':''}`);
      }
    });
    return parts.length ? parts.join(' · ') : 'Aucune valeur';
  };

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('progress')">${iconBack()}</button>

      </div>

      const key = entryKey(state.measurements, m, m._idx);
      const pending = isPendingDelete('measure', key);
      return `
        <div class="card">
          <div class="row-between mb-16">

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vital-track-' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Export téléchargé');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (confirm('Remplacer toutes les données actuelles ?')) {
        state = { ...DEFAULT_STATE, ...imported };
        saveState();
        toast('Import réussi');
        render();
      }
    } catch (err) {
      toast('Fichier invalide');
    }
  };
  r.readAsText(file);
}
