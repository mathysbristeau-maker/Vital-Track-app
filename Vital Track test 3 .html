// ============================================================
// PLANIFICATEUR DE SEMAINE
// ============================================================
function renderWeekPlanSetup() {
  const u = state.user;
  const ws = weekStartDate();
  // État du formulaire : tableau de 7 jours, chacun avec son sport (ou 'rest') et ses détails
  if (!state._planForm || state._planForm.weekStart !== ws) {
    const cur = (state.weekPlan && state.weekPlan.weekStart === ws) ? state.weekPlan : null;
    let strengthSessionIdx = 0;
    const program = PROGRAMS[u.program];
    state._planForm = {
      weekStart: ws,
      days: Array.from({ length: 7 }, (_, i) => {
        const date = new Date(new Date(ws));
        date.setDate(date.getDate() + i);
        const iso = date.toISOString().slice(0, 10);
        if (cur) {
          return { ...cur.days[i] };
        }
        // Défaut : Lun/Mer/Ven musculation à 18h
        const defaults = [true, false, true, false, true, false, false];
        if (!defaults[i]) return { date: iso, sport: 'rest', time: null, duration: 0 };
        const sess = program.sessions[strengthSessionIdx % program.sessions.length];
        strengthSessionIdx++;
        return { date: iso, sport: 'strength', programId: u.program, sessionId: sess.id, sessionName: sess.name, time: '18:00', duration: 60 };
      })
    };
  }
  const f = state._planForm;
  const editingIdx = state._planEditIdx;
  const activeCount = f.days.filter(d => d.sport !== 'rest').length;

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('workout')">${iconBack()}</button>
        <button class="btn-icon" onclick="autoFillPlanForm()" aria-label="Auto-remplir">${iconRefresh()}</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Planifier ma semaine</h1>
      <div class="t-caption">${activeCount} séance${activeCount>1?'s':''} planifiée${activeCount>1?'s':''} · ${7-activeCount} repos</div>
    </div>

    ${f.days.map((d, i) => renderPlanDayCard(d, i, editingIdx === i)).join('')}

    <div style="height:8px;"></div>
    <button class="btn btn-primary" onclick="confirmWeekPlanV2()">Enregistrer ce planning</button>
    ${state.weekPlan && state.weekPlan.weekStart === ws ? `<div style="height:8px;"></div><button class="btn btn-secondary" onclick="clearWeekPlan()">Supprimer ce planning</button>` : ''}
    <div style="height: 100px;"></div>
  `;
}

function renderPlanDayCard(d, idx, editing) {
  const dayName = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'][idx];
  const isRest = d.sport === 'rest';
  const sp = sportType(d.sport);
  const dt = new Date(d.date);
  const num = dt.getDate();
  const month = dt.toLocaleDateString('fr-FR', { month: 'short' });

  // Mode résumé
  if (!editing) {
    return `
      <div class="plan-day-card ${isRest?'rest':''}" onclick="state._planEditIdx=${idx}; render();">
        <div class="plan-day-left">
          <div class="plan-day-date">
            <div class="plan-day-name">${dayName}</div>
            <div class="plan-day-num">${num} ${month}</div>
          </div>
        </div>
        <div class="plan-day-body">
          ${isRest ? `
            <div class="plan-day-sport-row">
              <div class="plan-day-icon rest">${sportIcon('rest', 16)}</div>
              <div class="plan-day-sport-name t-mist">Repos</div>
            </div>
          ` : `
            <div class="plan-day-sport-row">
              <div class="plan-day-icon">${sportIcon(d.sport, 16)}</div>
              <div class="plan-day-sport-name">${d.sport==='strength' && d.sessionName ? d.sessionName : sp.label}</div>
            </div>
            <div class="plan-day-meta">${d.time||'—'} · ${d.duration||0} min</div>
          `}
        </div>
        <div class="plan-day-action">${iconEdit()}</div>
      </div>
    `;
  }

  // Mode édition
  const u = state.user;
  const program = PROGRAMS[u.program];
  return `
    <div class="plan-day-card editing">
      <div class="row-between mb-16">
        <div>
          <div class="t-body" style="font-weight: 600;">${dayName} ${num} ${month}</div>
          <div class="t-caption">Choisis un sport ou laisse en repos</div>
        </div>
        <button class="btn-icon" onclick="state._planEditIdx=null; render();">${iconCheck()}</button>
      </div>

      <div class="plan-sport-options">
        <button class="sport-pick ${d.sport==='rest'?'active':''}" onclick="setPlanDaySport(${idx},'rest')">
          ${sportIcon('rest', 22)}<span>Repos</span>
        </button>
        ${SPORT_TYPES.filter(s => s.id !== 'rest').map(s => `
          <button class="sport-pick ${d.sport===s.id?'active':''}" onclick="setPlanDaySport(${idx},'${s.id}')">
            ${sportIcon(s.id, 22)}<span>${s.label}</span>
          </button>
        `).join('')}
      </div>

      ${!isRest ? `
        ${d.sport === 'strength' ? `
          <div class="input-group" style="margin-top:16px;">
            <label class="input-label">Session du programme (${program.name})</label>
            <select class="input" onchange="setPlanDaySession(${idx}, this.value)">
              ${program.sessions.map(s => `<option value="${s.id}" ${d.sessionId===s.id?'selected':''}>${s.name}</option>`).join('')}
            </select>
          </div>
        ` : ''}

        <div class="row gap-8" style="margin-top:8px;">
          <div class="input-group" style="flex:1; margin-bottom:0;">
            <label class="input-label">Heure</label>
            <input type="time" class="input" value="${d.time||'18:00'}" oninput="setPlanDayField(${idx},'time',this.value)">
          </div>
          <div class="input-group" style="flex:1; margin-bottom:0;">
            <label class="input-label">Durée (min)</label>
            <input type="text" class="input" inputmode="numeric" value="${d.duration||60}" oninput="setPlanDayField(${idx},'duration',parseInt(this.value)||0)">
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function setPlanDaySport(idx, sportId) {
  const d = state._planForm.days[idx];
  d.sport = sportId;
  if (sportId === 'rest') {
    d.time = null; d.duration = 0;
    delete d.sessionId; delete d.sessionName; delete d.programId;
  } else {
    d.time = d.time || '18:00';
    d.duration = d.duration || 60;
    if (sportId === 'strength') {
      const u = state.user;
      const program = PROGRAMS[u.program];
      // Trouve la dernière session non choisie pour proposer alternance
      const usedSessionIds = state._planForm.days
        .filter((dd, i) => i !== idx && dd.sport === 'strength' && dd.sessionId)
        .map(dd => dd.sessionId);
      const next = program.sessions.find(s => !usedSessionIds.includes(s.id)) || program.sessions[0];
      d.programId = u.program;
      d.sessionId = next.id;
      d.sessionName = next.name;
    } else {
      delete d.sessionId; delete d.sessionName; delete d.programId;
    }
  }
  render();
}

function setPlanDaySession(idx, sessionId) {
  const d = state._planForm.days[idx];
  const program = PROGRAMS[d.programId];
  const sess = program.sessions.find(s => s.id === sessionId);
  d.sessionId = sessionId;
  d.sessionName = sess?.name;
  render();
}

function setPlanDayField(idx, field, value) {
  state._planForm.days[idx][field] = value;
}

function autoFillPlanForm() {
  // Reset le form en pré-remplissant Lun/Mer/Ven musculation
  const ws = weekStartDate();
  delete state._planForm;
  delete state._planEditIdx;
  render();
  toast('Suggestion auto-générée');
}

function confirmWeekPlanV2() {
  const f = state._planForm;
  const active = f.days.filter(d => d.sport !== 'rest').length;
  if (active === 0) return toast('Planifie au moins un jour');
  state.weekPlan = { weekStart: f.weekStart, days: f.days };
  state._planEditIdx = null;
  saveState();
  toast('Planning enregistré');
  navigate('workout');
}

function clearWeekPlan() {
  if (state._clearPlanPending) {
    clearTimeout(state._clearPlanTimer);
    state._clearPlanPending = false;
    state.weekPlan = null;
    saveState();
    toast('Planning supprimé');
    navigate('workout');
    return;
  }
  state._clearPlanPending = true;
  toast('Reclique pour confirmer la suppression');
  state._clearPlanTimer = setTimeout(()=>{ state._clearPlanPending = false; }, 3000);
}

function toggleCardioTimer() {
  const c = state._activeCardio;
  if (!c) return;
  if (c.runningSince) {
    c.elapsedMs = (c.elapsedMs || 0) + (Date.now() - c.runningSince);
    c.runningSince = null;
  } else {
    c.runningSince = Date.now();
  }
  render();
}

function abortCardio() {
  if (state._abortPending) {
    clearTimeout(state._abortTimer);
    state._abortPending = false;
    state._activeCardio = null;
    navigate('workout');
    return;
  }
  state._abortPending = true;
  toast('Re-clique sur retour pour abandonner');
  state._abortTimer = setTimeout(()=>{ state._abortPending = false; }, 3000);
}

function finishCardio() {
  const c = state._activeCardio;
  if (!c) return;
  if (c.runningSince) {
    c.elapsedMs = (c.elapsedMs || 0) + (Date.now() - c.runningSince);
    c.runningSince = null;
  }
  const realDuration = Math.max(1, Math.round((c.elapsedMs || 0) / 60000));
  const kcal = caloriesBurned(c.sport, realDuration, state.user?.weight);

  // Normaliser le champ "distance" (s'il existe) vers km pour stockage cohérent
  const fields = { ...(c.fields || {}) };
  const sport = sportType(c.sport);
  (sport.fields || []).forEach(f => {
    const raw = fields[f.key];
    if (raw === '' || raw === undefined || raw === null) return;
    if (f.type === 'distance') {
      const n = parseFloat(raw) || 0;
      fields[f.key] = isImperial() ? (n * 1.609344) : n;
    } else if (['meters','count','bpm'].includes(f.type)) {
      const n = parseFloat(raw);
      if (!isNaN(n)) fields[f.key] = n;
    } else if (f.type === 'speed') {
      const n = parseFloat(raw);
      if (!isNaN(n)) fields[f.key] = isImperial() ? (n * 1.609344) : n;
    }
    // strings (time, pool, stroke, yoga…) restent telles quelles
  });

  state.workouts.push({
    id: c.id,
    date: c.date,
    type: 'cardio',
    sport: c.sport,
    duration: realDuration,
    fields,
    rpe: c.rpe,
    notes: c.notes || '',
    kcalBurned: kcal,
    exercises: []
  });
  state._activeCardio = null;
  saveState();
  toast(`Séance enregistrée · ~${kcal} kcal`);
  navigate('workout');
}

function sportIcon(id, size = 18) {
  const s = sportType(id);
  const w = size, h = size;
  const i = s.icon;
  const sw = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">';
  switch(i){
    case 'dumbbell': return sw+'<path d="M3 12 L6 12 M18 12 L21 12 M6 8 L6 16 M18 8 L18 16 M9 6 L9 18 M15 6 L15 18 M9 12 L15 12"/></svg>';
    case 'run': return sw+'<circle cx="14" cy="5" r="2"/><path d="M9 11 L13 8 L16 11 L19 11 M13 8 L11 14 L14 17 L14 21 M11 14 L7 16 M11 14 L8 21"/></svg>';
    case 'walk': return sw+'<circle cx="13" cy="5" r="2"/><path d="M11 21 L13 14 L10 11 L13 7 L17 11 M13 14 L17 17 L18 21 M11 21 L9 17 L7 12"/></svg>';
    case 'bike': return sw+'<circle cx="6" cy="17" r="3.5"/><circle cx="18" cy="17" r="3.5"/><path d="M6 17 L10 11 L14 11 L18 17 M14 11 L11 5 L8 5 M14 11 L17 7"/></svg>';
    case 'wave': return sw+'<path d="M3 10 C 5 8, 7 8, 9 10 C 11 12, 13 12, 15 10 C 17 8, 19 8, 21 10 M3 16 C 5 14, 7 14, 9 16 C 11 18, 13 18, 15 16 C 17 14, 19 14, 21 16"/></svg>';
    case 'mountain': return sw+'<path d="M2 20 L8 10 L13 16 L17 11 L22 20 Z"/><circle cx="16" cy="6" r="1.5"/></svg>';
    case 'flame': return sw+'<path d="M12 3 C 12 8, 7 9, 7 14 A 5 5 0 0 0 17 14 C 17 9, 12 8, 12 3 Z"/></svg>';
    case 'lotus': return sw+'<path d="M12 14 C 8 14, 6 10, 6 7 C 8 9, 10 10, 12 10 C 14 10, 16 9, 18 7 C 18 10, 16 14, 12 14 Z"/><path d="M12 14 L12 19 M8 19 L16 19"/></svg>';
    case 'sun': return sw+'<circle cx="12" cy="12" r="4"/><path d="M12 3 L12 5 M12 19 L12 21 M3 12 L5 12 M19 12 L21 12 M5.6 5.6 L7 7 M17 17 L18.4 18.4 M5.6 18.4 L7 17 M17 7 L18.4 5.6"/></svg>';
    default: return sw+'<circle cx="12" cy="12" r="6"/></svg>';
  }
}
const iconSun = (s=18) => sportIcon('rest', s);


setInterval(() => {
  if (currentView === 'workout-session' && state._activeWorkout && state._activeWorkout.runningSince) {
    const el = document.getElementById('sessionTimer');
    if (el) el.textContent = formatElapsed(activeWorkoutElapsedMs());
  }
  if (currentView === 'cardio-session' && state._activeCardio && state._activeCardio.runningSince) {
    const el = document.getElementById('cardioTimer');
    if (el) {
      const ms = (state._activeCardio.elapsedMs || 0) + (Date.now() - state._activeCardio.runningSince);
      el.textContent = formatElapsed(ms);
    }
  }
}, 1000);

// ============================================================
// DÉMARRAGE
// ============================================================
function boot() {
  if (state.user && state.user.firstName) {
    updateStreak();
    navigate('home');
  } else {
    navigate('welcome');
  }
}


// Heure réelle dans la status bar
function updateClock(){
  const d=new Date();
  document.getElementById('statusTime').textContent = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
updateClock();
setInterval(updateClock,30000);

// Démarrage
boot();
</script>
