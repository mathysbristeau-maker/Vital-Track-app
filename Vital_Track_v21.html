// Détermine la sémantique d'une variation pour un champ donné
function trendSemantic(fieldKey, delta, goal) {
  // delta > 0 = augmentation, delta < 0 = diminution
  const muscleGroups = ['arm','forearm','thigh','calf','chest','shoulder','neck'];
  const isMuscle = muscleGroups.includes(fieldKey);
  const fatTracked = ['waist','hips','bf'];
  const isFat = fatTracked.includes(fieldKey);
  // Champs où l'augmentation est TOUJOURS positive
  const alwaysGood = ['water','muscle'];

  if (Math.abs(delta) < 0.05) return 'neutral';

  if (alwaysGood.includes(fieldKey)) {
    return delta > 0 ? 'good' : 'bad';
  }
  if (isFat) {
    if (goal === 'masse') return delta > 0 ? 'mild' : 'good';
    return delta < 0 ? 'good' : 'bad';
  }
  if (isMuscle) {
    if (goal === 'seche') return delta < 0 ? 'mild' : 'good';
    if (goal === 'masse') return delta > 0 ? 'good' : 'bad';
    return 'neutral';
  }
  return 'neutral';
}

function trendColor(sem) {
  // sage (positif), terra (négatif), mist (neutre/léger)
  if (sem === 'good') return 'var(--sage-deep)';
  if (sem === 'bad')  return 'var(--terra)';
  return 'var(--mist)';
}

function trendArrow(delta) {
  if (Math.abs(delta) < 0.05) return iconDash();
  return delta > 0 ? iconUp() : iconDown();
}

function sparkline(series, color) {
  if (series.length === 0) return '';
  const W = 84, H = 32, PAD = 2;
  if (series.length === 1) {
    // Un seul point : ligne plate au centre
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <circle cx="${W/2}" cy="${H/2}" r="2" fill="${color}"/>
    </svg>`;
  }
  const vals = series.map(p => p.val);
  let minY = Math.min(...vals), maxY = Math.max(...vals);
  if (maxY - minY < 0.5) { minY -= 0.5; maxY += 0.5; }
  const xs = series.map((_, i) => PAD + (i / (series.length - 1)) * (W - 2*PAD));
  const ys = vals.map(v => H - PAD - ((v - minY) / (maxY - minY)) * (H - 2*PAD));
  const path = series.map((_, i) => `${i===0?'M':'L'} ${xs[i].toFixed(1)} ${ys[i].toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xs[xs.length-1].toFixed(1)}" cy="${ys[ys.length-1].toFixed(1)}" r="2" fill="${color}"/>
  </svg>`;
}

function renderSingleMeasure(field, series, goal) {
  const isPercent = field.unit === '%';
  const displayUnit = isPercent ? '%' : lengthUnit();
  // Conversion du series pour l'affichage
  const seriesView = isPercent ? series : series.map(p => ({ date: p.date, val: displayLength(p.val) }));
  const last = seriesView[seriesView.length - 1];
  const prev = seriesView.length > 1 ? seriesView[seriesView.length - 2] : null;
  const delta = prev ? last.val - prev.val : 0;
  // Sémantique sur la donnée brute (kg, cm) — peu importe l'unité d'affichage
  const rawDelta = series.length > 1 ? series[series.length-1].val - series[series.length-2].val : 0;
  const sem = prev ? trendSemantic(field.key, rawDelta, goal) : 'neutral';
  const color = trendColor(sem);
  const sign = delta > 0 ? '+' : '';
  const deltaTxt = prev ? `${sign}${delta.toFixed(1)} ${displayUnit}` : 'Premier point';

  return `
    <div class="kinetic-row">
      <div class="kinetic-label">
        <div class="kinetic-name">${field.label}</div>
        <div class="kinetic-meta">${series.length} point${series.length>1?'s':''}</div>
      </div>
      <div class="kinetic-value">
        <span class="t-mono-sm">${last.val}</span>
        <span class="t-caption" style="margin-left:2px;">${displayUnit}</span>
      </div>
      <div class="kinetic-spark">${sparkline(seriesView, color)}</div>
      <div class="kinetic-trend" style="color:${color};">
        ${prev ? trendArrow(delta) : ''}
        <span class="kinetic-delta">${deltaTxt}</span>
      </div>
    </div>
  `;
}

function renderPairedMeasure(field, seriesL, seriesR, goal) {
  const isPercent = field.unit === '%';
  const displayUnit = isPercent ? '%' : lengthUnit();
  const buildSide = (lab, series) => {
    if (series.length === 0) {
      return `
        <div class="kinetic-side">
          <div class="kinetic-side-lab">${lab}</div>
          <div class="kinetic-side-val t-mist">—</div>
        </div>
      `;
    }
    const seriesView = isPercent ? series : series.map(p => ({ date: p.date, val: displayLength(p.val) }));
    const last = seriesView[seriesView.length - 1];
    const prev = seriesView.length > 1 ? seriesView[seriesView.length - 2] : null;
    const delta = prev ? last.val - prev.val : 0;
    const rawDelta = series.length > 1 ? series[series.length-1].val - series[series.length-2].val : 0;
    const sem = prev ? trendSemantic(field.key, rawDelta, goal) : 'neutral';
    const color = trendColor(sem);
    const sign = delta > 0 ? '+' : '';
    return `
      <div class="kinetic-side">
        <div class="kinetic-side-lab">${lab}</div>
        <div class="kinetic-side-val"><span class="t-mono-sm">${last.val}</span><span class="t-caption" style="margin-left:2px;">${displayUnit}</span></div>
        <div class="kinetic-side-spark">${sparkline(seriesView, color)}</div>
        <div class="kinetic-side-trend" style="color:${color};">${prev ? `${trendArrow(delta)}<span>${sign}${delta.toFixed(1)}</span>` : '<span class="t-caption">1er</span>'}</div>
      </div>
    `;
  };
  return `
    <div class="kinetic-row paired">
      <div class="kinetic-name" style="margin-bottom:8px;">${field.label}</div>
      <div class="kinetic-pair">
        ${buildSide('Gauche', seriesL)}
        <div class="kinetic-pair-sep"></div>
        ${buildSide('Droit', seriesR)}
      </div>
    </div>
  `;
}

  return weights.filter(w => w.date >= cutoffStr);

function weightChart(data, target) {
  if (data.length === 0) {
    return `<div class="empty" style="padding:24px;"><div class="empty-sub">Pas encore de données.</div></div>`;
  }

  // Trier par date puis par ordre d'insertion (index dans state.weights)
  // data est déjà trié par date (passé depuis renderProgress)
  // On déduplique UNIQUEMENT les entrées strictement identiques (même date ET même kg)
  const seen = new Set();
  const pts = data.filter(d => {
    const k = d.date + '_' + d.kg;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  const conv = isImperial() ? kgToLb : (v => v);
  const targetView = conv(target);

  const PAD_L = 8, PAD_R = 20, PAD_TOP = 28, PAD_BOT = 32;
  const W = 320, H = 220;
  const cW = W - PAD_L - PAD_R;
  const cH = H - PAD_TOP - PAD_BOT;

  const ys = pts.map(d => conv(d.kg));
  const minY = Math.min(...ys, targetView) - 1;
  const maxY = Math.max(...ys, targetView) + 1;
  const yScale = v => PAD_TOP + cH - ((v - minY) / (maxY - minY)) * cH;
  const xOf = i => pts.length === 1 ? W / 2 : PAD_L + (i / (pts.length - 1)) * cW;

  const fmtShort = dateStr => {
    const d = new Date(dateStr + 'T12:00:00');
    return `${d.getDate()}/${d.getMonth()+1}`;
  };

  const SQ = 5;
  const targetY = yScale(targetView).toFixed(2);
  const linePoints = pts.map((d,i) => `${xOf(i).toFixed(2)},${yScale(conv(d.kg)).toFixed(2)}`).join(' ');

  // Label valeur : alterner haut/bas pour éviter les chevauchements
  const labelAbove = (i) => {
    if (i === 0) return true;
    return yScale(conv(pts[i].kg)) <= yScale(conv(pts[i-1].kg)); // monte = label en haut
  };

  return `
    <div class="chart-wrap" style="height:${H}px;">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;overflow:visible;">
        <line x1="${PAD_L}" y1="${targetY}" x2="${W-PAD_R}" y2="${targetY}"
              stroke="var(--mist)" stroke-width="1" stroke-dasharray="4 4"/>
        <text x="${W-PAD_R+2}" y="${targetY}" dy="4" font-size="9" fill="var(--mist)" font-family="var(--font-mono)">obj.</text>

        ${pts.length > 1 ? `<polyline points="${linePoints}" fill="none" stroke="var(--sage)" stroke-width="2" stroke-linejoin="miter"/>` : ''}

        ${pts.map((d,i) => {
          const x = xOf(i);
          const y = yScale(conv(d.kg));
          const val = conv(d.kg);
          const valStr = val % 1 === 0 ? val.toFixed(0) : val.toFixed(1);
          const above = labelAbove(i);
          const lY = above ? y - 10 : y + 18;
          return `
            <rect x="${(x-SQ).toFixed(2)}" y="${(y-SQ).toFixed(2)}" width="${SQ*2}" height="${SQ*2}" fill="var(--sage-deep)" rx="1"/>
            <text x="${x.toFixed(2)}" y="${lY.toFixed(2)}" text-anchor="middle"
                  font-size="10" font-weight="600" fill="var(--stone)" font-family="var(--font-mono)">${valStr}</text>
            <text x="${x.toFixed(2)}" y="${(H - PAD_BOT + 14).toFixed(2)}" text-anchor="middle"
                  font-size="9" fill="var(--mist)" font-family="var(--font-text)"
                  transform="rotate(-35,${x.toFixed(2)},${(H - PAD_BOT + 14).toFixed(2)})">${fmtShort(d.date)}</text>
          `;
        }).join('')}
      </svg>
    </div>
  `;
}

function sleepBars(sleep) {
  const dayNames = ['L','M','M','J','V','S','D'];

  return `

        `;
      }).join('')}
    </div>
  `;
}

let _sleepQ = 4;

function saveSleep() {
  const bed = document.getElementById('s_bed').value;
  const wake = document.getElementById('s_wake').value;
  let h = parseFloat(document.getElementById('s_hours').value);
  if (!h && bed && wake) {
    const [bH, bM] = bed.split(':').map(Number);
    const [wH, wM] = wake.split(':').map(Number);
    let mins = (wH*60+wM) - (bH*60+bM);
    if (mins < 0) mins += 24*60;
    h = +(mins/60).toFixed(2);
  }
  if (!h) return toast('Durée requise');
  state.sleep.push({
    id: uid(),
    date: document.getElementById('s_date').value,
    hours: h, quality: _sleepQ, bedtime: bed, wake
  });
  saveState();
  toast('Sommeil enregistré');
  navigate('progress');
}

// ============================================================
// SUPPRESSION GÉNÉRIQUE — confirmation visuelle 2 clics
// ============================================================
// Helpers : trouver l'identifiant d'une entrée (id sinon index)
function entryKey(arr, item, idx) {
  return item.id || `idx-${idx}`;
}

function requestDelete(scope, key, onConfirm) {
  // 1er clic : on demande confirmation, change l'icône en rouge
  if (state._delScope !== scope || state._delKey !== key) {
    state._delScope = scope;
    state._delKey = key;
    render();
    clearTimeout(state._delTimer);
    state._delTimer = setTimeout(() => {
      if (state._delScope === scope && state._delKey === key) {
        state._delScope = null;
        state._delKey = null;
        render();
      }
    }, 4000);
    return;
  }
  // 2e clic : suppression effective
  state._delScope = null;
  state._delKey = null;
  clearTimeout(state._delTimer);
  onConfirm();
}

function isPendingDelete(scope, key) {
  return state._delScope === scope && state._delKey === key;
}

function deleteRow(scope, idx) {
  const key = scope === 'weight' ? entryKey(state.weights, state.weights[idx], idx)
            : scope === 'measure' ? entryKey(state.measurements, state.measurements[idx], idx)
            : entryKey(state.sleep, state.sleep[idx], idx);
  requestDelete(scope, key, () => {
    if (scope === 'weight') {
      state.weights.splice(idx, 1);
      // Recale le poids "actuel" de l'utilisateur sur le dernier point restant
      if (state.weights.length > 0) {
        const last = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date)).pop();
        state.user.weight = last.kg;
      }
    } else if (scope === 'measure') {
      state.measurements.splice(idx, 1);
    } else {
      state.sleep.splice(idx, 1);
    }
    saveState();
    toast('Supprimé');
    render();
  });
}

function renderMeasurementsHistory() {
  const sorted = state.measurements
    .map((m, idx) => ({ ...m, _idx: idx }))
    .sort((a, b) => b.date.localeCompare(a.date));

  // Synthèse compacte des champs renseignés pour une mesure
  const summarize = (m) => {
    const parts = [];
    MEASURE_FIELDS.forEach(f => {
      const isPercent = f.unit === '%';
      const fmt = (v) => v === undefined ? '—' : (isPercent ? v : displayLength(v));
      if (f.pair) {
        if (m[f.keyL] !== undefined || m[f.keyR] !== undefined) {
          parts.push(`${f.label} ${fmt(m[f.keyL])}/${fmt(m[f.keyR])}`);
        }
      } else if (m[f.key] !== undefined) {
        parts.push(`${f.label} ${fmt(m[f.key])}${isPercent?'%':''}`);
      }
    });
    return parts.length ? parts.join(' · ') : 'Aucune valeur';
  };

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('progress')">${iconBack()}</button>

}

async function askCoachAI(text) {
  if (!state._coachHistory) state._coachHistory = [];

  // Message "loading" temporaire
  const loadingEntry = { user: text, response: { type: 'plain', title: '...', content: '⏳ Je réfléchis...' }, timestamp: Date.now(), loading: true };
  state._coachHistory.push(loadingEntry);
  state._coachQuery = '';
  render();
  setTimeout(() => { const cont = document.getElementById('screenContainer'); if (cont) cont.scrollTop = cont.scrollHeight; }, 50);

  try {
    const systemPrompt = buildCoachContext();

    const pastMessages = (state._coachHistory || [])
      .filter(h => !h.loading && h.response && h.response.type === 'ai')
      .slice(-6)
      .flatMap(h => [
        { role: 'user', content: h.user },
        { role: 'assistant', content: h.response.content }
      ]);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [...pastMessages, { role: 'user', content: text }]
      })
    });
    const data = await response.json();
    const aiText = data.content && data.content[0] ? data.content[0].text : "Désolé, je n'ai pas pu répondre. Réessaie.";

    // Remplacer le message loading par la vraie réponse
    const idx = state._coachHistory.indexOf(loadingEntry);
    if (idx !== -1) {
      state._coachHistory[idx] = { user: text, response: { type: 'ai', title: '🤖 Coach IA', content: aiText }, timestamp: Date.now() };
    }
  } catch (err) {
    const idx = state._coachHistory.indexOf(loadingEntry);
    if (idx !== -1) {
      state._coachHistory[idx] = { user: text, response: { type: 'plain', title: 'Erreur', content: "Impossible de contacter le coach IA. Vérifie ta connexion." }, timestamp: Date.now() };
    }
  }

  render();
  setTimeout(() => { const cont = document.getElementById('screenContainer'); if (cont) cont.scrollTop = cont.scrollHeight; }, 50);
}

function askCoach(text) {
  if (!state._coachHistory) state._coachHistory = [];
  const response = coachRespond(text);
  if (response) {
    state._coachHistory.push({ user: text, response, timestamp: Date.now() });
    state._coachQuery = '';
    render();
    setTimeout(() => { const cont = document.getElementById('screenContainer'); if (cont) cont.scrollTop = cont.scrollHeight; }, 50);
  } else {
    // Fallback IA : appel à Claude
    askCoachAI(text);
  }
}

              <div class="list-item" style="cursor:pointer;" onclick="navigate('recipe-detail', { id: '${rec.id}', slot: 'Suggestion', date: '${todayISO()}' })">

                </div>
                ${iconArrow()}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    case 'generated_session': {
      const c = r.content;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <div class="t-caption">${c.duration} min · niveau ${c.level} · ~${c.totalEstimatedKcal} kcal</div>
          <div class="mt-16">
            ${c.exercises.map((ex, i) => `
              <div class="list-item">
                <div class="list-item-icon" style="font-family:var(--font-mono);font-weight:700;">${i+1}</div>
                <div class="list-item-content">
                  <div class="list-item-title">${ex.name}</div>
                  <div class="list-item-sub">${ex.sets}×${ex.reps} · repos ${ex.rest}s${ex.suggestedKg?` · ${ex.suggestedKg} ${weightUnit()}`:''}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    case 'generated_meal_plan': {
      const c = r.content;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          <div class="t-caption mb-16">Plan adapté à tes préférences, ton frigo et ton planning sportif.</div>
          ${c.slice(0, 3).map(d => `
            <div class="mini-day-plan">
              <div class="t-mono-sm" style="color:var(--sage-deep);text-transform:capitalize;">${d.day} ${d.date.slice(5)}</div>
              <div class="t-caption">${d.breakfast?.name} · ${d.lunch?.name} · ${d.dinner?.name}${d.snack2?` · +collation`:''}</div>
            </div>
          `).join('')}
          ${c.length > 3 ? `<div class="t-caption mt-8">+ ${c.length - 3} jours</div>` : ''}
          <button class="btn btn-secondary mt-16" onclick="useMealPlan(); navigate('meal-plan');">Voir le plan complet</button>
        </div>
      `;
    }

    case 'alerts': {
      const c = r.content;
      if (c.length === 0) return `<div class="coach-msg-bubble bot"><div class="coach-msg-title">${r.title}</div><p>Tu navigues bien : aucun signal d'alerte sur tes données récentes.</p></div>`;
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">${r.title}</div>
          ${c.map(a => renderAlertCard(a, true)).join('')}
        </div>
      `;
    }

    case 'search_fallback': {
      return `
        <div class="coach-msg-bubble bot">
          <div class="coach-msg-title">Recherche dans les exercices</div>
          ${renderCoachResults(r.content)}
        </div>
      `;
    }

    case 'ai': {
      const formatted = r.content
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .split(/\n\n+/)
        .map(p => p.trim())
        .filter(Boolean)
        .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
        .join('');
      return `<div class="coach-msg-bubble bot"><div class="coach-msg-title">${r.title || '🤖 Coach IA'}</div>${formatted}</div>`;
    }

    default:
      return `<div class="coach-msg-bubble bot">${r.title || ''}<p>${r.content || ''}</p></div>`;
  }
}

function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  if (!input) return;
  const key = input.value.trim();
  if (!key) return toast('Saisis ta clé API');
  if (!key.startsWith('sk-ant-')) return toast('Clé invalide — doit commencer par sk-ant-');
  localStorage.setItem('vt_api_key', key);
  toast('✅ Clé API enregistrée');
  render();
}

function deleteApiKey() {
  if (!confirm('Supprimer la clé API ? Le Coach IA ne pourra plus répondre.')) return;
  localStorage.removeItem('vt_api_key');
  toast('Clé supprimée');
  render();
}

function getApiKey() {
  return localStorage.getItem('vt_api_key') || '';
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vital-track-' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Export téléchargé');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (confirm('Remplacer toutes les données actuelles ?')) {
        state = { ...DEFAULT_STATE, ...imported };
        saveState();
        toast('Import réussi');
        render();
      }
    } catch (err) {
      toast('Fichier invalide');
    }
  };
  r.readAsText(file);
}

function renderWeekPlanSetup() {
  const u = state.user;
  const ws = weekStartDate();
  // État du formulaire : tableau de 7 jours, chacun avec son sport (ou 'rest') et ses détails
  if (!state._planForm || state._planForm.weekStart !== ws) {
    const cur = (state.weekPlan && state.weekPlan.weekStart === ws && Array.isArray(state.weekPlan.days)) ? state.weekPlan : null;

    const targetSessions = u.sessionsPerWeek || 3;
    const sessionDaysByCount = {
      1: [0], 2: [0, 3], 3: [0, 2, 4],
      4: [0, 1, 3, 4], 5: [0, 1, 2, 3, 4],
      6: [0, 1, 2, 3, 4, 5], 7: [0,1,2,3,4,5,6]
    };
    const activeDays = sessionDaysByCount[Math.min(Math.max(targetSessions, 1), 7)] || [0, 2, 4];

    // Tous les programmes sélectionnés (dans l'ordre de sélection)
    const selectedPrograms = Array.isArray(u.programs) && u.programs.length > 0
      ? u.programs : [u.program || 'fullbody'];

    const LEG_SESSION_IDS = ['legs', 'lower', 'fb1', 'fb2'];
    const hasAbdos = selectedPrograms.includes('abdos');
    // Programmes principaux (hors abdos — géré séparément)
    const mainPrograms = selectedPrograms.filter(id => id !== 'abdos');

    // Construire une file de séances pour les jours actifs
    // On alterne entre les sessions de chaque programme principal dans l'ordre
    const sessionQueue = [];
    const progIdxMap = {}; // index de session courant par programme
    mainPrograms.forEach(pid => { progIdxMap[pid] = 0; });

    let globalIdx = 0;
    for (let slot = 0; slot < activeDays.length; slot++) {
      const pid = mainPrograms[globalIdx % mainPrograms.length];
      const prog = PROGRAMS[pid];
      if (!prog) { globalIdx++; continue; }
      const sess = prog.sessions[progIdxMap[pid] % prog.sessions.length];
      progIdxMap[pid]++;
      globalIdx++;
      sessionQueue.push({ programId: pid, session: sess });
    }

    // Construire les 7 jours
    let queueIdx = 0;
    let abdosIdx = 0;
    const baseDays = Array.from({ length: 7 }, (_, i) => {
      const date = new Date(new Date(ws));
      date.setDate(date.getDate() + i);
      const iso = date.toISOString().slice(0, 10);

      // Si plan existant validé, le conserver
      if (cur && cur.days[i] && cur.days[i].date && cur.days[i].sport) {
        const validSport = SPORT_TYPES.find(s => s.id === cur.days[i].sport);
        if (validSport) return { ...cur.days[i] };
      }

      if (!activeDays.includes(i)) return { date: iso, sport: 'rest', time: null, duration: 0 };

      const item = sessionQueue[queueIdx++];
      if (!item) return { date: iso, sport: 'rest', time: null, duration: 0 };

      return {
        date: iso,
        sport: 'strength',
        programId: item.programId,
        sessionId: item.session.id,
        sessionName: item.session.name,
        time: '18:00',
        duration: item.session.duration || 60
      };
    });

    // Injecter abdos : le même jour que jambes/lower (séance combinée),
    // ou si pas de jambes trouvé → premier repos dispo
    // Dans tous les cas on ne crée pas de jour séparé qui mangerait un repos
    if (hasAbdos) {
      const abdosProg = PROGRAMS.abdos;
      let placed = false;

      // Cherche une séance jambes/lower et ajoute abdos ce même jour (tag _extraAbdos)
      for (let i = 0; i < 7; i++) {
        const d = baseDays[i];
        const isLegDay = d.sport === 'strength' && LEG_SESSION_IDS.includes(d.sessionId);
        if (isLegDay) {
          const abdosSess = abdosProg.sessions[abdosIdx % abdosProg.sessions.length];
          abdosIdx++;
          // On attache la séance abdos au même jour via un champ extraSession
          baseDays[i] = {
            ...d,
            extraProgramId: 'abdos',
            extraSessionId: abdosSess.id,
            extraSessionName: abdosSess.name
          };
          placed = true;
          // Continuer pour couvrir plusieurs jours jambes (ex: PPL a legs + upper/lower a lower)
        }
      }

      // Si aucun jour jambes, placer sur premier repos dispo
      if (!placed) {
        const firstRest = baseDays.findIndex(d => d.sport === 'rest');
        if (firstRest >= 0) {
          const abdosSess = abdosProg.sessions[0];
          baseDays[firstRest] = {
            date: baseDays[firstRest].date, sport: 'strength',
            programId: 'abdos', sessionId: abdosSess.id,
            sessionName: abdosSess.name, time: '18:00', duration: abdosSess.duration
          };
        }
      }
    }

    state._planForm = { weekStart: ws, days: baseDays };
  }
  const f = state._planForm;
  const editingIdx = state._planEditIdx;
  const activeCount = f.days.filter(d => d.sport !== 'rest').length;

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('workout')">${iconBack()}</button>
        <button class="btn-icon" onclick="autoFillPlanForm()" aria-label="Auto-remplir">${iconRefresh()}</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Planifier ma semaine</h1>
      <div class="t-caption">${activeCount} séance${activeCount>1?'s':''} planifiée${activeCount>1?'s':''} · ${7-activeCount} repos</div>
    </div>

    ${f.days.map((d, i) => renderPlanDayCard(d, i, editingIdx === i)).join('')}

    <div style="height:8px;"></div>
    <button class="btn btn-primary" onclick="confirmWeekPlanV2()">Enregistrer ce planning</button>
    ${state.weekPlan && state.weekPlan.weekStart === ws ? `<div style="height:8px;"></div><button class="btn btn-secondary" onclick="clearWeekPlan()">Supprimer ce planning</button>` : ''}
    <div style="height: 100px;"></div>
  `;
}

function renderPlanDayCard(d, idx, editing) {
  // Sécurités état : si jamais d est vide ou corrompu
  if (!d || !d.date) {
    d = { date: todayISO(), sport: 'rest', time: null, duration: 0 };
  }
  // Si le sport stocké n'existe plus dans le catalogue, on retombe sur 'rest'
  if (!SPORT_TYPES.find(s => s.id === d.sport)) {
    d.sport = 'rest';
  }
  const dayName = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'][idx];
  const isRest = d.sport === 'rest';
  const sp = sportType(d.sport);
  const dt = new Date(d.date);
  const num = dt.getDate();
  const month = dt.toLocaleDateString('fr-FR', { month: 'short' });

  // Mode résumé
  if (!editing) {
    return `
      <div class="plan-day-card ${isRest?'rest':''}" onclick="state._planEditIdx=${idx}; render();">
        <div class="plan-day-left">
          <div class="plan-day-date">
            <div class="plan-day-name">${dayName}</div>
            <div class="plan-day-num">${num} ${month}</div>
          </div>
        </div>
        <div class="plan-day-body">
          ${isRest ? `
            <div class="plan-day-sport-row">
              <div class="plan-day-icon rest">${sportIcon('rest', 16)}</div>
              <div class="plan-day-sport-name t-mist">Repos</div>
            </div>
          ` : `
            <div class="plan-day-sport-row">
              <div class="plan-day-icon">${sportIcon(d.sport, 16)}</div>
              <div class="plan-day-sport-name">${d.sport==='strength' && d.sessionName ? d.sessionName : sp.label}</div>
            </div>
            ${d.extraSessionName ? `
            <div class="plan-day-sport-row" style="margin-top:4px;">
              <div class="plan-day-icon" style="background:var(--sage-pale);">🔥</div>
              <div class="plan-day-sport-name" style="font-size:12px;color:var(--sage-deep);">${d.extraSessionName}</div>
            </div>` : ''}
            <div class="plan-day-meta">${d.time||'—'} · ${d.duration||0} min${d.extraSessionName ? ` + ${PROGRAMS.abdos?.sessions.find(s=>s.id===d.extraSessionId)?.duration||20} min abdos` : ''}</div>
          `}
        </div>
        <div class="plan-day-action">${iconEdit()}</div>
      </div>
    `;
  }

  // Mode édition
  const u = state.user;
  const program = PROGRAMS[u.program];
  return `
    <div class="plan-day-card editing">
      <div class="row-between mb-16">
        <div>
          <div class="t-body" style="font-weight: 600;">${dayName} ${num} ${month}</div>
          <div class="t-caption">Choisis un sport ou laisse en repos</div>
        </div>
        <button class="btn-icon" onclick="state._planEditIdx=null; render();">${iconCheck()}</button>
      </div>

      <div class="plan-sport-options">
        <button class="sport-pick ${d.sport==='rest'?'active':''}" onclick="setPlanDaySport(${idx},'rest')">
          ${sportIcon('rest', 22)}<span>Repos</span>
        </button>
        ${SPORT_TYPES.filter(s => s.id !== 'rest').map(s => `
          <button class="sport-pick ${d.sport===s.id?'active':''}" onclick="setPlanDaySport(${idx},'${s.id}')">
            ${sportIcon(s.id, 22)}<span>${s.label}</span>
          </button>
        `).join('')}
      </div>

      ${!isRest ? `
        ${d.sport === 'strength' ? `
          <div class="input-group" style="margin-top:16px;">
            <label class="input-label">Session du programme (${program.name})</label>
            <select class="input" onchange="setPlanDaySession(${idx}, this.value)">
              ${program.sessions.map(s => `<option value="${s.id}" ${d.sessionId===s.id?'selected':''}>${s.name}</option>`).join('')}
            </select>
          </div>
        ` : ''}

        <div class="row gap-8" style="margin-top:8px;">
          <div class="input-group" style="flex:1; margin-bottom:0;">
            <label class="input-label">Heure</label>
            <input type="time" class="input" value="${d.time||'18:00'}" oninput="setPlanDayField(${idx},'time',this.value)">
          </div>
          <div class="input-group" style="flex:1; margin-bottom:0;">
            <label class="input-label">Durée (min)</label>
            <input type="text" class="input" inputmode="numeric" value="${d.duration||60}" oninput="setPlanDayField(${idx},'duration',parseInt(this.value)||0)">
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function setPlanDaySport(idx, sportId) {
  if (!state._planForm?.days?.[idx]) return;
  const d = state._planForm.days[idx];
  d.sport = sportId;
  if (sportId === 'rest') {
    d.time = null; d.duration = 0;
    delete d.sessionId; delete d.sessionName; delete d.programId;
  } else {
    d.time = d.time || '18:00';
    d.duration = d.duration || 60;
    if (sportId === 'strength') {
      const u = state.user;
      const programId = u?.program || 'fullbody';
      const program = PROGRAMS[programId];
      if (!program) {
        delete d.sessionId; delete d.sessionName; delete d.programId;
        render();
        return;
      }
      const usedSessionIds = state._planForm.days
        .filter((dd, i) => i !== idx && dd.sport === 'strength' && dd.sessionId)
        .map(dd => dd.sessionId);
      const next = program.sessions.find(s => !usedSessionIds.includes(s.id)) || program.sessions[0];
      d.programId = programId;
      d.sessionId = next.id;
      d.sessionName = next.name;
    } else {
      delete d.sessionId; delete d.sessionName; delete d.programId;
    }
  }
  render();
}

function setPlanDaySession(idx, sessionId) {
  const d = state._planForm.days[idx];
  // Sécurité : si programId est manquant (état corrompu), on le récupère du user
  const programId = d.programId || state.user?.program || 'fullbody';
  const program = PROGRAMS[programId];
  if (!program) {
    toast('Programme introuvable');
    return;
  }
  const sess = program.sessions.find(s => s.id === sessionId);
  if (!sess) {
    toast('Session introuvable');
    return;
  }
  d.programId = programId;
  d.sessionId = sessionId;
  d.sessionName = sess.name;
  render();
}

function setPlanDayField(idx, field, value) {
  if (!state._planForm?.days?.[idx]) return;
  state._planForm.days[idx][field] = value;
}

function autoFillPlanForm() {
  // Reset le form en respectant sessionsPerWeek
  delete state._planForm;
  delete state._planEditIdx;
  render();
  toast('Suggestion basée sur ' + (state.user?.sessionsPerWeek || 3) + ' séances/sem');
}

function confirmWeekPlanV2() {
  const f = state._planForm;
  const active = f.days.filter(d => d.sport !== 'rest').length;
  if (active === 0) return toast('Planifie au moins un jour');
  state.weekPlan = { weekStart: f.weekStart, days: f.days };
  state._planEditIdx = null;
  saveState();
  toast('Planning enregistré');
  navigate('workout');
}

function clearWeekPlan() {
  if (state._clearPlanPending) {
    clearTimeout(state._clearPlanTimer);
    state._clearPlanPending = false;
    state.weekPlan = null;
    saveState();
    toast('Planning supprimé');
    navigate('workout');
    return;
  }
  state._clearPlanPending = true;
  toast('Reclique pour confirmer la suppression');
  state._clearPlanTimer = setTimeout(()=>{ state._clearPlanPending = false; }, 3000);
}

// Rendu d'un champ spécifique au sport

  const v = value === undefined || value === null ? '' : value;
  const setVal = (val) => `state._activeCardio.fields['${field.key}']=${JSON.stringify(val)}`;
  switch (field.type) {
    case 'distance':
      return `<div class="input-group">
        <label class="input-label">${field.label} (${distanceUnit()})</label>
        <input type="text" class="input" inputmode="decimal" value="${v}" placeholder="ex : ${isImperial()?'3.2':'5.0'}" oninput="state._activeCardio.fields['${field.key}']=this.value">
      </div>`;
    case 'meters':
      return `<div class="input-group">
        <label class="input-label">${field.label} (m)</label>
        <input type="text" class="input" inputmode="numeric" value="${v}" placeholder="ex : 250" oninput="state._activeCardio.fields['${field.key}']=this.value">
      </div>`;
    case 'count':
      return `<div class="input-group">
        <label class="input-label">${field.label}</label>
        <input type="text" class="input" inputmode="numeric" value="${v}" oninput="state._activeCardio.fields['${field.key}']=this.value">
      </div>`;
    case 'bpm':
      return `<div class="input-group">
        <label class="input-label">${field.label} (bpm)</label>
        <input type="text" class="input" inputmode="numeric" value="${v}" placeholder="ex : 145" oninput="state._activeCardio.fields['${field.key}']=this.value">
      </div>`;
    case 'speed':

        <label class="input-label">${field.label} (${isImperial()?'mph':'km/h'})</label>

    case 'time':

    case 'pool': {

        <label class="input-label">${field.label}</label>
        <div class="row gap-8">
          ${opts.map(o => `<button class="chip ${v===o?'active':''}" onclick="state._activeCardio.fields['${field.key}']='${o}'; render();" style="flex:1; justify-content:center;">${o}</button>`).join('')}

    case 'stroke': {

      return `<div class="input-group">
        <label class="input-label">${field.label}</label>
        <div class="row gap-8" style="flex-wrap:wrap;">
          ${opts.map(o => `<button class="chip ${v===o?'active':''}" onclick="state._activeCardio.fields['${field.key}']='${o}'; render();">${o}</button>`).join('')}
        </div>

    }

          ${opts.map(o => `<button class="chip ${v===o?'active':''}" onclick="state._activeCardio.fields['${field.key}']='${o}'; render();">${o}</button>`).join('')}
        </div>
      </div>`;

function toggleCardioTimer() {
  const c = state._activeCardio;
  if (!c) return;
  if (c.runningSince) {
    c.elapsedMs = (c.elapsedMs || 0) + (Date.now() - c.runningSince);
    c.runningSince = null;
  } else {
    c.runningSince = Date.now();
  }
  render();
}

function abortCardio() {
  if (state._abortPending) {
    clearTimeout(state._abortTimer);
    state._abortPending = false;
    state._activeCardio = null;
    navigate('workout');
    return;
  }
  state._abortPending = true;
  toast('Re-clique sur retour pour abandonner');
  state._abortTimer = setTimeout(()=>{ state._abortPending = false; }, 3000);
}

function finishCardio() {
  const c = state._activeCardio;
  if (!c) return;
  if (c.runningSince) {
    c.elapsedMs = (c.elapsedMs || 0) + (Date.now() - c.runningSince);
    c.runningSince = null;
  }
  const realDuration = Math.max(1, Math.round((c.elapsedMs || 0) / 60000));
  const kcal = caloriesBurned(c.sport, realDuration, state.user?.weight);

  // Normaliser le champ "distance" (s'il existe) vers km pour stockage cohérent
  const fields = { ...(c.fields || {}) };
  const sport = sportType(c.sport);
  (sport.fields || []).forEach(f => {
    const raw = fields[f.key];
    if (raw === '' || raw === undefined || raw === null) return;
    if (f.type === 'distance') {
      const n = parseFloat(raw) || 0;
      fields[f.key] = isImperial() ? (n * 1.609344) : n;
    } else if (['meters','count','bpm'].includes(f.type)) {
      const n = parseFloat(raw);
      if (!isNaN(n)) fields[f.key] = n;
    } else if (f.type === 'speed') {
      const n = parseFloat(raw);
      if (!isNaN(n)) fields[f.key] = isImperial() ? (n * 1.609344) : n;
    }
    // strings (time, pool, stroke, yoga…) restent telles quelles
  });

  state.workouts.push({
    id: c.id,
    date: c.date,
    type: 'cardio',
    sport: c.sport,
    duration: realDuration,
    fields,
    rpe: c.rpe,
    notes: c.notes || '',
    kcalBurned: kcal,
    exercises: []
  });
  state._activeCardio = null;
  saveState();
  const newBadgesCardio = checkAllBadges();

  const s = sportType(id);
  const w = size, h = size;

  const sw = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">';
  switch(i){

    case 'run': return sw+'<circle cx="14" cy="5" r="2"/><path d="M9 11 L13 8 L16 11 L19 11 M13 8 L11 14 L14 17 L14 21 M11 14 L7 16 M11 14 L8 21"/></svg>';
    case 'walk': return sw+'<circle cx="13" cy="5" r="2"/><path d="M11 21 L13 14 L10 11 L13 7 L17 11 M13 14 L17 17 L18 21 M11 21 L9 17 L7 12"/></svg>';
    case 'bike': return sw+'<circle cx="6" cy="17" r="3.5"/><circle cx="18" cy="17" r="3.5"/><path d="M6 17 L10 11 L14 11 L18 17 M14 11 L11 5 L8 5 M14 11 L17 7"/></svg>';
    case 'wave': return sw+'<path d="M3 10 C 5 8, 7 8, 9 10 C 11 12, 13 12, 15 10 C 17 8, 19 8, 21 10 M3 16 C 5 14, 7 14, 9 16 C 11 18, 13 18, 15 16 C 17 14, 19 14, 21 16"/></svg>';
    case 'mountain': return sw+'<path d="M2 20 L8 10 L13 16 L17 11 L22 20 Z"/><circle cx="16" cy="6" r="1.5"/></svg>';
    case 'flame': return sw+'<path d="M12 3 C 12 8, 7 9, 7 14 A 5 5 0 0 0 17 14 C 17 9, 12 8, 12 3 Z"/></svg>';
    case 'lotus': return sw+'<path d="M12 14 C 8 14, 6 10, 6 7 C 8 9, 10 10, 12 10 C 14 10, 16 9, 18 7 C 18 10, 16 14, 12 14 Z"/><path d="M12 14 L12 19 M8 19 L16 19"/></svg>';
    case 'sun': return sw+'<circle cx="12" cy="12" r="4"/><path d="M12 3 L12 5 M12 19 L12 21 M3 12 L5 12 M19 12 L21 12 M5.6 5.6 L7 7 M17 17 L18.4 18.4 M5.6 18.4 L7 17 M17 7 L18.4 5.6"/></svg>';
    default: return sw+'<circle cx="12" cy="12" r="6"/></svg>';
  }
}

function appleRing(label, ratio, val, goal, unit, colorVar) {
  const r = 32, c = 2 * Math.PI * r;
  const offset = c * (1 - Math.min(1, ratio));
  const colorMap = { crimson: 'var(--crimson)', sage: 'var(--sage)', terra: 'var(--terra)', 'sage-deep': 'var(--sage-deep)' };
  const stroke = colorMap[colorVar] || 'var(--sage)';
  return `
    <div class="apple-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="${r}" stroke="var(--cloud)" stroke-width="8" fill="none"/>
        <circle cx="40" cy="40" r="${r}" stroke="${stroke}" stroke-width="8" fill="none"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
          transform="rotate(-90 40 40)" style="transition: stroke-dashoffset 800ms var(--ease-out);"/>
      </svg>
      <div class="apple-ring-label">${label}</div>
      <div class="apple-ring-value">${val}<span class="apple-ring-unit">${unit}</span></div>
    </div>
  `;
}

function formatSleepHHMM(min) {
  if (!min) return '0:00';
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return `${h}h${String(m).padStart(2,'0')}`;
}

function sleepPhasesBar(sd) {
  const total = (sd.deepMin || 0) + (sd.remMin || 0) + (sd.lightMin || 0) + (sd.awakeMin || 0);
  if (!total) return '<div class="t-caption">Phases non saisies.</div>';
  const pct = (m) => ((m || 0) / total) * 100;
  return `
    <div class="sleep-phases-bar">
      <div class="sleep-phase deep" style="width:${pct(sd.deepMin)}%;" title="Profond"></div>
      <div class="sleep-phase rem" style="width:${pct(sd.remMin)}%;" title="REM"></div>
      <div class="sleep-phase light" style="width:${pct(sd.lightMin)}%;" title="Léger"></div>
      <div class="sleep-phase awake" style="width:${pct(sd.awakeMin)}%;" title="Éveil"></div>
    </div>
    <div class="sleep-phases-legend">
      <span><span class="dot deep"></span>Profond</span>
      <span><span class="dot rem"></span>REM</span>
      <span><span class="dot light"></span>Léger</span>
      <span><span class="dot awake"></span>Éveil</span>

  `;
}

function saveSleepDetail() {
  const date = document.getElementById('hsd_date').value || todayISO();

  const patch = {
    bedtime: document.getElementById('hsd_bed').value || null,
    wake: document.getElementById('hsd_wake').value || null,
    deepMin: num('hsd_deep'),
    remMin: num('hsd_rem'),
    lightMin: num('hsd_light'),
    awakeMin: num('hsd_awake'),
    hr: parseInt(document.getElementById('hsd_hr').value) || undefined
  };
  patch.totalMin = (patch.deepMin || 0) + (patch.remMin || 0) + (patch.lightMin || 0) + (patch.awakeMin || 0);
  if (patch.totalMin === 0) return toast('Saisis au moins une phase');
  if (patch.hr === undefined) delete patch.hr;
  upsertDayEntry('sleepDetail', date, patch);
  toast('Sommeil détaillé enregistré');
  navigate('health-day');
}

function renderHealthTile(metric, today) {
  const last = lastHealthSample(metric.id);
  const todayValue = metric.daily ? todaysHealthValue(metric.id) : (last ? last.value : null);
  const hasGoal = !!metric.goal;
  const ratio = (hasGoal && todayValue !== null) ? Math.min(todayValue / metric.goal, 1) : 0;
  const formatted = todayValue !== null ? formatHealthValue(todayValue, metric) : '—';

  return `
    <button class="health-tile" onclick="navigate('health-metric', { id: '${metric.id}' })">
      <div class="health-tile-label">${metric.label}</div>
      <div class="health-tile-value">
        <span class="health-tile-num">${formatted}</span>
        <span class="health-tile-unit">${metric.unit}</span>
      </div>
      ${hasGoal && todayValue !== null ? `
        <div class="health-tile-bar"><div class="health-tile-bar-fill" style="width:${ratio*100}%;"></div></div>
        <div class="health-tile-goal">${Math.round(ratio*100)}% de ${metric.goal}</div>
      ` : (last ? `<div class="health-tile-meta">Dernière saisie ${fmtDate(last.date)}</div>` : `<div class="health-tile-meta t-mist">Pas encore renseigné</div>`)}
    </button>
  `;
}

function formatHealthValue(value, metric) {
  if (value === null || value === undefined || isNaN(value)) return '—';
  const dec = metric.decimals !== undefined ? metric.decimals : 0;
  // Pas avec séparateur de milliers
  if (metric.id === 'stepCount') {
    return Math.round(value).toLocaleString('fr-FR');
  }
  return value.toFixed(dec);
}

      <div class="t-caption mt-8">${todayValue !== null ? "Aujourd'hui" : (last ? `Dernière saisie le ${fmtDate(last.date)} : ${formatHealthValue(last.value, metric)} ${metric.unit}` : 'Aucune saisie')}</div>

      ${metric.goal && todayValue !== null ? `
        <div class="macro-bar mt-16"><div class="macro-bar-fill" style="width: ${Math.min(100, (todayValue/metric.goal)*100)}%;"></div></div>
      ` : ''}

    ${stats ? `
      <div class="card">
        <div class="card-title">Statistiques sur ${period} jours</div>

          <button class="period-btn ${period===7?'active':''}" onclick="state._healthPeriod=7; render();">7j</button>
          <button class="period-btn ${period===30?'active':''}" onclick="state._healthPeriod=30; render();">30j</button>
          <button class="period-btn ${period===90?'active':''}" onclick="state._healthPeriod=90; render();">3 mois</button>
        </div>
        ${healthChart(healthSeries(id, period), metric)}
        <div class="row-between mt-16">
          <div><div class="t-legend">MIN</div><div class="t-mono-sm">${formatHealthValue(stats.min, metric)}</div></div>
          <div><div class="t-legend">MOYENNE</div><div class="t-mono-sm">${formatHealthValue(stats.avg, metric)}</div></div>
          <div><div class="t-legend">MAX</div><div class="t-mono-sm">${formatHealthValue(stats.max, metric)}</div></div>
          <div><div class="t-legend">JOURS</div><div class="t-mono-sm">${stats.count}</div></div>
        </div>
      </div>
    ` : ''}

    <div class="card">
      <div class="card-title">Saisir une valeur</div>
      <div class="input-group">
        <label class="input-label">Date</label>
        <input type="date" class="input" id="hm_date" value="${today}">
      </div>
      <div class="input-group">

function deleteHealthSample(id) {
  if (state._delSamplePending === id) {
    state.healthSamples = state.healthSamples.filter(s => s.id !== id);
    state._delSamplePending = null;
    saveState();
    toast('Supprimé');
    render();
    return;
  }
  state._delSamplePending = id;
  toast('Reclique sur la croix pour confirmer');
  setTimeout(() => { state._delSamplePending = null; }, 3000);
}

function healthChart(data, metric) {
  const W = 320, H = 140;
  if (data.filter(p => p.val !== null).length < 2) {
    return `<div class="empty" style="padding:24px;"><div class="empty-sub">Pas assez de points pour une courbe.</div></div>`;
  }
  const vals = data.filter(p => p.val !== null).map(p => p.val);
  let minY = Math.min(...vals), maxY = Math.max(...vals);
  if (metric.goal && metric.goal > maxY) maxY = metric.goal;
  if (maxY - minY < 1) { maxY += 1; minY -= 1; }
  const yScale = v => H - ((v - minY) / (maxY - minY)) * H;
  const xs = data.map((_, i) => (i / (data.length - 1)) * W);
  // Bars pour les sommes (pas, étages, calories), line pour les avg/last (FC, etc.)
  const isBar = metric.aggregate === 'sum';

  if (isBar) {
    const bw = Math.max(2, W / data.length - 2);
    return `
      <div class="chart-wrap">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          ${metric.goal ? `<line class="chart-target" x1="0" y1="${yScale(metric.goal)}" x2="${W}" y2="${yScale(metric.goal)}"/>` : ''}
          ${data.map((p, i) => {
            if (p.val === null) return '';
            const x = xs[i] - bw / 2;
            const y = yScale(p.val);
            return `<rect x="${x}" y="${y}" width="${bw}" height="${H - y}" fill="var(--sage)" rx="1"/>`;
          }).join('')}
        </svg>
      </div>
    `;
  } else {
    const filled = data.map((p, i) => ({ x: xs[i], y: p.val !== null ? yScale(p.val) : null }));
    const segments = [];
    let cur = '';
    filled.forEach((p, i) => {
      if (p.y === null) { if (cur) { segments.push(cur); cur = ''; } return; }
      cur += (cur ? ' L ' : 'M ') + p.x + ' ' + p.y;
    });
    if (cur) segments.push(cur);
    return `
      <div class="chart-wrap">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          ${segments.map(d => `<path class="chart-line" d="${d}"/>`).join('')}
          ${data.map((p, i) => p.val !== null ? `<circle class="chart-dot" cx="${xs[i]}" cy="${yScale(p.val)}" r="2.5"/>` : '').join('')}
        </svg>
      </div>
    `;
  }
}

    case 'candy':  return sw+'<circle cx="12" cy="12" r="4"/><path d="M5 8 L8 11 L8 13 L5 16 Z"/><path d="M19 8 L16 11 L16 13 L19 16 Z"/></svg>';

function logHabit(habitId, success, count) {
  if (!state.habitLogs) state.habitLogs = [];
  const today = todayISO();
  // Remplace l'éventuel log du jour
  state.habitLogs = state.habitLogs.filter(l => !(l.habitId === habitId && l.date === today));
  state.habitLogs.push({
    id: 'id-' + Math.random().toString(36).slice(2,10),
    habitId, date: today, count: count || 0, success: !!success,
    createdAt: Date.now()
  });
  saveState();
  const newBadges = checkAllBadges();
  if (newBadges.length > 0) {
    toast(`Nouveau badge : ${newBadges[0].label}`);
  } else {
    toast(success ? 'Bravo, journée tenue' : 'Saisi');
  }
  render();
}

function promptHabitFail(habitId) {
  // Mini-prompt : on incrémente +1 si déjà fail, sinon on log fail count=1
  const today = todayISO();
  const existing = state.habitLogs.find(l => l.habitId === habitId && l.date === today);
  const count = (existing && !existing.success ? existing.count : 0) + 1;
  logHabit(habitId, false, count);
}

function undoHabitLog(habitId) {
  const today = todayISO();
  state.habitLogs = state.habitLogs.filter(l => !(l.habitId === habitId && l.date === today));
  saveState();
  toast('Saisie annulée');

}

function deleteHabit(id) {
  if (state._delHabitPending === id) {
    state.habits = (state.habits || []).filter(h => h.id !== id);
    state.habitLogs = (state.habitLogs || []).filter(l => l.habitId !== id);
    state._delHabitPending = null;
    saveState();
    toast('Habitude supprimée');
    navigate('habits');
    return;
  }
  state._delHabitPending = id;
  toast('Reclique pour confirmer');
  setTimeout(()=>{ state._delHabitPending = null; }, 3000);
  render();
}

    <div class="share-card">
      <div class="share-card-header">
        <div class="share-card-app">VITAL TRACK</div>
        <div class="share-card-date">${fmtFullDate(today)}</div>
      </div>
      <div class="share-card-name">${u.firstName}</div>
      <div class="share-card-stats">
        <div class="share-stat">
          <div class="share-stat-num">${totalWorkouts}</div>
          <div class="share-stat-lab">séances</div>
        </div>
        <div class="share-stat">
          <div class="share-stat-num">${streak}</div>
          <div class="share-stat-lab">jour${streak>1?'s':''} d'affilée</div>
        </div>
        <div class="share-stat">
          <div class="share-stat-num">${delta>0?'+':''}${displayWeight(delta).toFixed(1)}</div>
          <div class="share-stat-lab">${weightUnit()} ${delta<0?'perdus':delta>0?'pris':''}</div>
        </div>
      </div>
    </div>

    <div class="card mt-16">
      <div class="card-title">Texte à partager</div>
      <div class="share-text-preview">${summary}</div>
      <button class="btn btn-primary mt-16" onclick="copyShareText()">Copier le texte</button>
    </div>

    <div class="card">
      <p class="t-body t-graphite" style="line-height:1.5;">Tu peux faire une capture d'écran de la card du dessus pour la publier sur Instagram, X, Facebook... Tes données ne sont envoyées à personne, c'est juste un screenshot.</p>
    </div>

    <div style="height: 100px;"></div>
  `;
}

function copyShareText() {
  const u = state.user;
  const lastWeight = state.weights[state.weights.length - 1]?.kg || u.weight;
  const startWeight = state.weights[0]?.kg || u.weight;
  const delta = lastWeight - startWeight;
  const txt = `Mon parcours sur Vital Track 💪
${state.workouts.length} séance${state.workouts.length>1?'s':''} · ${state.streak} jour${state.streak>1?'s':''} de série · ${delta>0?'+':''}${displayWeight(delta).toFixed(1)} ${weightUnit()} depuis le départ`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(() => toast('Copié dans le presse-papier'));
  } else {
    toast('Copie manuelle nécessaire');
  }
}

// ============================================================
// PRÉFÉRENCES ALIMENTAIRES
// ============================================================
function renderFoodPrefs() {
  const p = state.foodPrefs || { likes: [], dislikes: [], allergies: [], diet: null };
  const diets = [
    { id: null, label: 'Aucun régime' },
    { id: 'vegetarian', label: 'Végétarien' },
    { id: 'vegan', label: 'Végan' },
    { id: 'glutenFree', label: 'Sans gluten' },
    { id: 'lactoseFree', label: 'Sans lactose' }
  ];

  const renderTagList = (key, label, items, placeholder) => `
    <div class="card">
      <div class="card-title">${label}</div>
      ${items.length === 0 ? `<div class="t-caption mb-16">Aucun ${label.toLowerCase()} pour l'instant.</div>` : `
        <div class="tag-list mb-16">
          ${items.map((item, i) => `
            <div class="tag-pill">
              <span>${item}</span>
              <button class="tag-close" onclick="removeFoodPrefItem('${key}', ${i})">×</button>
            </div>
          `).join('')}
        </div>
      `}
      <div class="row gap-8">
        <input type="text" class="input" id="fp_${key}" placeholder="${placeholder}" style="height:44px;" onkeydown="if(event.key==='Enter')addFoodPrefItem('${key}')">
        <button class="btn-icon" style="background: var(--sage); color: var(--bone); width: 44px; height: 44px;" onclick="addFoodPrefItem('${key}')">${iconPlus()}</button>
      </div>
    </div>
  `;

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('nutrition')">${iconBack()}</button>
        <button class="btn-small" style="background:var(--sage-pale); color:var(--sage-deep);" onclick="navigate('shopping-list')">Voir la liste de courses</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Mes préférences</h1>
      <div class="t-caption">Budget, goûts et régime — tout adapte ton plan repas</div>
    </div>

    <div class="card" style="padding:14px 16px; background:var(--sage-pale); border:none; margin-bottom:16px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:20px;">🛒</span>
        <div class="t-caption" style="color:var(--sage-deep); font-weight:500; line-height:1.4;">
          Toute modification ici <strong>met à jour automatiquement</strong> ta liste de courses et ton plan de repas.
        </div>
      </div>
    </div>

    ${renderBudgetSection()}

    <div class="card">
      <div class="card-title">Régime alimentaire</div>
      <div class="segment-group">
        ${diets.map(d => {
          const arg = d.id === null ? 'null' : "'" + d.id + "'";
          return `
            <button class="segment-option ${p.diet===d.id?'selected':''}" onclick="setFoodPrefDiet(${arg})">
              ${d.label}<span class="check">✓</span>
            </button>
          `;
        }).join('')}
      </div>
    </div>

    ${renderTagList('likes', 'Aliments aimés', p.likes, 'ex : saumon, brocolis...')}
    ${renderTagList('dislikes', 'Aliments détestés', p.dislikes, 'ex : champignons')}
    ${renderTagList('allergies', 'Allergies / intolérances', p.allergies, 'ex : arachides, fruits de mer')}

    <div style="height: 100px;"></div>
  `;
}

function setFoodPrefDiet(diet) {
  if (!state.foodPrefs) state.foodPrefs = { likes: [], dislikes: [], allergies: [], diet: null };
  state.foodPrefs.diet = diet;
  _currentPlan = null; // force régénération du plan
  saveState();
  toast('Plan de repas mis à jour');
  render();
}

function addFoodPrefItem(key) {
  const input = document.getElementById('fp_' + key);
  if (!input) return;
  const value = input.value.trim();
  if (!value) return toast('Tape quelque chose');
  if (!state.foodPrefs) state.foodPrefs = { likes: [], dislikes: [], allergies: [], diet: null };
  if (!state.foodPrefs[key]) state.foodPrefs[key] = [];
  if (state.foodPrefs[key].some(v => v.toLowerCase() === value.toLowerCase())) {
    return toast('Déjà dans la liste');
  }
  state.foodPrefs[key].push(value);
  _currentPlan = null; // force régénération du plan
  saveState();
  toast('Ajouté · liste de courses mise à jour');
  render();
}

function removeFoodPrefItem(key, idx) {
  if (!state.foodPrefs?.[key]) return;
  state.foodPrefs[key].splice(idx, 1);
  _currentPlan = null; // force régénération du plan
  saveState();
  toast('Supprimé · liste de courses mise à jour');
  render();
}


setInterval(() => {
  if (currentView === 'workout-session' && state._activeWorkout && state._activeWorkout.runningSince) {
    const el = document.getElementById('sessionTimer');
    if (el) el.textContent = formatElapsed(activeWorkoutElapsedMs());
  }
  if (currentView === 'cardio-session' && state._activeCardio && state._activeCardio.runningSince) {
    const el = document.getElementById('cardioTimer');
    if (el) {
      const ms = (state._activeCardio.elapsedMs || 0) + (Date.now() - state._activeCardio.runningSince);
      el.textContent = formatElapsed(ms);
    }
  }
}, 1000);

// ============================================================
// DÉMARRAGE
// ============================================================
function boot() {
  if (state.user && state.user.firstName) {
    updateStreak();
    navigate('home');
  } else {
    navigate('welcome');
  }
}


// Heure réelle dans la status bar
function updateClock(){
  const d=new Date();
  document.getElementById('statusTime').textContent = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
updateClock();
setInterval(updateClock,30000);

// Démarrage
boot();
</script>
</body>
</html>
