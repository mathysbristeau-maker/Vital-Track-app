// Calcule le 1RM estimé à partir d'une charge × reps (formule d'Epley)
function epley1RM(weight, reps) {
  const w = parseFloat(weight) || 0;
  const r = parseInt(reps) || 0;
  if (w <= 0 || r <= 0) return 0;
  if (r === 1) return w;
  return w * (1 + r / 30);
}

// Renvoie les sets historiques d'un exercice (max 30 dernières séances)
function exerciseHistory(exerciseId, limit = 30) {
  const sets = [];
  state.workouts
    .filter(w => w.type !== 'cardio' && w.exercises)
    .slice(-limit)
    .reverse()
    .forEach(w => {
      const ex = w.exercises.find(e => e.exerciseId === exerciseId);
      if (!ex || !ex.sets) return;
      ex.sets.forEach(s => {
        if (s.kg && s.reps) {
          sets.push({
            date: w.date,
            kg: parseFloat(s.kg),
            reps: parseInt(s.reps),
            estimated1RM: epley1RM(s.kg, s.reps)
          });
        }
      });
    });
  return sets;
}

// Best 1RM estimé sur les N derniers jours
function bestRecent1RM(exerciseId, days = 30) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  return Math.max(0,
    ...exerciseHistory(exerciseId, 50)
      .filter(s => s.date >= cutoffISO)
      .map(s => s.estimated1RM)
  );
}

// Évalue le score de récupération (0-100) en fonction du sommeil et de la FC repos
function recoveryScore() {
  // Sommeil : moyenne 7 derniers jours
  const recentSleep = state.sleep.slice(-7);
  const avgSleep = recentSleep.length > 0
    ? recentSleep.reduce((s, x) => s + (x.hours || 0), 0) / recentSleep.length
    : 7;
  // FC repos : dernière mesure
  const lastHR = lastHealthSample('restingHeartRate');
  const baseHR = lastHR ? lastHR.value : null;
  // Volume séances 7 derniers jours
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  const recentWorkouts = state.workouts.filter(w => w.date >= cutoffISO).length;

  let score = 70; // baseline
  // Sommeil
  if (avgSleep >= 8) score += 15;
  else if (avgSleep >= 7) score += 8;
  else if (avgSleep >= 6) score += 0;
  else if (avgSleep >= 5) score -= 10;
  else score -= 25;
  // Surcharge entrainement
  if (recentWorkouts >= 6) score -= 12;
  else if (recentWorkouts >= 5) score -= 5;
  // FC repos : si élevée par rapport à valeur de référence (60), -10
  if (baseHR && baseHR > 70) score -= 8;
  if (baseHR && baseHR > 80) score -= 12;

  return Math.max(0, Math.min(100, score));
}

// Recommande les charges pour la prochaine séance d'un exercice
function recommendLoadFor(exerciseId, targetReps = 10) {
  const history = exerciseHistory(exerciseId, 5);
  const def = EXERCISES.find(e => e.id === exerciseId);
  if (history.length === 0) {
    return {
      strategy: 'first_time',
      message: "Première séance sur cet exercice. Commence léger pour valider ta technique, puis monte progressivement.",
      suggestedKg: null,
      suggestedReps: targetReps
    };
  }

  // Dernière séance enregistrée
  const lastSession = history[0];
  const lastDate = lastSession.date;
  const lastSets = history.filter(s => s.date === lastDate);
  const heaviestSet = lastSets.reduce((a, b) => (a.kg > b.kg ? a : b));

  // 1RM théorique
  const best1RM = bestRecent1RM(exerciseId, 30);
  // Charge cible pour atteindre `targetReps` reps : on inverse Epley
  // 1RM = kg × (1 + reps/30) → kg = 1RM / (1 + reps/30)
  let targetKg = best1RM / (1 + targetReps / 30);
  // Arrondi au 2.5 le plus proche (pas de plaques)
  targetKg = Math.round(targetKg / 2.5) * 2.5;

  // Recovery factor
  const rec = recoveryScore();
  let recoveryAdj = 1;
  let recoveryNote = '';
  if (rec < 50) {
    recoveryAdj = 0.93; // -7%
    recoveryNote = " Ta récup' est basse, j'ai allégé un peu.";
    targetKg = Math.round(targetKg * recoveryAdj / 2.5) * 2.5;
  } else if (rec >= 85) {
    recoveryAdj = 1.025; // +2.5%
    recoveryNote = " Tu es bien récupéré, on peut pousser un poil.";
    targetKg = Math.round(targetKg * recoveryAdj / 2.5) * 2.5;
  }

  // Comparaison à la dernière séance
  let strategy, message;
  const heavyKg = heaviestSet.kg;
  const heavyReps = heaviestSet.reps;

  if (heavyReps >= targetReps + 2) {
    // Tu as fait largement plus de reps que demandé → progression
    strategy = 'progression';
    message = `Ta dernière séance était trop facile (${heavyReps} reps × ${heavyKg} ${weightUnit()}). Monte à ${targetKg} ${weightUnit()} pour ${targetReps} reps.${recoveryNote}`;
  } else if (heavyReps >= targetReps - 1) {
    // Pile dans la cible → maintenir ou +2.5
    targetKg = Math.max(heavyKg + 2.5, targetKg);
    strategy = 'maintain_progress';
    message = `Tu étais à ${heavyKg} ${weightUnit()} × ${heavyReps} reps. Essaie ${targetKg} ${weightUnit()} cette fois.${recoveryNote}`;
  } else if (heavyReps >= targetReps - 3) {
    // Tu as raté la cible de 2-3 reps → on garde
    targetKg = heavyKg;
    strategy = 'hold';
    message = `Tu n'as pas atteint ${targetReps} reps la dernière fois (${heavyReps}). Garde ${heavyKg} ${weightUnit()} et essaie d'en ajouter une.${recoveryNote}`;
  } else {
    // Tu as bien raté → on baisse
    targetKg = Math.max(2.5, heavyKg - 5);
    strategy = 'deload';
    message = `Tu as nettement raté la cible (${heavyReps}/${targetReps}). Allège à ${targetKg} ${weightUnit()} et reconstruis.${recoveryNote}`;
  }

  return {
    strategy,
    message,
    suggestedKg: targetKg,
    suggestedReps: targetReps,
    historyLastKg: heavyKg,
    historyLastReps: heavyReps,
    recoveryScore: rec,
    estimated1RM: Math.round(best1RM * 10) / 10
  };
}

// Mapping muscle simplifié → groupes en cohérence avec EXERCISES
const MUSCLE_GROUPS = {
  push: ['pectoraux', 'épaules', 'deltoïdes antérieurs', 'triceps', 'pec'],
  pull: ['dos', 'dorsaux', 'biceps', 'lombaires', 'trapèzes', 'trap'],
  legs: ['quadriceps', 'fessiers', 'ischio-jambiers', 'mollets', 'jambes', 'glutéaux'],
  core: ['abdominaux', 'gainage', 'obliques', 'tronc']
};

function muscleMatch(exMuscles, group) {
  const tokens = MUSCLE_GROUPS[group] || [];
  return exMuscles.some(m => tokens.some(t => m.toLowerCase().includes(t)));
}

// Génère une séance sur-mesure
// opts: { duration:45-90, focus:'push'|'pull'|'legs'|'fullbody'|'core', equipment:['barbell','dumbbell','bodyweight','machine','cable'], level:'beginner'|'intermediate'|'advanced' }
function generateCustomSession(opts = {}) {
  const duration = opts.duration || 60;
  const focus = opts.focus || 'fullbody';
  const equipment = opts.equipment && opts.equipment.length ? opts.equipment : null;
  const level = opts.level || 'intermediate';

  // Détermine combien d'exercices selon durée (≈10min/exercice avec échauf+repos)
  const targetCount = Math.max(3, Math.min(8, Math.floor(duration / 10)));

  // Filtre par équipement disponible (si précisé)
  let pool = EXERCISES.filter(e => {
    if (!equipment) return true;
    const eq = (e.equipment || '').toLowerCase();
    return equipment.some(req => {
      if (req === 'bodyweight') return eq.includes('poids du corps') || eq.includes('aucun') || eq === '';
      if (req === 'barbell') return eq.includes('barre') || eq.includes('barbell');
      if (req === 'dumbbell') return eq.includes('haltère') || eq.includes('dumbbell');
      if (req === 'machine') return eq.includes('machine');
      if (req === 'cable') return eq.includes('câble') || eq.includes('cable') || eq.includes('poulie');
      return false;
    });
  });
  if (pool.length < targetCount) pool = EXERCISES; // fallback large

  // Compose selon le focus
  const picks = [];
  const usedIds = new Set();
  const pickFromGroup = (group, n) => {
    const candidates = pool.filter(e => !usedIds.has(e.id) && muscleMatch(e.muscles, group));
    // Préfère les exercices polyarticulaires (souvent en premier dans la liste pour chaque muscle)
    candidates.sort((a, b) => (b.muscles?.length || 1) - (a.muscles?.length || 1));
    for (let i = 0; i < Math.min(n, candidates.length); i++) {
      picks.push(candidates[i]);
      usedIds.add(candidates[i].id);
    }
  };

  if (focus === 'push') {
    pickFromGroup('push', Math.ceil(targetCount * 0.7));
    pickFromGroup('core', targetCount - picks.length);
  } else if (focus === 'pull') {
    pickFromGroup('pull', Math.ceil(targetCount * 0.7));
    pickFromGroup('core', targetCount - picks.length);
  } else if (focus === 'legs') {
    pickFromGroup('legs', Math.ceil(targetCount * 0.8));
    pickFromGroup('core', targetCount - picks.length);
  } else if (focus === 'core') {
    pickFromGroup('core', targetCount);
  } else {
    // Full body : équilibre push/pull/legs/core
    const each = Math.max(1, Math.floor(targetCount / 4));
    pickFromGroup('push', each);
    pickFromGroup('pull', each);
    pickFromGroup('legs', each);
    pickFromGroup('core', targetCount - picks.length);
  }

  // Pour chaque exercice : recommandation séries/reps/charge selon niveau et historique
  const sessionExercises = picks.map(ex => {
    const rec = recommendLoadFor(ex.id, 10);
    let sets, reps, rest;
    if (level === 'beginner') { sets = 3; reps = '10-12'; rest = 60; }
    else if (level === 'advanced') { sets = 4; reps = '6-10'; rest = 90; }
    else { sets = 4; reps = '8-12'; rest = 75; }
    // Ajuste rest pour les isos
    if (muscleMatch(ex.muscles, 'core')) rest = 45;
    return {
      exerciseId: ex.id,
      name: ex.name,
      sets, reps, rest,
      suggestedKg: rec.suggestedKg,
      reasoning: rec.message
    };
  });

  return {
    name: `Séance sur-mesure ${focusLabel(focus)}`,
    focus,
    duration,
    level,
    exercises: sessionExercises,
    totalEstimatedKcal: Math.round(5 * 3.5 * (state.user?.weight || 75) / 200 * duration)
  };
}

function focusLabel(focus) {
  return { push: 'Pousser', pull: 'Tirer', legs: 'Jambes', core: 'Gainage', fullbody: 'Full body' }[focus] || focus;
}

// On garde generateMealPlan() existant (filtre prefs + planning sportif)
// mais on ajoute un score de pertinence pour chaque recette

function recipeRelevanceScore(recipe, context) {
  const { burn, lastUsedDate, frigo, prefs } = context;
  let score = 50;
  // Densité calorique selon effort
  if (burn >= 500 && recipe.kcal >= 500) score += 15;
  if (burn >= 500 && recipe.kcal < 350) score -= 20;
  if (burn <= 100 && recipe.kcal < 400) score += 10;
  // Variété : on évite si utilisé récemment
  if (lastUsedDate) {
    const daysSince = (Date.now() - new Date(lastUsedDate).getTime()) / 86400000;
    if (daysSince < 2) score -= 30;
    else if (daysSince < 4) score -= 10;
  }
  // Frigo : recettes dont on a déjà les ingrédients
  if (frigo && frigo.length && recipe.ingredients) {
    const have = recipe.ingredients.filter(i => {
      const name = (typeof i === 'string' ? i : i.name).toLowerCase();
      return frigo.some(f => name.includes(f.toLowerCase()) || f.toLowerCase().includes(name));
    }).length;
    score += have * 5;
  }
  // Préférences likes
  if (prefs?.likes?.length && recipe.ingredients) {
    const matches = recipe.ingredients.filter(i => {
      const name = (typeof i === 'string' ? i : i.name).toLowerCase();
      return prefs.likes.some(l => name.includes(l.toLowerCase()));
    }).length;
    score += matches * 8;
  }
  return score;
}

// Génère un plan de repas IA intelligent (remplace generateMealPlan basique quand appelé)
function generateSmartMealPlan() {
  const u = state.user;
  const breakfasts = RECIPES.filter(r => r.category === 'petit-dej');
  const meals = RECIPES.filter(r => r.category === 'plat');
  const snacks = RECIPES.filter(r => r.category === 'collation');
  const prefs = state.foodPrefs;
  const frigo = (state.pantry || []).map(p => p.name);

  // Filtre prefs (réutilise les filtres de generateMealPlan via préfiltrage)
  const filterByPrefs = (recipes) => {
    if (!prefs) return recipes;
    const dislikes = [...(prefs.dislikes || []), ...(prefs.allergies || [])].map(s => s.toLowerCase().trim()).filter(Boolean);
    const MEAT = ['poulet','bœuf','boeuf','dinde','jambon','porc','lardon','viande','steak','agneau','saucisse','bacon','chorizo'];
    const FISH = ['thon','saumon','cabillaud','colin','poisson','crevette','crabe','sardine','maquereau','sole','truite'];
    const ANIMAL = ['oeuf','œuf','lait','beurre','fromage','yaourt','crème','feta','mozza','parmesan','ricotta','chèvre','comté','emmental'];
    const GLUTEN = ['pâtes','pâte','pain','blé','farine','semoule','couscous','boulgour','seitan'];
    const LACTOSE = ['lait','beurre','fromage','yaourt','crème','feta','mozza','parmesan','ricotta'];
    return recipes.filter(r => {
      const txt = (r.ingredients || []).map(i => typeof i === 'string' ? i : i.name).join(' ').toLowerCase();
      const hasAny = (words) => words.some(w => txt.includes(w));
      if (prefs.diet === 'vegetarian' && (hasAny(MEAT) || hasAny(FISH))) return false;
      if (prefs.diet === 'vegan' && (hasAny(MEAT) || hasAny(FISH) || hasAny(ANIMAL))) return false;
      if (prefs.diet === 'glutenFree' && hasAny(GLUTEN)) return false;
      if (prefs.diet === 'lactoseFree' && hasAny(LACTOSE)) return false;
      if (dislikes.length > 0 && dislikes.some(bad => txt.includes(bad))) return false;
      return true;
    });
  };

  const safeBfs = filterByPrefs(breakfasts).length > 0 ? filterByPrefs(breakfasts) : breakfasts;
  const safeMls = filterByPrefs(meals).length > 0 ? filterByPrefs(meals) : meals;
  const safeSks = filterByPrefs(snacks).length > 0 ? filterByPrefs(snacks) : snacks;

  // Pour chaque jour, on score et on prend le meilleur, en évitant les répétitions sur 7 jours
  const usedRecent = {}; // recipeId → date dernière utilisation
  const plan = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const date = d.toISOString().slice(0, 10);
    const burn = plannedBurnForDate(date);

    const pickBest = (pool) => {
      const ctx = (recipe) => ({ burn, lastUsedDate: usedRecent[recipe.id], frigo, prefs });
      // Score chaque candidat puis pick top + un peu de hasard pour ne pas être déterministe
      const scored = pool.map(r => ({ r, s: recipeRelevanceScore(r, ctx(r)) + Math.random() * 10 }));
      scored.sort((a, b) => b.s - a.s);
      const top = scored[0].r;
      usedRecent[top.id] = date;
      return top;
    };

    const dayPlan = {
      date,
      day: d.toLocaleDateString('fr-FR', { weekday: 'long' }),
      plannedBurn: burn,
      breakfast: pickBest(safeBfs),
      lunch: pickBest(safeMls),
      dinner: pickBest(safeMls),
      snack: pickBest(safeSks)
    };
    if (burn >= 400 && safeSks.length > 1) {
      const remaining = safeSks.filter(s => s.id !== dayPlan.snack.id);
      if (remaining.length > 0) dayPlan.snack2 = pickBest(remaining);
    }
    plan.push(dayPlan);
  }
  return plan;
}

// 4. ANALYSE HEBDO AUTOMATIQUE
// =============================================================
function weeklyAnalysis() {
  const now = new Date();
  const cutoff = new Date(now); cutoff.setDate(now.getDate() - 7);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  const prevCutoff = new Date(now); prevCutoff.setDate(now.getDate() - 14);
  const prevCutoffISO = prevCutoff.toISOString().slice(0, 10);

  const thisWeekWorkouts = state.workouts.filter(w => w.date >= cutoffISO);
  const lastWeekWorkouts = state.workouts.filter(w => w.date >= prevCutoffISO && w.date < cutoffISO);

  // Tonnage total (séances de muscu)
  const tonnageOf = (workouts) => workouts.filter(w => w.type !== 'cardio').reduce((sum, w) => {
    return sum + (w.exercises || []).reduce((s, e) => {
      return s + (e.sets || []).reduce((s2, set) => {
        return s2 + (parseFloat(set.kg) || 0) * (parseInt(set.reps) || 0);
      }, 0);
    }, 0);
  }, 0);

  const thisTonnage = tonnageOf(thisWeekWorkouts);
  const lastTonnage = tonnageOf(lastWeekWorkouts);
  const tonnageDelta = lastTonnage > 0 ? ((thisTonnage - lastTonnage) / lastTonnage) * 100 : 0;

  // Sommeil moyen
  const recentSleep = state.sleep.filter(s => s.date >= cutoffISO);
  const avgSleep = recentSleep.length > 0 ? recentSleep.reduce((s, x) => s + x.hours, 0) / recentSleep.length : null;

  // Poids
  const recentWeights = state.weights.filter(w => w.date >= cutoffISO);
  const weightStart = recentWeights[0]?.kg;
  const weightEnd = recentWeights[recentWeights.length - 1]?.kg;
  const weightDelta = (weightStart && weightEnd) ? weightEnd - weightStart : 0;

  // Calories moyennes
  const recentMeals = state.meals.filter(m => m.date >= cutoffISO);
  const dayBuckets = {};
  recentMeals.forEach(m => {
    if (!dayBuckets[m.date]) dayBuckets[m.date] = 0;
    dayBuckets[m.date] += m.kcal || 0;
  });
  const days = Object.keys(dayBuckets);
  const avgKcal = days.length > 0 ? days.reduce((s, d) => s + dayBuckets[d], 0) / days.length : 0;

  // Calories cible
  const targetKcal = state.user ? calorieTarget(state.user) : 2200;

  // ACTIONS CONCRÈTES (max 3)
  const actions = [];
  // 1. Séances : trop ou pas assez ?
  if (thisWeekWorkouts.length === 0) {
    actions.push({ priority: 'high', text: "Cette semaine zéro séance. Prévois-en au moins 2 sur les 7 prochains jours, même courtes." });
  } else if (thisWeekWorkouts.length < 3 && (state.user?.goal === 'masse' || state.user?.goal === 'seche')) {
    actions.push({ priority: 'medium', text: `${thisWeekWorkouts.length} séance${thisWeekWorkouts.length>1?'s':''} cette semaine. Pour ${state.user.goal === 'masse' ? 'la prise de masse' : 'la sèche'}, vise 4 à 5 séances/semaine.` });
  } else if (thisWeekWorkouts.length >= 6) {
    actions.push({ priority: 'medium', text: `${thisWeekWorkouts.length} séances : c'est beaucoup. Prévois 1 jour de repos complet pour ne pas tomber en surentraînement.` });
  }
  // 2. Sommeil
  if (avgSleep !== null && avgSleep < 6.5) {
    actions.push({ priority: 'high', text: `Tu dors ${avgSleep.toFixed(1)}h en moyenne. Sous 6h30, ta récupération et ta perte de gras sont impactées. Vise 7h30+.` });
  } else if (avgSleep !== null && avgSleep < 7 && state.user?.goal !== 'maintenance') {
    actions.push({ priority: 'medium', text: `${avgSleep.toFixed(1)}h de sommeil/nuit, c'est limite. 30 minutes de plus feraient une vraie différence.` });
  }
  // 3. Calories
  if (avgKcal > 0) {
    const ratio = avgKcal / targetKcal;
    if (state.user?.goal === 'seche' && ratio > 1.05) {
      actions.push({ priority: 'high', text: `Tu manges ${Math.round(avgKcal)} kcal/j, soit ${Math.round((ratio-1)*100)}% au-dessus de ta cible. La sèche ne marchera pas.` });
    } else if (state.user?.goal === 'masse' && ratio < 0.95) {
      actions.push({ priority: 'high', text: `Tu manges ${Math.round(avgKcal)} kcal/j, soit ${Math.round((1-ratio)*100)}% sous ta cible. Pour prendre de la masse, il faut surplus.` });
    } else if (Math.abs(ratio - 1) < 0.05) {
      actions.push({ priority: 'low', text: `Tu es très bien sur tes calories : ${Math.round(avgKcal)} kcal/j en moyenne. Continue comme ça.` });
    }
  }
  // 4. Cohérence poids vs objectif
  if (state.user?.goal === 'seche' && weightDelta > 0.3) {
    actions.push({ priority: 'medium', text: `+${weightDelta.toFixed(1)} ${weightUnit()} cette semaine alors qu'on cherche à sécher. Vérifie tes calories et ton sodium.` });
  } else if (state.user?.goal === 'masse' && weightDelta < -0.3) {
    actions.push({ priority: 'medium', text: `${weightDelta.toFixed(1)} ${weightUnit()} cette semaine. Pour prendre, il faut un peu de surplus. Mange plus.` });
  }

  return {
    period: { from: cutoffISO, to: todayISO() },
    workoutsCount: thisWeekWorkouts.length,
    workoutsCountPrev: lastWeekWorkouts.length,
    tonnageKg: Math.round(thisTonnage),
    tonnageDeltaPct: Math.round(tonnageDelta),
    avgSleep,
    weightDelta,
    avgKcal: Math.round(avgKcal),
    targetKcal,
    actions: actions.slice(0, 3)
  };
}

// 5. PRÉDICTION DU POIDS
// =============================================================
function predictWeight(weeksAhead = 4) {
  const data = state.weights.slice(-30);
  if (data.length < 4) {
    return { error: "Pas assez de données. Pèse-toi régulièrement pendant 1 à 2 semaines pour activer la prédiction." };
  }
  // Régression linéaire simple : x = jours depuis le 1er point, y = kg
  const start = new Date(data[0].date).getTime();
  const points = data.map(d => ({
    x: (new Date(d.date).getTime() - start) / 86400000,
    y: d.kg
  }));
  const n = points.length;
  const sumX = points.reduce((s, p) => s + p.x, 0);
  const sumY = points.reduce((s, p) => s + p.y, 0);
  const sumXY = points.reduce((s, p) => s + p.x * p.y, 0);
  const sumXX = points.reduce((s, p) => s + p.x * p.x, 0);
  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  // Slope = kg/jour. On projette à weeksAhead*7 jours après le dernier point
  const lastX = points[n - 1].x;
  const projDays = weeksAhead * 7;
  const projectedKg = slope * (lastX + projDays) + intercept;
  // Erreur résiduelle (RMSE) pour intervalle de confiance
  const predicted = points.map(p => slope * p.x + intercept);
  const residuals = points.map((p, i) => Math.pow(p.y - predicted[i], 2));
  const rmse = Math.sqrt(residuals.reduce((s, r) => s + r, 0) / n);

  const weeklyChange = slope * 7;
  let assessment;
  if (Math.abs(weeklyChange) < 0.1) {
    assessment = "Stable, pas de tendance claire";
  } else if (weeklyChange > 0) {
    assessment = `+${weeklyChange.toFixed(2)} ${weightUnit()}/semaine en moyenne`;
  } else {
    assessment = `${weeklyChange.toFixed(2)} ${weightUnit()}/semaine en moyenne`;
  }

  // Comparaison à l'objectif
  let goalMessage = '';
  if (state.user?.targetWeight) {
    const target = state.user.targetWeight;
    const current = points[n - 1].y;
    const distance = target - current;
    const goingRightWay = (distance > 0 && slope > 0) || (distance < 0 && slope < 0) || (Math.abs(distance) < 0.5);
    if (Math.abs(slope) < 0.001) {
      goalMessage = "Ton poids est stable. À ce rythme, tu n'atteins pas ta cible.";
    } else if (!goingRightWay) {
      const direction = distance > 0 ? "monter" : "descendre";
      goalMessage = `Tu veux ${direction} (cible ${target} ${weightUnit()}) mais ton poids va dans l'autre sens. Inverse la tendance.`;
    } else {
      const daysToGoal = distance / slope;
      if (daysToGoal > 0 && daysToGoal < 365) {
        const weeks = Math.round(daysToGoal / 7);
        goalMessage = `Au rythme actuel, tu atteins ta cible (${target} ${weightUnit()}) dans ~${weeks} semaine${weeks>1?'s':''}.`;
      } else {
        goalMessage = "À ce rythme, ta cible est lointaine (>1 an). Ajuste le programme pour aller plus vite.";
      }
    }
  }

  return {
    currentKg: Math.round(points[n - 1].y * 10) / 10,
    projectedKg: Math.round(projectedKg * 10) / 10,
    weeksAhead,
    weeklyChange: Math.round(weeklyChange * 100) / 100,
    confidenceMargin: Math.round(rmse * 1.96 * 10) / 10, // ~95%
    assessment,
    goalMessage,
    dataPoints: n
  };
}

// =============================================================
// 6. ALERTES INTELLIGENTES
// =============================================================
function detectAlerts() {
  const alerts = [];
  const u = state.user;
  if (!u) return alerts;
  const today = todayISO();
  const cutoff7 = new Date(); cutoff7.setDate(cutoff7.getDate() - 7);
  const cutoff7ISO = cutoff7.toISOString().slice(0, 10);
  const cutoff14 = new Date(); cutoff14.setDate(cutoff14.getDate() - 14);
  const cutoff14ISO = cutoff14.toISOString().slice(0, 10);
  const cutoff21 = new Date(); cutoff21.setDate(cutoff21.getDate() - 21);
  const cutoff21ISO = cutoff21.toISOString().slice(0, 10);

  // 1. SURENTRAÎNEMENT
  const recent7 = state.workouts.filter(w => w.date >= cutoff7ISO);
  const recentSleep = state.sleep.filter(s => s.date >= cutoff7ISO);
  const avgSleep = recentSleep.length > 0 ? recentSleep.reduce((s, x) => s + x.hours, 0) / recentSleep.length : null;
  const restingHR = lastHealthSample('restingHeartRate');
  if (recent7.length >= 6 && avgSleep !== null && avgSleep < 6.5) {
    alerts.push({
      severity: 'high', icon: 'flame',
      title: 'Risque de surentraînement',
      message: `${recent7.length} séances en 7 jours + ${avgSleep.toFixed(1)}h de sommeil. Ton corps n'a pas le temps de récupérer.`,
      action: 'Prévois 1-2 jours de repos complet et dors 8h+ minimum 2 nuits.'
    });
  } else if (recent7.length >= 6) {
    alerts.push({
      severity: 'medium', icon: 'flame',
      title: 'Volume d\'entraînement élevé',
      message: `${recent7.length} séances en 7 jours. Surveille ta récup'.`,
      action: '1 jour off bien marqué cette semaine.'
    });
  }

  // 2. PLATEAU POIDS
  const weights3w = state.weights.filter(w => w.date >= cutoff21ISO);
  if (weights3w.length >= 6 && u.goal !== 'maintenance') {
    const start = weights3w[0].kg;
    const end = weights3w[weights3w.length - 1].kg;
    const totalDelta = Math.abs(end - start);
    if (totalDelta < 0.5) {
      const goalLabel = u.goal === 'seche' ? 'sèche' : 'prise de masse';
      alerts.push({
        severity: 'medium', icon: 'list',
        title: 'Plateau détecté',
        message: `Ton poids stagne depuis 3 semaines (${totalDelta.toFixed(1)} ${weightUnit()} de variation seulement). En ${goalLabel}, c'est un signal.`,
        action: u.goal === 'seche' ? 'Réduis de 150-200 kcal/jour ou ajoute 1 séance de cardio.' : 'Augmente de 200 kcal/jour, focus sur les glucides.'
      });
    }
  }

  // 3. SOMMEIL INSUFFISANT (3+ jours sous 6h)
  const last7Sleep = state.sleep.filter(s => s.date >= cutoff7ISO);
  const lowNights = last7Sleep.filter(s => s.hours < 6).length;
  if (lowNights >= 3) {
    alerts.push({
      severity: 'high', icon: 'moon',
      title: 'Manque de sommeil critique',
      message: `${lowNights} nuits sous 6h cette semaine. Ta récupération musculaire et ta perte de gras sont compromises.`,
      action: 'Couche-toi 30 min plus tôt cette semaine, écran off 1h avant.'
    });
  }

  // 4. SOUS-ALIMENTATION CHRONIQUE (sèche : cible non atteinte 5+ jours)
  if (u.goal === 'seche') {
    const recentMeals = state.meals.filter(m => m.date >= cutoff7ISO);
    const buckets = {};
    recentMeals.forEach(m => { buckets[m.date] = (buckets[m.date] || 0) + (m.kcal || 0); });
    const minTarget = calorieTarget(u) - 200;
    const lowDays = Object.values(buckets).filter(v => v < minTarget * 0.7).length;
    if (lowDays >= 4) {
      alerts.push({
        severity: 'medium', icon: 'list',
        title: 'Restriction trop forte',
        message: `${lowDays} jours sous 70% de ta cible. Trop bas en sèche : ralentit le métabolisme et perd du muscle.`,
        action: 'Reviens à ta cible (-300/-400 kcal max). La régularité prime sur la sévérité.'
      });
    }
  }

  // 5. PROTÉINES INSUFFISANTES (sur 7 jours)
  const recentMealsP = state.meals.filter(m => m.date >= cutoff7ISO);
  const dailyP = {};
  recentMealsP.forEach(m => { dailyP[m.date] = (dailyP[m.date] || 0) + (m.p || 0); });
  const pDays = Object.values(dailyP);
  if (pDays.length >= 4) {
    const avgP = pDays.reduce((s, v) => s + v, 0) / pDays.length;
    const minP = u.weight * 1.6;
    if (avgP < minP) {
      alerts.push({
        severity: 'low', icon: 'list',
        title: 'Protéines insuffisantes',
        message: `${Math.round(avgP)}g/jour en moyenne. Pour ton poids (${u.weight} ${weightUnit()}), vise au moins ${Math.round(minP)}g.`,
        action: 'Ajoute 1 portion de poulet, fromage blanc 0%, ou shaker entre 2 repas.'
      });
    }
  }

  // 6. FC REPOS QUI MONTE (signe de fatigue ou maladie)
  const allHR = state.healthSamples.filter(s => s.type === 'restingHeartRate').sort((a, b) => a.date.localeCompare(b.date));
  if (allHR.length >= 6) {
    const recent3 = allHR.slice(-3);
    const previous3 = allHR.slice(-6, -3);
    const avgRecent = recent3.reduce((s, x) => s + x.value, 0) / 3;
    const avgPrev = previous3.reduce((s, x) => s + x.value, 0) / 3;
    if (avgRecent - avgPrev > 5) {
      alerts.push({
        severity: 'medium', icon: 'heart',
        title: 'FC au repos en hausse',
        message: `Ta FC repos est passée de ${Math.round(avgPrev)} à ${Math.round(avgRecent)} bpm. Souvent un signe de fatigue ou de maladie qui s'installe.`,
        action: 'Allège la semaine, hydrate-toi bien, surveille un éventuel rhume.'
      });
    }
  }

  // 7. AUCUNE PESÉE DEPUIS 14 JOURS (en transformation)
  if (u.goal !== 'maintenance') {
    const lastWeight = state.weights[state.weights.length - 1];
    if (lastWeight) {
      const daysSince = (Date.now() - new Date(lastWeight.date).getTime()) / 86400000;
      if (daysSince > 14) {
        alerts.push({
          severity: 'low', icon: 'list',
          title: 'Pas de pesée récente',
          message: `Dernière pesée il y a ${Math.round(daysSince)} jours. Sans données, on navigue à l'aveugle.`,
          action: 'Pèse-toi demain matin à jeun.'
        });
      }
    }
  }

  return alerts;
}

// =============================================================
// 7. COACH CONVERSATIONNEL — RECONNAISSANCE D'INTENTION
// =============================================================
const COACH_INTENTS = [
  { id: 'whatToDo',   patterns: [/que (faire|dois.je|conseilles? tu)/i, /quoi (faire|au programme)/i, /aujourd.?hui/i] },
  { id: 'analysis',   patterns: [/(comment je vais|comment ça va|fais le point|bilan|résum[éè]|analyse)/i, /ma progression|mon parcours/i] },
  { id: 'predict',    patterns: [/dans (\d+) ?(semaines?|mois)|cible|objectif/i, /(quand|combien.*temps).*(atteins|atteindre)/i, /prédiction|projection/i] },
  { id: 'whatToEat',  patterns: [/que (manger|cuisiner)|que.*(soir|midi|déjeuner|dîner)/i, /faim|repas/i, /reste.*manger/i] },
  { id: 'loadReco',   patterns: [/quelle?.*charge|combien.*pousser|combien.*soulev/i, /\b(charge|kg|poids).*(prochaine|sur)/i] },
  { id: 'generate',   patterns: [/(crée|génère|propose|fais).*(séance|entraînement)/i, /séance.*sur.?mesure/i] },
  { id: 'alerts',     patterns: [/alertes?|problèmes?|attention|risques?/i] },
  { id: 'meals',      patterns: [/(génère|fais|propose).*(plan|repas|menu)/i, /plan.*(semaine|repas)/i] }
];

function detectIntent(text) {
  const t = text.trim();
  if (!t) return null;
  for (const intent of COACH_INTENTS) {
    if (intent.patterns.some(p => p.test(t))) return intent.id;
  }
  return null;
}

// Détecte l'exercice dont parle l'utilisateur (matching fuzzy basé sur les noms)
function detectExerciseInText(text) {
  const t = text.toLowerCase();
  // Tokens du texte (mots isolés)
  const textTokens = new Set(t.split(/[\s,.'?!:;()-]+/).filter(Boolean));

  // 1. Match parfait : tous les tokens du nom sont des tokens isolés du texte
  const wordMatches = EXERCISES.filter(e => {
    const nameTokens = e.name.toLowerCase().split(/[\s,'-]+/).filter(Boolean);
    return nameTokens.every(w => textTokens.has(w));
  });
  if (wordMatches.length > 0) {
    wordMatches.sort((a, b) => {
      const aWords = a.name.split(/[\s,'-]+/).length;
      const bWords = b.name.split(/[\s,'-]+/).length;
      // Préfère le nom qui matche le plus exactement (= a le moins de mots additionnels)
      if (aWords !== bWords) return bWords - aWords; // plus de mots = nom plus précis
      return a.name.length - b.name.length;
    });
    // Si plusieurs candidats, on prend celui avec le moins de mots (générique gagne pour "squat", spécifique gagne pour "box squat")
    // En pratique, si l'utilisateur dit juste "squat", il veut "Squat" pas "Box squat"
    // Donc on inverse : on préfère le moins de mots
    wordMatches.sort((a, b) => {
      const aWords = a.name.split(/[\s,'-]+/).length;
      const bWords = b.name.split(/[\s,'-]+/).length;
      return aWords - bWords;
    });
    return wordMatches[0];
  }

  // 2. Match d'aliases courts
  const aliases = {
    'dc': 'developpe-couche',
    'sdt': 'soulever-de-terre',
    'developpe couche': 'developpe-couche',
    'développé couché': 'developpe-couche',
    'developpe militaire': 'developpe-militaire',
    'développé militaire': 'developpe-militaire',
    'soulevé de terre': 'soulever-de-terre',
    'tractions': 'tractions',
    'rowing': 'rowing-barre',
    'curl': 'curl-barre',
    'dips': 'dips',
    'pompes': 'pompes',
    'fente': 'fentes-haltères',
    'fentes': 'fentes-haltères',
    'squat': 'squat'
  };
  for (const [alias, exId] of Object.entries(aliases)) {
    if (t.includes(alias)) {
      const found = EXERCISES.find(e => e.id === exId);
      if (found) return found;
    }
  }

  // 3. Match large : au moins un mot >3 lettres du nom est un token du texte
  const candidates = EXERCISES.filter(e => {
    const words = e.name.toLowerCase().split(/[\s,'-]+/).filter(w => w.length > 3);
    return words.length > 0 && words.every(w => textTokens.has(w));
  });
  if (candidates.length > 0) {
    candidates.sort((a, b) => {
      const aWords = a.name.split(/[\s,'-]+/).length;
      const bWords = b.name.split(/[\s,'-]+/).length;
      if (aWords !== bWords) return aWords - bWords;
      return a.name.length - b.name.length;
    });
    return candidates[0];
  }

  return null;
}

// Compose la réponse du coach selon l'intention détectée et le contexte
function coachRespond(text) {
  const intent = detectIntent(text);
  const exMention = detectExerciseInText(text);
  const u = state.user;

  // Mots-clés qui indiquent une demande de charge/performance → traitement local
  const isLoadQuery = /quelle?.*charge|combien.*pousser|combien.*soulev|combien.*(kg|kilos?)|ma charge|mon (max|1rm|1 rm)|charge (suggérée|recommandée)/i.test(text);
  // Mots-clés qui indiquent une demande d'explication/technique → passe à l'IA
  const isInfoQuery = /explique|comment|technique|bonne forme|muscles?|travaille|conseils?|tips?|astuces?|quoi savoir|dis.moi|infos?|parle.moi|c'est quoi|qu'est.ce/i.test(text);

  // Cas spécial : exercice mentionné + intention de charge → recommandation locale
  if (exMention && (isLoadQuery || intent === 'loadReco') && !isInfoQuery) {
    const rec = recommendLoadFor(exMention.id, 10);
    return {
      type: 'load_reco',
      title: `${exMention.name}`,
      content: rec,
      exerciseId: exMention.id
    };
  }

  // Si exercice mentionné mais pas une demande de charge → laisser l'IA répondre
  if (exMention && !isLoadQuery) {
    return null; // → Claude
  }

  switch (intent) {
    case 'whatToDo': {
      const today = todayISO();
      const ws = weekStartDate();
      const plan = (state.weekPlan && state.weekPlan.weekStart === ws) ? state.weekPlan : null;
      const todayPlan = plan?.days.find(d => d.date === today);
      const alerts = detectAlerts().filter(a => a.severity !== 'low');
      let recommendation = '';
      if (alerts.length > 0) {
        recommendation = `Avant tout : ${alerts[0].message} → ${alerts[0].action}`;
      } else if (todayPlan && todayPlan.sport === 'rest') {
        recommendation = "Aujourd'hui c'est repos selon ton planning. Profite-en pour bien dormir et bien manger.";
      } else if (todayPlan && todayPlan.sport === 'strength') {
        recommendation = `Au programme : ${todayPlan.sessionName || 'séance muscu'} (${todayPlan.duration||60}min). Ouvre l'onglet Séance pour démarrer.`;
      } else if (todayPlan) {
        const sp = sportType(todayPlan.sport);
        recommendation = `Au programme : ${sp.label}, ${todayPlan.duration||30} min. Lance la séance depuis l'onglet Séance.`;
      } else {
        recommendation = "Pas de planning pour cette semaine. Va dans Séance → Planifier ma semaine pour t'organiser.";
      }
      return { type: 'plain', title: "Ce qu'il faut faire", content: recommendation };
    }

    case 'analysis': {
      const r = weeklyAnalysis();
      return { type: 'weekly_analysis', title: 'Bilan de la semaine', content: r };
    }

    case 'predict': {
      // Cherche un nombre de semaines dans le texte
      const m = text.match(/(\d+)\s*(semaines?|mois)/i);
      let weeks = 4;
      if (m) weeks = (m[2].startsWith('mois') ? parseInt(m[1]) * 4 : parseInt(m[1]));
      weeks = Math.max(1, Math.min(52, weeks));
      const p = predictWeight(weeks);
      return { type: 'prediction', title: `Projection à ${weeks} semaine${weeks>1?'s':''}`, content: p };
    }

    case 'whatToEat': {
      // Calcule ce qui reste pour la cible du jour
      const dyn = dynamicMacroTargets(state.user, todayISO());
      const today = todayISO();
      const todayMeals = state.meals.filter(m => m.date === today);
      const eaten = todayMeals.reduce((s, m) => ({
        kcal: s.kcal + (m.kcal||0), p: s.p + (m.p||0), c: s.c + (m.c||0), l: s.l + (m.l||0)
      }), { kcal: 0, p: 0, c: 0, l: 0 });
      const remaining = {
        kcal: dyn.kcal - eaten.kcal,
        p: dyn.p - eaten.p,
        c: dyn.c - eaten.c,
        l: dyn.l - eaten.l
      };
      // Trouve une recette adaptée : kcal proche de remaining/2 (un repas), p à hauteur, frigo si possible
      const meals = RECIPES.filter(r => r.category === 'plat' || r.category === 'collation');
      const targetKcal = Math.max(200, remaining.kcal / 2);
      const scored = meals.map(r => {
        let s = -Math.abs(r.kcal - targetKcal); // proche de la cible
        // Bonus si protéines bien dosées
        if (r.p && remaining.p > 0) s += Math.min(20, (r.p / remaining.p) * 20);
        // Bonus frigo
        const frigo = (state.pantry || []).map(p => p.name.toLowerCase());
        if (frigo.length && r.ingredients) {
          const matches = r.ingredients.filter(i => {
            const n = (typeof i === 'string' ? i : i.name).toLowerCase();
            return frigo.some(f => n.includes(f) || f.includes(n));
          }).length;
          s += matches * 8;
        }
        return { r, s };
      });
      scored.sort((a, b) => b.s - a.s);
      const top = scored.slice(0, 3).map(x => x.r);
      return { type: 'meal_suggestion', title: 'Mes suggestions', content: { remaining, recipes: top } };
    }

    case 'loadReco': {
      // Pas d'exercice spécifique mentionné mais l'intention est claire
      return { type: 'plain', title: 'Recommandation de charge', content: "Pour quel exercice ? Tape son nom (ex : développé couché, squat, soulevé de terre)." };
    }

    case 'generate': {
      // Génère une séance par défaut
      const session = generateCustomSession({ duration: 60, focus: 'fullbody', level: 'intermediate' });
      return { type: 'generated_session', title: session.name, content: session };
    }

    case 'meals': {
      const plan = generateSmartMealPlan();
      return { type: 'generated_meal_plan', title: 'Plan repas 7 jours', content: plan };
    }

    case 'alerts': {
      const alerts = detectAlerts();
      return { type: 'alerts', title: alerts.length === 0 ? 'Aucune alerte' : `${alerts.length} alerte${alerts.length>1?'s':''}`, content: alerts };
    }

    default:
      return null; // → fallback Coach existant (catalogue d'exercices)
  }
}

function ob1Next() {

function selectAndSet(field, value, el) {
  el.parentElement.querySelectorAll('.segment-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.user = { ...(state.user || {}), [field]: value };
  saveState();
}

function toggleProgram(id) {
  const u = state.user || {};
  let programs = Array.isArray(u.programs) ? [...u.programs] : (u.program ? [u.program] : []);
  if (programs.includes(id)) {
    programs = programs.filter(p => p !== id);
  } else {
    programs.push(id);
  }
  // Le premier sélectionné reste le programme principal (pour les séances)
  const primary = programs[0] || 'fullbody';
  state.user = { ...u, programs, program: primary };
  saveState();
  render();
}

function renderHome() {
  const u = state.user;
  if (!u) { navigate('welcome'); return ''; }
  const macros = todaysMacros();
  const targets = dynamicMacroTargets(u, todayISO());
  const calRatio = Math.min(macros.kcal / targets.kcal, 1);
  const ringOffset = 490 * (1 - calRatio);
  const lastWeight = state.weights[state.weights.length - 1]?.kg || u.weight;
  const monthAgo = new Date(); monthAgo.setMonth(monthAgo.getMonth() - 1);
  const monthAgoISO = monthAgo.toISOString().slice(0, 10);
  const oldWeight = [...state.weights].reverse().find(w => w.date <= monthAgoISO)?.kg;
  const weightDelta = oldWeight ? (displayWeight(lastWeight) - displayWeight(oldWeight)).toFixed(1) : '—';
  const weekWorkouts = workoutsThisWeek().length;
  const sleepAvg = state.sleep.slice(-7).reduce((a, s) => a + s.hours, 0) / Math.max(state.sleep.slice(-7).length, 1);

  // Séance du jour
  const program = PROGRAMS[u.program];
  const todayDay = new Date().getDay();
  const session = program.sessions[(todayDay - 1 + program.sessions.length) % program.sessions.length];

  const greeting = getGreeting();

  return `
    <div class="screen-header">
      <div class="greeting">${greeting}</div>
      <div class="row-between">
        <h1 class="t-h1">${u.firstName}</h1>
        <button class="btn-icon" onclick="navigate('profile')">${iconUser()}</button>
      </div>
    </div>

    <div class="streak-card">
      <div class="streak-icon">${iconFlame()}</div>
      <div class="streak-content">
        <div class="streak-num">${state.streak} jour${state.streak>1?'s':''}</div>
        <div class="streak-label">${state.streak >= 3 ? 'Tu tiens le rythme. Continue.' : 'Ouvre l\'app chaque jour pour bâtir ta série.'}</div>
      </div>
    </div>

    ${(() => {
      const homeAlerts = detectAlerts().filter(a => a.severity === 'high').slice(0, 2);
      if (homeAlerts.length === 0) return '';
      return `<div class="card-title">Coach IA</div>` + homeAlerts.map(a => renderAlertCard(a)).join('') + `<button class="btn-tertiary mt-8" style="font-size:13px;" onclick="navigate('coach')">Voir toutes les alertes →</button><div style="height:16px;"></div>`;
    })()}

    <div class="quick-stats">
      <div class="stat-tile" onclick="navigate('progress')" style="cursor:pointer;">
        <div class="stat-tile-label">Poids</div>
        <div class="stat-tile-value">${displayWeight(lastWeight)}<span class="stat-tile-unit">${weightUnit()}</span></div>
        <div class="stat-tile-trend">${weightDelta !== '—' ? (weightDelta > 0 ? '+' : '') + weightDelta + ' / 30j' : 'Premier point'}</div>
      </div>
      <div class="stat-tile" onclick="navigate('workout')" style="cursor:pointer;">
        <div class="stat-tile-label">Séances</div>
        <div class="stat-tile-value">${weekWorkouts}<span class="stat-tile-unit">/${u.sessionsPerWeek || program.sessions.length}</span></div>
        <div class="stat-tile-trend">cette semaine</div>
      </div>
      <div class="stat-tile" onclick="navigate('add-sleep')" style="cursor:pointer;">
        <div class="stat-tile-label">Sommeil</div>
        <div class="stat-tile-value">${sleepAvg.toFixed(1)}<span class="stat-tile-unit">h</span></div>
        <div class="stat-tile-trend">moyenne 7j</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Macros aujourd'hui</span>
        <button class="btn-tertiary" onclick="navigate('nutrition')" style="font-size: 13px;">Détail →</button>
      </div>
      <div class="calorie-ring-wrap">
        <svg class="ring-svg" width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-track" cx="90" cy="90" r="78" stroke-width="12"/>
          <circle class="ring-progress" cx="90" cy="90" r="78" stroke-width="12" stroke-dasharray="490" stroke-dashoffset="${ringOffset}"/>
        </svg>
        <div class="ring-center">
          <div class="num">${macros.kcal}</div>
          <div class="unit">kcal consommées</div>
          <div class="sub">/ ${targets.kcal}</div>
        </div>
      </div>
      ${macroBar('Protéines', macros.p, targets.p, 'g')}
      ${macroBar('Glucides', macros.c, targets.c, 'g')}
      ${macroBar('Lipides', macros.l, targets.l, 'g')}
    </div>

    <div class="card">
      <div class="card-title">
        <span>Séance du jour</span>
        <span class="t-caption">${session.name}</span>
      </div>
      <div class="row gap-16 mb-16">
        <div class="list-item-icon" style="width:48px; height:48px; border-radius:16px;">${iconDumbbell()}</div>
        <div style="flex:1;">
          <div class="t-body" style="font-weight:500;">${session.exercises.length} exercices</div>
          <div class="t-caption">environ ${session.duration} min</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startSession('${u.program}','${session.id}')">Démarrer la séance</button>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Sommeil</span>
        <button class="btn-tertiary" onclick="navigate('add-sleep')" style="font-size: 13px;">Saisir →</button>
      </div>
      ${(() => {
        const last = state.sleep[state.sleep.length - 1];
        if (!last) return '<div class="t-caption">Aucune donnée pour l\'instant.</div>';
        return `
          <div class="row gap-16">
            <div>
              <div class="t-mono-lg">${Math.floor(last.hours)}h ${Math.round((last.hours % 1) * 60)}</div>
              <div class="t-caption mt-8">Couché ${last.bedtime || '—'} · réveil ${last.wake || '—'}</div>
            </div>
            <div style="flex:1;"></div>
            <div class="t-caption text-right">Qualité<br><span class="t-mono-sm" style="color:var(--sage-deep);">${'★'.repeat(last.quality)}${'☆'.repeat(5-last.quality)}</span></div>
          </div>
        `;
      })()}
    </div>

    <div style="height: 100px;"></div>
  `;
}

function macroBar(name, val, target, unit) {
  const pct = Math.min((val / target) * 100, 100);
  return `
    <div class="macro-row">
      <div class="macro-head">
        <span class="macro-name">${name}</span>
        <span class="macro-vals">${Math.round(val)}<span class="total"> / ${target} ${unit}</span></span>
      </div>
      <div class="macro-bar"><div class="macro-bar-fill" style="width: ${pct}%;"></div></div>
    </div>
  `;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'Bonne nuit';
  if (h < 12) return 'Bonjour';
  if (h < 18) return "Bonne après-midi";
  return 'Bonsoir';
}

  const plan = (state.weekPlan && state.weekPlan.weekStart === ws) ? state.weekPlan : null;
  const doneByDate = {};
  state.workouts.forEach(w => { doneByDate[w.date] = (doneByDate[w.date] || 0) + 1; });

  return `

      </button>
    </div>

    ${state._programPickerOpen ? `
      <div class="card">
        <div class="t-caption mb-16">Choisis le programme qui te convient. Le changement est instantané et n'efface aucune donnée.</div>
        <div class="program-grid">
          ${Object.entries(PROGRAMS).map(([id, prog]) => `
            <button class="program-pick ${u.program===id?'active':''}" onclick="changeProgram('${id}')">

              <div class="program-pick-meta">${prog.sessions.length} séance${prog.sessions.length>1?'s':''}/sem</div>
              <div class="program-pick-desc">${prog.description}</div>

          `).join('')}

    ` : `
      <div class="program-banner">
        <div class="row-between" style="align-items:center;">
          <div style="flex:1; min-width:0;">

        </div>

    `}

    ${(() => {
      const n = u.sessionsPerWeek || program.sessions.length;
      // Construire la liste des séances à afficher (on boucle sur le programme si n > nombre de sessions)

function renderNoPlanCard() {
  return `
    <div class="card" style="background: var(--sage-pale);">
      <div class="card-title" style="color: var(--sage-deep);">Planifie ta semaine</div>
      <p class="t-body t-graphite mb-16" style="line-height:1.5;">Réponds à un mini-questionnaire (jours dispo, type de séance, horaire) et l'app construit ton planning sur-mesure.</p>
      <button class="btn btn-primary" onclick="navigate('week-plan-setup')">Planifier ma semaine</button>
    </div>
  `;
}

function renderWeekPlanCard(plan, today, doneByDate) {
  const todayDay = plan.days.find(d => d.date === today);
  return `
    <div class="card-title" style="margin-top: 8px;" >
      <span>Cette semaine</span>
      <button class="btn-tertiary" style="font-size:13px;" onclick="navigate('week-plan-setup')">Modifier</button>
    </div>
    <div class="week-grid mb-16">
      ${plan.days.map(d => {
        const dt = new Date(d.date);
        const dn = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'][(dt.getDay()+6)%7];
        const num = dt.getDate();
        const isToday = d.date === today;
        const done = doneByDate[d.date];
        const isRest = d.sport === 'rest';
        const cls = isToday ? 'today' : (done ? 'done' : (isRest ? 'rest' : 'planned'));
        const icon = isRest ? iconSun(14) : sportIcon(d.sport, 14);
        return `<div class="week-day ${cls}" onclick="state._planDayPreview='${d.date}'; render();">
          <div class="week-day-name">${dn}</div>
          <div class="week-day-num">${num}</div>
          <div class="week-day-pill">${icon}</div>
        </div>`;
      }).join('')}
    </div>

    ${todayDay ? renderTodayPlanned(todayDay) : ''}
  `;
}

function renderTodayPlanned(d) {

function toggleEditTarget(idx) {
  state._editingTarget = state._editingTarget === idx ? null : idx;
  render();
}

function updateTarget(idx, field, value) {
  const ex = state._activeWorkout.exercises[idx];
  if (!ex.target) {
    const session = PROGRAMS[state._activeWorkout.programId].sessions.find(s=>s.id===state._activeWorkout.sessionId);
    ex.target = { ...(session.exercises[idx] || { sets: ex.sets.length, reps: '8-12', rest: 75 }) };
  }
  ex.target[field] = value;
}

function addSetTo(idx) {
  state._activeWorkout.exercises[idx].sets.push({ kg: '', reps: '', done: false });
  render();
}

function removeSetFrom(idx) {
  const sets = state._activeWorkout.exercises[idx].sets;
  if (sets.length > 1) sets.pop();
  render();
}

function removeExerciseFromSession(idx) {
  state._activeWorkout.exercises.splice(idx, 1);
  if (state._editingTarget === idx) state._editingTarget = null;
  render();
}

function openAddExoToSession() {
  state._addExoOpen = true;
  state._addExoQuery = '';
  state._addExoCustom = false;

// ============================================================
// MINUTEUR DE REPOS
// ============================================================
function startRestTimer(seconds) {
  state._rest = { remaining: seconds, total: seconds, startAt: Date.now() };
  showRestModal();
  tickRestTimer();
}

function showRestModal() {
  const m = document.getElementById('restModal');
  if (m) m.style.display = 'flex';
}

function hideRestModal() {
  const m = document.getElementById('restModal');
  if (m) m.style.display = 'none';
}

function stopRestTimer() {
  state._rest = null;
  hideRestModal();
}

function restAddTime(delta) {
  if (!state._rest) return;
  state._rest.remaining = Math.max(0, state._rest.remaining + delta);
  state._rest.total = Math.max(state._rest.total, state._rest.remaining);
  updateRestDisplay();
}

function tickRestTimer() {
  if (!state._rest) return;
  const el = document.getElementById('restTime');
  if (!el) { state._rest = null; return; }
  state._rest.remaining = Math.max(0, state._rest.remaining - 1);
  updateRestDisplay();
  if (state._rest.remaining <= 0) {
    // Vibration courte si supportée + son visuel
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    toast('Repos terminé');
    setTimeout(() => stopRestTimer(), 1500);
    return;
  }
  setTimeout(tickRestTimer, 1000);
}

function updateRestDisplay() {
  const el = document.getElementById('restTime');
  if (!el || !state._rest) return;
  const r = state._rest.remaining;
  el.textContent = `${String(Math.floor(r/60)).padStart(2,'0')}:${String(r%60).padStart(2,'0')}`;
  // Couleur selon temps restant
  if (r <= 5) el.style.color = 'var(--crimson)';
  else if (r <= 15) el.style.color = 'var(--terra)';
  else el.style.color = 'var(--stone)';
}

// ============================================================
// HELPERS UNITÉS
// ============================================================
function unitsSystem() {
  return state.settings?.units || 'metric';
}
function isImperial() { return unitsSystem() === 'imperial'; }
function weightUnit() { return isImperial() ? 'lb' : 'kg'; }
function lengthUnit() { return isImperial() ? 'in' : 'cm'; }
function distanceUnit() { return isImperial() ? 'mi' : 'km'; }
function heightUnit() { return isImperial() ? 'ft' : 'cm'; }
// Conversions (jamais stockées convertes ; le storage reste en métrique)
function kgToLb(kg) { return kg * 2.2046226218; }
function lbToKg(lb) { return lb / 2.2046226218; }
function cmToIn(cm) { return cm / 2.54; }
function inToCm(inch) { return inch * 2.54; }
// Affiche un poids stocké (kg) selon l'unité courante
function displayWeight(kg, decimals = 1) {
  if (kg === null || kg === undefined || isNaN(kg)) return '—';
  const v = isImperial() ? kgToLb(kg) : kg;
  return Number(v.toFixed(decimals));
}
function displayLength(cm, decimals = 1) {
  if (cm === null || cm === undefined || isNaN(cm)) return '—';
  const v = isImperial() ? cmToIn(cm) : cm;
  return Number(v.toFixed(decimals));
}
// Convertit une valeur saisie (selon l'unité courante) en métrique pour le stockage
function inputToKg(value) {
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  return isImperial() ? lbToKg(v) : v;
}
function inputToCm(value) {
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  return isImperial() ? inToCm(v) : v;
}
// Affichage de la taille : 175cm en métrique, 5'9" en imperial
function formatHeightDisplay(cm) {
  if (cm === null || cm === undefined || isNaN(cm)) return '—';
  if (!isImperial()) return cm + ' cm';
  const totalIn = cmToIn(cm);
  const ft = Math.floor(totalIn / 12);
  const inch = Math.round(totalIn - ft * 12);
  return ft + "'" + inch + '"';
}

const iconEdit = () => `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3 L15 7 L7 15 L3 15 L3 11 Z"/></svg>`;

function updateSet(exIdx, setIdx, field, value) {
  state._activeWorkout.exercises[exIdx].sets[setIdx][field] = value;
}

function toggleSetDone(exIdx, setIdx) {
  const set = state._activeWorkout.exercises[exIdx].sets[setIdx];
  set.done = !set.done;
  if (set.done && set.kg && set.reps) {
    const exId = state._activeWorkout.exercises[exIdx].exerciseId;
    const isPR = checkPR(exId, set.kg, set.reps);
    if (isPR) toast('Nouveau record sur ' + EXERCISES.find(e=>e.id===exId).name + ' !');
  }
  document.getElementById(`set-${exIdx}-${setIdx}`).classList.toggle('done', set.done);
}

function abortSession() {
  // Pas de confirm() natif (bloqué partout) — on confirme via le bouton retour qui re-clic
  if (state._abortPending) {
    clearTimeout(state._abortTimer);
    state._abortPending = false;
    state._activeWorkout = null;
    navigate('workout');
    return;
  }
  state._abortPending = true;
  toast('Re-clique sur retour pour abandonner');
  state._abortTimer = setTimeout(() => { state._abortPending = false; }, 3000);
}

function activeWorkoutElapsedMs() {
  const w = state._activeWorkout;
  if (!w) return 0;
  let total = w.elapsedMs || 0;
  if (w.runningSince) total += Date.now() - w.runningSince;
  return total;
}

function formatElapsed(ms) {
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function toggleSessionTimer() {
  const w = state._activeWorkout;
  if (!w) return;
  if (w.runningSince) {
    // Pause
    w.elapsedMs = (w.elapsedMs || 0) + (Date.now() - w.runningSince);
    w.runningSince = null;
  } else {
    // Reprise
    w.runningSince = Date.now();
  }
  render();
}

function finishSession() {
  const w = state._activeWorkout;
  if (!w) return;
  // Stop chrono si encore actif
  if (w.runningSince) {
    w.elapsedMs = (w.elapsedMs || 0) + (Date.now() - w.runningSince);
    w.runningSince = null;
  }
  w.duration = Math.round((w.elapsedMs || 0) / 60000);
  w.type = 'strength';
  // Filtre les sets non remplis
  w.exercises.forEach(ex => {
    ex.sets = ex.sets.filter(s => s.kg || s.reps || s.done);
  });
  state.workouts.push(w);
  state._activeWorkout = null;
  saveState();
  const newBadges = checkAllBadges();
  if (newBadges.length > 0) {
    toast(`Séance enregistrée · Nouveau badge : ${newBadges[0].label}`);
  } else {
    toast('Séance enregistrée. Bravo !');
  }
  navigate('workout');
}

const iconPlay = () => `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M3 2 L11 7 L3 12 Z"/></svg>`;
const iconPause = () => `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="3" y="2" width="3" height="10" rx="0.5"/><rect x="8" y="2" width="3" height="10" rx="0.5"/></svg>`;

function renderWorkoutHistory() {
  const sorted = [...state.workouts].sort((a, b) => b.date.localeCompare(a.date));
  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="navigate('workout')">${iconBack()}</button><div></div></div>
      <h1 class="t-h1" style="margin-top: 8px;">Historique</h1>

function deleteWorkout(id) {
  // Premier clic : on demande confirmation visuelle
  if (state._deleteConfirm !== id) {
    state._deleteConfirm = id;
    render();
    // Reset auto au bout de 4 secondes si pas de second clic
    clearTimeout(state._deleteConfirmTimer);
    state._deleteConfirmTimer = setTimeout(() => {
      if (state._deleteConfirm === id) {
        state._deleteConfirm = null;
        render();
      }
    }, 4000);
    return;
  }
  // Deuxième clic : on supprime
  state._deleteConfirm = null;
  clearTimeout(state._deleteConfirmTimer);
  state.workouts = state.workouts.filter(w => w.id !== id);
  // Recalculer les PRs depuis les séances restantes
  state.prs = {};
  state.workouts.forEach(w => {
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => {
        const kg = parseFloat(s.kg), reps = parseInt(s.reps);
        if (kg && reps && s.done) {
          const vol = kg * reps;
          const cur = state.prs[ex.exerciseId];
          if (!cur || vol > cur.volumeKg) {
            state.prs[ex.exerciseId] = { volumeKg: vol, kg, reps, date: w.date };
          }
        }
      });
    });
  });
  saveState();
  toast('Séance supprimée');
  render();
}

      return `
        <div class="card" style="background: var(--sage-pale); border: 1px solid var(--sage); padding: 16px; margin-bottom: 16px;">
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">

            <div>
              <div class="t-h3" style="color:var(--sage-deep);">${fridgeFromShopping.length} article${fridgeFromShopping.length>1?'s':''} dans ton frigo</div>
              <div class="t-caption">${fridgeFromShopping.map(p=>p.name).slice(0,3).join(', ')}${fridgeFromShopping.length>3?' …':''}</div>
            </div>
          </div>
          <button class="btn btn-primary" style="height:44px; font-size:15px;" onclick="navigate('recipe-suggestions')">
            ✨ Générer des repas avec mon frigo
          </button>
        </div>
      `;
    })()}

    ${totalItems === 0 ? `
      <div class="empty">
        <div class="empty-icon">${iconBowl(40)}</div>
        <div class="empty-title">Liste vide</div>
        <div class="empty-sub">Ajoute des articles ci-dessus, ou tu as déjà tout ce qu'il faut au frigo.</div>
      </div>
    ` : Object.entries(list).map(([cat, items]) => `
      <div class="shopping-section">
        <div class="shopping-section-title">${cat}</div>
        ${items.map((it, i) => {
          const key = (it.extraId ? 'extra:'+it.extraId : cat + '-' + i);
          const checked = state._shoppingChecked[key];
          const safeName = it.name.replace(/'/g, "\\'");
          return `
            <div class="shopping-item ${checked?'checked':''}">
              <div class="shopping-checkbox" onclick="toggleShopping('${key}', '${safeName}')">${iconCheck()}</div>
              <div class="shopping-name" onclick="toggleShopping('${key}', '${safeName}')">${it.name}${it.source==='manual'?' <span class="t-legend" style="color:var(--sage-deep); margin-left:4px;">ajouté</span>':''}</div>
              <div class="shopping-qty">${it.qty ? Math.round(it.qty)+' '+(it.unit||'') : ''}</div>
              ${it.estimatedPrice ? `<div class="t-mono-sm" style="color:var(--mist); font-size:12px; min-width:36px; text-align:right;">~${it.estimatedPrice.toFixed(1)}€</div>` : ''}
              ${it.extraId ? `<button class="btn-icon" style="width:32px; height:32px; margin-left:4px;" onclick="removeShoppingExtra('${it.extraId}')">${iconClose()}</button>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `).join('')}
    <div style="height: 100px;"></div>
  `;
}

function addShoppingExtra() {
  const input = document.getElementById('extraInput');
  const name = input.value.trim();
  if (!name) return toast('Tape un nom d\'article');
  if (!state.shoppingExtras) state.shoppingExtras = [];
  state.shoppingExtras.push({ id: uid(), name, addedAt: Date.now() });
  saveState();
  input.value = '';
  toast('Ajouté à la liste');
  render();
}

function removeShoppingExtra(id) {
  state.shoppingExtras = (state.shoppingExtras || []).filter(e => e.id !== id);
  // Nettoyer aussi l'état "coché" associé
  delete state._shoppingChecked['extra:' + id];
  saveState();
  render();
}

function toggleShopping(key, itemName) {
  if (!state._shoppingChecked) state._shoppingChecked = {};
  const wasChecked = !!state._shoppingChecked[key];
  state._shoppingChecked[key] = !wasChecked;

  // Sync avec le frigo
  if (!state.pantry) state.pantry = [];
  if (!wasChecked && itemName) {
    // Coché → ajouter au frigo si pas déjà présent
    if (!state.pantry.some(p => normalizeFood(p.name) === normalizeFood(itemName))) {
      state.pantry.push({ id: 'shop_' + key.replace(/[^a-zA-Z0-9]/g,'_'), name: itemName, addedAt: Date.now(), fromShopping: true });
      toast('✓ Ajouté au frigo');
    }
  } else if (wasChecked && itemName) {
    // Décoché → retirer du frigo (seulement si ajouté depuis la liste de courses)
    const before = state.pantry.length;
    state.pantry = state.pantry.filter(p => !(normalizeFood(p.name) === normalizeFood(itemName) && p.fromShopping));
    if (state.pantry.length < before) toast('Retiré du frigo');
  }

  saveState();
  render();
}

// ============================================================
// MON FRIGO (PANTRY)
// ============================================================
function renderPantry() {
  if (!state.pantry) state.pantry = [];
  const items = state.pantry;
  const grouped = {};
  items.forEach(it => {
    const cat = categorizeFood(it.name);
    grouped[cat] = grouped[cat] || [];
    grouped[cat].push(it);
  });

  const matchable = matchableRecipes(items, 2);

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button><div></div></div>
      <h1 class="t-h1" style="margin-top: 8px;">Mon frigo</h1>
      <div class="t-caption">${items.length} ingrédient${items.length>1?'s':''} disponible${items.length>1?'s':''}</div>
    </div>

    <div class="card" style="padding: 16px;">
      <div class="t-caption mb-8" style="font-weight:500;">Qu'as-tu dans ton frigo ou ton placard ?</div>
      <div class="row gap-8">
        <input type="text" class="input" id="pantryInput" placeholder="ex : poulet, riz, courgettes…" style="height: 44px;" onkeydown="if(event.key==='Enter')addPantryItem()">
        <button class="btn-icon" style="background: var(--sage); color: var(--bone); width: 44px; height: 44px;" onclick="addPantryItem()">${iconPlus()}</button>
      </div>
      ${items.length > 0 ? `<div class="t-caption mt-16">Tu peux aussi taper plusieurs ingrédients séparés par des virgules.</div>` : `
        <div class="t-caption mt-16">Une fois rempli, je te proposerai des recettes faisables avec ce que tu as.</div>
      `}
    </div>

    ${items.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">${iconFridge(40)}</div>
        <div class="empty-title">Frigo vide</div>
        <div class="empty-sub">Commence par ajouter ce que tu as déjà chez toi pour découvrir les recettes possibles.</div>
      </div>
    ` : ''}

    ${Object.entries(grouped).map(([cat, list]) => `
      <div class="shopping-section">
        <div class="shopping-section-title">${cat}</div>
        ${list.map(it => `
          <div class="shopping-item">
            <div class="shopping-checkbox" style="background: var(--sage); border-color: var(--sage); color: var(--bone);">${iconCheck()}</div>
            <div class="shopping-name">${it.name}</div>
            <button class="btn-icon" style="width:32px; height:32px;" onclick="removePantryItem('${it.id}')">${iconClose()}</button>
          </div>
        `).join('')}
      </div>
    `).join('')}

    ${matchable.length > 0 ? `
      <div class="card" style="background: var(--sage-pale);">
        <div class="card-title" style="color: var(--sage-deep);">${iconSparkle()} ${matchable.length} recettes possibles avec ce que tu as</div>
        <button class="btn btn-primary" onclick="navigate('recipe-suggestions')">Voir les recettes</button>
      </div>
    ` : ''}

    <div style="height: 100px;"></div>
  `;
}

function addPantryItem() {
  const input = document.getElementById('pantryInput');
  const raw = input.value.trim();
  if (!raw) return toast('Tape un ingrédient');
  // Support multi-saisie : virgules
  const names = raw.split(/[,;]/).map(s => s.trim()).filter(Boolean);
  if (!state.pantry) state.pantry = [];
  let added = 0;
  names.forEach(name => {
    // Évite les doublons exacts (insensibles à la casse)
    if (!state.pantry.some(p => normalizeFood(p.name) === normalizeFood(name))) {
      state.pantry.push({ id: uid(), name, addedAt: Date.now() });
      added++;
    }
  });
  saveState();
  input.value = '';
  if (added === 0) toast('Déjà dans ton frigo');
  else toast(added > 1 ? `${added} ingrédients ajoutés` : 'Ajouté au frigo');
  render();
}

function removePantryItem(id) {
  state.pantry = (state.pantry || []).filter(p => p.id !== id);
  saveState();
  render();
}

// RECETTES POSSIBLES (matching)
// ============================================================
function renderRecipeSuggestions() {
  const items = state.pantry || [];
  if (items.length === 0) {
    return `
      <div class="screen-header">
        <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button><div></div></div>
        <h1 class="t-h1" style="margin-top: 8px;">Recettes possibles</h1>
      </div>
      <div class="empty">
        <div class="empty-icon">${iconBowl(40)}</div>
        <div class="empty-title">Frigo vide</div>
        <div class="empty-sub">Ajoute d'abord des ingrédients dans ton frigo pour que je te propose des recettes.</div>
      </div>
      <button class="btn btn-primary" onclick="navigate('pantry')">Remplir mon frigo</button>
    `;
  }

  const matches = matchableRecipes(items, 1);
  const filter = state._suggestFilter || 'all';
  let filtered = matches;
  if (filter === 'ready') filtered = matches.filter(m => m.missing.length === 0);
  if (filter === 'almost') filtered = matches.filter(m => m.missing.length > 0 && m.missing.length <= 3);

  return `
    <div class="screen-header">
      <div class="row-between"><button class="btn-icon" onclick="goBack('shopping-list')">${iconBack()}</button>
        <button class="btn-icon" onclick="navigate('pantry')">${iconFridge()}</button>
      </div>
      <h1 class="t-h1" style="margin-top: 8px;">Recettes possibles</h1>
      <div class="t-caption">À partir de ${items.length} ingrédient${items.length>1?'s':''} de ton frigo</div>
    </div>

    <div class="row gap-8 mb-16">
      <button class="chip ${filter==='all'?'active':''}" onclick="setSuggestFilter('all')">Toutes (${matches.length})</button>
      <button class="chip ${filter==='ready'?'active':''}" onclick="setSuggestFilter('ready')">Prêtes (${matches.filter(m=>m.missing.length===0).length})</button>
      <button class="chip ${filter==='almost'?'active':''}" onclick="setSuggestFilter('almost')">Presque (${matches.filter(m=>m.missing.length>0&&m.missing.length<=3).length})</button>
    </div>

    ${filtered.length === 0 ? `
      <div class="empty">
        <div class="empty-title">Aucune recette ne correspond</div>
        <div class="empty-sub">Ajoute plus d'ingrédients à ton frigo ou change de filtre.</div>
      </div>
    ` : filtered.slice(0, 30).map(m => {
      const r = m.recipe;
      const ratio = m.have / m.total;
      const ready = m.missing.length === 0;
      return `
        <div class="card" style="cursor:pointer;" onclick="navigate('recipe-detail', { id: '${r.id}', slot: '${r.category==='petit-dej'?'Petit-déj':r.category==='collation'?'Collation':'Repas'}', date: '${todayISO()}' })">
          <div class="row-between mb-16">
            <div style="flex:1; min-width:0;">
              <div class="t-body" style="font-weight:600;">${r.name}</div>
              <div class="t-caption mt-8">${r.kcal} kcal · ${r.p}g P · ${r.time} min</div>
            </div>
            <div class="match-badge ${ready?'ready':m.missing.length<=2?'almost':'partial'}">
              ${m.have}/${m.total}
            </div>
          </div>
          <div class="match-bar"><div class="match-bar-fill ${ready?'ready':m.missing.length<=2?'almost':'partial'}" style="width: ${ratio*100}%;"></div></div>
          ${m.missing.length === 0 ? `
            <div class="t-caption mt-8" style="color: var(--sage-deep); font-weight: 500;">${iconCheck()} Tu as tout ce qu'il faut</div>
          ` : `
            <div class="t-caption mt-8">Manque : <span style="color: var(--graphite);">${m.missing.slice(0,3).map(i=>i.name).join(', ')}${m.missing.length>3?` et ${m.missing.length-3} autre${m.missing.length-3>1?'s':''}`:''}</span></div>
          `}
        </div>
      `;
    }).join('')}

    <div style="height: 100px;"></div>
  `;
}

function setSuggestFilter(f) {
  state._suggestFilter = f;
  render();
}

const iconFridge = (s=18) => `<svg width="${s}" height="${s}" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="10" height="14" rx="1.5"/><path d="M4 8 L14 8 M6 5 L6 6.5 M6 11 L6 12.5"/></svg>`;
const iconSparkle = (s=16) => `<svg width="${s}" height="${s}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2 L9 6 L13 7 L9 8 L8 12 L7 8 L3 7 L7 6 Z"/><path d="M13 2 L13.5 3.5 L15 4 L13.5 4.5 L13 6 L12.5 4.5 L11 4 L12.5 3.5 Z"/></svg>`;
const iconClose = () => `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3 L11 11 M11 3 L3 11"/></svg>`;

function saveCustomMeal() {
  const meal = {
    id: uid(), date: todayISO(),
    slot: document.getElementById('m_slot').value,
    name: document.getElementById('m_name').value.trim(),
    kcal: parseInt(document.getElementById('m_kcal').value) || 0,
    p: parseFloat(document.getElementById('m_p').value) || 0,
    c: parseFloat(document.getElementById('m_c').value) || 0,
    l: parseFloat(document.getElementById('m_l').value) || 0
  };
  if (!meal.name || !meal.kcal) return toast('Nom et kcal au minimum');
  state.meals.push(meal);
  saveState();
  toast('Repas ajouté');
  navigate('nutrition');
}

function addRecipeAsMeal(id) {
  const r = RECIPES.find(x => x.id === id);
  const slotMap = { 'petit-dej': 'Petit-déjeuner', 'plat': 'Déjeuner', 'collation': 'Collation' };
  const meal = {
    id: uid(), date: todayISO(),
    slot: slotMap[r.category], name: r.name,
    kcal: r.kcal, p: r.p, c: r.c, l: r.l, recipeId: r.id
  };
  state.meals.push(meal);
  saveState();
  toast('Repas ajouté');
  navigate('nutrition');
}

// PROGRÈS
// ============================================================
function renderProgress() {
  const u = state.user;
  const weights = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const lastWeight = weights[weights.length-1]?.kg || u.weight;
  const startWeight = weights[0]?.kg || u.weight;
  const delta = lastWeight - startWeight;
  const totalToTarget = startWeight - u.targetWeight;
  const progressed = startWeight - lastWeight;
  const progressPct = totalToTarget !== 0 ? Math.max(0, Math.min(100, (progressed / totalToTarget) * 100)) : 0;

  const period = state._period || '30';
  const filteredWeights = filterByPeriod(weights, period);
  const lastMeasure = state.measurements[state.measurements.length - 1];

  const sleepLast7 = state.sleep.slice(-7);
  const sleepAvg = sleepLast7.length ? sleepLast7.reduce((a,s)=>a+s.hours,0)/sleepLast7.length : 0;

  return `
    <div class="screen-header">
      <h1 class="t-h1" style="margin-bottom: 4px;">Progrès</h1>
      <div class="t-caption">Mis à jour ${weights.length>0 ? fmtDate(weights[weights.length-1].date) : 'jamais'}</div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Poids</span>
        <span class="t-caption">objectif ${displayWeight(u.targetWeight)} ${weightUnit()}</span>
      </div>
      <div class="row" style="align-items: baseline; gap: 12px; margin-bottom: 8px;">
        <div class="t-mono-xl">${displayWeight(lastWeight)}</div>
        <div class="t-caption">${weightUnit()}</div>
        <div style="flex:1;"></div>
        <div class="t-mono-sm" style="color: var(--sage-deep);">${delta>0?'+':''}${(displayWeight(lastWeight)-displayWeight(startWeight)).toFixed(1)} depuis le départ</div>
      </div>
      <div class="t-caption mb-24">${Math.abs(displayWeight(lastWeight) - displayWeight(u.targetWeight)).toFixed(1)} ${weightUnit()} avant ta cible</div>

      <div class="period-selector">
        <button class="period-btn ${period==='7'?'active':''}" onclick="setPeriod('7')">7j</button>
        <button class="period-btn ${period==='30'?'active':''}" onclick="setPeriod('30')">30j</button>
        <button class="period-btn ${period==='90'?'active':''}" onclick="setPeriod('90')">3 mois</button>
        <button class="period-btn ${period==='365'?'active':''}" onclick="setPeriod('365')">1 an</button>
      </div>

      ${weightChart(filteredWeights, u.targetWeight)}

      <div class="row-between mt-16">
        <div><div class="t-caption">Départ</div><div class="t-mono-sm" style="margin-top: 4px;">${displayWeight(startWeight)} ${weightUnit()}</div></div>
        <div style="flex:1; padding: 0 16px;">
          <div class="macro-bar"><div class="macro-bar-fill" style="width: ${progressPct}%;"></div></div>
          <div class="t-legend text-right" style="margin-top: 4px;">${Math.round(progressPct)}% du chemin</div>
        </div>
        <div class="text-right"><div class="t-caption">Cible</div><div class="t-mono-sm" style="margin-top: 4px;">${displayWeight(u.targetWeight)} ${weightUnit()}</div></div>
      </div>
      <div style="height: 16px;"></div>
      <div class="row gap-8">
        <button class="btn btn-secondary" style="flex:1;" onclick="navigate('add-weight')">+ Ajouter</button>
        <button class="btn btn-secondary" style="flex:1;" onclick="navigate('weight-history')">Historique</button>
      </div>
    </div>

      <div class="card-title">
        <span>Mensurations</span>

    </div>

    <div class="card">
      <div class="card-title">Records personnels</div>
      ${(() => {
        const prs = Object.entries(state.prs).sort((a,b)=>b[1].volumeKg - a[1].volumeKg).slice(0,5);

            <div class="list-item">

              <div class="list-item-content">
